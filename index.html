        <div style="font-size:10px;color:var(--acc);background:var(--bg3);padding:7px 10px;border-radius:3px;border-left:3px solid var(--acc);margin-bottom:8px;line-height:1.5">बुध (सूर्य से ≤28°) व शुक्र (≤48°) केवल सूर्य से <b>युति</b> ही बनाते हैं — इनकी त्रिकोणीय ज्यामिति वायदा-हाजिर अन्तर (futures-spot basis) को किसी भी अन्य योग से अधिक नियन्त्रित करती है।</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          ${card('सूर्य · SUN',TR.Su.sign.slice(0,3)+' '+dmsC(TR.Su.lon%30),TR.Su.lon.toFixed(2)+'° निरयन','#FFB300')}
          ${card('बुध · MERCURY'+(TR.Me.retro?' ℞':''),TR.Me.sign.slice(0,3)+' '+dmsC(TR.Me.lon%30),'गति '+(TR.Me.speed>0?'+':'')+TR.Me.speed.toFixed(3)+'°/d','#69F0AE')}
          ${card('शुक्र · VENUS'+(TR.Ve.retro?' ℞':''),TR.Ve.sign.slice(0,3)+' '+dmsC(TR.Ve.lon%30),'गति '+(TR.Ve.speed>0?'+':'')+TR.Ve.speed.toFixed(3)+'°/d','#F06292')}
          ${card('त्रिक निर्णय',TR.trioBias,'स्कोर '+(TR.trioScore>0?'+':'')+TR.trioScore,tcol)}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          ${card('बुध ↔ सूर्य',TR.dMeSu.toFixed(2)+'°',TR.mercCombust?'⚡ अस्त · combust':'मुक्त',TR.mercCombust?'var(--neut)':'#cde')}
          ${card('शुक्र ↔ सूर्य',TR.dVeSu.toFixed(2)+'°',TR.venusCombust?'⚡ अस्त · combust':'मुक्त',TR.venusCombust?'var(--bear)':'#cde')}
          ${card('बुध ↔ शुक्र',TR.dMeVe.toFixed(2)+'°',TR.merVenYuti?'युति · range-bound':TR.merVenWide?'चौड़ा · max basis':'मध्य',TR.merVenYuti?'var(--neut)':TR.merVenWide?'var(--acc)':'#cde')}
          ${card('BASIS परिमाण',TR.basisMag+'%','बुध-शुक्र '+TR.dMeVe.toFixed(0)+'°/76°',reg[1])}
        </div>
        <div style="background:var(--bg2);border-left:3px solid ${reg[1]};padding:7px 10px;border-radius:3px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:${reg[1]}">वायदा-हाजिर आधार: ${reg[0]}</div><div style="font-size:10px;color:var(--tx2);margin-top:2px">${TR.basisText}</div></div>
        <div class="ts"><table class="tbl"><thead><tr><th>नियम</th><th>व्याख्या (book rule)</th><th style="text-align:center">दिशा</th></tr></thead><tbody>${trules}</tbody></table></div>
        <div style="font-size:9px;color:var(--tx3);margin-top:6px"><b style="color:var(--acc)">पु.271:</b> "बुध और शुक्र के बीच की दूरी ही तैयार और वायदे के बाज़ार की चाल के रुख को बतलाती है।"</div>
      </div></div>`;
  }
  // ── MODULE 9: 15-day UPCOMING-ASPECTS lead-time scan (p.283) ──
  const UP=D.upcomingAspects||[];
  const upCol=d=>d>0?'var(--bull)':d<0?'var(--bear)':'var(--neut)';
  const upRows=UP.map(u=>`<tr class="${u.inLeadTime?(u.dir>0?'tr-b':u.dir<0?'tr-r':'tr-n'):''}"><td style="font-weight:700;white-space:nowrap"><span style="color:${PC[u.p1]||'#cde'}">${VR_DEV[u.p1]||u.p1}</span>–<span style="color:${PC[u.p2]||'#cde'}">${VR_DEV[u.p2]||u.p2}</span></td><td style="white-space:nowrap">${u.sym} ${u.name}<div style="font-size:8px;color:var(--tx3)">${u.aspect}°</div></td><td style="text-align:right;font-family:monospace;color:${u.inLeadTime?'var(--acc)':'var(--tx2)'};font-weight:${u.inLeadTime?700:400}">${u.daysFromNow}d</td><td style="font-size:9px;color:${u.inLeadTime?'var(--acc)':'var(--tx3)'}">${u.note}</td><td style="text-align:center;color:${upCol(u.dir)};font-weight:700;white-space:nowrap">${u.dir>0?'▲ तेजी':u.dir<0?'▼ मंदी':'• सम'}</td></tr>`).join('');
  const upcomingPanel=`<div class="pnl"><div class="ph"><span class="dot"></span>★ आगामी दृष्टि-योग · 15-दिन LEAD-TIME स्कैन · p.283</div>
    <div class="pb"><div style="font-size:10px;color:var(--tx2);margin-bottom:6px">पु.283: दृष्टि का प्रभाव पूर्ण होने से <b>पहले</b> आरम्भ होता है — युति/प्रतियोग ≈ 7 दिन पूर्व, त्रिकोण/केन्द्र ≈ 5 दिन, षष्ठांश ≈ 4 दिन। <b style="color:var(--acc)">★</b> पंक्तियाँ अभी अपने lead-time में हैं (भाव अभी प्रभावित)।</div>
    ${UP.length?`<div class="ts" style="max-height:320px;overflow:auto"><table class="tbl"><thead><tr><th>ग्रह-युग्म</th><th>दृष्टि</th><th style="text-align:right">कब</th><th>स्थिति</th><th style="text-align:center">फल</th></tr></thead><tbody>${upRows}</tbody></table></div>`:'<div style="color:var(--tx3);font-size:11px">अगले 15 दिनों में कोई बड़ा दृष्टि-योग पूर्ण नहीं हो रहा।</div>'}</div></div>`;

  const yrows=VR.yogas.map(y=>{ const aspTxt=y.kranti?`क्रान्ति-साम्य<div style="font-size:8px;color:var(--tx3)">Δदेक ${y.off.toFixed(2)}°</div>`:`${y.asp.dev}<div style="font-size:8px;color:var(--tx3)">${y.asp.a}° · off ${y.off.toFixed(1)}°</div>`;
    const tag=p=>`<span style="color:${PC[p.name]};font-weight:700">${p.dev}</span> <span style="font-size:8px;color:${p.ben?'var(--bull)':'var(--bear)'}">${p.ben?'शुभ':'क्रूर'}${p.retro?'·वक्री':''}</span>`;
    const mixed=(y.p1.ben!==y.p2.ben);
    return `<tr class="${y.v>0?'tr-b':y.v<0?'tr-r':'tr-n'}"><td>${tag(y.p1)}</td><td>${tag(y.p2)}</td><td style="font-size:10px;color:var(--tx1)">${aspTxt}</td><td style="text-align:center;font-weight:700;color:${vcol(y.v)};white-space:nowrap">${vlbl(y.v)}<div style="font-size:8px">${y.v>0?'+':''}${y.v}</div></td><td style="font-size:9px;color:var(--tx3)">${mixed?('जय: '+VR.Pm[y.win].dev):(y.p1.ben&&y.p2.ben?'शुभ-शुभ':'क्रूर-क्रूर')}${(y.p1.retro||y.p2.retro)?' · वक्री-विपरीत':''}</td></tr>`; }).join('');
  const yogaPanel=`<div class="pnl"><div class="ph"><span class="dot"></span>सक्रिय दृष्टि-योग · ACTIVE ASPECT-YOGAS (सायन · ${mtt(parseFloat(S.time)*60)})</div>
    ${VR.yogas.length?`<div class="ts" style="max-height:380px;overflow:auto"><table class="tbl"><thead><tr><th>ग्रह १</th><th>ग्रह २</th><th>दृष्टियोग (अंशान्तर)</th><th style="text-align:center">फल</th><th>निर्णय</th></tr></thead><tbody>${yrows}</tbody></table></div>`:`<div class="pb" style="color:var(--tx3);font-size:11px">कोई दृष्टियोग दीप्तांश के अन्दर सक्रिय नहीं।</div>`}</div>`;

  // ── MODULES 7+8: enhanced शर / क्रान्ति-साम्य / शर-परिवर्तन (pp.320-329) ──
  const shMap=Object.fromEntries((D.sharNow||[]).map(s=>[s.body,s]));
  const srows=VR.P.map(p=>{ const noLat=(p.name==='Sun'||p.name==='Rahu'||p.name==='Ketu'); const sm=shMap[p.name];
    const shar=noLat?'<span style="color:var(--tx3)">— (क्रान्तिवृत्त पर)</span>':`${Math.abs(p.lat).toFixed(2)}° ${p.lat>=0?'<span style="color:#ff8a65">उ N</span>':'<span style="color:#69f0ae">द S</span>'}`;
    const pctTxt=(!noLat&&sm)?`<span style="color:var(--tx2)">${sm.pctOfMax}%</span>`:'<span style="color:var(--tx3)">—</span>';
    const nz=(sm&&sm.nearZero)?'<span class="pill pb-n" style="font-size:8px">⚡ NEAR-ZERO शर-परिवर्तन</span>':'';
    const kr=`${Math.abs(p.dec).toFixed(2)}° ${p.dec>=0?'<span style="color:#ff8a65">उ N</span>':'<span style="color:#69f0ae">द S</span>'}`;
    return `<tr><td style="color:${PC[p.name]};font-weight:700">${p.dev} <span style="font-size:8px;color:var(--tx3)">${p.name}</span></td><td>${shar} ${nz}</td><td style="text-align:right">${pctTxt}</td><td>${kr}</td><td>${p.retro?'<span style="color:var(--bear)">℞</span>':'<span style="color:var(--tx3)">मार्गी</span>'}</td></tr>`; }).join('');
  const NODES=D.sharCrossings||[];
  const nodeRows=NODES.slice(0,8).map(nc=>{ const im=Math.abs(nc.daysFromNow)<3;
    return `<tr><td style="color:${PC[nc.body]||'#cde'};font-weight:700">${VR_DEV[nc.body]||nc.body}</td><td style="font-size:10px">${nc.direction}</td><td style="text-align:right;font-family:monospace;color:${im?'var(--bear)':'var(--tx2)'};font-weight:${im?700:400}">${nc.daysFromNow>0?'+':''}${nc.daysFromNow}d</td><td style="font-size:9px;color:${im?'var(--bear)':'var(--tx3)'}">${nc.note}</td></tr>`; }).join('');
  const KS=D.krantiSamya||[];
  const ksRows=KS.slice(0,8).map(k=>{ const col=k.weight>0?'var(--bull)':k.weight<0?'var(--bear)':'var(--neut)';
    return `<tr><td style="font-weight:700;white-space:nowrap"><span style="color:${PC[k.p1]||'#cde'}">${VR_DEV[k.p1]||k.p1}</span>–<span style="color:${PC[k.p2]||'#cde'}">${VR_DEV[k.p2]||k.p2}</span></td><td style="font-size:10px;color:${k.sameDir?'var(--bull)':'var(--neut)'}">${k.type}<div style="font-size:8px;color:var(--tx3)">${k.sameDir?'75% बल':'50% बल'}</div></td><td style="text-align:right;color:var(--tx2)">Δ${k.delta}°</td><td style="text-align:center;color:${col};font-weight:700">${k.weight>0?'+':''}${k.weight}</td></tr>`; }).join('');
  const sharPanel=`<div class="pnl"><div class="ph"><span class="dot"></span>★ शर (अक्षांश) · क्रान्ति-साम्य · शर-परिवर्तन · pp.320-329</div>
    <div class="pb">
      <div style="font-size:9px;color:var(--tx3);margin-bottom:6px">पु.325: <b style="color:#ff8a65">शर का शून्य पर पहुँचना (शर-परिवर्तन) का बाजार पर सबसे अधिक प्रभाव</b> — समस्त दृष्टियों से ऊपर। मिश्र योग में अधिक उत्तर-शर वाला विजयी; फल उसी के स्वभाव का।</div>
      <div class="ts"><table class="tbl"><thead><tr><th>ग्रह</th><th>शर (अक्षांश)</th><th style="text-align:right">% Max</th><th>क्रान्ति</th><th>गति</th></tr></thead><tbody>${srows}</tbody></table></div>
      ${NODES.length?`<div style="font-size:10px;color:var(--acc);font-weight:700;margin:10px 0 4px">आगामी शर-परिवर्तन · NODE CROSSINGS (±30 दिन)</div><div class="ts" style="max-height:200px;overflow:auto"><table class="tbl"><thead><tr><th>ग्रह</th><th>दिशा</th><th style="text-align:right">कब</th><th>टिप्पणी</th></tr></thead><tbody>${nodeRows}</tbody></table></div>`:''}
      ${KS.length?`<div style="font-size:10px;color:var(--acc);font-weight:700;margin:10px 0 4px">क्रान्ति-साम्य · DECLINATION PARALLELS <span style="font-weight:400;color:var(--tx3)">(पु.329: समदिशा=75%, विपरीत=50%, orb 1°)</span></div><div class="ts"><table class="tbl"><thead><tr><th>युग्म</th><th>प्रकार</th><th style="text-align:right">Δक्रान्ति</th><th style="text-align:center">भार</th></tr></thead><tbody>${ksRows}</tbody></table></div>`:'<div style="font-size:10px;color:var(--tx3);margin-top:8px">क्रान्ति-साम्य (≤1°) अभी सक्रिय नहीं।</div>'}
    </div></div>`;
  const crows=VR.commodities.map(c=>{ const sc=c.score,col=vcol(sc),lbl=sc>0.3?'▲ तेजी':sc<-0.3?'▼ मंदी':'• सम';
    return `<tr><td style="font-weight:700">${c.nm}</td><td style="font-size:10px">${c.rulers.map(r=>`<span style="color:${PC[r]}">${VR_DEV[r]||r}</span>`).join(' · ')}</td><td style="text-align:center">${c.n}</td><td style="text-align:center;font-weight:700;color:${col}">${lbl} <span style="font-size:9px">${sc>0?'+':''}${sc}</span></td></tr>`; }).join('');
  const commPanel=`<div class="pnl"><div class="ph"><span class="dot"></span>ग्रह ↔ वस्तु · COMMODITY</div>
    <div class="ts"><table class="tbl"><thead><tr><th>वस्तु</th><th>स्वामी ग्रह</th><th style="text-align:center">योग</th><th style="text-align:center">फल</th></tr></thead><tbody>${crows}</tbody></table></div></div>`;

  const legend=`<div class="pnl"><div class="ph"><span class="dot"></span>नियम · RULES (Vyaapar Ratna)</div>
    <div class="pb" style="font-size:10px;color:var(--tx2);line-height:1.7">
      <b style="color:var(--acc)">दृष्टि-योग:</b> युति 0° · प्रतियोग 180° · त्रिकोण 120° · षष्ठांश 60° · पञ्चमांश 72° · सप्तमांश 51°26′ · अष्टमांश 45° · नवमांश 40° · दशमांश 36° · एकादशांश 32°44′ · द्वादशांश 30° · षोडशांश 22°30′ · रहित 108/135/144/147/150°.<br>
      <b style="color:var(--bull)">शुभ→तेजी</b>, <b style="color:var(--bear)">अशुभ→मंदी</b>. त्रिकोण सर्वदा शुभ. युति/प्रतियोग: दो शुभ⇒तेजी, दो क्रूर⇒मंदी, मिश्र⇒जय-पराजय. षडष्टक-रहित प्रायः मंदी. <b style="color:var(--neut)">वक्री⇒विपरीत फल</b>. क्रान्ति-साम्य(≤1°)⇒युति-तुल्य.<br>
      सौम्य: <span style="color:${PC.Moon}">चन्द्र</span> <span style="color:${PC.Mercury}">बुध</span> <span style="color:${PC.Jupiter}">गुरु</span> <span style="color:${PC.Venus}">शुक्र</span> · क्रूर: <span style="color:${PC.Sun}">सूर्य</span> <span style="color:${PC.Mars}">मंगल</span> <span style="color:${PC.Saturn}">शनि</span> राहु-केतु, हर्षल, प्लूटो.
    </div></div>`;

  return `<div style="display:flex;flex-direction:column;gap:10px">${hdr}${trioPanel}${intraPanel}${upcomingPanel}${yogaPanel}${sharPanel}${commPanel}${legend}
    <div style="font-size:9px;color:var(--tx3)">स्रोत: Vyaapar_ratna_part_1.md & _part_2.md. सायन गणना. अध्ययन-सहायक, निवेश-सलाह नहीं।</div></div>`;
}

// direction → colour / pill-class helpers (used by Day Forecast)
function _dirCls(d){return d==='BULLISH'?'pb-b':d==='BEARISH'?'pb-r':'pb-n';}
function _dirCol(d){return d==='BULLISH'?'var(--bull)':d==='BEARISH'?'var(--bear)':'var(--neut)';}
function tDayForecast(){
  const D=DATA, df=D.astroDF, bh=D.bhadra, sbc=D.sbc;
  const order=['NIFTY','BANKNIFTY','NASDAQ','DOW','SPX'];
  const cards=order.map(k=>{
    const f=df.indices[k];
    const col=_dirCol(f.dir);
    const revs=(f.reversals||[]).slice(0,5).map(r=>`<div style="font-size:10px;color:var(--tx2);margin-bottom:2px;line-height:1.45"><span style="color:var(--acc);font-weight:700">${r.time}</span> ${r.reason}</div>`).join('')||'<div style="font-size:10px;color:var(--tx3)">none flagged</div>';
    return`<div class="pnl" style="border-color:${col}55">
      <div class="ph" style="justify-content:space-between"><span><span class="dot" style="background:${col}"></span>${f.name}</span>
        <span style="color:var(--tx3);font-size:10px">ruler ${f.ruler}</span></div>
      <div class="pb">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span class="pill ${_dirCls(f.dir)}" style="font-size:13px;padding:3px 12px">${f.dir} ${f.score>0?'+':''}${f.score}</span>
          <span style="font-weight:700;color:${f.strong?col:'var(--tx3)'};font-size:11px">${f.strong?'⚡ '+f.move:f.move}</span>
        </div>
        <div style="font-size:10px;color:var(--tx3);margin-bottom:4px">DRIVERS</div>
        ${f.drivers.map(d=>`<div style="font-size:10px;color:var(--tx1)">• ${d}</div>`).join('')}
        <div style="font-size:10px;color:var(--tx3);margin:6px 0 2px">REVERSAL WINDOWS (intraday)</div>
        ${revs}
      </div></div>`;
  }).join('');

  // Bhadra panel
  const bhBody = bh.active
    ? `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
         <span class="pill ${bh.net>0?'pb-b':bh.net<0?'pb-r':'pb-n'}" style="padding:3px 12px;font-size:12px">${bh.net>0?'POSITIVE':bh.net<0?'NEGATIVE':'MIXED'}</span>
         <span style="color:var(--tx1);font-weight:700">${bh.typeLabel}</span>
         <span style="color:var(--tx2)">phase: ${bh.phase}</span>
         <span style="color:var(--tx2)">Moon ${bh.moonSignName} → <b style="color:${bh.lokaPol>0?'var(--bull)':'var(--bear)'}">${bh.loka}</b></span>
         <span style="color:var(--tx2)">window ${bh.windowTxt}</span>
       </div>
       <div style="font-size:10px;color:var(--tx3);margin-top:6px">${bh.hint}</div>`
    : `<div style="color:var(--tx2)">${bh.hint}</div>`;

  // SBC panel (5 signals)
  const sbcRows = sbc.sig.map(s=>`<tr class="${s.active?'tr-r':''}">
      <td style="font-weight:700;color:${s.active?'var(--bear)':'var(--tx3)'}">${s.n}</td>
      <td style="font-weight:700;white-space:nowrap;color:${s.active?'var(--bear)':'var(--tx2)'}">${s.key}</td>
      <td style="text-align:center"><span class="pill ${s.active?'pb-r':'pb-n'}">${s.active?'ACTIVE ▼':'—'}</span></td>
      <td style="font-size:10px;color:var(--tx1)">${s.detail}</td>
      <td style="font-size:10px;color:var(--tx3)">${s.text}</td></tr>`).join('');

  // Declination shifts (CHAPTER 21)
  const shifts=(D.declShifts||[]).slice(0,8).map(s=>`<tr class="${Math.abs(s.daysFromNow)<=1?'tr-hl':''}">
      <td style="color:${PC[s.body]||'var(--tx1)'};font-weight:700">${s.body}</td>
      <td style="font-family:monospace;color:var(--tx2)">${s.daysFromNow>0?'+':''}${s.daysFromNow}d</td>
      <td style="font-family:monospace;color:var(--tx2)">${s.decl}°</td>
      <td style="font-weight:700;color:${s.change.includes('NORTH')?'var(--bear)':'var(--bull)'}">${s.change}</td>
      <td>${s.baseBias}${s.reverse?` <span style="color:var(--neut)">⇄ reversed (${[s.retro?'R':'',s.combust?'combust':'',s.debil?'debil':''].filter(Boolean).join('/')})</span>`:''}</td>
      <td style="font-weight:700;color:${s.dir>0?'var(--bull)':'var(--bear)'}">${s.dir>0?'BULLISH +':'BEARISH −'}</td>
      <td style="font-size:10px;color:var(--tx3)">${s.note}</td></tr>`).join('');

function tSharParivartan(mode){
  const isShar = (mode||'shar')==='shar';
  const from = S.spFrom || S.date;
  const to   = S.spTo || (()=>{const d=new Date(S.date+'T00:00:00');d.setDate(d.getDate()+30);return d.toISOString().slice(0,10);})();
  const tbl = buildSharTable(from, to, S.ayMode);
  const colLbl = isShar?'Shar':'Kranti';
  // ── per-planet maxima / minima over the window (▲ = period max / extreme-North, ▼ = period min / extreme-South) ──
  const _vKey = isShar?'lat':'dec';
  const _ext = {};
  tbl.bodies.forEach(b=>{ _ext[b]={maxV:-Infinity,minV:Infinity,maxI:-1,minI:-1}; });
  tbl.rows.forEach((r,ri)=>{ r.cells.forEach(c=>{ const v=c[_vKey]; const e=_ext[c.b]; if(!e)return;
    if(v>e.maxV){e.maxV=v;e.maxI=ri;} if(v<e.minV){e.minV=v;e.minI=ri;} }); });
  const _extMark = (b,ri)=>{ const e=_ext[b]; if(!e||e.maxV===e.minV) return {st:'',bg:''};
    if(e.maxI===ri) return {st:'outline:2px solid #ffd54a;outline-offset:-2px;font-weight:700;', bg:' <span style="color:#ffd54a;font-weight:800" title="Period maximum (extreme North)">▲</span>'};
    if(e.minI===ri) return {st:'outline:2px solid #4aa3ff;outline-offset:-2px;font-weight:700;', bg:' <span style="color:#4aa3ff;font-weight:800" title="Period minimum (extreme South)">▼</span>'};
    return {st:'',bg:''}; };
  const head = `<th style="position:sticky;left:0;background:#041e28">Date</th>` +
    tbl.bodies.map(b=>`<th style="text-align:center;color:${PC[b]||'#5ad0e8'}">${b}<div style="font-size:8px;color:var(--tx3);font-weight:400">${colLbl}</div></th>`).join('');
  const rows = tbl.rows.map((r,ri)=>{
    const cells = r.cells.map(c=>{
      const _m=_extMark(c.b,ri);
      if(isShar){
        const latCol = c.latDir==='N'?'#ff8a65':'#69f0ae';
        const flip = c.latFlip?'background:#2a2000;border:1px solid var(--neut)':'';
        return `<td style="font-family:monospace;font-size:10px;color:${latCol};${flip}${_m.st}" title="${c.latFlip?'SHAR PARIVARTAN — latitude crossed 0 (market driven by this planet)':''}">${c.lat}${c.latDir}${_m.bg}</td>`;
      } else {
        const decCol = c.decDir==='N'?'#ff8a65':'#69f0ae';
        return `<td style="font-family:monospace;font-size:10px;color:${decCol};${c.parColor?'background:'+c.parColor+'33;border:1px solid '+c.parColor:''}${_m.st}" title="${c.parWith?'Declination parallel with '+c.parWith+' (|Δdecl|<1°)':''}">${c.dec}${c.decDir}${_m.bg}</td>`;
      }
    }).join('');
    return `<tr><td style="position:sticky;left:0;background:#021520;font-weight:700;color:var(--tx1);white-space:nowrap">${r.date} <span style="color:var(--tx3)">${r.dow}</span></td>${cells}</tr>`;
  }).join('');
  const shifts=(DATA.declShifts||[]).slice(0,10).map(s=>`<tr class="${Math.abs(s.daysFromNow)<=1?'tr-hl':''}"><td style="color:${PC[s.body]};font-weight:700">${s.body}</td><td>${s.daysFromNow>0?'+':''}${s.daysFromNow}d</td><td style="font-weight:700;color:${s.change.includes('NORTH')?'var(--bear)':'var(--bull)'}">${s.change}</td><td>${s.baseBias}${s.reverse?' ⇄rev':''}</td><td style="font-weight:700;color:${s.dir>0?'var(--bull)':'var(--bear)'}">${s.dir>0?'BULLISH':'BEARISH'}</td><td style="font-size:9px;color:var(--tx3)">${s.note}</td></tr>`).join('');
  const title = isShar
    ? '⟐ SHAR — Monthly Ecliptic Latitude (Shar) of Planets'
    : '◓ KRANTI — Monthly Declination (Kranti) of Planets';
  const desc = isShar
    ? `<b style="color:var(--neut)">SHAR PARIVARTAN</b> = a planet's ecliptic latitude (Shar) crossing 0° (North ↔ South). On the crossing day that planet drives the market and its aspects & all three Vedh become ineffective — the strongest signal. Moon crosses twice a month; big / slow planets cross when nearer Earth. <b style="color:var(--neut)">Yellow cell</b> = latitude crossed 0° (Shar Parivartan). Sun / Rahu / Ketu have no latitude (Shar 0).`
    : `CHAPTER 21: a planet changing to <b style="color:var(--bear)">NORTH</b> declination → <b style="color:var(--bear)">Bearishness</b>; to <b style="color:var(--bull)">SOUTH</b> → <b style="color:var(--bull)">Bullishness</b> (continues a long time). During a declination change, aspects & all three Vedh become ineffective — this is the strongest signal. Reverse the effect if the planet is Combust / Retrograde / Debilitated. Moon changes twice a month; big planets change when nearer Earth.`;
  const note = isShar
    ? 'Shar = ecliptic latitude (N/S of the ecliptic plane). Orange = North, Green = South. A yellow cell marks the day latitude crosses 0° (Shar Parivartan). Sun / Rahu / Ketu always Shar 0. Snapshot ~09:30 IST.'
    : 'Kranti = equatorial declination (N/S of equator). Orange = North, Green = South. A COLOURED cell = declination parallel — two planets within 1° (same colour = same pair), held while the parallel lasts. Snapshot ~09:30 IST.';
  const declPanel = isShar ? '' : `
  <div class="pnl"><div class="ph"><span class="dot"></span>DECLINATION DIRECTION CHANGES — nearest first (drives the day per CHAPTER 21)</div>
    <div class="ts"><table class="tbl"><thead><tr><th>Planet</th><th>When</th><th>Change</th><th>Base</th><th>Net bias</th><th>Note</th></tr></thead><tbody>${shifts||'<tr><td colspan=6 style="color:var(--tx3)">none in window</td></tr>'}</tbody></table></div>
  </div>`;
  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="pnl"><div class="ph"><span class="dot"></span>${title}</div>
    <div class="pb">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px">
        <div class="cg"><span class="cl">FROM</span><input type="date" value="${from}" class="ci w130" onchange="gs({spFrom:this.value})"></div>
        <div class="cg"><span class="cl">TO</span><input type="date" value="${to}" class="ci w130" onchange="gs({spTo:this.value})"></div>
        <div style="font-size:10px;color:var(--tx3);max-width:640px">${desc}</div>
      </div>
      <div class="ts" style="max-height:520px;overflow:auto"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
      <div style="font-size:9px;color:var(--tx3);margin-top:6px">${note} &nbsp;·&nbsp; <b style="color:#ffd54a">▲</b> = period maximum (extreme North) per planet, <b style="color:#4aa3ff">▼</b> = period minimum (extreme South) per planet.</div>
    </div>
  </div>${declPanel}
</div>`;
}

function tGann(){
  const D=DATA;
  const dateObj=new Date(S.date+"T00:00:00");
  const jan1=new Date(dateObj.getFullYear(),0,0);
  const doy=Math.round((dateObj-jan1)/86400000);

  // Resolve anchor for each index based on user's prefs + manual entries
  const nO = parseFloat(S.niftyOpen) || PS.niftyOpen;
  const nC = parseFloat(S.niftyPC)   || PS.niftyPrev;
  const bO = parseFloat(S.bnOpen)    || PS.bnOpen;
  const bC = parseFloat(S.bnPC)      || PS.bnPrev;
  // US indices
  const nqO = parseFloat(S.nasdaqOpen) || PS.nasdaqOpen;
  const nqC = parseFloat(S.nasdaqPC)   || PS.nasdaqPrev;
  const djO = parseFloat(S.dowOpen)    || PS.dowOpen;
  const djC = parseFloat(S.dowPC)      || PS.dowPrev;
  const spO = parseFloat(S.spxOpen)    || PS.spxOpen;
  const spC = parseFloat(S.spxPC)      || PS.spxPrev;
  const nA = resolveAnchor(S.gannAnchor, nO, nC);
  const bA = resolveAnchor(S.gannAnchor, bO, bC);
  const nqA = resolveAnchor(S.gannAnchor, nqO, nqC);
  const djA = resolveAnchor(S.gannAnchor, djO, djC);
  const spA = resolveAnchor(S.gannAnchor, spO, spC);
  // Recompute Gann levels off the resolved anchor
  const nGann  = nA.price > 0  ? gannLevels(Math.round(nA.price))  : [];
  const bGann  = bA.price > 0  ? gannLevels(Math.round(bA.price))  : [];

  const eLOC=document.getElementById('iLOC');

  // Lat/Lon binding — these mutate the module-level constants and re-render

  const eLO=document.getElementById('iLO');

}

// LIVE PRICE FETCHER — Multi-source, returns BOTH ltp + day-open
// ───────────────────────────────────────────────────────────────────
// Fetches the day's OPEN @ 09:15 IST plus current LTP.
// "Open" comes from Yahoo's regularMarketDayOpen meta field, which
// IS the 09:15 candle's open (NSE opening auction).
// Google Finance is also attempted via several CORS proxies.

const PROXIES = [
  // allorigins is the most reliable free CORS proxy as of 2026 (allow-origin: *)
  // It has flaky uptime via Cloudflare so we retry it from multiple angles.
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,  // wrapped JSON
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,
];

const withTimeout = (p, ms=8000) =>
  Promise.race([p, new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout')), ms))]);

const isFinitePos = v => typeof v==='number' && isFinite(v) && v>0;

// ── Moneycontrol pricefeed ─ returns {open, prevClose} ──────────────
// CRITICAL: This endpoint sends 'Access-Control-Allow-Origin: *' so it
// works DIRECTLY from a browser — no CORS proxy needed. This is what
// Indian finance apps actually use under the hood. The OPEN field is
// the official NSE 09:15 auction open, and priceprevclose is the prior
// session's official close.
//
// MC index symbols (URL-encoded "in;X"):
//   Nifty 50    : in%3BNSX
//   Bank Nifty  : in%3Bnbx  (lowercase!)
//
// Available fields in response.data:
//   OPEN, HIGH, LOW, priceprevclose, pricecurrent (LTP), CHANGE,
//   PERCCHANGE, lastupd ("YYYY-MM-DD HH:MM:SS"), 52wkhi/52wklow, etc.
async function mcFetch(symbol){
  const url = `https://priceapi.moneycontrol.com/pricefeed/notapplicable/inidicesindia/${symbol}`;
  const r = await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if(j.code !== '200' || !j.data) throw new Error(j.message || 'MC returned no data');
  const open      = parseFloat(j.data.OPEN);
  const prevClose = parseFloat(j.data.priceprevclose);
  if(!isFinitePos(open) && !isFinitePos(prevClose)) throw new Error('no valid prices');
  return {
    open:      isFinitePos(open)?open:null,
    prevClose: isFinitePos(prevClose)?prevClose:null
  };
}

// ── Yahoo Finance daily candles (proxy-only fallback) ──────────────
// Kept as a secondary source if Moneycontrol is ever unreachable.
// Requires a CORS proxy because Yahoo doesn't send CORS headers.
async function yfFetch(sym, proxify){
  const target = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`;
  const url = (proxify?proxify:(s=>s))(target);
  const r = await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  let j;
  try {
    j = JSON.parse(text);
    // allorigins/get wraps response as {contents:"<raw JSON string>", status:...}
    if(j && typeof j.contents === 'string' && !j.chart){
      j = JSON.parse(j.contents);
    }
  } catch(e){
    throw new Error('JSON parse: ' + e.message.slice(0,40));
  }
  const res = j?.chart?.result?.[0];
  const ts  = res?.timestamp || [];
  const q   = res?.indicators?.quote?.[0];
  if(!ts.length || !q) throw new Error('no daily candles');
  const lastIdx = ts.length - 1;
  const open = q.open?.[lastIdx];
  const prevClose = ts.length >= 2 ? q.close?.[lastIdx - 1] : null;
  if(!isFinitePos(open) && !isFinitePos(prevClose)) throw new Error('no valid prices');
  return {
    open:      isFinitePos(open)?open:null,
    prevClose: isFinitePos(prevClose)?prevClose:null
  };
}

function fmtPrice(p){
  if(!isFinitePos(p)) return '—';
  return Number(p).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:2});

function nowISTStr(){
  try{
    return new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour12:false,
      hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){return new Date().toTimeString().slice(0,8);}
}

function isMarketHours(){
  try{
    const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const day=ist.getDay();
    if(day===0||day===6) return false; // Sun/Sat
    const m=ist.getHours()*60+ist.getMinutes();
    return m>=9*60+15 && m<=15*60+30;
  }catch(e){return false;}
}

  // Before 09:15 IST on a trading day, the "OPEN" field returned by
  // Moneycontrol / Yahoo is the PREVIOUS session's open — today's
  // 09:15 auction open does not exist yet. We still fetch (to refresh
  // PrevClose) but tag the result so the UI can warn the user instead
  // of silently overwriting their values with stale data.
  const istNow = (()=>{ try{const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'})); return {h:d.getHours(),m:d.getMinutes(),day:d.getDay()};} catch(e){return null;} })();
  const preMarket = istNow && istNow.day!==0 && istNow.day!==6 && (istNow.h*60+istNow.m) < (9*60+15);
  const weekend   = istNow && (istNow.day===0 || istNow.day===6);

  for(const src of PRICE_SOURCES){
    try{
      PS.tried.push(src.name);
      if(pb) pb.innerHTML=buildPriceBar();
      const r=await src.go();
      const nO=r.nifty?.open, bO=r.bn?.open;
      const nP=r.nifty?.prevClose, bP=r.bn?.prevClose;
      // Need at least Open or PrevClose for both indices
      if(!isFinitePos(nO)&&!isFinitePos(nP)) throw new Error('no nifty data');
      if(!isFinitePos(bO)&&!isFinitePos(bP)) throw new Error('no bank-nifty data');
      PS={...PS,state:'ok',src:src.name,ts:nowISTStr(),
          niftyOpen:isFinitePos(nO)?nO:PS.niftyOpen, bnOpen:isFinitePos(bO)?bO:PS.bnOpen,
          niftyPrev:isFinitePos(nP)?nP:PS.niftyPrev, bnPrev:isFinitePos(bP)?bP:PS.bnPrev,
          preMarket, weekend};
      // Auto-populate state inputs (user can still override)
      if(!S._userEditedPrices){
        // PrevClose is always safe — copy it regardless of market state.
        if(isFinitePos(nP)) S.niftyPC   = String(Math.round(nP));
        if(isFinitePos(bP)) S.bnPC      = String(Math.round(bP));
        // OPEN: only copy when market has actually opened (≥ 09:15 IST
        // on a weekday). Before that, the API's OPEN is the previous
        // session's open — keep the user's value or fall back to PC.
        if(!preMarket && !weekend){
          if(isFinitePos(nO)) S.niftyOpen = String(Math.round(nO));
          if(isFinitePos(bO)) S.bnOpen    = String(Math.round(bO));
        } else {
          // Pre-market: if user has no open yet, seed from PC (best estimate)
          if((!S.niftyOpen || S.niftyOpen==='0') && isFinitePos(nP)) S.niftyOpen = String(Math.round(nP));
          if((!S.bnOpen    || S.bnOpen==='0')    && isFinitePos(bP)) S.bnOpen    = String(Math.round(bP));
        }
        render();
        return;
      }
      if(pb) pb.innerHTML=buildPriceBar();
      return;
    }catch(e){ /* try next */ }
  }
  PS={...PS,state:'error',src:'all sources failed',ts:nowISTStr(),preMarket,weekend};
  if(pb) pb.innerHTML=buildPriceBar();
}

// ── US INDEX FETCHER ──────────────────────────────────────────────
// Runs in parallel with the India fetch. Independent failure mode.
// US "open" is the 09:30 ET (= ~19:00 IST in summer, 20:00 IST in winter)
// session open. During IST market hours US is closed → data is from the
// previous US session. That's fine for KP analysis (uses PrevClose anchor
// by default).
async function fetchUSPrices(){
  PS.usState = 'fetching'; PS.usSrc = ''; PS.usTried = [];
  const pb = document.getElementById('price-bar');
  if(pb) pb.innerHTML = buildPriceBar();
  for(const src of US_SOURCES){
    try{
      PS.usTried.push(src.name);
      if(pb) pb.innerHTML = buildPriceBar();
      const r = await src.go();
      const nqO=r.nasdaq?.open, djO=r.dow?.open, spO=r.spx?.open;
      const nqP=r.nasdaq?.prevClose, djP=r.dow?.prevClose, spP=r.spx?.prevClose;
      // Need at least Open or PrevClose for each
      if(!isFinitePos(nqO)&&!isFinitePos(nqP)) throw new Error('no nasdaq data');
      if(!isFinitePos(djO)&&!isFinitePos(djP)) throw new Error('no dow data');
      if(!isFinitePos(spO)&&!isFinitePos(spP)) throw new Error('no spx data');
      PS = {...PS,
        usState:'ok', usSrc:src.name, usTs:nowISTStr(),
        nasdaqOpen: isFinitePos(nqO)?nqO:PS.nasdaqOpen,
        nasdaqPrev: isFinitePos(nqP)?nqP:PS.nasdaqPrev,
        dowOpen:    isFinitePos(djO)?djO:PS.dowOpen,
        dowPrev:    isFinitePos(djP)?djP:PS.dowPrev,
        spxOpen:    isFinitePos(spO)?spO:PS.spxOpen,
        spxPrev:    isFinitePos(spP)?spP:PS.spxPrev
      };
      // Auto-populate state inputs if user hasn't edited US values
      if(!S._userEditedUSPrices){
        // PrevClose always safe
        if(isFinitePos(nqP)) S.nasdaqPC = String(Math.round(nqP));
        if(isFinitePos(djP)) S.dowPC    = String(Math.round(djP));
        if(isFinitePos(spP)) S.spxPC    = String(Math.round(spP));
        // Open from prior US session (always at 09:30 ET — meaningful)
        if(isFinitePos(nqO)) S.nasdaqOpen = String(Math.round(nqO));
        if(isFinitePos(djO)) S.dowOpen    = String(Math.round(djO));
        if(isFinitePos(spO)) S.spxOpen    = String(Math.round(spO));
        // Re-render the inputs (price bar already updated)
        ['iNQO','iNQC','iDJO','iDJC','iSPO','iSPC'].forEach(id=>{
          const e = document.getElementById(id);
          if(e){
            const map = {iNQO:'nasdaqOpen',iNQC:'nasdaqPC',iDJO:'dowOpen',iDJC:'dowPC',iSPO:'spxOpen',iSPC:'spxPC'};
            e.value = S[map[id]];
          }
        });
      }
      if(pb) pb.innerHTML = buildPriceBar();
      return;
    } catch(e){ /* try next */ }
  }
  PS.usState = 'error'; PS.usSrc = 'all US sources failed'; PS.usTs = nowISTStr();
  if(pb) pb.innerHTML = buildPriceBar();
}

function buildPriceBar(){
  const stCol = PS.state==='ok' ? 'var(--bull)' :
                PS.state==='error' ? 'var(--bear)' :
                PS.state==='fetching' ? 'var(--neut)' : 'var(--tx3)';
  const stIco = PS.state==='ok' ? '<span class="live-dot"></span>' :
                PS.state==='fetching' ? '<span class="spin-anim">⟳</span>' :
                PS.state==='error' ? '⚠' : '○';
  const mh = isMarketHours();
  const tried = (PS.tried||[]).join(', ');
  // Pre-market means today's actual 09:15 OPEN doesn't exist yet — the
  // OPEN column is showing yesterday's open (or a Prev-Close fallback).
  const stale = (PS.preMarket || PS.weekend) && PS.state==='ok';
  const openLbl = stale ? 'OPEN (STALE)' : 'OPEN';
  const openCol = stale ? 'var(--neut)' : 'var(--acc)';
  const staleMsg = PS.weekend
    ? '○ Weekend — market closed. "Open" shown is last trading day\'s open.'
    : PS.preMarket
      ? '⏳ Pre-market — today\'s 09:15 open does not exist yet. "Open" shown is previous session\'s open. Refresh after 09:15.'
      : '';

  // US fetch status (independent from India fetch state)
  const usStCol = PS.usState==='ok' ? 'var(--bull)' :
                  PS.usState==='error' ? 'var(--bear)' :
                  PS.usState==='fetching' ? 'var(--neut)' : 'var(--tx3)';
  const usStIco = PS.usState==='ok' ? '●' :
                  PS.usState==='fetching' ? '<span class="spin-anim">⟳</span>' :
                  PS.usState==='error' ? '⚠' : '○';

  // Helper to render one index unit (label + open + prev close)
  const idxUnit = (name, openVal, prevVal, labelCol = '#3a8898') => `
    <div style="display:flex;align-items:center;gap:10px;font-size:11px">
      <span style="color:${labelCol};font-weight:700;letter-spacing:.05em">${name}</span>
      <span style="display:flex;flex-direction:column;line-height:1.2">
        <span style="font-size:9px;color:${stale?'var(--neut)':'var(--tx3)'};font-weight:${stale?700:400}">${openLbl}</span>
        <strong style="color:${openCol};font-family:monospace;font-size:14px">${fmtPrice(openVal)}</strong>
      </span>
      <span style="display:flex;flex-direction:column;line-height:1.2">
        <span style="font-size:9px;color:var(--tx3)">PREV CLOSE</span>
        <strong style="color:var(--tx1);font-family:monospace;font-size:14px">${fmtPrice(prevVal)}</strong>
      </span>
    </div>`;

  return `
<div style="background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
  ${idxUnit('NIFTY 50',  PS.niftyOpen||parseFloat(S.niftyOpen), PS.niftyPrev||parseFloat(S.niftyPC))}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('BANK NIFTY', PS.bnOpen||parseFloat(S.bnOpen), PS.bnPrev||parseFloat(S.bnPC))}
  <div style="color:var(--bd2)">|</div>
  <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:${stCol}">
    ${stIco}
    <span>${
      PS.state==='ok'      ? `IN: ${PS.src} · ${PS.ts}` :
      PS.state==='fetching'? `IN: Fetching… (${tried||'starting'})` :
      PS.state==='error'   ? `IN: Auto-fetch failed — use ⎘ PASTE or edit inputs` :
                              'IN: Idle'
    }</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span style="font-size:9px;color:${mh?'var(--bull)':'var(--tx3)'}">
      ${mh?'● MARKET LIVE':'○ MARKET CLOSED'}
    </span>
    <button onclick="pastePrompt()" style="background:var(--bg3);color:var(--tx1);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em" title="Paste prices: 4 India or 10 (India + US)">
      ⎘ PASTE PRICES
    </button>
    <button onclick="fetchPrices()" style="background:var(--bg3);color:var(--acc);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em">
      ⟳ REFRESH
    </button>
  </div>
</div>
<div style="background:var(--bg1);border-bottom:1px solid var(--bd);padding:6px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
  ${idxUnit('NASDAQ',     PS.nasdaqOpen||parseFloat(S.nasdaqOpen), PS.nasdaqPrev||parseFloat(S.nasdaqPC), '#69F0AE')}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('DOW JONES',  PS.dowOpen||parseFloat(S.dowOpen),       PS.dowPrev||parseFloat(S.dowPC),       '#FF8A65')}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('S&P 500',    PS.spxOpen||parseFloat(S.spxOpen),       PS.spxPrev||parseFloat(S.spxPC),       '#F06292')}
  <div style="color:var(--bd2)">|</div>
  <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:${usStCol}">
    ${usStIco}
    <span>${
      PS.usState==='ok'      ? `US: ${PS.usSrc} · ${PS.usTs}` :
      PS.usState==='fetching'? `US: Fetching… (${(PS.usTried||[]).join(', ')||'starting'})` :
      PS.usState==='error'   ? `US: Auto-fetch failed — edit values manually` :
                                'US: Idle'
    }</span>
  </div>
  <div style="margin-left:auto;font-size:9px;color:var(--tx3)">
    NASDAQ ^IXIC · DOW ^DJI · SPX ^GSPC · NY 09:30 ET = ~19:00 IST
  </div>
</div>${staleMsg?`<div style="background:var(--neut3);border-bottom:1px solid var(--neut2);color:var(--neut);padding:5px 16px;font-size:10.5px;font-weight:700;letter-spacing:.05em">${staleMsg}</div>`:''}`;
}

// Paste 4 (India only) or 10 (India + US) prices in any common separator format
window.pastePrompt = function(){
  const cur4  = `${S.niftyOpen},${S.niftyPC},${S.bnOpen},${S.bnPC}`;
  const cur10 = `${cur4},${S.nasdaqOpen},${S.nasdaqPC},${S.dowOpen},${S.dowPC},${S.spxOpen},${S.spxPC}`;
  const txt = prompt(
    'Paste 4 or 10 prices (any separator: comma, space, tab, newline):\n\n' +
    '4 prices — INDIA ONLY:\n' +
    '  NIFTY OPEN, NIFTY PC, BANKN OPEN, BANKN PC\n\n' +
    '10 prices — INDIA + US:\n' +
    '  NIFTY OPEN, NIFTY PC, BANKN OPEN, BANKN PC,\n' +
    '  NASDAQ OPEN, NASDAQ PC, DOW OPEN, DOW PC, SPX OPEN, SPX PC\n\n' +
    'Examples:\n' +
    '  23970, 24176, 54832, 55310\n' +
    '  23970 24176 54832 55310 21850 21900 44200 44150 6320 6310',
    cur10
  );
  if(!txt) return;
  const nums = txt.split(/[^\d.\-]+/).filter(Boolean).map(parseFloat).filter(n=>!isNaN(n)&&n>0);
  if(nums.length < 4){
    alert(`Need 4 or 10 numbers, got ${nums.length}. India minimum:\nNifty Open, Nifty PC, BankN Open, BankN PC`);
    return;
  }
  // India (always)
  S.niftyOpen = String(Math.round(nums[0]));
  S.niftyPC   = String(Math.round(nums[1]));
  S.bnOpen    = String(Math.round(nums[2]));
  S.bnPC      = String(Math.round(nums[3]));
  S._userEditedPrices = true;
  PS = {...PS, state:'ok', src:'Manual paste', ts:nowISTStr(),
        niftyOpen:nums[0], niftyPrev:nums[1], bnOpen:nums[2], bnPrev:nums[3]};
  // US (optional — only if 10 numbers given)
  if(nums.length >= 10){
    S.nasdaqOpen = String(Math.round(nums[4]));
    S.nasdaqPC   = String(Math.round(nums[5]));
    S.dowOpen    = String(Math.round(nums[6]));
    S.dowPC      = String(Math.round(nums[7]));
    S.spxOpen    = String(Math.round(nums[8]));
    S.spxPC      = String(Math.round(nums[9]));
    S._userEditedUSPrices = true;
    PS = {...PS, usState:'ok', usSrc:'Manual paste', usTs:nowISTStr(),
          nasdaqOpen:nums[4], nasdaqPrev:nums[5],
          dowOpen:nums[6],    dowPrev:nums[7],
          spxOpen:nums[8],    spxPrev:nums[9]};
  } else if(nums.length >= 6){
    // Partial US (e.g. 6 numbers = India + just NASDAQ): take what we have
    if(nums[4]) S.nasdaqOpen = String(Math.round(nums[4]));
    if(nums[5]) S.nasdaqPC   = String(Math.round(nums[5]));
    if(nums[6]) S.dowOpen    = String(Math.round(nums[6]));
    if(nums[7]) S.dowPC      = String(Math.round(nums[7]));
    S._userEditedUSPrices = true;
  }
  render();
};

function scheduleAutoRefresh(){
  if(autoTimer) clearInterval(autoTimer);
  // Refresh every 60s during market hours, every 5min outside
  autoTimer=setInterval(()=>{
    if(isMarketHours()) fetchPrices();
  }, 60*1000);
}

// Track manual price edits so we don't overwrite on auto-refresh
document.addEventListener('input', e=>{
  const id = e.target?.id;
  if(id==='iNO' || id==='iNC' || id==='iBO' || id==='iBC') S._userEditedPrices=true;
  if(id==='iNQO' || id==='iNQC' || id==='iDJO' || id==='iDJC' || id==='iSPO' || id==='iSPC') S._userEditedUSPrices=true;
});

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
// restore sidebar collapsed preference (desktop) + keyboard shortcut (Ctrl/Cmd+B, Esc)
try{ if(localStorage.getItem('fatNavCollapsed')==='1' && !window.matchMedia('(max-width:820px)').matches) document.body.classList.add('nav-collapsed'); }catch(e){}
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey) && (e.key==='b'||e.key==='B')){ e.preventDefault(); toggleNav(); }
  else if(e.key==='Escape') closeNav();
});
render();
fetchPrices();
scheduleAutoRefresh();

</script>
