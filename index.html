// TAB: SBC
// ═══════════════════════════════════════════════════════════════════
function tSBC(){
  const D=DATA;
  const activeNaks=new Set(D.planets.map(p=>getNak(p.lon).idx));
  const VEDHA={0:13,1:14,2:15,3:16,4:17,5:18,6:19,7:20,8:21,9:22,10:23,11:24,12:25,13:0,14:1,15:2,16:3,17:4,18:5,19:6,20:7,21:8,22:9,23:10,24:11,25:12};

  // Build per-nakshatra polarity map. For each active nak, sum the polarity
  // contribution from each vedha pair it participates in using rules.md logic:
  //   Shubh-Shubh = -ve (resistance/profit-booking)
  //   Paap-Paap   = +ve (short-cover/spike)
  //   Mixed       = mild (sign of the heavier side)
  const SHUBH = new Set(['Moon','Mercury','Jupiter','Venus']);
  const PAPA  = new Set(['Sun','Mars','Saturn','Rahu','Ketu']);
  // map: nakIdx → list of {with: otherNakIdx, plnHere: [], plnThere: [], dir, label}
  const nakVedha = new Map();
  for(const ni of activeNaks){
    const vi=VEDHA[ni];
    if(vi===undefined || !activeNaks.has(vi)) continue;
    const here  = D.planets.filter(p=>getNak(p.lon).idx===ni).map(p=>p.name);
    const there = D.planets.filter(p=>getNak(p.lon).idx===vi).map(p=>p.name);
    // Determine class for the pair (worst-of for visualization)
    let dirSum = 0, classes = [];
    for(const p1 of here) for(const p2 of there){
      const s1=SHUBH.has(p1), s2=SHUBH.has(p2);
      const m1=PAPA.has(p1),  m2=PAPA.has(p2);
      if(s1&&s2)      { dirSum -= 1.0; classes.push('Shubh-Shubh ▼'); }
      else if(m1&&m2) { dirSum += 1.0; classes.push('Paap-Paap ▲'); }
      else if(s1||s2) { dirSum -= 0.5; classes.push('Mixed-Shubh ▽'); }
      else            { dirSum += 0.5; classes.push('Mixed-Paap △'); }
    }
    if(!nakVedha.has(ni)) nakVedha.set(ni, []);
    nakVedha.get(ni).push({ with:vi, plnHere:here, plnThere:there, dir:dirSum, classes });
  }
  // For grid coloring, decide each nak's net polarity color
  const nakPol = new Map();   // nakIdx → +1 / -1 / 0
  for(const [ni, ents] of nakVedha){
    const s = ents.reduce((a,e)=>a+e.dir, 0);
    nakPol.set(ni, Math.sign(s));
  }

  const SBC_POS=[[0,1,0],[0,2,1],[0,3,2],[0,4,3],[0,5,4],[0,6,5],[0,7,6],[1,8,7],[2,8,8],[3,8,9],[4,8,10],[5,8,11],[6,8,12],[7,8,13],[8,7,14],[8,6,15],[8,5,16],[8,4,17],[8,3,18],[8,2,19],[8,1,20],[7,0,21],[6,0,22],[5,0,23],[4,0,24],[3,0,25],[2,0,26],[1,0,-1]];
  const INNER=[[2,3,'Cancer'],[2,4,'Gemini'],[2,5,'Taurus'],[3,2,'Leo'],[3,6,'Aries'],[4,2,'Virgo'],[4,6,'Pisces'],[5,2,'Libra'],[5,6,'Aquarius'],[6,3,'Scorpio'],[6,4,'Sagittarius'],[6,5,'Capricorn']];
  const CS=85,SZ=9*CS;

  let svg=`<svg width="${SZ}" height="${SZ}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${SZ}" height="${SZ}" fill="#010b0f" rx="4" stroke="#1c6080" stroke-width="2"/>`;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const corner=(r===0||r===8)&&(c===0||c===8);
    svg+=`<rect x="${c*CS}" y="${r*CS}" width="${CS}" height="${CS}" fill="${corner?'#01080c':'#011a26'}" stroke="#1c5070" stroke-width=".8"/>`;
  }
  for(const[r,c,sn] of INNER){
    svg+=`<rect x="${c*CS+.5}" y="${r*CS+.5}" width="${CS-1}" height="${CS-1}" fill="#02202e" stroke="#1c5070" stroke-width="1"/>`;
    svg+=`<text x="${c*CS+CS/2}" y="${r*CS+CS/2+5}" text-anchor="middle" fill="#ffc107" font-size="15" font-weight="bold" font-family="Courier New">${sn.slice(0,3)}</text>`;
  }
  svg+=`<rect x="${3*CS}" y="${3*CS}" width="${3*CS}" height="${3*CS}" fill="#010a10" stroke="#1c5070" stroke-width="1"/>`;
  svg+=`<text x="${4.5*CS}" y="${4.3*CS}" text-anchor="middle" fill="#00e8ff" font-size="20" font-weight="bold" font-family="Courier New">SARVATOBHADRA</text>`;
  svg+=`<text x="${4.5*CS}" y="${4.65*CS}" text-anchor="middle" fill="#00e8ff" font-size="20" font-weight="bold" font-family="Courier New">CHAKRA</text>`;
  svg+=`<text x="${4.5*CS}" y="${4.92*CS}" text-anchor="middle" fill="#5ad0e8" font-size="14" font-family="Courier New">${S.date}</text>`;

  for(const[r,c,ni] of SBC_POS){
    const nak=ni>=0?NAKS[ni]:null;
    const isAct=ni>=0&&activeNaks.has(ni);
    const isVedha=ni>=0&&nakVedha.has(ni);
    const pol = nakPol.get(ni) || 0;
    const ps=ni>=0?D.planets.filter(p=>getNak(p.lon).idx===ni):[];

    // Grid cell color now reflects polarity instead of always-red vedha
    let fillCol = '#011a28', strokeCol = '#1c5070', strokeW = 0.8;
    if(isAct && !isVedha){          // active but no vedha — neutral cyan-green
      fillCol = '#003020'; strokeCol = '#00b84a'; strokeW = 1.5;
    } else if(isVedha && pol > 0){  // +ve vedha (paap-paap)
      fillCol = '#002a14'; strokeCol = '#00b84a'; strokeW = 2;
    } else if(isVedha && pol < 0){  // -ve vedha (shubh-shubh)
      fillCol = '#280008'; strokeCol = '#cc1030'; strokeW = 2;
    } else if(isVedha){             // mixed
      fillCol = '#2a2000'; strokeCol = '#cc8800'; strokeW = 1.5;
    }
    svg+=`<rect x="${c*CS+.5}" y="${r*CS+.5}" width="${CS-1}" height="${CS-1}" fill="${fillCol}" stroke="${strokeCol}" stroke-width="${strokeW}"/>`;

    if(nak){
      const txtCol = isVedha && pol>0 ? '#00f07a'
                   : isVedha && pol<0 ? '#ff3355'
                   : isVedha          ? '#ffc107'
                   : isAct            ? '#00f07a'
                   : '#6ac8e0';
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+18}" text-anchor="middle" fill="${txtCol}" font-size="12" font-weight="bold" font-family="Courier New">${nak.n.slice(0,10)}</text>`;
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+33}" text-anchor="middle" fill="${PC[nak.l]||'#7ecad8'}" font-size="12" font-weight="bold" font-family="Courier New">${nak.l.slice(0,3)}</text>`;
      // Tiny +/- badge in corner if vedha
      if(isVedha){
        const badge = pol>0 ? '+VE' : pol<0 ? '-VE' : '±';
        const badgeCol = pol>0 ? '#00f07a' : pol<0 ? '#ff3355' : '#ffc107';
        svg+=`<text x="${c*CS+CS-6}" y="${r*CS+10}" text-anchor="end" fill="${badgeCol}" font-size="9" font-weight="bold" font-family="Courier New">${badge}</text>`;
      }
    }else{
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+CS/2}" text-anchor="middle" fill="#5ad0e8" font-size="11" font-family="Courier New">Abhijit</text>`;
    }
    ps.forEach((p,i)=>{
      // Color the planet's marker by Shubh/Paap class (subtle hint)
      const planetCol = PC[p.name];
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+54+i*15}" text-anchor="middle" fill="${planetCol}" font-size="15" font-weight="bold" font-family="Courier New">${p.abbr}</text>`;
    });
  }
  svg+=`</svg>`;

  // Build pair-level vedha list with explicit polarity per pair
  const vedhaPairs = [];
  const seen = new Set();
  for(const [ni, ents] of nakVedha){
    for(const e of ents){
      const key = Math.min(ni,e.with) + '-' + Math.max(ni,e.with);
      if(seen.has(key)) continue;
      seen.add(key);
      for(let i=0;i<e.plnHere.length;i++){
        for(let j=0;j<e.plnThere.length;j++){
          const p1=e.plnHere[i], p2=e.plnThere[j];
          const s1=SHUBH.has(p1), s2=SHUBH.has(p2);
          const m1=PAPA.has(p1),  m2=PAPA.has(p2);
          let dir, klass, hint;
          if(s1&&s2)      { dir=-1; klass='SHUBH ↔ SHUBH'; hint='Resistance to upside · profit-booking · supply at highs'; }
          else if(m1&&m2) { dir=+1; klass='PAAP ↔ PAAP';   hint='Short-covering · sudden uptick · breakout-prone'; }
          else if(s1||s2) { dir=-0.5; klass='MIXED (Shubh-side)'; hint='Mild negative · soft resistance'; }
          else            { dir=+0.5; klass='MIXED (Paap-side)';  hint='Mild positive · soft demand'; }
          vedhaPairs.push({nak1:NAKS[ni].n, nak2:NAKS[e.with].n, p1, p2, dir, klass, hint});
        }
      }
    }
  }
  // Sort by absolute strength desc
  vedhaPairs.sort((a,b)=>Math.abs(b.dir)-Math.abs(a.dir));

  // Net polarity summary
  const netSum = vedhaPairs.reduce((s,v)=>s+v.dir, 0);
  const netLabel = netSum > 0.5 ? '+VE (paap-dominant)' : netSum < -0.5 ? '−VE (shubh-dominant)' : netSum === 0 ? 'NO VEDHA' : 'MIXED / NEUTRAL';
  const netCol   = netSum > 0.5 ? 'var(--bull)' : netSum < -0.5 ? 'var(--bear)' : 'var(--neut)';

  return`
<div style="display:flex;flex-direction:column;gap:10px">

  <!-- ▒▒▒ POLARITY RULES LEGEND ▒▒▒ -->
  <div class="pnl">
    <div class="ph"><span class="dot"></span>SBC VEDHA POLARITY RULES · WHEN +VE / WHEN −VE</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="background:var(--bull3);border:1px solid var(--bull2);border-radius:4px;padding:10px 12px">
          <div style="font-size:13px;font-weight:700;color:var(--bull);margin-bottom:6px">▲ +VE  (Bullish · Short-Cover · Spike)</div>
          <div style="font-size:11px;color:var(--tx0);line-height:1.6">
            <strong style="color:var(--bull)">PAAP ↔ PAAP vedha</strong> &nbsp; full +VE
            <div style="margin:4px 0 6px 8px;color:var(--tx2);font-size:10px">Two malefics (Sun, Mars, Saturn, Rahu, Ketu) sit in opposing nakshatras of the SBC table.</div>
            <strong style="color:var(--bull)">PAAP-side MIXED</strong> &nbsp; mild +VE
            <div style="margin:4px 0 0 8px;color:var(--tx2);font-size:10px">One side is a paap planet, the other is neutral / shubh — net leans positive.</div>
          </div>
        </div>
        <div style="background:var(--bear3);border:1px solid var(--bear2);border-radius:4px;padding:10px 12px">
          <div style="font-size:13px;font-weight:700;color:var(--bear);margin-bottom:6px">▼ −VE  (Resistance · Profit-Booking · Supply)</div>
          <div style="font-size:11px;color:var(--tx0);line-height:1.6">
            <strong style="color:var(--bear)">SHUBH ↔ SHUBH vedha</strong> &nbsp; full −VE
            <div style="margin:4px 0 6px 8px;color:var(--tx2);font-size:10px">Two benefics (Moon, Mercury, Jupiter, Venus) sit in opposing nakshatras of the SBC table.</div>
            <strong style="color:var(--bear)">SHUBH-side MIXED</strong> &nbsp; mild −VE
            <div style="margin:4px 0 0 8px;color:var(--tx2);font-size:10px">One side is a shubh planet, the other is neutral / paap — net leans negative.</div>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
        <div style="background:var(--bg2);border-left:3px solid var(--bull);padding:6px 10px;font-size:11px">
          <strong style="color:var(--bull)">Shubh planets:</strong>
          <span style="color:${PC.Moon};font-weight:700">Moon</span> · <span style="color:${PC.Mercury};font-weight:700">Mercury</span> · <span style="color:${PC.Jupiter};font-weight:700">Jupiter</span> · <span style="color:${PC.Venus};font-weight:700">Venus</span>
        </div>
        <div style="background:var(--bg2);border-left:3px solid var(--bear);padding:6px 10px;font-size:11px">
          <strong style="color:var(--bear)">Paap planets:</strong>
          <span style="color:${PC.Sun};font-weight:700">Sun</span> · <span style="color:${PC.Mars};font-weight:700">Mars</span> · <span style="color:${PC.Saturn};font-weight:700">Saturn</span> · <span style="color:${PC.Rahu};font-weight:700">Rahu</span> · <span style="color:${PC.Ketu};font-weight:700">Ketu</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ▒▒▒ NET POLARITY HEADLINE ▒▒▒ -->
  <div class="pnl" style="border-color:${netCol}55">
    <div class="ph"><span class="dot" style="background:${netCol}"></span>NET SBC VEDHA POLARITY TODAY</div>
    <div class="pb" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:20px;font-weight:800;color:${netCol};letter-spacing:.1em">${netLabel}</div>
        <div style="font-size:11px;color:var(--tx2);margin-top:2px">${vedhaPairs.length} active vedha pair${vedhaPairs.length===1?'':'s'} · Σ direction = ${netSum>0?'+':''}${netSum.toFixed(1)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:9px;color:var(--tx3)">+VE pairs &nbsp;/&nbsp; −VE pairs &nbsp;/&nbsp; mixed</div>
        <div style="font-size:14px;font-weight:700;font-family:monospace">
          <span style="color:var(--bull)">${vedhaPairs.filter(v=>v.dir>0.5).length}</span> &nbsp;/&nbsp;
          <span style="color:var(--bear)">${vedhaPairs.filter(v=>v.dir<-0.5).length}</span> &nbsp;/&nbsp;
          <span style="color:var(--neut)">${vedhaPairs.filter(v=>Math.abs(v.dir)<=0.5 && v.dir!==0).length}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ▒▒▒ THE GRID ▒▒▒ -->
  <div class="pnl">
    <div class="ph"><span class="dot"></span>SARVATOBHADRA CHAKRA · ${S.date} · IST ${mtt(parseFloat(S.time)*60)}</div>
    <div class="pb">
      <div style="overflow-x:auto;display:flex;justify-content:center">${svg}</div>
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;font-size:11px">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#003020;border:1.5px solid #00b84a;display:inline-block"></span><span style="color:#00f07a;font-weight:700">Active (no vedha)</span></span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#002a14;border:2px solid #00b84a;display:inline-block"></span><span style="color:#00f07a;font-weight:700">+VE vedha (paap-paap)</span></span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#280008;border:2px solid #cc1030;display:inline-block"></span><span style="color:#ff3355;font-weight:700">−VE vedha (shubh-shubh)</span></span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:14px;background:#2a2000;border:1.5px solid #cc8800;display:inline-block"></span><span style="color:#ffc107;font-weight:700">Mixed vedha</span></span>
      </div>
    </div>
  </div>

  <!-- ▒▒▒ ACTIVE VEDHA PAIRS TABLE (with polarity) ▒▒▒ -->
  <div class="pnl">
    <div class="ph"><span class="dot"></span>ACTIVE VEDHA PAIRS · WITH POLARITY</div>
    ${vedhaPairs.length === 0 ? `
      <div class="pb"><div style="padding:10px;color:var(--tx3);font-size:11px">No nakshatra-pair vedha active right now.</div></div>
    ` : `<div class="ts"><table class="tbl">
      <thead><tr><th>Nakshatra A</th><th>Nakshatra B</th><th>Planet A</th><th>Planet B</th><th>Class</th><th style="text-align:center">Polarity</th><th>Interpretation</th></tr></thead>
      <tbody>${vedhaPairs.map(v=>{
        const col = v.dir>0 ? 'var(--bull)' : 'var(--bear)';
        const trCls = v.dir>0.5 ? 'tr-b' : v.dir<-0.5 ? 'tr-r' : 'tr-n';
        const pol = v.dir>0.5 ? '▲ +VE' : v.dir<-0.5 ? '▼ −VE' : v.dir>0 ? '△ mild +VE' : '▽ mild −VE';
        return `<tr class="${trCls}">
          <td style="font-size:11px;font-weight:700">${v.nak1}</td>
          <td style="font-size:11px;font-weight:700">${v.nak2}</td>
          <td style="color:${pc(v.p1)};font-weight:700">${v.p1} <span style="font-size:9px;color:var(--tx3)">(${SHUBH.has(v.p1)?'shubh':'paap'})</span></td>
          <td style="color:${pc(v.p2)};font-weight:700">${v.p2} <span style="font-size:9px;color:var(--tx3)">(${SHUBH.has(v.p2)?'shubh':'paap'})</span></td>
          <td style="font-size:10px;color:var(--tx2)">${v.klass}</td>
          <td style="text-align:center;font-weight:700;color:${col};white-space:nowrap">${pol}</td>
          <td style="font-size:10px;color:var(--tx2)">${v.hint}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}
  </div>

  <!-- ▒▒▒ PLANET POSITIONS (with vedha polarity tag per planet) ▒▒▒ -->
  <div class="pnl">
    <div class="ph"><span class="dot"></span>NAKSHATRA POSITIONS — ALL PLANETS</div>
    <div class="pb" style="display:flex;gap:8px;flex-wrap:wrap">
      ${D.planets.map(p=>{
        const nk=getNak(p.lon);
        const vi=VEDHA[nk.idx];
        const vactive=vi!==undefined&&activeNaks.has(vi);
        const pol = vactive ? (nakPol.get(nk.idx) || 0) : 0;
        const polLabel = pol>0 ? '▲ +VE' : pol<0 ? '▼ −VE' : vactive ? '± mixed' : '';
        const polCol   = pol>0 ? 'var(--bull)' : pol<0 ? 'var(--bear)' : 'var(--neut)';
        const klass = SHUBH.has(p.name) ? 'shubh' : PAPA.has(p.name) ? 'paap' : 'neutral';
        return`<div style="background:var(--bg2);border:1px solid var(--bd);border-left:3px solid ${PC[p.name]};padding:6px 10px;border-radius:3px${vactive?';border-top:1px solid '+polCol:''}">
          <div style="font-size:12px;font-weight:700;color:${PC[p.name]}">${p.name}${p.retro?' <span style="color:var(--bear)">℞</span>':''} <span style="font-size:9px;color:var(--tx3);font-weight:400">(${klass})</span></div>
          <div style="font-size:11px;color:var(--tx0);margin-top:2px;font-weight:700">${nk.n}</div>
          <div style="font-size:10px;color:var(--tx1)">${p.sign} ${dmsC(p.deg)} Pd${nk.pada}</div>
          <div style="font-size:10px;color:${pc(p.sub)};font-weight:700">${p.sub}</div>
          ${vactive?`<div style="font-size:9px;color:${polCol};font-weight:700">Vedha: ${NAKS[vi]?.n} <span style="float:right">${polLabel}</span></div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>

</div>`;
}

// TAB: 15-MIN TIMING
// ═══════════════════════════════════════════════════════════════════
function tTiming(){
  const D=DATA;
  const curMin=parseFloat(S.time)*60;
  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="pnl">
    <div class="ph">
      <span class="dot"></span>15-MIN INTRADAY TIMING · ${S.date} · Sunrise ${mtt(D.rMin)} · Sunset ${mtt(D.sMin)} · Planet Hour = ${D.hlMin.toFixed(1)} min
    </div>
    <div class="ts">
      <table class="tbl">
        <thead><tr>
          <th>Time IST</th><th>PL Hour</th><th>Bias</th>
          <th>Moon Rashi</th><th>Moon °</th><th>Nakshatra</th><th>Nak Lord</th><th>Sub Lord</th><th>SS Lord</th><th>Pada</th>
          <th>KP Indication</th><th>Action</th>
        </tr></thead>
        <tbody>
          ${D.slots.map(sl=>{
            const hl=Math.abs(curMin-sl.min)<8;
            const cls=sl.hb.bias==='BULLISH'?'tr-b':sl.hb.bias==='BEARISH'?'tr-r':'tr-n';
            return`<tr class="${cls}${hl?' tr-hl':''}">
              <td style="font-family:monospace;font-weight:700;color:${hl?'var(--acc)':'var(--tx1)'};white-space:nowrap">${sl.time}${hl?' ◄':''}</td>
              <td style="color:${PC[sl.planet]};font-weight:700">${sl.planet}</td>
              <td style="white-space:nowrap"><span style="color:${sl.hb.col};font-weight:700">${sl.hb.arrow} ${sl.hb.bias}</span></td>
              <td style="color:var(--tx1)">${sl.moonSign.slice(0,4)}</td>
              <td style="font-family:monospace;color:var(--tx1)">${dmsC(sl.moonDeg)}</td>
              <td style="color:var(--tx2);font-size:10px">${sl.moonNak.slice(0,10)}</td>
              <td style="color:${PC[sl.moonNakL]};font-weight:700">${sl.moonNakL}</td>
              <td style="color:${PC[sl.moonSub]};font-weight:700;font-size:12px">${sl.moonSub}</td>
              <td style="color:${PC[sl.moonSS]};font-size:10px">${sl.moonSS}</td>
              <td style="color:#4ab8c8">${sl.moonPada}</td>
              <td style="color:${sl.hb.col};font-size:10px">${sl.hb.ind}</td>
              <td style="font-weight:700;color:${sl.hb.bias==='BULLISH'?'var(--bull)':sl.hb.bias==='BEARISH'?'var(--bear)':'var(--neut)'}">${sl.hb.bias==='BULLISH'?'▲ Long':sl.hb.bias==='BEARISH'?'▼ Short':'→ Wait'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="padding:5px 12px;background:var(--bg2);border-top:1px solid var(--bd);font-size:9px;color:var(--tx3)">
      ◄ = selected time. Moon position recomputed from ephemeris per slot (not linear extrapolation). Sub-lord changes = intraday inflection.
    </div>
  </div>
  <div class="pnl">
    <div class="ph"><span class="dot"></span>PLANETARY HOUR SCHEDULE · ${S.date} · Market Hours Only</div>
    <div class="ts">
      <table class="tbl">
        <thead><tr><th>Start</th><th>End</th><th>Dur.</th><th>Hour Lord</th><th>Sign · Nak · House</th><th>Sub Lord</th><th>Market Bias</th><th>Indication</th></tr></thead>
        <tbody>
          ${D.phpHours.filter(h=>h.em>555&&h.sm<930).map(h=>{
            const pl=D.planets.find(p=>p.name===h.planet);
            const hb=hourBias(h.planet,D.planets);
            const cur=curMin>=h.sm&&curMin<h.em;
            const cls=hb.bias==='BULLISH'?'tr-b':hb.bias==='BEARISH'?'tr-r':'tr-n';
            return`<tr class="${cls}${cur?' tr-hl':''}">
              <td style="font-family:monospace;color:${cur?'var(--acc)':'var(--tx1)'};font-weight:${cur?700:400}">${mtt(h.sm)}${cur?' ◄':''}</td>
              <td style="font-family:monospace;color:var(--tx2)">${mtt(h.em)}</td>
              <td style="color:var(--tx3)">${(h.em-h.sm).toFixed(1)}m</td>
              <td style="color:${PC[h.planet]};font-weight:700;font-size:13px">${h.planet}</td>
              <td style="font-size:10px;color:var(--tx1)">${pl?`${pl.sign} · ${pl.nak.slice(0,9)} · H${pl.h}`:'-'}</td>
              <td style="color:${PC[pl?.sub]||'var(--tx3)'};font-size:10px">${pl?.sub||'-'}</td>
              <td style="font-weight:700;color:${hb.col}">${hb.arrow} ${hb.bias}</td>
              <td style="font-size:10px;color:${hb.col}">${hb.ind}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════════
// TAB: ASTRO RULES  — FORECAST-DRIVEN
// Pattern-matches today's planetary combinations to specific predicted
// outcomes (session type, direction, intraday reversal times, sector
// calls, trade plan). The diagnostic data tables (tithi/combust/papa
// kartari/vedha) are kept below for reference but not the focus.
// ═══════════════════════════════════════════════════════════════════
function tRules(){
  const D = DATA;
  const R = D.rules;
  const F = D.forecast;
  if(!R || !F) return '<div style="padding:20px;color:var(--bear)">Forecast engine unavailable.</div>';

  // Session-type colour
  const sessCol = {
    'WHIPSAW':  '#FF5366',
    'VOLATILE': '#FFB300',
    'TRENDING': F.direction === 'BULLISH' ? '#00d68f' : '#FF5366',
    'RANGE':    '#5ad0e8',
    'QUIET':    '#7a96a0',
    'NORMAL':   '#7a96a0'
  }[F.session.type] || '#7a96a0';
  const dirCol  = F.direction === 'BULLISH' ? 'var(--bull)'
                : F.direction === 'BEARISH' ? 'var(--bear)' : 'var(--neut)';
  const sevCol = s => ({ EXTREME:'#FF3355', HIGH:'#FFB300', MED:'#5ad0e8', LOW:'#7a96a0' }[s]);

  // ▒▒▒ TOP: SESSION VERDICT + TRADE PLAN ▒▒▒
  const verdictCard = `
  <div class="pnl" style="border:2px solid ${sessCol}66">
    <div class="ph" style="background:linear-gradient(90deg,${sessCol}22 0%,transparent 100%)"><span class="dot" style="background:${sessCol}"></span>SESSION FORECAST · ${S.date}</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px">
        <div style="background:${sessCol}15;border-left:3px solid ${sessCol};padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">SESSION TYPE</div>
          <div style="font-size:20px;font-weight:800;color:${sessCol};line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.session.type}</div>
        </div>
        <div style="background:${dirCol === 'var(--bull)' ? 'var(--bull3)' : dirCol === 'var(--bear)' ? 'var(--bear3)' : 'var(--bg2)'};border-left:3px solid ${dirCol};padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">DIRECTION</div>
          <div style="font-size:20px;font-weight:800;color:${dirCol};line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.direction} ${F.directionScore>0?'+':''}${F.directionScore}</div>
        </div>
        <div style="background:var(--bg2);border-left:3px solid var(--acc);padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">CONFIDENCE</div>
          <div style="font-size:20px;font-weight:800;color:var(--acc);line-height:1.1;margin-top:2px">${F.confidence}%</div>
          <div class="sbar" style="height:4px;margin-top:4px"><div class="sbar-fill" style="width:${F.confidence}%;background:var(--acc)"></div></div>
        </div>
        <div style="background:var(--bg2);border-left:3px solid #4DB8FF;padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">SPOTLIGHT INDEX</div>
          <div style="font-size:18px;font-weight:800;color:#4DB8FF;line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.indexSpotlight}</div>
          <div style="font-size:9px;color:var(--tx3);margin-top:1px">BN:${F.indexImpacts.bn} · NF:${F.indexImpacts.nf} · US:${F.indexImpacts.us}${F.usFlag?' ★':''}</div>
        </div>
      </div>
      <div style="background:var(--bg2);border-radius:3px;padding:10px 14px;border-left:3px solid ${sessCol};margin-bottom:8px">
        <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em;font-weight:700;margin-bottom:3px">SUMMARY</div>
        <div style="font-size:12px;color:var(--tx0);line-height:1.5">${F.session.summary}</div>
      </div>
      <div style="background:linear-gradient(90deg,var(--acc)22,transparent);border-radius:3px;padding:10px 14px;border-left:3px solid var(--acc)">
        <div style="font-size:9px;color:var(--acc);letter-spacing:.08em;font-weight:700;margin-bottom:3px">⇨ TRADE PLAN</div>
        <div style="font-size:13px;color:var(--tx0);line-height:1.5;font-weight:600">${F.session.plan}</div>
      </div>
    </div>
  </div>`;

  // ▒▒▒ ACTIVE YOGAS — each with its specific forecast ▒▒▒
  const yogaCard = F.yogas.length === 0 ? `
    <div class="pnl"><div class="ph"><span class="dot"></span>ACTIVE COMBINATIONS</div>
    <div class="pb"><div style="padding:10px;color:var(--tx3);font-size:11px">No high-significance combinations detected — calm session expected.</div></div></div>
  ` : `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>ACTIVE YOGAS &amp; THEIR SPECIFIC FORECASTS · ${F.yogas.length} detected</div>
    <div class="pb">
      <div style="display:flex;flex-direction:column;gap:8px">
      ${F.yogas.map(o => {
        const col = sevCol(o.severity);
        const dirArr = o.dir > 0.5 ? '▲' : o.dir < -0.5 ? '▼' : '⟷';
        const dirC   = o.dir > 0.5 ? 'var(--bull)' : o.dir < -0.5 ? 'var(--bear)' : 'var(--neut)';
        const ixCol  = o.indexImpact === 'BANKNIFTY' ? '#4DB8FF' : o.indexImpact === 'NIFTY' ? '#FFB300' : '#9C7DFF';
        return `<div style="background:var(--bg2);border-left:4px solid ${col};border-radius:3px;padding:10px 14px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="background:${col}33;color:${col};font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:2px;border:1px solid ${col}55">${o.severity}</span>
              <span style="font-size:13px;font-weight:700;color:var(--tx0)">${o.name}</span>
              <span style="font-size:14px;color:${dirC};font-weight:700">${dirArr}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="background:${ixCol}22;color:${ixCol};font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px">${o.indexImpact}</span>
              ${o.usImpact === 'HIGH' ? `<span style="background:#4caf5022;color:#4caf50;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px">US★</span>` : ''}
            </div>
          </div>
          <div style="font-size:11px;color:var(--tx1);line-height:1.55;margin-bottom:${o.sectors?.length ? 6 : 0}px">${o.forecast}</div>
          ${o.sectors?.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;font-size:9px">${o.sectors.map(s=>`<span style="background:var(--bg3);color:var(--tx2);padding:1px 6px;border-radius:2px;border:1px solid var(--bd)">${s}</span>`).join('')}</div>` : ''}
        </div>`;
      }).join('')}
      </div>
    </div>
  </div>`;

  // ▒▒▒ REVERSAL WINDOWS ▒▒▒
  const curMin = parseFloat(S.time)*60;
  const reversalCard = `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>INTRADAY REVERSAL WINDOWS · ${F.reversals.length} computed</div>
    <div class="pb">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:8px;line-height:1.5">
        Computed from Moon sub-lord transitions, planetary hour flips, and nakshatra changes during the session. The highest-strength events are inflections where intraday direction often pivots.
      </div>
      ${F.reversals.length === 0 ? `<div style="color:var(--tx3);font-size:11px;padding:6px">No major intraday inflections detected.</div>` : `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px">
          ${F.reversals.map(r => {
            const [h,m] = r.time.split(':').map(Number);
            const rMin = h*60+m;
            const past = curMin > rMin;
            const upcoming = !past && (rMin - curMin) <= 30;
            const baseCol = r.strength >= 90 ? 'var(--acc)' : r.strength >= 75 ? '#5ad0e8' : 'var(--tx2)';
            const col = upcoming ? 'var(--acc)' : past ? 'var(--tx3)' : baseCol;
            const bg  = upcoming ? 'rgba(0,200,255,0.15)' : past ? 'var(--bg2)' : 'var(--bg2)';
            const dirA = r.dir > 0 ? '▲' : r.dir < 0 ? '▼' : '◆';
            return `<div style="background:${bg};border:1px solid ${upcoming?'var(--acc)':'var(--bd)'};border-left:3px solid ${col};border-radius:3px;padding:6px 10px;${past?'opacity:0.5':''}">
              <div style="display:flex;justify-content:space-between;align-items:baseline">
                <span style="font-size:14px;font-weight:700;color:${col};font-family:monospace">${r.time} ${dirA}</span>
                <span style="font-size:8px;color:var(--tx3);letter-spacing:.05em">${r.type.replace('_',' ')} · ${r.strength}</span>
              </div>
              <div style="font-size:10px;color:var(--tx2);margin-top:2px;line-height:1.4">${r.reason}</div>
              ${upcoming?`<div style="font-size:9px;color:var(--acc);font-weight:700;margin-top:2px">◄ in ${Math.round(rMin-curMin)} min</div>`:''}
            </div>`;
          }).join('')}
        </div>`}
    </div>
  </div>`;

  // ▒▒▒ SECTOR CALLS ▒▒▒
  const sectorCard = F.sectors.length === 0 ? '' : `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>SECTOR CALLS · WEIGHTED FROM ACTIVE YOGAS</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px">
        ${F.sectors.map(s => {
          const col = s.score > 0.5 ? 'var(--bull)' : s.score < -0.5 ? 'var(--bear)' : 'var(--neut)';
          const arr = s.score > 0.5 ? '▲' : s.score < -0.5 ? '▼' : '◆';
          return `<div style="background:var(--bg2);border-left:3px solid ${col};border-radius:3px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--tx0);font-weight:700">${s.sector}</span>
            <span style="font-family:monospace;color:${col};font-weight:700">${arr} ${s.score>0?'+':''}${s.score.toFixed(1)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  // ▒▒▒ DIAGNOSTIC INFO (small, below) ▒▒▒
  const diagCard = `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>DAY CONTEXT · DIAGNOSTIC DATA</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;font-size:11px">
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">TITHI</div><div style="font-weight:700;color:var(--tx0)">${R.tithi.paksha} ${R.tithi.name}</div><div style="font-size:9px;color:var(--tx2)">${R.tithi.klass} · ${(R.tithi.fraction*100).toFixed(0)}%</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">MOON NAKSHATRA</div><div style="font-weight:700;color:${R.gandMool?'var(--bear)':'var(--tx0)'}">${R.moonNakName}${R.gandMool?' ⚠':''}</div><div style="font-size:9px;color:var(--tx2)">${R.gandMool?'Gand Mool':R.panchak?'Panchak':'Normal'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">MOON DECL</div><div style="font-weight:700;color:${R.moonDecl.bias>0?'var(--bull)':'var(--bear)'}">${R.moonDecl.hemisphere} ${R.moonDecl.dec.toFixed(1)}°</div><div style="font-size:9px;color:var(--tx2)">→ ${R.moonDecl.movingToward}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">COMBUST</div><div style="font-weight:700;color:${R.combust.length?'var(--neut)':'var(--tx0)'}">${R.combust.length} planet${R.combust.length===1?'':'s'}</div><div style="font-size:9px;color:var(--tx2)">${R.combust.map(c=>c.name.slice(0,3)).join(',')||'None'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">PAPA KARTARI</div><div style="font-weight:700;color:${R.papaKartari.filter(p=>p.tight).length?'var(--bear)':'var(--tx0)'}">${R.papaKartari.length} (${R.papaKartari.filter(p=>p.tight).length} tight)</div><div style="font-size:9px;color:var(--tx2)">${R.papaKartari.map(p=>p.target.slice(0,3)).join(',')||'None'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">VEDHA Σ</div><div style="font-weight:700;color:${R.vedha.reduce((s,v)=>s+v.dir,0)>0?'var(--bull)':R.vedha.reduce((s,v)=>s+v.dir,0)<0?'var(--bear)':'var(--neut)'}">${(R.vedha.reduce((s,v)=>s+v.dir,0)>0?'+':'')}${R.vedha.reduce((s,v)=>s+v.dir,0).toFixed(1)}</div><div style="font-size:9px;color:var(--tx2)">${R.vedha.length} pair${R.vedha.length===1?'':'s'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">JUP/SAT SPEED</div><div style="font-weight:700;color:var(--tx0)">${F.jupSpd.toFixed(3)} / ${F.satSpd.toFixed(3)}</div><div style="font-size:9px;color:var(--tx2)">${F.jupSpd<0.05?'JUP STN':F.satSpd<0.04?'SAT STN':'Normal'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">PLUTO RX</div><div style="font-weight:700;color:${R.plutoRx.active?'var(--neut)':'var(--tx0)'}">${R.plutoRx.active?`Day ${R.plutoRx.daysIn}/163`:'Direct'}</div><div style="font-size:9px;color:var(--tx2)">${R.plutoRx.active?`${R.plutoRx.daysLeft}d left`:''}</div></div>
      </div>
    </div>
  </div>`;

  return verdictCard + yogaCard + reversalCard + sectorCard + diagCard;
}

// TAB: GANN SQ9
// ═══════════════════════════════════════════════════════════════════
// ── ANCHOR RESOLUTION ──────────────────────────────────────────────
// Gann SQ9 levels are FIXED reference points for the trading session.
// We track only TWO prices: Day Open and Previous Close. The user
// selects which one anchors the levels via the Gann Anchor dropdown.
// ═══════════════════════════════════════════════════════════════════
function resolveAnchor(mode, open, prevClose){
  // mode: 'open' | 'prevclose'
  const ok = v => typeof v==='number' && isFinite(v) && v>0;
  if(mode==='prevclose'){
    if(ok(prevClose)) return {price: prevClose, label:'Prev Close', src:'prevclose'};
    if(ok(open))      return {price: open,      label:'Open (PC unavailable)', src:'open(fallback)'};
    return                   {price: 0,         label:'No data',   src:'none'};
  }
  // Default: open
  if(ok(open))      return {price: open,      label:'Open',      src:'open'};
  if(ok(prevClose)) return {price: prevClose, label:'Prev Close (Open unavailable)', src:'prevclose(fallback)'};
  return                   {price: 0,         label:'No data',   src:'none'};
}

// ═══════════════════════════════════════════════════════════════════
// LIVE PRICE FETCHER — Multi-source, returns BOTH ltp + day-open
// ───────────────────────────────────────────────────────────────────
// Fetches the day's OPEN @ 09:15 IST plus current LTP.
// "Open" comes from Yahoo's regularMarketDayOpen meta field, which
// IS the 09:15 candle's open (NSE opening auction).
// Google Finance is also attempted via several CORS proxies.
// ═══════════════════════════════════════════════════════════════════

const PROXIES = [
  // allorigins is the most reliable free CORS proxy as of 2026 (allow-origin: *)
  // It has flaky uptime via Cloudflare so we retry it from multiple angles.
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,  // wrapped JSON
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,
];

const withTimeout = (p, ms=8000) =>
  Promise.race([p, new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout')), ms))]);

const isFinitePos = v => typeof v==='number' && isFinite(v) && v>0;

// ── Moneycontrol pricefeed ─ returns {open, prevClose} ──────────────
// CRITICAL: This endpoint sends 'Access-Control-Allow-Origin: *' so it
// works DIRECTLY from a browser — no CORS proxy needed. This is what
// Indian finance apps actually use under the hood. The OPEN field is
// the official NSE 09:15 auction open, and priceprevclose is the prior
// session's official close.
//
// MC index symbols (URL-encoded "in;X"):
//   Nifty 50    : in%3BNSX
//   Bank Nifty  : in%3Bnbx  (lowercase!)
//
// Available fields in response.data:
//   OPEN, HIGH, LOW, priceprevclose, pricecurrent (LTP), CHANGE,
//   PERCCHANGE, lastupd ("YYYY-MM-DD HH:MM:SS"), 52wkhi/52wklow, etc.
async function mcFetch(symbol){
  const url = `https://priceapi.moneycontrol.com/pricefeed/notapplicable/inidicesindia/${symbol}`;
  const r = await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if(j.code !== '200' || !j.data) throw new Error(j.message || 'MC returned no data');
  const open      = parseFloat(j.data.OPEN);
  const prevClose = parseFloat(j.data.priceprevclose);
  if(!isFinitePos(open) && !isFinitePos(prevClose)) throw new Error('no valid prices');
  return {
    open:      isFinitePos(open)?open:null,
    prevClose: isFinitePos(prevClose)?prevClose:null
  };
}

// ── Yahoo Finance daily candles (proxy-only fallback) ──────────────
// Kept as a secondary source if Moneycontrol is ever unreachable.
// Requires a CORS proxy because Yahoo doesn't send CORS headers.
async function yfFetch(sym, proxify){
  const target = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`;
  const url = (proxify?proxify:(s=>s))(target);
  const r = await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  let j;
  try {
    j = JSON.parse(text);
    // allorigins/get wraps response as {contents:"<raw JSON string>", status:...}
    if(j && typeof j.contents === 'string' && !j.chart){
      j = JSON.parse(j.contents);
    }
  } catch(e){
    throw new Error('JSON parse: ' + e.message.slice(0,40));
  }
  const res = j?.chart?.result?.[0];
  const ts  = res?.timestamp || [];
  const q   = res?.indicators?.quote?.[0];
  if(!ts.length || !q) throw new Error('no daily candles');
  const lastIdx = ts.length - 1;
  const open = q.open?.[lastIdx];
  const prevClose = ts.length >= 2 ? q.close?.[lastIdx - 1] : null;
  if(!isFinitePos(open) && !isFinitePos(prevClose)) throw new Error('no valid prices');
  return {
    open:      isFinitePos(open)?open:null,
    prevClose: isFinitePos(prevClose)?prevClose:null
  };
}

// ── Source list — Moneycontrol direct (CORS-enabled), Yahoo via proxy fallback ──
// Moneycontrol's priceapi.moneycontrol.com sends `Access-Control-Allow-Origin: *`,
// so it works directly from a browser. This is the primary and most
// reliable source. Yahoo is kept as a fallback in case MC has an outage.
const PRICE_SOURCES = [
  {name:'Moneycontrol (direct)', go:async()=>({
    nifty:await mcFetch('in%3BNSX'),  // Nifty 50
    bn:   await mcFetch('in%3Bnbx')   // Bank Nifty
  })},
  // Fallbacks via CORS proxies (when MC is down — rare)
  {name:'Yahoo via allorigins/raw', go:async()=>({
    nifty:await yfFetch('^NSEI',     PROXIES[0]),
    bn:   await yfFetch('^NSEBANK',  PROXIES[0])})},
  {name:'Yahoo via allorigins/get', go:async()=>({
    nifty:await yfFetch('^NSEI',     PROXIES[1]),
    bn:   await yfFetch('^NSEBANK',  PROXIES[1])})},
  {name:'Yahoo via cors.lol', go:async()=>({
    nifty:await yfFetch('^NSEI',     PROXIES[4]),
    bn:   await yfFetch('^NSEBANK',  PROXIES[4])})},
  {name:'Yahoo via corsproxy.io', go:async()=>({
    nifty:await yfFetch('^NSEI',     PROXIES[2]),
    bn:   await yfFetch('^NSEBANK',  PROXIES[2])})},
  {name:'Yahoo via codetabs', go:async()=>({
    nifty:await yfFetch('^NSEI',     PROXIES[3]),
    bn:   await yfFetch('^NSEBANK',  PROXIES[3])})},
];

// ── US INDEX SOURCES ──────────────────────────────────────────────
// NASDAQ Composite = ^IXIC, Dow Jones Industrial Average = ^DJI,
// S&P 500 = ^GSPC. Yahoo doesn't serve direct CORS so we proxy. The
// "open" returned is the US session's 09:30 ET open — during IST market
// hours US markets are closed and the data is from the prior US session.
const US_SOURCES = [
  {name:'Yahoo US via allorigins/raw', go:async()=>({
    nasdaq:await yfFetch('^IXIC', PROXIES[0]),
    dow:   await yfFetch('^DJI',  PROXIES[0]),
    spx:   await yfFetch('^GSPC', PROXIES[0])})},
  {name:'Yahoo US via allorigins/get', go:async()=>({
    nasdaq:await yfFetch('^IXIC', PROXIES[1]),
    dow:   await yfFetch('^DJI',  PROXIES[1]),
    spx:   await yfFetch('^GSPC', PROXIES[1])})},
  {name:'Yahoo US via cors.lol', go:async()=>({
    nasdaq:await yfFetch('^IXIC', PROXIES[4]),
    dow:   await yfFetch('^DJI',  PROXIES[4]),
    spx:   await yfFetch('^GSPC', PROXIES[4])})},
  {name:'Yahoo US via corsproxy.io', go:async()=>({
    nasdaq:await yfFetch('^IXIC', PROXIES[2]),
    dow:   await yfFetch('^DJI',  PROXIES[2]),
    spx:   await yfFetch('^GSPC', PROXIES[2])})},
  {name:'Yahoo US via codetabs', go:async()=>({
    nasdaq:await yfFetch('^IXIC', PROXIES[3]),
    dow:   await yfFetch('^DJI',  PROXIES[3]),
    spx:   await yfFetch('^GSPC', PROXIES[3])})},
];

function fmtPrice(p){
  if(!isFinitePos(p)) return '—';
  return Number(p).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:2});
}

function nowISTStr(){
  try{
    return new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour12:false,
      hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){return new Date().toTimeString().slice(0,8);}
}

function isMarketHours(){
  try{
    const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const day=ist.getDay();
    if(day===0||day===6) return false; // Sun/Sat
    const m=ist.getHours()*60+ist.getMinutes();
    return m>=9*60+15 && m<=15*60+30;
  }catch(e){return false;}
}

async function fetchPrices(){
  PS={...PS,state:'fetching',src:'',ts:nowISTStr(),tried:[]};
  const pb=document.getElementById('price-bar');
  if(pb) pb.innerHTML=buildPriceBar();

  // Kick off US fetch in parallel — independent failure mode
  fetchUSPrices();

  // ── Pre-market awareness ──────────────────────────────────────
  // Before 09:15 IST on a trading day, the "OPEN" field returned by
  // Moneycontrol / Yahoo is the PREVIOUS session's open — today's
  // 09:15 auction open does not exist yet. We still fetch (to refresh
  // PrevClose) but tag the result so the UI can warn the user instead
  // of silently overwriting their values with stale data.
  const istNow = (()=>{ try{const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'})); return {h:d.getHours(),m:d.getMinutes(),day:d.getDay()};} catch(e){return null;} })();
  const preMarket = istNow && istNow.day!==0 && istNow.day!==6 && (istNow.h*60+istNow.m) < (9*60+15);
  const weekend   = istNow && (istNow.day===0 || istNow.day===6);

  for(const src of PRICE_SOURCES){
    try{
      PS.tried.push(src.name);
      if(pb) pb.innerHTML=buildPriceBar();
      const r=await src.go();
      const nO=r.nifty?.open, bO=r.bn?.open;
      const nP=r.nifty?.prevClose, bP=r.bn?.prevClose;
      // Need at least Open or PrevClose for both indices
      if(!isFinitePos(nO)&&!isFinitePos(nP)) throw new Error('no nifty data');
      if(!isFinitePos(bO)&&!isFinitePos(bP)) throw new Error('no bank-nifty data');
      PS={...PS,state:'ok',src:src.name,ts:nowISTStr(),
          niftyOpen:isFinitePos(nO)?nO:PS.niftyOpen, bnOpen:isFinitePos(bO)?bO:PS.bnOpen,
          niftyPrev:isFinitePos(nP)?nP:PS.niftyPrev, bnPrev:isFinitePos(bP)?bP:PS.bnPrev,
          preMarket, weekend};
      // Auto-populate state inputs (user can still override)
      if(!S._userEditedPrices){
        // PrevClose is always safe — copy it regardless of market state.
        if(isFinitePos(nP)) S.niftyPC   = String(Math.round(nP));
        if(isFinitePos(bP)) S.bnPC      = String(Math.round(bP));
        // OPEN: only copy when market has actually opened (≥ 09:15 IST
        // on a weekday). Before that, the API's OPEN is the previous
        // session's open — keep the user's value or fall back to PC.
        if(!preMarket && !weekend){
          if(isFinitePos(nO)) S.niftyOpen = String(Math.round(nO));
          if(isFinitePos(bO)) S.bnOpen    = String(Math.round(bO));
        } else {
          // Pre-market: if user has no open yet, seed from PC (best estimate)
          if((!S.niftyOpen || S.niftyOpen==='0') && isFinitePos(nP)) S.niftyOpen = String(Math.round(nP));
          if((!S.bnOpen    || S.bnOpen==='0')    && isFinitePos(bP)) S.bnOpen    = String(Math.round(bP));
        }
        render();
        return;
      }
      if(pb) pb.innerHTML=buildPriceBar();
      return;
    }catch(e){ /* try next */ }
  }
  PS={...PS,state:'error',src:'all sources failed',ts:nowISTStr(),preMarket,weekend};
  if(pb) pb.innerHTML=buildPriceBar();
}

// ── US INDEX FETCHER ──────────────────────────────────────────────
// Runs in parallel with the India fetch. Independent failure mode.
// US "open" is the 09:30 ET (= ~19:00 IST in summer, 20:00 IST in winter)
// session open. During IST market hours US is closed → data is from the
// previous US session. That's fine for KP analysis (uses PrevClose anchor
// by default).
async function fetchUSPrices(){
  PS.usState = 'fetching'; PS.usSrc = ''; PS.usTried = [];
  const pb = document.getElementById('price-bar');
  if(pb) pb.innerHTML = buildPriceBar();
  for(const src of US_SOURCES){
    try{
      PS.usTried.push(src.name);
      if(pb) pb.innerHTML = buildPriceBar();
      const r = await src.go();
      const nqO=r.nasdaq?.open, djO=r.dow?.open, spO=r.spx?.open;
      const nqP=r.nasdaq?.prevClose, djP=r.dow?.prevClose, spP=r.spx?.prevClose;
      // Need at least Open or PrevClose for each
      if(!isFinitePos(nqO)&&!isFinitePos(nqP)) throw new Error('no nasdaq data');
      if(!isFinitePos(djO)&&!isFinitePos(djP)) throw new Error('no dow data');
      if(!isFinitePos(spO)&&!isFinitePos(spP)) throw new Error('no spx data');
      PS = {...PS,
        usState:'ok', usSrc:src.name, usTs:nowISTStr(),
        nasdaqOpen: isFinitePos(nqO)?nqO:PS.nasdaqOpen,
        nasdaqPrev: isFinitePos(nqP)?nqP:PS.nasdaqPrev,
        dowOpen:    isFinitePos(djO)?djO:PS.dowOpen,
        dowPrev:    isFinitePos(djP)?djP:PS.dowPrev,
        spxOpen:    isFinitePos(spO)?spO:PS.spxOpen,
        spxPrev:    isFinitePos(spP)?spP:PS.spxPrev
      };
      // Auto-populate state inputs if user hasn't edited US values
      if(!S._userEditedUSPrices){
        // PrevClose always safe
        if(isFinitePos(nqP)) S.nasdaqPC = String(Math.round(nqP));
        if(isFinitePos(djP)) S.dowPC    = String(Math.round(djP));
        if(isFinitePos(spP)) S.spxPC    = String(Math.round(spP));
        // Open from prior US session (always at 09:30 ET — meaningful)
        if(isFinitePos(nqO)) S.nasdaqOpen = String(Math.round(nqO));
        if(isFinitePos(djO)) S.dowOpen    = String(Math.round(djO));
        if(isFinitePos(spO)) S.spxOpen    = String(Math.round(spO));
        // Re-render the inputs (price bar already updated)
        ['iNQO','iNQC','iDJO','iDJC','iSPO','iSPC'].forEach(id=>{
          const e = document.getElementById(id);
          if(e){
            const map = {iNQO:'nasdaqOpen',iNQC:'nasdaqPC',iDJO:'dowOpen',iDJC:'dowPC',iSPO:'spxOpen',iSPC:'spxPC'};
            e.value = S[map[id]];
          }
        });
      }
      if(pb) pb.innerHTML = buildPriceBar();
      return;
    } catch(e){ /* try next */ }
  }
  PS.usState = 'error'; PS.usSrc = 'all US sources failed'; PS.usTs = nowISTStr();
  if(pb) pb.innerHTML = buildPriceBar();
}

function buildPriceBar(){
  const stCol = PS.state==='ok' ? 'var(--bull)' :
                PS.state==='error' ? 'var(--bear)' :
                PS.state==='fetching' ? 'var(--neut)' : 'var(--tx3)';
  const stIco = PS.state==='ok' ? '<span class="live-dot"></span>' :
                PS.state==='fetching' ? '<span class="spin-anim">⟳</span>' :
                PS.state==='error' ? '⚠' : '○';
  const mh = isMarketHours();
  const tried = (PS.tried||[]).join(', ');
  // Pre-market means today's actual 09:15 OPEN doesn't exist yet — the
  // OPEN column is showing yesterday's open (or a Prev-Close fallback).
  const stale = (PS.preMarket || PS.weekend) && PS.state==='ok';
  const openLbl = stale ? 'OPEN (STALE)' : 'OPEN';
  const openCol = stale ? 'var(--neut)' : 'var(--acc)';
  const staleMsg = PS.weekend
    ? '○ Weekend — market closed. "Open" shown is last trading day\'s open.'
    : PS.preMarket
      ? '⏳ Pre-market — today\'s 09:15 open does not exist yet. "Open" shown is previous session\'s open. Refresh after 09:15.'
      : '';

  // US fetch status (independent from India fetch state)
  const usStCol = PS.usState==='ok' ? 'var(--bull)' :
                  PS.usState==='error' ? 'var(--bear)' :
                  PS.usState==='fetching' ? 'var(--neut)' : 'var(--tx3)';
  const usStIco = PS.usState==='ok' ? '●' :
                  PS.usState==='fetching' ? '<span class="spin-anim">⟳</span>' :
                  PS.usState==='error' ? '⚠' : '○';

  // Helper to render one index unit (label + open + prev close)
  const idxUnit = (name, openVal, prevVal, labelCol = '#3a8898') => `
    <div style="display:flex;align-items:center;gap:10px;font-size:11px">
      <span style="color:${labelCol};font-weight:700;letter-spacing:.05em">${name}</span>
      <span style="display:flex;flex-direction:column;line-height:1.2">
        <span style="font-size:9px;color:${stale?'var(--neut)':'var(--tx3)'};font-weight:${stale?700:400}">${openLbl}</span>
        <strong style="color:${openCol};font-family:monospace;font-size:14px">${fmtPrice(openVal)}</strong>
      </span>
      <span style="display:flex;flex-direction:column;line-height:1.2">
        <span style="font-size:9px;color:var(--tx3)">PREV CLOSE</span>
        <strong style="color:var(--tx1);font-family:monospace;font-size:14px">${fmtPrice(prevVal)}</strong>
      </span>
    </div>`;

  return `
<div style="background:var(--bg2);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
  ${idxUnit('NIFTY 50',  PS.niftyOpen||parseFloat(S.niftyOpen), PS.niftyPrev||parseFloat(S.niftyPC))}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('BANK NIFTY', PS.bnOpen||parseFloat(S.bnOpen), PS.bnPrev||parseFloat(S.bnPC))}
  <div style="color:var(--bd2)">|</div>
  <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:${stCol}">
    ${stIco}
    <span>${
      PS.state==='ok'      ? `IN: ${PS.src} · ${PS.ts}` :
      PS.state==='fetching'? `IN: Fetching… (${tried||'starting'})` :
      PS.state==='error'   ? `IN: Auto-fetch failed — use ⎘ PASTE or edit inputs` :
                              'IN: Idle'
    }</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span style="font-size:9px;color:${mh?'var(--bull)':'var(--tx3)'}">
      ${mh?'● MARKET LIVE':'○ MARKET CLOSED'}
    </span>
    <button onclick="pastePrompt()" style="background:var(--bg3);color:var(--tx1);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em" title="Paste prices: 4 India or 10 (India + US)">
      ⎘ PASTE PRICES
    </button>
    <button onclick="fetchPrices()" style="background:var(--bg3);color:var(--acc);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em">
      ⟳ REFRESH
    </button>
  </div>
</div>
<div style="background:var(--bg1);border-bottom:1px solid var(--bd);padding:6px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
  ${idxUnit('NASDAQ',     PS.nasdaqOpen||parseFloat(S.nasdaqOpen), PS.nasdaqPrev||parseFloat(S.nasdaqPC), '#69F0AE')}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('DOW JONES',  PS.dowOpen||parseFloat(S.dowOpen),       PS.dowPrev||parseFloat(S.dowPC),       '#FF8A65')}
  <div style="color:var(--bd2)">|</div>
  ${idxUnit('S&P 500',    PS.spxOpen||parseFloat(S.spxOpen),       PS.spxPrev||parseFloat(S.spxPC),       '#F06292')}
  <div style="color:var(--bd2)">|</div>
  <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:${usStCol}">
    ${usStIco}
    <span>${
      PS.usState==='ok'      ? `US: ${PS.usSrc} · ${PS.usTs}` :
      PS.usState==='fetching'? `US: Fetching… (${(PS.usTried||[]).join(', ')||'starting'})` :
      PS.usState==='error'   ? `US: Auto-fetch failed — edit values manually` :
                                'US: Idle'
    }</span>
  </div>
  <div style="margin-left:auto;font-size:9px;color:var(--tx3)">
    NASDAQ ^IXIC · DOW ^DJI · SPX ^GSPC · NY 09:30 ET = ~19:00 IST
  </div>
</div>${staleMsg?`<div style="background:var(--neut3);border-bottom:1px solid var(--neut2);color:var(--neut);padding:5px 16px;font-size:10.5px;font-weight:700;letter-spacing:.05em">${staleMsg}</div>`:''}`;
}

// Paste 4 (India only) or 10 (India + US) prices in any common separator format
window.pastePrompt = function(){
  const cur4  = `${S.niftyOpen},${S.niftyPC},${S.bnOpen},${S.bnPC}`;
  const cur10 = `${cur4},${S.nasdaqOpen},${S.nasdaqPC},${S.dowOpen},${S.dowPC},${S.spxOpen},${S.spxPC}`;
  const txt = prompt(
    'Paste 4 or 10 prices (any separator: comma, space, tab, newline):\n\n' +
    '4 prices — INDIA ONLY:\n' +
    '  NIFTY OPEN, NIFTY PC, BANKN OPEN, BANKN PC\n\n' +
    '10 prices — INDIA + US:\n' +
    '  NIFTY OPEN, NIFTY PC, BANKN OPEN, BANKN PC,\n' +
    '  NASDAQ OPEN, NASDAQ PC, DOW OPEN, DOW PC, SPX OPEN, SPX PC\n\n' +
    'Examples:\n' +
    '  23970, 24176, 54832, 55310\n' +
    '  23970 24176 54832 55310 21850 21900 44200 44150 6320 6310',
    cur10
  );
  if(!txt) return;
  const nums = txt.split(/[^\d.\-]+/).filter(Boolean).map(parseFloat).filter(n=>!isNaN(n)&&n>0);
  if(nums.length < 4){
    alert(`Need 4 or 10 numbers, got ${nums.length}. India minimum:\nNifty Open, Nifty PC, BankN Open, BankN PC`);
    return;
  }
  // India (always)
  S.niftyOpen = String(Math.round(nums[0]));
  S.niftyPC   = String(Math.round(nums[1]));
  S.bnOpen    = String(Math.round(nums[2]));
  S.bnPC      = String(Math.round(nums[3]));
  S._userEditedPrices = true;
  PS = {...PS, state:'ok', src:'Manual paste', ts:nowISTStr(),
        niftyOpen:nums[0], niftyPrev:nums[1], bnOpen:nums[2], bnPrev:nums[3]};
  // US (optional — only if 10 numbers given)
  if(nums.length >= 10){
    S.nasdaqOpen = String(Math.round(nums[4]));
    S.nasdaqPC   = String(Math.round(nums[5]));
    S.dowOpen    = String(Math.round(nums[6]));
    S.dowPC      = String(Math.round(nums[7]));
    S.spxOpen    = String(Math.round(nums[8]));
    S.spxPC      = String(Math.round(nums[9]));
    S._userEditedUSPrices = true;
    PS = {...PS, usState:'ok', usSrc:'Manual paste', usTs:nowISTStr(),
          nasdaqOpen:nums[4], nasdaqPrev:nums[5],
          dowOpen:nums[6],    dowPrev:nums[7],
          spxOpen:nums[8],    spxPrev:nums[9]};
  } else if(nums.length >= 6){
    // Partial US (e.g. 6 numbers = India + just NASDAQ): take what we have
    if(nums[4]) S.nasdaqOpen = String(Math.round(nums[4]));
    if(nums[5]) S.nasdaqPC   = String(Math.round(nums[5]));
    if(nums[6]) S.dowOpen    = String(Math.round(nums[6]));
    if(nums[7]) S.dowPC      = String(Math.round(nums[7]));
    S._userEditedUSPrices = true;
  }
  render();
};

function scheduleAutoRefresh(){
  if(autoTimer) clearInterval(autoTimer);
  // Refresh every 60s during market hours, every 5min outside
  autoTimer=setInterval(()=>{
    if(isMarketHours()) fetchPrices();
  }, 60*1000);
}

// Track manual price edits so we don't overwrite on auto-refresh
document.addEventListener('input', e=>{
  const id = e.target?.id;
  if(id==='iNO' || id==='iNC' || id==='iBO' || id==='iBC') S._userEditedPrices=true;
  if(id==='iNQO' || id==='iNQC' || id==='iDJO' || id==='iDJC' || id==='iSPO' || id==='iSPC') S._userEditedUSPrices=true;
});

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
render();
fetchPrices();
scheduleAutoRefresh();

</script>
