<style>
:root{
  --bg0:#010d12;--bg1:#021620;--bg2:#031e28;--bg3:#042530;
  --bd:#0e3848;--bd2:#145060;--bd3:#1c6080;
  --tx0:#e8f6fc;--tx1:#6ac8e0;--tx2:#4ab0c8;--tx3:#2a6878;
  --acc:#00e8ff;--acc2:#00c0d8;--acc3:#00607a;
  --bull:#00f07a;--bull2:#00b84a;--bull3:#003818;
  --bear:#ff3355;--bear2:#cc1030;--bear3:#480010;
  --neut:#ffc107;--neut2:#cc8800;--neut3:#3a2800;
  --sun:#FFB300;--moon:#4DB8FF;--mars:#FF5252;--merc:#69F0AE;
  --jupi:#FF8A65;--venu:#F06292;--satn:#CE93D8;--rahu:#90A4AE;--ketu:#A1887F;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:var(--bg0);color:var(--tx0);font-family:'Courier New',Consolas,monospace;font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px}
.terminal{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.body-row{display:flex;flex:1;min-height:0}
.hdr{background:var(--bg1);border-bottom:2px solid var(--bd2);padding:8px 16px;z-index:100;display:flex;flex-direction:column;gap:6px}
.hdr-r1{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{font-size:15px;font-weight:700;color:#00e8ff;letter-spacing:.12em}
.brand-sub{font-size:9px;color:#f2ff3a;letter-spacing:.07em;margin-top:2px;font-weight:600;text-shadow:0 0 4px rgba(225,255,45,.75),0 0 9px rgba(225,255,45,.4)}
.ctrl-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
.cg{display:flex;flex-direction:column;gap:2px}
.cl{font-size:8px;color:#c79bff;letter-spacing:.1em;font-weight:700;text-shadow:0 0 4px rgba(168,85,247,.75),0 0 8px rgba(168,85,247,.4)}
.ci{background:#031a22;color:#e0f4fc;border:1px solid #104858;border-radius:3px;padding:4px 7px;font-family:inherit;font-size:11px;outline:none}
.ci:focus{border-color:var(--acc)}
.w80{width:86px}.w110{width:110px}.w130{width:130px}
.hdr-r2{display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-top:1px solid #0d3848;padding-top:6px;font-size:10px}
.mp{display:flex;gap:4px;align-items:center}
.ml{color:#3a8090;font-size:9px}
.mv{color:#e0f4fc;font-weight:700;font-size:11px}
.nav{display:flex;flex-direction:column;background:var(--bg1);border-right:1px solid var(--bd);width:198px;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
.nb{background:none;border:none;color:#d2eef6;font-weight:700;padding:10px 14px;font-family:inherit;font-size:11.5px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid #07232d;white-space:nowrap;letter-spacing:.04em;transition:all .15s;text-align:left;width:100%;display:flex;align-items:center}
.nb:hover{color:var(--tx1);background:var(--bg2)}
.nb.on{color:#8df7ff;border-left-color:#00e8ff;background:#06303f;font-weight:800}
.main{padding:10px 16px;flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-width:0}
.pnl{background:#021520;border:1px solid #0d3848;border-radius:4px;overflow:hidden}
.ph{background:#031820;border-bottom:1px solid var(--bd);padding:5px 12px;font-size:9px;color:#5ad0e8;letter-spacing:.1em;font-weight:700;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ph .dot{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.pb{padding:10px 12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#041e28;color:#5ad0e8;font-size:9px;padding:6px 8px;text-align:left;border-bottom:1px solid var(--bd);letter-spacing:.06em;font-weight:700;white-space:nowrap}
.tbl td{padding:5px 8px;border-bottom:1px solid #05202e;font-size:11px;vertical-align:middle;color:#ddf0f8}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#041e28}
.ts{overflow-x:auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px}
.pill{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700}
.pb-b{background:var(--bull3);color:var(--bull);border:1px solid var(--bull2)}
.pb-r{background:var(--bear3);color:var(--bear);border:1px solid var(--bear2)}
.pb-n{background:var(--neut3);color:var(--neut);border:1px solid var(--neut2)}
.pb-a{background:var(--bg3);color:var(--acc);border:1px solid var(--bd3)}
.cb{color:var(--bull)}.cr{color:var(--bear)}.cn{color:var(--neut)}.ca{color:var(--acc)}
.pc{background:var(--bg2);border:1px solid var(--bd);border-radius:3px;padding:7px 10px}
.sbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative;margin:8px 0}
.sbar-fill{height:100%;border-radius:3px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.fi{background:var(--bg2);border-left:2px solid var(--bd);border-radius:2px;padding:3px 8px;display:flex;align-items:center;gap:6px;font-size:10px}
.fi.pos{border-left-color:var(--bull2)}.fi.neg{border-left-color:var(--bear2)}
.rpc{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px}
.rpi{padding:3px 9px;border-radius:3px;border:1px solid var(--bd2);background:var(--bg2);font-size:10px;font-weight:600}
.tr-b td{background:#001e0a !important;border-bottom:1px solid #003018 !important;color:#d0f8e0 !important}
.tr-r td{background:#1e0008 !important;border-bottom:1px solid #300010 !important;color:#ffd0d8 !important}
.tr-n td{background:#1e1400 !important;border-bottom:1px solid #2e1e00 !important;color:#fff0c0 !important}
.tr-hl td{outline:none !important;border-top:1px solid #00e8ff !important;border-bottom:1px solid #00e8ff !important}
.gbase td{background:#042030 !important;border-top:1px solid #1a5060 !important;border-bottom:1px solid #1a5060 !important;color:#00e8ff !important}
@media(max-width:768px){.g2,.g-kp{grid-template-columns:1fr}.fg{grid-template-columns:1fr}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin-anim{display:inline-block;animation:spin 1s linear infinite}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--bull);display:inline-block;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>

const NAK_SPAN=360/27;
const DO_SEQ=['Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury'];
const DY={Ketu:7,Venus:20,Sun:6,Moon:10,Mars:7,Rahu:18,Jupiter:16,Saturn:19,Mercury:17};
const CHALD=['Sun','Venus','Mercury','Moon','Saturn','Jupiter','Mars'];
const DAY_LORDS=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];
const PC={Sun:'#FFB300',Moon:'#4DB8FF',Mars:'#FF5252',Mercury:'#69F0AE',Jupiter:'#FF8A65',Venus:'#F06292',Saturn:'#CE93D8',Rahu:'#90A4AE',Ketu:'#A1887F',Uranus:'#80DEEA',Neptune:'#9FA8DA'};
const PA={Sun:'Su',Moon:'Mo',Mars:'Ma',Mercury:'Me',Jupiter:'Ju',Venus:'Ve',Saturn:'Sa',Rahu:'Ra',Ketu:'Ke',Uranus:'Ur',Neptune:'Ne'};
const DEG=Math.PI/180;

// ── MATH HELPERS ───────────────────────────────────────────────────
const n360=d=>((d%360)+360)%360;
const toR=d=>d*DEG;
const toD=r=>r/DEG;

// ── JULIAN DAY (IST → UTC) ─────────────────────────────────────────
function JD(yr,mo,dy,istH){
  const utcH=istH-IST;
  let Y=yr,M=mo;
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+dy+utcH/24+B-1524.5;
}

// ═══════════════════════════════════════════════════════════════════
// AYANAMSA — calibrated to match AstroSage / Indian Govt reference
// to within 0.15 arcsecond. Verified against May 5 2026 data:
//   Lahiri 24°13'28" · KP New 24°08'04" · KP Old 24°07'48" · Raman 22°46'50"
//
// Lahiri (Chitrapaksha): 23°15'00" at JD 2435553.5 (1956-Mar-21 0h UT,
// vernal equinox, per the Calendar Reform Committee 1955), with mean
// precession 50.029"/year (the rate adopted in the Rashtriya Panchanga).
//
// All other Indian ayanamsas are constant offsets from Lahiri:
//   KP New (Krishnamurti) = Lahiri − 5'24"
//   KP Old                = Lahiri − 5'40"
//   Raman                 = Lahiri − 1°26'38"
// ═══════════════════════════════════════════════════════════════════
function lahiriAyanamsa(J){
  return 23.25 + (J-2435553.5)*50.029/(3600*365.25);
}
function kpAyanamsa(J){    return lahiriAyanamsa(J) - (5*60+24)/3600; }
function kpOldAyanamsa(J){ return lahiriAyanamsa(J) - (5*60+40)/3600; }
function ramanAyanamsa(J){ return lahiriAyanamsa(J) - (1*3600+26*60+38)/3600; }
function getAyanamsa(J,mode){
  switch(mode){
    case 'lahiri': return lahiriAyanamsa(J);
    case 'kp':     return kpAyanamsa(J);
    case 'kpold':  return kpOldAyanamsa(J);
    case 'raman':  return ramanAyanamsa(J);
    default:       return lahiriAyanamsa(J);
  }
}
function ayanamsaLabel(mode){
  return {lahiri:'Lahiri (Chitrapaksha)', kp:'KP New (Krishnamurti)',
          kpold:'KP Old', raman:'Raman'}[mode] || 'Lahiri';
}

// ═══════════════════════════════════════════════════════════════════
// NUTATION (longitude) — IAU 1980 truncated, ~0.5" precision
// ═══════════════════════════════════════════════════════════════════
function nutation(J){
  const T=(J-2451545)/36525;
  const om=toR(n360(125.04452-1934.136261*T+0.0020708*T*T));
  const L =toR(n360(280.4665+36000.7698*T));
  const Lp=toR(n360(218.3165+481267.8813*T));
  // Δψ in arcseconds → degrees
  const dpsi=(-17.20*Math.sin(om)-1.32*Math.sin(2*L)-0.23*Math.sin(2*Lp)+0.21*Math.sin(2*om))/3600;
  return dpsi;
}

// ═══════════════════════════════════════════════════════════════════
// MEAN OBLIQUITY (IAU 2006) + nutation in obliquity (truncated)
// ═══════════════════════════════════════════════════════════════════
function meanObliquity(J){
  const T=(J-2451545)/36525;
  // IAU 2006 polynomial (arcsec → degrees), accurate to <0.001" for ±200yr
  const eps0_arcsec = 84381.406 - 46.836769*T - 0.0001831*T*T
                     + 0.00200340*T*T*T - 5.76e-7*T*T*T*T - 4.34e-8*T*T*T*T*T;
  return eps0_arcsec/3600;
}
function trueObliquity(J){
  const T=(J-2451545)/36525;
  const om=toR(n360(125.04452-1934.136261*T));
  // Δε in arcseconds
  const deps=(9.20*Math.cos(om)+0.57*Math.cos(2*toR(n360(280.4665+36000.7698*T)))
              +0.10*Math.cos(2*toR(n360(218.3165+481267.8813*T)))-0.09*Math.cos(2*om))/3600;
  return meanObliquity(J)+deps;
}

// ═══════════════════════════════════════════════════════════════════
// SUN apparent ecliptic longitude (Meeus Ch.25, ~0.01° accuracy)
// ═══════════════════════════════════════════════════════════════════
function sunLon(J){
  const T=(J-2451545)/36525;
  const L0=n360(280.46646+36000.76983*T+0.0003032*T*T);
  const M=n360(357.52911+35999.05029*T-0.0001537*T*T);
  const Mr=toR(M);
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)
         +0.000289*Math.sin(3*Mr);
  const O=n360(L0+C);                    // true longitude
  const om=n360(125.04-1934.136*T);
  // apparent = true - 0.00569° aberration - 0.00478°·sin(Ω) (longitude nutation included)
  return n360(O - 0.00569 - 0.00478*Math.sin(toR(om)));
}

// ═══════════════════════════════════════════════════════════════════
// MOON apparent ecliptic longitude — Meeus Ch.47, expanded
// ~60 leading periodic terms, accuracy ~0.01° (better than the 0.1°
// of the original 30-term truncation; matters at sub-lord boundaries).
// ═══════════════════════════════════════════════════════════════════
function moonLon(J){
  const T=(J-2451545)/36525;
  const Lp=n360(218.3164477+481267.88123421*T-0.0015786*T*T+T*T*T/538841-T*T*T*T/65194000);
  const D =n360(297.8501921+445267.1114034*T-0.0018819*T*T+T*T*T/545868-T*T*T*T/113065000);
  const M =n360(357.5291092+35999.0502909*T-0.0001536*T*T+T*T*T/24490000);
  const Mp=n360(134.9633964+477198.8675055*T+0.0087414*T*T+T*T*T/69699-T*T*T*T/14712000);
  const F =n360(93.2720950+483202.0175233*T-0.0036539*T*T-T*T*T/3526000+T*T*T*T/863310000);
  const E =1-0.002516*T-0.0000074*T*T;
  const Dr=toR(D),Mr=toR(M),Mpr=toR(Mp),Fr=toR(F);
  // Σl table (subset of 60 strongest terms in 0.000001° units, Meeus Table 47.A)
  // Each row: [coef, D, M, M', F]
  const T47 = [
    [6288774, 0, 0, 1, 0], [1274027, 2, 0,-1, 0], [ 658314, 2, 0, 0, 0],
    [ 213618, 0, 0, 2, 0], [-185116, 0, 1, 0, 0], [-114332, 0, 0, 0, 2],
    [  58793, 2, 0,-2, 0], [  57066, 2,-1,-1, 0], [  53322, 2, 0, 1, 0],
    [  45758, 2,-1, 0, 0], [ -40923, 0, 1,-1, 0], [ -34720, 1, 0, 0, 0],
    [ -30383, 0, 1, 1, 0], [  15327, 2, 0, 0,-2], [ -12528, 0, 0, 1, 2],
    [  10980, 0, 0, 1,-2], [  10675, 4, 0,-1, 0], [  10034, 0, 0, 3, 0],
    [   8548, 4, 0,-2, 0], [  -7888, 2, 1,-1, 0], [  -6766, 2, 1, 0, 0],
    [  -5163, 1, 0,-1, 0], [   4987, 1, 1, 0, 0], [   4036, 2,-1, 1, 0],
    [   3994, 2, 0, 2, 0], [   3861, 4, 0, 0, 0], [   3665, 2, 0,-3, 0],
    [  -2689, 0, 1,-2, 0], [  -2602, 2, 0,-1, 2], [   2390, 2,-1,-2, 0],
    [  -2348, 1, 0, 1, 0], [   2236, 2,-2, 0, 0], [  -2120, 0, 1, 2, 0],
    [  -2069, 0, 2, 0, 0], [   2048, 2,-2,-1, 0], [  -1773, 2, 0, 1,-2],
    [  -1595, 2, 0, 0, 2], [   1215, 4,-1,-1, 0], [  -1110, 0, 0, 2, 2],
    [   -892, 3, 0,-1, 0], [   -810, 2, 1, 1, 0], [    759, 4,-1,-2, 0],
    [   -713, 0, 2,-1, 0], [   -700, 2, 2,-1, 0], [    691, 2, 1,-2, 0],
    [    596, 2,-1, 0,-2], [    549, 4, 0, 1, 0], [    537, 0, 0, 4, 0],
    [    520, 4,-1, 0, 0], [   -487, 1, 0,-2, 0], [   -399, 2, 1, 0,-2],
    [   -381, 0, 0, 2,-2], [    351, 1, 1, 1, 0], [   -340, 3, 0,-2, 0],
    [    330, 4, 0,-3, 0], [    327, 2,-1, 2, 0], [   -323, 0, 2, 1, 0],
    [    299, 1, 1,-1, 0], [    294, 2, 0, 3, 0]
  ];
  let dL=0;
  for(const [c,d,m,mp,f] of T47){
    const Eb = (Math.abs(m)===1)?E : (Math.abs(m)===2)?E*E : 1;
    dL += c*Eb*Math.sin(d*Dr + m*Mr + mp*Mpr + f*Fr);
  }
  // Additional perturbation A1 (Venus), A2 (Jupiter), L'
  const A1=toR(n360(119.75+131.849*T));
  const A2=toR(n360(53.09+479264.290*T));
  dL += 3958*Math.sin(A1) + 1962*Math.sin(toR(Lp)-Fr) + 318*Math.sin(A2);
  return n360(Lp + dL/1e6);
}

// ═══════════════════════════════════════════════════════════════════
// PLANETARY LONGITUDES (Keplerian heliocentric → geocentric)
// Accuracy ~0.5° — adequate for KP house/sub of slow-moving planets.
// (For arc-minute precision on Mercury/Venus, swap in Swiss Ephemeris
// or full VSOP87 — beyond scope of single-file build.)
// ═══════════════════════════════════════════════════════════════════
const ELS={
  Mercury:{a:.38709927,e:.20563593,i:7.00497902,O:48.33076593,w:77.45779628,L0:252.25032350,Lr:149472.67411175},
  Venus:  {a:.72333566,e:.00677672,i:3.39467605,O:76.67984255,w:131.60246718,L0:181.97909950,Lr:58517.81538729},
  Mars:   {a:1.52371034,e:.09339410,i:1.84969142,O:49.55953891,w:-23.94362959,L0:-4.55343205,Lr:19140.30268499},
  Jupiter:{a:5.20288700,e:.04838624,i:1.30439695,O:100.47390909,w:14.72847983,L0:34.39644051,Lr:3034.74612775},
  Saturn: {a:9.53667594,e:.05386179,i:2.48599187,O:113.66242448,w:92.59887831,L0:49.95424423,Lr:1222.49362201}
};

function planetGeo(J,body){
  const T=(J-2451545)/36525;
  const el=ELS[body];if(!el)return 0;
  const L=n360(el.L0+el.Lr*T);
  const M=n360(L-el.w),Mr=toR(M);
  let E=Mr+el.e*Math.sin(Mr)*(1+el.e*Math.cos(Mr));
  for(let k=0;k<8;k++) E=E - (E-el.e*Math.sin(E)-Mr)/(1-el.e*Math.cos(E));
  const xv=el.a*(Math.cos(E)-el.e);
  const yv=el.a*Math.sqrt(1-el.e*el.e)*Math.sin(E);
  const v=toD(Math.atan2(yv,xv));
  const r=Math.sqrt(xv*xv+yv*yv);
  const lonH=n360(v+el.w);
  const Or=toR(el.O),ir=toR(el.i),lhr=toR(lonH);
  const xH=r*(Math.cos(Or)*Math.cos(lhr-Or)-Math.sin(Or)*Math.sin(lhr-Or)*Math.cos(ir));
  const yH=r*(Math.sin(Or)*Math.cos(lhr-Or)+Math.cos(Or)*Math.sin(lhr-Or)*Math.cos(ir));
  const sl=sunLon(J);
  const Re=1.0;
  const xs=Re*Math.cos(toR(sl));
  const ys=Re*Math.sin(toR(sl));
  return n360(toD(Math.atan2(yH+ys, xH+xs)));
}

// ═══════════════════════════════════════════════════════════════════
// RAHU/KETU — Mean lunar ascending node (Meeus 47.6).
// This is the CLASSICAL KP convention used in KSK's original tables
// and the Lahiri Ephemeris. Some modern apps (e.g. JagannathaHora,
// "KP Details" by certain publishers) display the TRUE node instead,
// which oscillates around the mean by up to ±1°40' (~100' at most).
// On May 6 2026 the true−mean offset is ~31'; on other dates it can
// flip sign. If your reference shows a different node value, that's
// the convention difference, not a calculation error.
// ═══════════════════════════════════════════════════════════════════
function rahuLon(J){
  const T=(J-2451545)/36525;
  const om = 125.0445479 - 1934.1362891*T + 0.0020754*T*T
           + T*T*T/467441 - T*T*T*T/60616000;
  return n360(om);
}

// ═══════════════════════════════════════════════════════════════════
// ASCENDANT — Meeus 13.6 with QUADRANT FIX (was 180° off in v1)
// ═══════════════════════════════════════════════════════════════════
function computeAsc(J){
  const T=(J-2451545)/36525;
  // Apparent sidereal time at Greenwich (includes nutation)
  const GMST=n360(280.46061837+360.98564736629*(J-2451545)
                  +0.000387933*T*T-T*T*T/38710000);
  const eps=trueObliquity(J);
  const dpsi=nutation(J);
  // Equation of equinoxes (in degrees): Δψ·cos(ε)
  const eqEq = dpsi*Math.cos(toR(eps));
  const GAST = n360(GMST + eqEq);
  const LST  = n360(GAST + LON);
  const epsr=toR(eps), latr=toR(LAT), lstr=toR(LST);
  // Meeus 13.6 ascendant formula
  const y = -Math.cos(lstr);
  const x =  Math.sin(lstr)*Math.cos(epsr) + Math.tan(latr)*Math.sin(epsr);
  let asc = n360(toD(Math.atan2(y,x)));
  // ── QUADRANT CORRECTION (THE BUG FIX) ──
  // Meeus's atan2 form yields the descendant in the LST ranges where
  // the eastern semi-arc wraps. Force the ascendant to lie east of MC.
  const mc = n360(toD(Math.atan2(Math.sin(lstr), Math.cos(lstr)*Math.cos(epsr))));
  if (n360(asc - mc) > 180) asc = n360(asc + 180);
  return { asc, mc, lst:LST };
}

// ═══════════════════════════════════════════════════════════════════
// SUNRISE / SUNSET (Mumbai) — verified accurate to ~30s
// ═══════════════════════════════════════════════════════════════════
function sunriseSunset(dateStr){
  const dp=dateStr.split('-').map(Number);
  const[yr,mo,dy]=dp;
  let Y=yr,M=mo;
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  const JDnoon=Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+dy+0.5+B-1524.5;
  const n=JDnoon-2451545.0;
  const L=((280.460+0.9856474*n)%360+360)%360;
  const g=((357.528+0.9856003*n)%360+360)%360;
  const gr=g*DEG;
  const lam=(L+1.915*Math.sin(gr)+0.020*Math.sin(2*gr))*DEG;
  const eps=(23.439-0.0000004*n)*DEG;
  const RA=((Math.atan2(Math.cos(eps)*Math.sin(lam),Math.cos(lam)))/DEG+360)%360;
  const decl=Math.asin(Math.sin(eps)*Math.sin(lam));
  let EoT=(L-RA)*4;
  if(EoT>20)EoT-=1440;
  if(EoT<-20)EoT+=1440;
  const cosH=(Math.sin(-0.8333*DEG)-Math.sin(LAT*DEG)*Math.sin(decl))
            /(Math.cos(LAT*DEG)*Math.cos(decl));
  if(Math.abs(cosH)>1)return{rise:6*60,set:18*60,hl:60};
  const H=Math.acos(cosH)/DEG;
  const noonIST=(12-EoT/60-LON/15)+IST;  // local clock noon at selected timezone
  const riseH=noonIST-H/15;
  const setH =noonIST+H/15;
  return{rise:riseH*60,set:setH*60,hl:(setH-riseH)*60/12};
}

// ═══════════════════════════════════════════════════════════════════
// KP NAKSHATRA / SUB / SUB-SUB
// ═══════════════════════════════════════════════════════════════════
function getNak(lon){
  const l=n360(lon);
  const idx=Math.min(Math.floor(l/NAK_SPAN),26);
  const posInNak=l-idx*NAK_SPAN;
  const pada=Math.min(Math.floor(posInNak/(NAK_SPAN/4))+1,4);
  return{...NAKS[idx],idx,pada,pos:posInNak};
}
function getSub(lon){
  const l=n360(lon);
  const ni=Math.min(Math.floor(l/NAK_SPAN),26);
  const nakL=NAKS[ni].l;
  const posInNak=(l-ni*NAK_SPAN)/NAK_SPAN;
  const si=DO_SEQ.indexOf(nakL);
  let cum=0,sub=nakL,subi=si,ss=nakL;
  for(let i=0;i<9;i++){
    const p=DO_SEQ[(si+i)%9];
    const f=DY[p]/120;
    if(posInNak>=cum&&posInNak<cum+f){
      sub=p;subi=(si+i)%9;
      const posInSub=(posInNak-cum)/f;
      let c2=0;
      for(let j=0;j<9;j++){
        const p2=DO_SEQ[(subi+j)%9];
        const f2=DY[p2]/120;
        if(posInSub>=c2&&posInSub<c2+f2){ss=p2;break;}
        c2+=f2;
      }
      break;
    }
    cum+=f;
  }
  const nk=getNak(lon);
  return{nak:nk.n,nakL:nk.l,sub,ss,pada:nk.pada};
}
function getSign(lon){
  const l=n360(lon);const s=Math.floor(l/30);
  return{sign:SIGNS[s],s,lord:SLRD[s],deg:l%30,abb:SABB[s]};
}
function getD9(lon){
  const l=n360(lon);const s=Math.floor(l/30);const d=l%30;
  const p=Math.floor(d/(30/9));
  const st=[0,9,6,3,0,9,6,3,0,9,6,3];
  return(st[s]+p)%12;
}
function houseOf(pLon,ascLon){return(Math.floor(n360(pLon-ascLon)/30)%12)+1;}

// ═══════════════════════════════════════════════════════════════════
// GANN SQUARE-OF-9
// ═══════════════════════════════════════════════════════════════════
// GANN SQUARE-OF-9 LEVELS
// ───────────────────────────────────────────────────────────────────
// Generates support/resistance levels around an ANCHOR price using
// the classical SQ9 formula: level = (√anchor + n)² where n is in
// units of 0.5 (each 0.5 unit corresponds to ~22.5° on the SQ9 wheel).
// The anchor should be a FIXED reference for the trading session —
// typically the Day Open or Previous Close, NOT live price.
// ═══════════════════════════════════════════════════════════════════
function gannLevels(anchor){
  const sq=Math.sqrt(Math.max(anchor,1));
  return[-2,-1.5,-1,-0.5,0,.5,1,1.5,2].map(u=>{
    const p=Math.round((sq+u)**2);
    const pct=((p-anchor)/anchor*100).toFixed(2);
    const type=u===0?'BASE':u>0?`R${Math.abs(u)*2}`:`S${Math.abs(u)*2}`;
    return{u,p,pct,type};
  });
}

// ★ VYAPAAR RATNA MODULE 1 — MULTI-ASPECT ENGINE

const ORBS = {

  // Saturn pairs (p.331)

// Return signed polarity for any planet pair (order-independent)
function pairPolarity(a, b){
  const k1 = a+'|'+b, k2 = b+'|'+a;
  if(k1 in PAIR_POLARITY) return PAIR_POLARITY[k1];
  if(k2 in PAIR_POLARITY) return PAIR_POLARITY[k2];
  return 0; // unknown pair
}

// ═══════════════════════════════════════════════════════════════════
// RASHI POLARITY (p.285) — teji-sign vs mandi-sign
// ═══════════════════════════════════════════════════════════════════
// 0=Ari, 1=Tau, 2=Gem, 3=Can, 4=Leo, 5=Vir, 6=Lib, 7=Sco, 8=Sag, 9=Cap, 10=Aqu, 11=Pis
const TEJI_SIGNS  = new Set([0, 1, 4, 7, 9]);                 // Ari, Tau, Leo, Sco, Cap
const MANDI_SIGNS = new Set([2, 3, 5, 6, 8, 10, 11]);          // Gem, Can, Vir, Lib, Sag, Aqu, Pis

// Within each sign, navamsa-grain polarity alternates (p.285):
//   0°–6°40'   = TEJI
//   6°40'–10°  = MANDI
//   10°–16°40' = TEJI
//   16°40'–20° = MANDI
//   20°–26°40' = TEJI
//   26°40'–30° = MANDI
function navamsaPolarity(degInSign){
  const d = degInSign % 30;
  const bands = [
    [0,         6+40/60, +1],
    [6+40/60,   10,      -1],
    [10,        16+40/60,+1],
    [16+40/60,  20,      -1],
    [20,        26+40/60,+1],
    [26+40/60,  30,      -1],
  ];
  for(const [lo, hi, p] of bands){
    if(d >= lo && d < hi) return p;
  }
  return -1;
}

// Combined sign+navamsa rashi-polarity for a planet at a given longitude
function rashiPolarity(lon){
  const sign = Math.floor(lon/30) % 12;
  const degInSign = lon % 30;
  const sgnPol = TEJI_SIGNS.has(sign) ? +1 : -1;
  const navPol = navamsaPolarity(degInSign);
  // Book's "purna" rule: both agree = full effect, disagree = reduced
  if(sgnPol === navPol) return sgnPol;        // full agreement = ±1
  return sgnPol * 0.5;                         // disagreement = half effect, sign-dominant
}

function orbFor(aspectDeg, p1, p2){
  const isLum=n=>n==='Sun'||n==='Moon';
  const both=isLum(p1)&&isLum(p2);
  const one =isLum(p1)||isLum(p2);
  const o=ORBS[aspectDeg];
  if(!o) return 6;
  return both?o[0]:one?o[1]:o[2];
}

// Aspect-relative-weight table from book p.329 (Khand 2 Ch.5)
// Expressed as fractions in "annas" (out of 16). Conj/opp=full, others scaled.
const ASPECT_WEIGHT = {
  0:   1.00,   // conjunction (yuti) — full
  180: 1.00,   // opposition (prati-yoga) — full but opposite polarity (mandi-karak)
  120: 0.50,   // trine — half
  60:  0.25,   // sextile — quarter
  90:  0.50,   // square — half (treated like trine in magnitude per book mandi side)
  45:  0.20,   // semisquare
  135: 0.20,   // sesquiquadrate
  150: 0.25,   // quincunx
  30:  0.125,  // semisextile
  72:  0.094,  // quintile
  144: 0.094,  // biquintile
  36:  0.094,  // decile
};

// Returns array of active aspects with strength 0..1
function computeAspects(planets){
  const out=[];
  // Only use 9 traditional bodies for the yoga grid (book scope)
  // (modern outers Uranus/Neptune/Pluto included since book pp.330-331 list them)
  const NAMES = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune','Pluto'];
  const set=planets.filter(p=>NAMES.includes(p.name));
  for(let i=0;i<set.length;i++){
    for(let j=i+1;j<set.length;j++){
      const p1=set[i], p2=set[j];
      let d=Math.abs(n360(p1.lon-p2.lon));
      if(d>180) d=360-d;
      for(const a of ASPECTS){
        const target = a.deg<=180 ? a.deg : 360-a.deg;
        const delta  = Math.abs(d - target);
        const orb    = orbFor(a.deg, p1.name, p2.name);
        if(delta <= orb){
          const strength = 1 - (delta/orb);   // 1 = exact, 0 = at edge

          // ── BOOK POLARITY (pp.329-331) ─────────────────────────
          // Each pair has explicit teji/mandi polarity for CONJUNCTION.
          // Opposition (180°) flips it (book treats prati-yoga as mandi
          // equivalent of yuti's teji). All other aspects use the same
          // polarity as conjunction with reduced weight.
          const pairPol = pairPolarity(p1.name, p2.name);
          const isOpposition = (a.deg === 180);
          const polSign = isOpposition ? -pairPol : pairPol;

          // ── RASHI POLARITY MODIFIER (p.285) ────────────────────
          // Sign and navamsa where the planets sit further modify the
          // outcome. Average of both planets' rashi-polarity.
          const r1 = rashiPolarity(p1.lon);
          const r2 = rashiPolarity(p2.lon);
          const rashiMod = (r1 + r2) / 2;

          // ── ASPECT WEIGHT (p.329) ──────────────────────────────
          const aspWt = ASPECT_WEIGHT[a.deg] ?? 0.1;

          // ── MAGNITUDE (preserved from PLANET_NATURE) ───────────
          const n1=PLANET_NATURE[p1.name], n2=PLANET_NATURE[p2.name];
          const baseMag = (n1.mag + n2.mag)/2;

          // Final signed weight: book's deterministic formula
          // = pair_polarity × aspect_weight × orb_strength × magnitude
          //   × (1 + 0.5×rashi_modifier_alignment)
          const rashiAlign = polSign !== 0 ? Math.sign(polSign) === Math.sign(rashiMod) ? 1 : -1 : 0;
          const rashiBoost = 1 + 0.3 * rashiAlign * Math.abs(rashiMod);
          const weight = polSign * aspWt * strength * baseMag * rashiBoost;

          out.push({
            p1:p1.name, p2:p2.name, abb1:p1.abbr, abb2:p2.abbr,
            aspect:a.name, deg:a.deg, sym:a.sym,
            actual:d, delta, orb, strength,
            dir: Math.sign(weight),
            weight: weight,
            pairPol, rashiMod,
            nature:a.nature
          });
        }
      }
    }
  }
  // sort by absolute weight desc
  out.sort((x,y)=>Math.abs(y.weight)-Math.abs(x.weight));
  return out;
}

// Aggregate aspect grid into a single score (-100..+100)
function aspectScore(aspects){
  let sum=0, maxAbs=0;
  for(const a of aspects){ sum += a.weight; maxAbs += Math.abs(a.weight); }
  if(maxAbs===0) return {score:0, contrib:0};
  // normalize to ±100 using a soft cap
  const raw = sum * 8; // empirical scaling (~5 strong aspects ⇒ ±40)
  const score = Math.max(-100, Math.min(100, raw));
  return {score:Math.round(score), contrib:Math.round(raw)};
}

// ═══════════════════════════════════════════════════════════════════
// ★ VYAPAAR RATNA MODULE 2 — SANKRANTI OVERLAY
// ───────────────────────────────────────────────────────────────────
// Ch.4 (pp.102–137). Sankranti = solar ingress into a tropical sign.
// We use the TROPICAL Sun (not sidereal), per the book's सायन approach.
// Effect-window rules (p.103):
//   Vrishabh/Karka/Simha/Vrishchik/Kumbh: first 10 days strongest
//   Mithun/Kanya/Dhanu/Makar/Meen:        last 10 days strongest
//   Mesh/Tula:                            middle 10 days strongest
// Persistence: Mesh = 1 year; Karka/Tula = 6 months; others = own period.
// Khadi/Baithi/Soti by ingress time vs sunrise (p.103 onwards):
//   sunrise±2h    = खड़ी (Khadi, standing)   — sharp moves
//   day-mid       = बैठी (Baithi, sitting)   — congestion
//   night         = सोती (Soti, sleeping)    — listless / range-bound
// ═══════════════════════════════════════════════════════════════════
const SANKRANTI_NAMES = ['Mesh','Vrishabh','Mithun','Karka','Simha','Kanya','Tula','Vrishchik','Dhanu','Makar','Kumbh','Meen'];
const SANKRANTI_DURATION = [32,32,32,32,32,32,30,28,28,30,30,30]; // approximate, p.102
const SANKRANTI_WINDOW = ['MID','FIRST','LAST','FIRST','FIRST','LAST','MID','FIRST','LAST','LAST','FIRST','LAST'];

// Find the current sankranti window from tropical Sun longitude.
function currentSankranti(sunTropLon){
  const idx = Math.floor(n360(sunTropLon)/30);
  const degIntoSign = n360(sunTropLon) % 30;
  // approx days into sankranti = degIntoSign × (duration/30)
  const dur = SANKRANTI_DURATION[idx];
  const dayIn = degIntoSign * (dur/30);
  const dayLeft = dur - dayIn;
  const window = SANKRANTI_WINDOW[idx];
  // Strongest window check
  const inFirst10  = dayIn <= 10;
  const inLast10   = dayLeft <= 10;
  const inMid10    = dayIn > 10 && dayLeft > 10;
  const peak =
    (window==='FIRST' && inFirst10) ||
    (window==='LAST'  && inLast10)  ||
    (window==='MID'   && inMid10);
  return {
    sign: SANKRANTI_NAMES[idx],
    idx,
    duration: dur,
    dayIn: Math.round(dayIn*10)/10,
    dayLeft: Math.round(dayLeft*10)/10,
    window,
    peak,
    desc: peak
      ? `${SANKRANTI_NAMES[idx]} Sankranti in PEAK window (${window} 10 days)`
      : `${SANKRANTI_NAMES[idx]} Sankranti (off-peak)`
  };
}

// Khadi/Baithi/Soti classification for a given ingress time vs sunrise.
// Here we approximate using current time-of-day for the overlay panel.
function khadiClass(timeIST, sunriseMin){
  const min = timeIST * 60;
  const dawn = sunriseMin;
  const dusk = sunriseMin + 12*60; // approximate
  const fromDawn = Math.abs(min - dawn);
  if(fromDawn <= 120) return {cls:'Khadi',  hint:'sharp directional moves',     col:'var(--bull)'};
  if(min > dawn && min < dusk) return {cls:'Baithi', hint:'congestion / consolidation', col:'var(--neut)'};
  return {cls:'Soti', hint:'listless / range-bound', col:'var(--tx2)'};
}

const VARGESHA_DATES = [ // [name, approx-month, approx-day, commodity-class]

  ['Durgesh',  7, 16, 'Defence / heavy industry'],

// Each year-lord planet ⇒ class-specific bias direction (from Ch.3
// rules pp.85–96). Bull = lord favorable to that commodity class.
const LORD_BIAS = {
  // [Sasyesh table p.85] — analogous tables for each lord
  Sun:     {default:+0.5, hot:+1,  cool:-0.5, grains:+0.5, metals:+1},
  Moon:    {default:+1,   hot:-0.3,cool:+1,   grains:+1,   metals:+0.3},
  Mars:    {default:-0.7, hot:+1,  cool:-1,   grains:-0.5, metals:+1},
  Mercury: {default:+0.3, hot:0,   cool:+0.3, grains:+0.5, metals:+0.3},
  Jupiter: {default:+1,   hot:+0.5,cool:+1,   grains:+1,   metals:+0.5},
  Venus:   {default:+0.7, hot:+0.3,cool:+1,   grains:+0.5, metals:+0.5},
  Saturn:  {default:-1,   hot:-1,  cool:+0.3, grains:-1,   metals:+0.5},
};

function vargeshaForDate(dateStr){
  const yr = parseInt(dateStr.split('-')[0]);
  const out=[];
  for(const [name, mo, dy, klass] of VARGESHA_DATES){
    const d = new Date(yr, mo-1, dy);
    const w = d.getDay();
    const lord = DAY_LORDS[w];
    const bias = LORD_BIAS[lord]?.default ?? 0;
    out.push({name, lord, klass, bias,
              tag: bias>0.5?'BULL':bias<-0.5?'BEAR':'NEUT'});
  }
  return out;
}

// Build per-sector strength map from active aspect list.
function sectorYogaRank(aspects){
  const idx = {};
  for(const a of aspects){
    idx[a.p1+'|'+a.p2] = a;
    idx[a.p2+'|'+a.p1] = a;
  }
  const results=[];
  for(const [name, pairs] of Object.entries(SECTOR_YOGAS)){
    let bull=0, bear=0, hits=[];
    for(const [x,y] of pairs){
      const a = idx[x+'|'+y];
      if(a){
        if(a.weight > 0) bull += a.weight; else bear += a.weight;
        hits.push(a);
      }
    }
    const net = bull + bear;
    const bias = net > 0.5 ? 'BULL' : net < -0.5 ? 'BEAR' : 'NEUT';
    results.push({sector:name, score:Math.round(net*100)/100, bull:Math.round(bull*100)/100, bear:Math.round(bear*100)/100, hits:hits.length, bias});
  }
  results.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score));
  return results;
}

// ★ VYAPAAR RATNA MODULE 5 — SUN-MERCURY-VENUS TRIO (FUTURES BASIS)
// ───────────────────────────────────────────────────────────────────
// Pages 269–271 (printed) — the most operationally specific framework
// in the entire book. Premise: since Mercury never exceeds ~28° from
// the Sun and Venus never exceeds ~48°, these three planets only ever
// form CONJUNCTION (युति) with each other — never trine/square/opp.
// The geometry between Sun-Mer-Ven therefore governs the futures-spot
// basis (वायदा-तैयार अन्तर) more than any other planetary configuration.
//
// CORE RULES (from book):
//
//  R1. Mer-Sun conjunction (Mercury combust) → BULLISH for spot prices
//  R2. Ven-Sun conjunction (Venus combust)   → BEARISH for spot prices
//  R3. Tight Mer-Ven cluster                 → market paralysis (rangebound)
//  R4. Mer-Ven exact conjunction (समीप)     → monthly LOW in prices
//  R5. Wide Mer-Ven separation (~76° max)    → futures-spot gap WIDEST
//
//  SPEED RULE (p.272):
//  R6. Mer speed > Ven speed → SPOT below FUTURES (contango)
//  R7. Ven speed > Mer speed → SPOT above FUTURES (backwardation)
//  R8. Equal speeds          → near-zero basis
//
//  SIGN RULES (p.270–271 explicit):
//  - Mer-Sun yuti in Virgo/Aries          → bullish industrials
//  - Mer-Sun yuti in Pis/Lib/Tau/Cap/Aqu  → bearish
//  - Mer-Ven yuti in Gem/Vir/Tau/Lib/Pis  → bearish silver/seeds/cloth/yarn/shares/oil
//  - Mer-Ven yuti in Can/Leo              → bullish
//  - Mer-Ven yuti in Venus's own/exalted sign (Tau/Lib/Pis) → basis collapses
// ═══════════════════════════════════════════════════════════════════
const SIGN_NAMES_FULL = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];

// Returns full Sun-Mer-Ven analysis with operational implications
function sunMerVenTrio(planets, J){
  const Su = planets.find(p=>p.name==='Sun');
  const Me = planets.find(p=>p.name==='Mercury');
  const Ve = planets.find(p=>p.name==='Venus');
  if(!Su||!Me||!Ve) return null;

  // Separations (signed for direction, absolute for magnitude)
  function sepSigned(a,b){ let d=a-b; while(d>180)d-=360; while(d<-180)d+=360; return d; }
  function sepAbs(a,b){ return Math.abs(sepSigned(a,b)); }

  const dMeSu = sepAbs(Me.lon, Su.lon);
  const dVeSu = sepAbs(Ve.lon, Su.lon);
  const dMeVe = sepAbs(Me.lon, Ve.lon);
  const dMeSuS = sepSigned(Me.lon, Su.lon);
  const dVeSuS = sepSigned(Ve.lon, Su.lon);

  // Speeds (deg/day, signed)
  const vMe = planetSpeed('Mercury', J);
  const vVe = planetSpeed('Venus', J);
  const dV  = vMe - vVe; // positive ⇒ Mer faster

  // Combustion / conjunction state (book uses "yuti" loosely; we use orb<8°)
  const ORB = 8;
  const mercCombust  = dMeSu < ORB;
  const venusCombust = dVeSu < ORB;
  const merVenYuti   = dMeVe < ORB;
  const merVenWide   = dMeVe > 60; // approaching the ~76° max — basis widest

  // Sign-based polarity flags from book pages 270-271
  const meSign = Me.s, veSign = Ve.s, suSign = Su.s;
  const meSunSameSign = meSign === suSign;
  const meVenSameSign = meSign === veSign;

  // R1: Mer-Sun combust → bullish, but only if in book's bullish signs
  // Bullish signs for Mer-Sun yuti: Virgo(5), Aries(0)
  // Bearish signs: Pisces(11), Libra(6), Taurus(1), Capricorn(9), Aquarius(10), Cancer(3)
  const MER_SUN_BULL_SIGNS = new Set([5, 0]);              // Vir, Ari
  const MER_SUN_BEAR_SIGNS = new Set([11, 6, 1, 9, 10, 3]); // Pis, Lib, Tau, Cap, Aqu, Can

  // R3-R4: Mer-Ven yuti — bearish for silver/seeds/cloth/yarn/shares/oil in Gem/Vir/Tau/Lib/Pis
  // Bullish in Cancer, Leo
  const MER_VEN_BEAR_SIGNS = new Set([2, 5, 1, 6, 11]); // Gem, Vir, Tau, Lib, Pis
  const MER_VEN_BULL_SIGNS = new Set([3, 4]);           // Can, Leo
  // Venus's own/exalted: Tau(1), Lib(6), Pis(11) — basis collapse if Mer-Ven yuti here
  const VENUS_HOME = new Set([1, 6, 11]);

  // ─── Build operational signals ────────────────────────────────
  const signals = [];

  // R1
  if(mercCombust && meSunSameSign){
    if(MER_SUN_BULL_SIGNS.has(meSign)){
      signals.push({code:'R1+', text:`Mercury combust in ${SIGN_NAMES_FULL[meSign]} (Δ${dMeSu.toFixed(1)}°) — book: bullish industrials, prices push higher`, dir:+1, weight:1.0});
    } else if(MER_SUN_BEAR_SIGNS.has(meSign)){
      signals.push({code:'R1-', text:`Mercury combust in ${SIGN_NAMES_FULL[meSign]} (Δ${dMeSu.toFixed(1)}°) — book: bearish sign, prices weaken`, dir:-1, weight:0.8});
    } else {
      signals.push({code:'R1', text:`Mercury combust in ${SIGN_NAMES_FULL[meSign]} (Δ${dMeSu.toFixed(1)}°) — neutral-to-bullish`, dir:+0.3, weight:0.5});
    }
  } else if(mercCombust){
    signals.push({code:'R1?', text:`Mercury within ${dMeSu.toFixed(1)}° of Sun but in different sign (Mer→${SIGN_NAMES_FULL[meSign]}, Sun→${SIGN_NAMES_FULL[suSign]}) — partial combustion`, dir:+0.3, weight:0.4});
  }

  // R2: Venus combust → bearish (always)
  if(venusCombust){
    signals.push({code:'R2', text:`Venus combust in ${SIGN_NAMES_FULL[veSign]} (Δ${dVeSu.toFixed(1)}°) — book: bearish, prices fall`, dir:-1, weight:0.9});
  }

  // R3-R4: Mer-Ven configuration
  if(merVenYuti){
    if(VENUS_HOME.has(veSign) && meVenSameSign){
      signals.push({code:'R4★', text:`Mer-Ven yuti (Δ${dMeVe.toFixed(1)}°) in Venus's home/exalted sign ${SIGN_NAMES_FULL[veSign]} — book: futures-spot BASIS COLLAPSES to ~zero`, dir:0, weight:1.0, special:'BASIS_COLLAPSE'});
    } else if(meVenSameSign && MER_VEN_BEAR_SIGNS.has(meSign)){
      signals.push({code:'R3-', text:`Mer-Ven yuti (Δ${dMeVe.toFixed(1)}°) in ${SIGN_NAMES_FULL[meSign]} — book: BEAR mandi in silver/seeds/cloth/yarn/shares/oil`, dir:-1, weight:1.0});
    } else if(meVenSameSign && MER_VEN_BULL_SIGNS.has(meSign)){
      signals.push({code:'R3+', text:`Mer-Ven yuti (Δ${dMeVe.toFixed(1)}°) in ${SIGN_NAMES_FULL[meSign]} — book: BULL teji in markets`, dir:+1, weight:1.0});
    } else if(dMeVe < 3){
      signals.push({code:'R4', text:`Mer-Ven near-exact conjunction (Δ${dMeVe.toFixed(1)}°) — book: monthly LOW likely near this time`, dir:-0.7, weight:0.9, special:'MONTHLY_LOW'});
    } else {
      signals.push({code:'R3', text:`Mer-Ven yuti (Δ${dMeVe.toFixed(1)}°) — market paralysis / rangebound`, dir:0, weight:0.6, special:'RANGEBOUND'});
    }
  } else if(merVenWide){
    signals.push({code:'R5', text:`Mer-Ven separation ${dMeVe.toFixed(1)}° — approaching max (76°) — futures-spot basis at WIDEST`, dir:0, weight:0.7, special:'WIDE_BASIS'});
  }

  // R6-R8: Speed comparison
  let basisRegime, basisText, basisDir;
  if(Math.abs(dV) < 0.05){
    basisRegime = 'EQUAL_SPEEDS';
    basisText = `Mer & Ven speeds nearly equal (ΔV=${dV.toFixed(3)}°/d) — basis near zero`;
    basisDir = 0;
  } else if(dV > 0){
    basisRegime = 'CONTANGO';
    basisText = `Mercury faster than Venus (ΔV=+${dV.toFixed(3)}°/d) — book: SPOT trades BELOW futures (CONTANGO)`;
    basisDir = -1;
  } else {
    basisRegime = 'BACKWARDATION';
    basisText = `Venus faster than Mercury (ΔV=${dV.toFixed(3)}°/d) — book: SPOT trades ABOVE futures (BACKWARDATION)`;
    basisDir = +1;
  }
  signals.push({code:'R6-8', text:basisText, dir:basisDir, weight:0.8, special:basisRegime});

  // ─── Net trio score ─────────────────────────────────────────
  let netScore = 0, totalWeight = 0;
  for(const s of signals){ netScore += s.dir*s.weight; totalWeight += s.weight; }
  const normScore = totalWeight > 0 ? netScore / totalWeight : 0;
  const trioBias = normScore > 0.3 ? 'BULL' : normScore < -0.3 ? 'BEAR' : 'NEUT';

  // ─── Estimate basis direction & magnitude ──────────────────
  // Heuristic: basis magnitude scales with Mer-Ven separation (up to 76°)
  // Direction from speed-rule (contango/backwardation)
  // Sign-rule modifiers can amplify or cancel
  const basisMag = Math.min(100, (dMeVe / 76) * 100);  // 0-100%
  let basisSign = basisDir; // -1 contango, +1 backwardation, 0 flat
  if(signals.some(s=>s.special==='BASIS_COLLAPSE')) { basisSign = 0; }
  if(signals.some(s=>s.special==='MONTHLY_LOW')) { basisSign = 0; }

  return {
    Su:{lon:Su.lon, sign:SIGN_NAMES_FULL[suSign], retro:false},
    Me:{lon:Me.lon, sign:SIGN_NAMES_FULL[meSign], retro:Me.retro, speed:vMe},
    Ve:{lon:Ve.lon, sign:SIGN_NAMES_FULL[veSign], retro:Ve.retro, speed:vVe},
    dMeSu, dVeSu, dMeVe,
    mercCombust, venusCombust, merVenYuti, merVenWide,
    speedDiff:dV, basisRegime, basisText,
    signals,
    trioBias,
    trioScore: Math.round(normScore*100),
    basisMag: Math.round(basisMag),
    basisSign,  // +1 backwardation, 0 flat, -1 contango
  };
}


// ═══════════════════════════════════════════════════════════════════
// ★ VYAPAAR RATNA MODULE 6 — LAGNA-BASED TEJI-MANDI (pp.260-265)
// ───────────────────────────────────────────────────────────────────
// THE most operationally precise framework for intraday signals.
//
// Book methodology (pp.263-265): cast a chart at the live lagna and
// analyze drishti relations between key house-lords and bhavas.
//
// Core houses for trade:
//   1H Lagna       — the trader / the asset (lagnesh = self)
//   2H Dhana       — money / wealth (dhanesh = price-receivable)
//   5H Labh-stan   — speculation profit house ("लाभ स्थान" for trade)
//   7H Bhagya      — counterparty / market (saptamesh)
//   8H Ashtam      — sudden gain/loss (ashtamesh = "8L" = volatility lord)
//   10H Karma      — actions / contracts (karmesh)
//   11H Aaye       — gains house
//
// BUY rules (p.260-261):
//   B1: 2L in shubh-drishti of 8L (Moon/Jup/Ven aspecting both)
//   B2: 2L reaches 8L's uchcha-rashi (exalted sign)
//   B3: Moon leaves 8L (papa-drishti) and joins 2L (shubh-drishti)
//   B4: 5L+7L mutually aspect, Jupiter or Venus dignified
//   B5: 10L receives shubh-drishti from 2L AND lagnesh in 11H
//
// SELL rules (p.261):
//   S1: Any shubh-graha (Jup/Ven/Moon) enters 2H → SELL
//   S2: Lagnesh moves to 7H → SELL
//   S3: Moon leaves shubh-drishti of 2L and joins 7L/8L with papa-drishti
//   S4: Saptamesh (7L) in 2H → prices fall
//
// AVOID rules (p.260):
//   A1: Papa-grahas in lagna (1H), 2H, 7H, 8H → never buy
//   A2: Saptamesh in papa-drishti to lagnesh/dhanesh → don't trade
//   A3: 1L+2L+8L all afflicted → severe loss likely
//
// FUTURES specific (p.261):
//   F1: 1L+2L+5L all in 10H from lagna → guaranteed contract profit
//   F2: 5L in 5H with shubh-drishti from 1L/2L → mahaan suyog (great)
//   F3: Jupiter in 5H or 2H, balwan, 5L in kendra, no papa-drishti →
//       profitable contract time
//   F4: Lagnesh in 11H during futures → LOSS, not gain (counterintuitive)
// ═══════════════════════════════════════════════════════════════════

// Sign-lord lookup (planet that rules each sign)
const SIGN_LORDS = {
  0:'Mars',    1:'Venus',  2:'Mercury', 3:'Moon',    4:'Sun',     5:'Mercury',
  6:'Venus',   7:'Mars',   8:'Jupiter', 9:'Saturn', 10:'Saturn', 11:'Jupiter'
};

// Planet exaltation (uchcha) signs
const UCHCHA = {
  Sun:0, Moon:1, Mars:9, Mercury:5, Jupiter:3, Venus:11, Saturn:6, Rahu:1, Ketu:7
};
// Planet debilitation (neecha) signs
const NEECHA = {
  Sun:6, Moon:7, Mars:3, Mercury:11, Jupiter:9, Venus:5, Saturn:0, Rahu:7, Ketu:1
};

// Benefic / Malefic classification (book p.264)
const NATURAL_BENEFIC = new Set(['Jupiter','Venus','Mercury']); // Mercury when not with papa
const NATURAL_MALEFIC = new Set(['Sun','Mars','Saturn','Rahu','Ketu']);

// Moon polarity by tithi-equivalent (book p.264):
// Shukla-paksha 8 to Krishna-paksha 5 = full/near-full = benefic
// Otherwise = waning = malefic
function moonBenefic(moonLon, sunLon){
  let phase = n360(moonLon - sunLon); // 0..360
  // Shukla-8 ≈ 84°, Krishna-5 ≈ 240°. Between = benefic
  return phase >= 84 && phase <= 240;
}

// Hindu special drishti (sign-to-sign per book p.263)
// Returns the houses (1-12) a planet aspects from its own position
function planetDrishtiHouses(planetName){
  // Default: all planets aspect 7th from themselves
  // Special: Mars also 4,8 ; Jupiter also 5,9 ; Saturn also 3,10
  if(planetName==='Mars')    return [4, 7, 8];
  if(planetName==='Jupiter') return [5, 7, 9];
  if(planetName==='Saturn')  return [3, 7, 10];
  return [7]; // Sun, Moon, Mer, Ven, Rahu, Ketu, Uranus, Neptune, Pluto
}

// Does planet at house pH aspect target house tH? (Hindu drishti)
function aspectsHouse(planet, planetHouse, targetHouse){
  const drishtis = planetDrishtiHouses(planet);
  for(const d of drishtis){
    const aspectHouse = ((planetHouse + d - 2) % 12) + 1; // wrap 1-12
    if(aspectHouse === targetHouse) return true;
  }
  return false;
}

// Find planets occupying a given house
function planetsInHouse(planets, house){
  return planets.filter(p => p.h === house).map(p => p.name);
}

// Find planets aspecting a given house
function planetsAspectingHouse(planets, house){
  return planets.filter(p => aspectsHouse(p.name, p.h, house)).map(p => p.name);
}

// Compute lagna-based teji-mandi signal
function lagnaTejiMandi(planets, ascSid){
  const ascSign = Math.floor(ascSid / 30) % 12;
  const lagnesh   = SIGN_LORDS[ascSign];
  const dhanesh   = SIGN_LORDS[(ascSign + 1) % 12];   // 2L
  const panchamesh= SIGN_LORDS[(ascSign + 4) % 12];   // 5L
  const saptamesh = SIGN_LORDS[(ascSign + 6) % 12];   // 7L
  const ashtamesh = SIGN_LORDS[(ascSign + 7) % 12];   // 8L
  const karmesh   = SIGN_LORDS[(ascSign + 9) % 12];   // 10L
  const ayesh     = SIGN_LORDS[(ascSign + 10) % 12];  // 11L

  // House of each key lord
  function houseOf(planetName){
    const p = planets.find(x => x.name === planetName);
    return p ? p.h : null;
  }
  const hLagnesh   = houseOf(lagnesh);
  const hDhanesh   = houseOf(dhanesh);
  const hPanchamesh= houseOf(panchamesh);
  const hSaptamesh = houseOf(saptamesh);
  const hAshtamesh = houseOf(ashtamesh);
  const hKarmesh   = houseOf(karmesh);
  const hAyesh     = houseOf(ayesh);

  // Moon position relative to phase
  const sunP  = planets.find(x => x.name === 'Sun');
  const moonP = planets.find(x => x.name === 'Moon');
  const moonIsShubh = sunP && moonP ? moonBenefic(moonP.lon, sunP.lon) : false;

  // Effective benefic / malefic status for each planet now
  function isBenefic(name){
    if(name === 'Moon') return moonIsShubh;
    return NATURAL_BENEFIC.has(name);
  }
  function isMalefic(name){
    if(name === 'Moon') return !moonIsShubh;
    return NATURAL_MALEFIC.has(name);
  }

  // Signal collection
  const signals = [];
  let buyScore = 0, sellScore = 0, avoidScore = 0;

  // ── BUY signals ───────────────────────────────────────────────
  // B1: 2L and 8L mutually aspect or share house with benefic drishti
  if(hDhanesh && hAshtamesh){
    const dhAspectsAsh = aspectsHouse(dhanesh, hDhanesh, hAshtamesh);
    const ashAspectsDh = aspectsHouse(ashtamesh, hAshtamesh, hDhanesh);
    if(dhAspectsAsh || ashAspectsDh){
      // Check if any benefic aspects either house
      const beneficsOn2H = planetsAspectingHouse(planets, hDhanesh).filter(isBenefic);
      const beneficsOn8H = planetsAspectingHouse(planets, hAshtamesh).filter(isBenefic);
      if(beneficsOn2H.length > 0 || beneficsOn8H.length > 0){
        signals.push({code:'B1', dir:+1, text:`2L (${dhanesh}/H${hDhanesh}) ↔ 8L (${ashtamesh}/H${hAshtamesh}) connected with benefic drishti — BUY signal`, weight:1.0});
        buyScore += 1.0;
      }
    }
  }

  // B2: 2L in 8L's exaltation sign
  const dhaneshP = planets.find(x => x.name === dhanesh);
  if(dhaneshP && UCHCHA[ashtamesh] !== undefined && dhaneshP.s === UCHCHA[ashtamesh]){
    signals.push({code:'B2', dir:+1, text:`2L ${dhanesh} reached 8L's exaltation sign ${SIGN_NAMES_FULL[UCHCHA[ashtamesh]]} — BUY`, weight:0.9});
    buyScore += 0.9;
  }

  // B5: 10L receives benefic drishti AND lagnesh in 11H
  if(hKarmesh && hLagnesh === 11){
    const beneficsOnKarmesh = planetsAspectingHouse(planets, hKarmesh).filter(isBenefic);
    if(beneficsOnKarmesh.length > 0){
      signals.push({code:'B5', dir:+1, text:`Lagnesh (${lagnesh}) in 11H + benefic drishti on 10L → strong buy regime`, weight:0.8});
      buyScore += 0.8;
    }
  }

  // ── SELL signals ──────────────────────────────────────────────
  // S1: Any benefic in 2H
  const beneficsIn2H = planetsInHouse(planets, 2).filter(isBenefic);
  if(beneficsIn2H.length > 0){
    signals.push({code:'S1', dir:-1, text:`Benefics in 2H (${beneficsIn2H.join(', ')}) — book: SELL signal (prices have peaked)`, weight:1.0});
    sellScore += 1.0;
  }

  // S2: Lagnesh in 7H
  if(hLagnesh === 7){
    signals.push({code:'S2', dir:-1, text:`Lagnesh (${lagnesh}) in 7H — book: SELL signal`, weight:0.9});
    sellScore += 0.9;
  }

  // S4: Saptamesh (7L) in 2H → prices fall
  if(hSaptamesh === 2){
    signals.push({code:'S4', dir:-1, text:`Saptamesh (${saptamesh}) in 2H — book: prices will FALL`, weight:1.0});
    sellScore += 1.0;
  }

  // ── AVOID signals ─────────────────────────────────────────────
  // A1: Malefics in 1H/2H/7H/8H
  for(const h of [1, 2, 7, 8]){
    const maleficsInH = planetsInHouse(planets, h).filter(isMalefic);
    if(maleficsInH.length > 0){
      signals.push({code:'A1', dir:-0.5, text:`Malefics in H${h}: ${maleficsInH.join(', ')} — caution`, weight:0.5});
      avoidScore += 0.5;
    }
  }

  // A2: 7L aspects 1L/2L with papa-drishti
  if(hSaptamesh && hLagnesh){
    const s7aspectsLagnesh = aspectsHouse(saptamesh, hSaptamesh, hLagnesh);
    const s7aspectsDhanesh = hDhanesh && aspectsHouse(saptamesh, hSaptamesh, hDhanesh);
    if(isMalefic(saptamesh) && (s7aspectsLagnesh || s7aspectsDhanesh)){
      signals.push({code:'A2', dir:-0.7, text:`Saptamesh ${saptamesh} (malefic) aspects 1L/2L — book: don't trade`, weight:0.7});
      avoidScore += 0.7;
    }
  }

  // ── FUTURES-specific signals ──────────────────────────────────
  // F1: 1L+2L+5L all in 10H from lagna → guaranteed futures profit
  if(hLagnesh === 10 && hDhanesh === 10 && hPanchamesh === 10){
    signals.push({code:'F1★', dir:+1, text:`1L+2L+5L ALL in 10H — book: guaranteed futures contract profit`, weight:1.5, special:'FUTURES_GOLDEN'});
    buyScore += 1.5;
  }
  // F4: Lagnesh in 11H during futures → LOSS not gain (book's counterintuitive rule, p.262)
  // (already used as B5 context; here it's a warning if no benefic support)
  if(hLagnesh === 11 && hPanchamesh !== null){
    const beneficsOnPanch = planetsAspectingHouse(planets, hPanchamesh).filter(isBenefic);
    if(beneficsOnPanch.length === 0){
      signals.push({code:'F4', dir:-0.6, text:`Lagnesh in 11H without benefic support on 5L — book: futures will LOSE (counterintuitive p.262)`, weight:0.6});
      sellScore += 0.6;
    }
  }

  // ── Net synthesis ─────────────────────────────────────────────
  const net = buyScore - sellScore - avoidScore * 0.5;
  let verdict;
  if(buyScore > sellScore + avoidScore && buyScore >= 0.8) verdict = 'BUY';
  else if(sellScore > buyScore && sellScore >= 0.8) verdict = 'SELL';
  else if(avoidScore >= 1.0) verdict = 'AVOID';
  else verdict = 'NEUTRAL';

  const score = Math.round(Math.max(-100, Math.min(100, net * 25)));

  return {
    ascSign: SIGN_NAMES_FULL[ascSign],
    lords: {
      lagnesh, dhanesh, panchamesh, saptamesh, ashtamesh, karmesh, ayesh,
      hLagnesh, hDhanesh, hPanchamesh, hSaptamesh, hAshtamesh, hKarmesh, hAyesh
    },
    moonIsShubh,
    signals,
    buyScore: Math.round(buyScore * 100) / 100,
    sellScore: Math.round(sellScore * 100) / 100,
    avoidScore: Math.round(avoidScore * 100) / 100,
    verdict,
    score
  };
}

// ═══════════════════════════════════════════════════════════════════
// ★ VYAPAAR RATNA MODULE 7 — SHAR (LATITUDE) CROSSING DETECTOR
// ───────────────────────────────────────────────────────────────────
// Book p.325: "शर-परिवर्तन का बाजार पर सबसे अधिक प्रभाव"
// — Latitude change has the GREATEST market impact, above all aspects.
// When a planet's ecliptic latitude crosses zero (i.e., it crosses
// the ecliptic plane going N→S or S→N), it triggers a major price
// move. Per p.326 the prabhav-kal (effect duration) is computed as:
//   duration = (max_shar / current_shar) × mean_speed_days
// We scan ±30 days for upcoming or recent crossings.
// ═══════════════════════════════════════════════════════════════════

// Mean max latitudes from book p.325 (degrees)
const MAX_SHAR = {
  Moon: 5.25, Mars: 6.65, Mercury: 7.0, Jupiter: 1.63,
  Venus: 8.5, Saturn: 2.87, Uranus: 2.87, Neptune: 1.66, Pluto: 17
};

function findShararParivartan(J, daysAhead = 30, daysBack = 7){
  const out = [];
  const bodies = ['Moon','Mars','Mercury','Jupiter','Venus','Saturn','Uranus','Neptune'];

  for(const body of bodies){
    let prevLat = null;
    let prevJ = null;
    // Step through day-by-day looking for sign change in latitude
    for(let dayOff = -daysBack; dayOff <= daysAhead; dayOff += 1){
      try{
        const Jx = J + dayOff;
        const lat = geoLat(body, Jx);
        if(prevLat !== null && Math.sign(prevLat) !== Math.sign(lat) && prevLat !== 0){
          // Crossing detected between prevJ and Jx — refine by linear interp
          const fraction = Math.abs(prevLat) / (Math.abs(prevLat) + Math.abs(lat));
          const Jcross = prevJ + fraction * (Jx - prevJ);
          const daysFromNow = Jcross - J;
          const direction = prevLat < 0 ? 'S→N (ascending)' : 'N→S (descending)';
          out.push({
            body, Jcross, at: jdToISTParts(Jcross),
            daysFromNow: Math.round(daysFromNow * 10) / 10,
            direction,
            note: daysFromNow < 0 ? 'recent — effects may still be in play'
                : daysFromNow < 3 ? '⚡ IMMINENT — strongest impact window'
                : daysFromNow < 10 ? 'approaching — watch closely'
                : 'upcoming'
          });
        }
        prevLat = lat;
        prevJ = Jx;
      }catch(e){ /* skip body */ break; }
    }
  }
  out.sort((a, b) => Math.abs(a.daysFromNow) - Math.abs(b.daysFromNow));
  return out;
}

// ═══════════════════════════════════════════════════════════════════
// ★ VYAPAAR RATNA MODULE 8 — KRANTI-SAMYA (DECLINATION PARALLEL)
// ───────────────────────────────────────────────────────────────────
// Book pp.320-322 + p.329: when two planets share the same declination,
// they form a "kranti-samya" — a hidden aspect equivalent to ~75% of
// conjunction strength (book p.329 anna table: पौन = 3/4).
// Two flavors:
//   1. Same-direction (both N or both S) = 75% strength
//   2. Opposite-direction (one N, one S, same magnitude) = 50% strength
//      (called विपरीत क्रान्ति / viprit-kranti)
// ═══════════════════════════════════════════════════════════════════
function findKrantiSamya(planets, J){
  const out = [];
  const decs = {};
  const bodies = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Uranus','Neptune'];
  for(const body of bodies){
    try{ decs[body] = declination(body, J); }catch(e){ /* skip */ }
  }
  const names = Object.keys(decs);
  for(let i = 0; i < names.length; i++){
    for(let j = i + 1; j < names.length; j++){
      const a = names[i], b = names[j];
      const da = decs[a], db = decs[b];
      const sameDir = Math.sign(da) === Math.sign(db);
      const delta = sameDir ? Math.abs(da - db) : Math.abs(Math.abs(da) - Math.abs(db));
      // Orb: 1° for kranti-samya (tighter than longitude orbs)
      if(delta < 1.0){
        const strength = 1 - delta;     // 0..1
        // Polarity: same-dir parallel = conjunction polarity (use pair table)
        // opposite-dir = also conjunction polarity but weighted lower
        const pairPol = pairPolarity(a, b);
        const weight = pairPol * (sameDir ? 0.75 : 0.50) * strength;
        out.push({
          p1: a, p2: b,
          decA: Math.round(da * 100) / 100,
          decB: Math.round(db * 100) / 100,
          delta: Math.round(delta * 100) / 100,
          sameDir,
          type: sameDir ? 'Parallel' : 'Contra-parallel',
          strength: Math.round(strength * 100),
          pairPol,
          weight: Math.round(weight * 100) / 100,
          dir: Math.sign(weight),
        });
      }
    }
  }
  out.sort((x, y) => Math.abs(y.weight) - Math.abs(x.weight));
  return out;
}

// ★ VYAPAAR RATNA MODULE 9 — FORWARD ASPECT-TIMING SCAN
// ───────────────────────────────────────────────────────────────────
// Book p.283: aspect effects begin BEFORE the aspect perfects.
// Lead-times: conj/opp = 1 week early; trine/quincunx = 4-5 days;
// semisquare = 2 days. We scan ±15 days for major aspects (conj, opp,
// trine, square, sextile) perfecting and report their approach.
// ═══════════════════════════════════════════════════════════════════

const MAJOR_ASPECTS_FORWARD = [0, 60, 90, 120, 180];
const LEAD_TIME_DAYS = {0: 7, 180: 7, 120: 5, 90: 5, 60: 4, 150: 5, 45: 2, 30: 2};

function findUpcomingAspects(J, daysAhead = 15){
  const out = [];
  const bodies = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune'];
  // Skip Moon-X aspects since Moon perfects ~30 aspects in 30 days (too noisy)
  const slowBodies = bodies.filter(b => b !== 'Moon');

  // Get current positions
  const lonsNow = {};
  for(const b of slowBodies){
    try{ lonsNow[b] = geoLon(b, J); }catch(e){ /* skip */ }
  }

  // For each pair, check if any major aspect perfects within window
  for(let i = 0; i < slowBodies.length; i++){
    for(let j = i + 1; j < slowBodies.length; j++){
      const p1 = slowBodies[i], p2 = slowBodies[j];
      if(!(p1 in lonsNow) || !(p2 in lonsNow)) continue;

      let curSep = Math.abs(n360(lonsNow[p1] - lonsNow[p2]));
      if(curSep > 180) curSep = 360 - curSep;

      // For each major aspect, find when separation hits target
      for(const target of MAJOR_ASPECTS_FORWARD){
        const actualTarget = target > 180 ? 360 - target : target;
        // Find approximate Jcross by stepping daily
        let prevDelta = curSep - actualTarget;
        for(let day = 1; day <= daysAhead; day += 1){
          try{
            const Jx = J + day;
            const l1 = geoLon(p1, Jx);
            const l2 = geoLon(p2, Jx);
            let sep = Math.abs(n360(l1 - l2));
            if(sep > 180) sep = 360 - sep;
            const delta = sep - actualTarget;
            // Zero-crossing in delta = aspect perfecting
            if(Math.sign(delta) !== Math.sign(prevDelta) && Math.abs(prevDelta) < 30){
              // Refine by linear interp
              const fraction = Math.abs(prevDelta) / (Math.abs(prevDelta) + Math.abs(delta));
              const Jperf = (J + day - 1) + fraction;
              const daysFromNow = Jperf - J;
              if(daysFromNow > 0 && daysFromNow <= daysAhead){
                const leadTime = LEAD_TIME_DAYS[target] || 3;
                const pairPol = pairPolarity(p1, p2);
                const dir = target === 180 ? -pairPol : pairPol;
                out.push({
                  p1, p2,
                  aspect: target,
                  sym: ASPECTS.find(a => a.deg === target)?.sym || '?',
                  name: ASPECTS.find(a => a.deg === target)?.name || target+'°',
                  daysFromNow: Math.round(daysFromNow * 10) / 10,
                  leadTimeDays: leadTime,
                  inLeadTime: daysFromNow <= leadTime,
                  pairPol, dir,
                  note: daysFromNow <= 1 ? '⚡ PERFECTING NOW'
                      : daysFromNow <= leadTime ? `★ in lead-time window (effects starting)`
                      : `approaching in ${Math.round(daysFromNow)} days`
                });
              }
              break;
            }
            prevDelta = delta;
          }catch(e){ break; }
        }
      }
    }
  }
  out.sort((a, b) => a.daysFromNow - b.daysFromNow);
  // De-duplicate near-identical entries
  const seen = new Set();
  return out.filter(o => {
    const k = `${o.p1}|${o.p2}|${o.aspect}`;
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  }).slice(0, 12); // top 12 upcoming
}


function computeBias(planets){
  const pm=Object.fromEntries(planets.map(p=>[p.name,p]));
  const F=[];let sc=0;
  const add=(l,w,d)=>{F.push({l,w,d});sc+=w*d;};
  const{Sun,Moon,Mars,Mercury,Jupiter,Venus,Saturn,Rahu,Ketu}=pm;
  if(Sun){
    if(Sun.h===11)add('Sun in 11H — profit house',25,1);
    if(Sun.h===5)add('Sun in 5H speculation',12,1);
    if(Sun.s===0)add('Sun exalted Aries',20,1);
    else if(Sun.s===6)add('Sun debilitated Libra',20,-1);
    if([6,8,12].includes(Sun.h))add('Sun in dusthana H'+Sun.h,15,-1);
  }
  if(Moon){
    if([1,4,5,7,10,11].includes(Moon.h)&&![6,8,12].includes(Moon.h))add('Moon in good house H'+Moon.h,14,1);
    if([6,8,12].includes(Moon.h))add('Moon in dusthana H'+Moon.h,12,-1);
    if(Moon.s===1)add('Moon exalted Taurus',12,1);
    if(Moon.s===7)add('Moon debilitated Scorpio',12,-1);
  }
  if(Jupiter){
    if(Jupiter.h===1)add('Jupiter in Lagna — expansive',20,1);
    else if(Jupiter.h===11)add('Jupiter in 11H gains',15,1);
    else if(Jupiter.h===5)add('Jupiter in 5H trikona',10,1);
    if([6,8,12].includes(Jupiter.h))add('Jupiter in dusthana',10,-1);
    if(Jupiter.s===3)add('Jupiter exalted Cancer',15,1);
    if(Jupiter.s===9)add('Jupiter debilitated Capricorn',15,-1);
  }
  if(Mars&&Saturn){
    const df=n360(Mars.lon-Saturn.lon),d=df>180?360-df:df;
    if(d<8)add(`Mars-Sat conj ${dmsC(d)} (tight)`,18,-1);
    else if(d<18)add(`Mars-Sat near conj ${Math.round(d)}°`,8,-1);
  }
  if(Mercury){
    if(Mercury.s===11)add('Mercury debilitated Pisces',10,-1);
    if(Mercury.s===5)add('Mercury exalted Virgo',10,1);
    if([6,8,12].includes(Mercury.h))add('Mercury in dusthana H'+Mercury.h,7,-1);
  }
  if(Venus){
    if(Venus.h===12)add('Venus in 12H — expenses',8,-1);
    if([1,6].includes(Venus.s))add('Venus own sign',8,1);
    if(Venus.s===11)add('Venus exalted Pisces',12,1);
    if(Venus.s===5)add('Venus debilitated Virgo',12,-1);
  }
  if(Rahu&&[5,11].includes(Rahu.h))add('Rahu in 5/11H gains',8,1);
  const norm=Math.max(-100,Math.min(100,sc*0.8));
  const bias=norm>15?'BULLISH':norm<-15?'BEARISH':'NEUTRAL';
  return{score:Math.round(norm),bias,F:F.slice(0,10)};
}

// EPHEMERIS WRAPPER — uses Astronomy Engine (VSOP87/ELP) when loaded,
// falls back to in-file Keplerian/Sun/Moon series when offline.
// AE delivers sub-arcsecond accuracy matching JPL Horizons.
// ═══════════════════════════════════════════════════════════════════
function jdToDate(J){
  // JD → JS Date (UTC). JD 2440587.5 = 1970-01-01 00:00 UT
  return new Date((J-2440587.5)*86400000);
}
function isAELoaded(){
  return typeof window!=='undefined' && typeof window.Astronomy!=='undefined'
      && typeof window.Astronomy.GeoVector==='function';
}
function ephemerisStatus(){
  return isAELoaded() ? 'VSOP87/ELP (sub-arcsecond)' : 'Keplerian fallback (~5\' accuracy)';
}

// Geocentric apparent ecliptic longitude (tropical, ecliptic of date)
function geoLon(body,J){
  if(body==='Rahu') return n360(rahuLon(J));
  if(body==='Ketu') return n360(rahuLon(J)+180);
  if(isAELoaded()){
    try{
      const A=window.Astronomy, d=jdToDate(J);
      if(body==='Moon') return n360(A.EclipticGeoMoon(d).lon);
      if(body==='Sun'){
        const ev=A.HelioVector(A.Body.Earth,d);
        return n360(A.Ecliptic({x:-ev.x,y:-ev.y,z:-ev.z,t:ev.t}).elon);
      }
      const v=A.GeoVector(A.Body[body],d,true); // aberration=true → apparent
      return n360(A.Ecliptic(v).elon);
    }catch(e){ /* fall through to Keplerian */ }
  }
  if(body==='Sun')  return sunLon(J);
  if(body==='Moon') return moonLon(J);
  return planetGeo(J,body);
}

// Retrograde detection: compare longitude at J-12h vs J+12h
function isRetrograde(body,J){
  if(body==='Sun'||body==='Moon') return false;
  if(body==='Rahu'||body==='Ketu') return true; // mean nodes always retrograde
  try{
    let l1=geoLon(body,J-0.5), l2=geoLon(body,J+0.5);
    let d=l2-l1; if(d>180)d-=360; if(d<-180)d+=360;
    return d<0;
  }catch(e){ return false; }
}
// Returns daily motion in degrees (signed: + direct, - retrograde)
function planetSpeed(body,J){
  if(body==='Rahu'||body==='Ketu') return -0.0529; // mean lunar node retrograde rate
  try{
    let l1=geoLon(body,J-0.5), l2=geoLon(body,J+0.5);
    let d=l2-l1; if(d>180)d-=360; if(d<-180)d+=360;
    return d; // degrees per day
  }catch(e){ return 0; }
}

// ═══════════════════════════════════════════════════════════════════
// ECLIPTIC LATITUDE (शर / Shar) — book p.321-325
// ───────────────────────────────────────────────────────────────────
// Each planet has an ecliptic latitude (its distance N or S of the
// ecliptic plane). The book gives mean max values per planet on p.325.
// When a planet's latitude crosses zero (node crossing), the book on
// p.325 states this has the GREATEST market impact, above all aspects.
// ═══════════════════════════════════════════════════════════════════
function geoLat(body, J){
  if(body==='Sun')  return 0;                  // Sun is always on ecliptic
  if(body==='Rahu' || body==='Ketu') return 0; // lunar nodes also on ecliptic
  if(isAELoaded()){
    try{
      const A=window.Astronomy, d=jdToDate(J);
      if(body==='Moon') return A.EclipticGeoMoon(d).lat;
      const v=A.GeoVector(A.Body[body],d,true);
      return A.Ecliptic(v).elat;
    }catch(e){ return 0; }
  }
  return 0; // no Keplerian fallback for latitude — would need full theory
}

// Equatorial declination of a body (used for kranti-samya — book Ch.4)
// Approximate: dec = asin(sin(lat)*cos(eps) + cos(lat)*sin(eps)*sin(lon))
function declination(body, J){
  const lon = geoLon(body, J) * Math.PI/180;
  const lat = geoLat(body, J) * Math.PI/180;
  // Obliquity of ecliptic — book uses approx 23.44° but here we use a
  // more accurate value with secular term (good to <0.1° over 100 years)
  const T = (J - 2451545.0) / 36525;
  const eps = (23.4392911 - 0.0130042*T - T*T*1.64e-7 + T*T*T*5.04e-7) * Math.PI/180;
  const sinDec = Math.sin(lat)*Math.cos(eps) + Math.cos(lat)*Math.sin(eps)*Math.sin(lon);
  return Math.asin(sinDec) * 180/Math.PI; // degrees, signed
}

 11:'Nanda',12:'Bhadra',13:'Jaya', 14:'Rikta',15:'Purna'

// Panchak — Dhanishtha-2nd-half .. Revati (book Day-13)

function tithiCompute(sunLon, moonLon){
  const diff = n360(moonLon - sunLon);
  const elapsed = diff / 12;
  const tNum = Math.floor(elapsed) + 1;
  const paksha = tNum <= 15 ? 'Shukla' : 'Krishna';
  const tInP = tNum <= 15 ? tNum : tNum - 15;
  let name;
  if(tInP === 15) name = paksha === 'Shukla' ? 'Purnima' : 'Amavasya';
  else name = TITHI_NAMES[tInP-1];
  const klass = TITHI_CLASS[tInP];
  const frac = elapsed - Math.floor(elapsed);
  return { num:tNum, name, paksha, klass, inPaksha:tInP, fraction:frac,
           diff, bias:TITHI_BIAS[klass] };
}

function tithiAnomaly(J){
  const moonNow = geoLon('Moon', J),    sunNow = geoLon('Sun', J);
  const moonNext= geoLon('Moon', J+1),  sunNext= geoLon('Sun', J+1);
  let dMoon = n360(moonNext - moonNow); if(dMoon>180) dMoon -= 360;
  let dSun  = n360(sunNext  - sunNow ); if(dSun >180) dSun  -= 360;
  const elong = dMoon - dSun;
  if(elong < 11.5) return { type:'VRIDDHI', val:elong, hint:'Tithi stretching > 24h — emotional indecision, range-bound' };
  if(elong > 13.0) return { type:'KSHAY',   val:elong, hint:'Tithi compressed < 24h — sudden mood shifts, gap-prone' };
  return { type:'NORMAL', val:elong, hint:'Tithi running ~24h — neutral' };
}

function isInGandMool(moonNakIdx){ return GAND_MOOL.has(moonNakIdx); }

function combustList(planets){
  const sun = planets.find(p=>p.name==='Sun');
  if(!sun) return [];
  const out = [];
  for(const p of planets){
    if(['Sun','Rahu','Ketu','Uranus','Neptune','Moon'].includes(p.name)) continue;
    const orbKey = p.retro && (p.name==='Mercury' || p.name==='Venus')
                   ? p.name + 'R' : p.name;
    const orb = COMBUST_ORB[orbKey];
    if(!orb) continue;
    const diff = Math.abs(((p.lon - sun.lon + 180) % 360) - 180);
    if(diff <= orb){
      out.push({ name:p.name, sep:diff, orb, retro:p.retro,
                 strength: 1 - diff/orb, abbr:p.abbr });
    }
  }
  return out.sort((a,b)=>a.sep - b.sep);
}

function papaKartari(planets){
  const papa = planets.filter(p => PAPA_GRAH.has(p.name) && p.name!=='Sun');
  const targets = ['Moon','Mercury','Jupiter','Venus'];
  const out = [];
  for(const tName of targets){
    const t = planets.find(p=>p.name===tName);
    if(!t) continue;
    let leftP=null, leftD=Infinity, rightP=null, rightD=Infinity;
    for(const m of papa){
      let d = n360(t.lon - m.lon);
      if(d < leftD && d > 0 && d < 90){ leftD = d; leftP = m; }
      d = n360(m.lon - t.lon);
      if(d < rightD && d > 0 && d < 90){ rightD = d; rightP = m; }
    }
    if(leftP && rightP){
      const tight = leftD < 30 && rightD < 30;
      out.push({ target:tName, left:leftP.name, leftSep:leftD,
                 right:rightP.name, rightSep:rightD, tight,
                 hint: tight
                   ? `${tName} squeezed tight (${leftP.abbr}-${rightP.abbr}) — sharp reversals likely`
                   : `${tName} between ${leftP.abbr} and ${rightP.abbr} — pressure both sides` });
    }
  }
  return out;
}

function moonAspectsClass(aspects){
  const merc=[], malef=[], benef=[], shadow=[];
  for(const a of aspects){
    if(a.p1!=='Moon' && a.p2!=='Moon') continue;
    const other = a.p1==='Moon' ? a.p2 : a.p1;
    if(other==='Mercury') merc.push(other);
    if(other==='Sun' || other==='Saturn' || other==='Mars') malef.push(other);
    if(other==='Jupiter' || other==='Venus') benef.push(other);
    if(other==='Rahu' || other==='Ketu') shadow.push(other);
  }
  return { merc, malef, benef, shadow,
           total: merc.length+malef.length+benef.length+shadow.length };
}

function moonD9Conjunctions(planets){
  const moon = planets.find(p=>p.name==='Moon');
  if(!moon) return [];
  const targets = ['Jupiter','Venus','Ketu'];
  const out = [];
  for(const t of targets){
    const p = planets.find(x=>x.name===t);
    if(p && p.d9Sign === moon.d9Sign){
      out.push({ with:t, d9Sign:moon.d9Sign });
    }
  }
  return out;
}

const NAK_VEDHA_PAIRS = {
  0:13, 1:14, 2:15, 3:16, 4:17, 5:18, 6:19, 7:20, 8:21,

 18:5,19:6,20:7,21:8,22:9,23:10,24:11,25:12

function vedhaPolarity(planets){
  const naksWith = new Map();
  for(const p of planets){
    const ni = getNak(p.lon).idx;
    if(!naksWith.has(ni)) naksWith.set(ni, []);
    naksWith.get(ni).push(p.name);
  }
  const events = [];
  for(const [ni, plns] of naksWith){
    const target = NAK_VEDHA_PAIRS[ni];
    if(target === undefined || !naksWith.has(target)) continue;
    if(target < ni) continue;
    const otherPlns = naksWith.get(target);
    for(const p1 of plns) for(const p2 of otherPlns){
      const isShubh1 = SHUBH_GRAH.has(p1), isShubh2 = SHUBH_GRAH.has(p2);
      const isPapa1  = PAPA_GRAH.has(p1),  isPapa2  = PAPA_GRAH.has(p2);
      let dir = 0, hint;
      if(isShubh1 && isShubh2){ dir = -1; hint = 'Shubh-Shubh vedha → resistance/profit-booking'; }
      else if(isPapa1 && isPapa2){ dir = +1; hint = 'Paap-Paap vedha → short-covering / sharp uptick'; }
      else if(isShubh1 || isShubh2){ dir = -0.5; hint = 'Shubh-involved vedha → mild −ve'; }
      else { dir = +0.5; hint = 'Paap-involved vedha → mild +ve'; }
      events.push({ nak1: NAKS[ni].n, nak2: NAKS[target].n,
                    pl1:p1, pl2:p2, dir, hint });
    }
  }
  return events;
}

function mercuryRiseEvent(J){
  const todaySep    = Math.abs(((geoLon('Mercury',J)   - geoLon('Sun',J)   + 180)%360)-180);
  const yesterdaySep= Math.abs(((geoLon('Mercury',J-1) - geoLon('Sun',J-1) + 180)%360)-180);
  const tomorrowSep = Math.abs(((geoLon('Mercury',J+1) - geoLon('Sun',J+1) + 180)%360)-180);
  const orb = isRetrograde('Mercury',J) ? 12 : 14;
  const combustToday = todaySep <= orb;
  const combustYday  = yesterdaySep <= orb;
  const combustTmrw  = tomorrowSep <= orb;
  if(combustYday && !combustToday)  return { event:'RISE', sep:todaySep, hint:'Mercury rising heliacally — short reversal trigger' };
  if(!combustYday && combustToday)  return { event:'SET',  sep:todaySep, hint:'Mercury entering combustion — trend confusion' };
  if(combustToday && !combustTmrw)  return { event:'RISE-SOON', sep:todaySep, hint:'Mercury exits combustion next day' };
  if(combustToday)                  return { event:'COMBUST', sep:todaySep, hint:'Mercury combust — directional decisions weak' };
  return null;
}

function moonDeclinationState(J){
  const decToday = declination('Moon', J);
  const decYday  = declination('Moon', J - 1);
  const hemisphere = decToday >= 0 ? 'NORTH' : 'SOUTH';
  const movingToward = decToday > decYday ? 'NORTH' : 'SOUTH';
  const extreme = Math.abs(decToday) > 22;
  return {
    dec: decToday, hemisphere, movingToward, extreme,
    bias: movingToward === 'SOUTH' ? +1 : -1,
    hint: extreme
      ? `Moon ${hemisphere} extreme (${decToday.toFixed(1)}°) — high volatility, hidden-eclipse-like effect`
      : `Moon ${hemisphere} ${decToday.toFixed(1)}°, moving ${movingToward} — ${movingToward==='SOUTH'?'supports upside':'pressure/profit-booking'}`
  };
}

function moonOppositionCount(aspects){
  let n = 0;
  for(const a of aspects){
    if((a.p1==='Moon' || a.p2==='Moon') && a.aspect === 'Opposition'){ n++; }
  }
  return n;
}

function buildRulesScore(rules, planets, aspects){
  const factors = [];
  let score = 0;
  const add = (label, w, d, hint) => { factors.push({label,w,d,hint}); score += w * d; };

  // ── Day-14 BULL 5 / Day-17 BEAR 5 ──
  // 1. Vedha polarity (per rules.md)
  const vedhaSum = rules.vedha.reduce((s,v)=>s+v.dir, 0);
  if(vedhaSum > 0)  add('+VE Vedha (Paap-paap)', 18, +1, 'Short covering + buying support');
  else if(vedhaSum < 0)  add('−VE Vedha (Shubh-shubh)', 18, -1, 'Resistance / profit-booking');

  // 2. Tithi class
  if(rules.tithi.bias){
    const tb = rules.tithi.bias;
    add(`Tithi ${rules.tithi.klass} (${rules.tithi.name})`,
        Math.round(tb.w*15), tb.dir, tb.hint);
  }

  // 3. Mercury combust + retro
  const merc = planets.find(p=>p.name==='Mercury');
  const mercInCombust = rules.combust.find(c=>c.name==='Mercury');
  if(mercInCombust && merc && merc.retro){
    add('Mercury combust + retro', 14, +1, 'Sharp directional move + recovery (Day-14)');
  } else if(mercInCombust){
    add('Mercury combust (no retro)', 10, -1, 'Trend confusion, false breakouts (Day-17)');
  }

  // 4. Moon declination
  add(`Moon decl moving ${rules.moonDecl.movingToward}`, 10,
      rules.moonDecl.bias, rules.moonDecl.hint);

  // 5. Moon multi-aspect participation
  const moonAsp = rules.moonAsp.total;
  if(moonAsp >= 3 && moonAsp <= 5) add('Moon multi-aspect (3-5 planets)', 8, +1, 'Active participation / momentum');

  // ── Day-17 BEAR specifics ──
  if(rules.moonOpp >= 4) add(`Moon opposed by ${rules.moonOpp} planets`, 14, -1, 'Energy unstable — sharp panic swings');
  if(rules.papaKartari.length){
    const tight = rules.papaKartari.filter(p=>p.tight).length;
    if(tight)  add(`Papa Kartari TIGHT × ${tight}`, 12, -1, 'Both-side pressure, fake breakouts');
    else       add(`Papa Kartari × ${rules.papaKartari.length}`, 6, -1, 'Pressure on key planets');
  }

  // ── Supplementary book rules ──
  if(rules.gandMool) add('Moon in Gand Mool', 10, -1, 'Instability — lack of follow-through');
  if(rules.panchak)  add('Moon in Panchak', 9, -1, 'Gap moves + intra-day reversals');
  if(rules.tithiAnomaly.type === 'VRIDDHI') add('Vriddhi Tithi (>24h)', 6, -1, rules.tithiAnomaly.hint);
  if(rules.tithiAnomaly.type === 'KSHAY')   add('Kshay Tithi (<24h)',   8, -1, rules.tithiAnomaly.hint);
  if(rules.plutoRx.active) add('Pluto Retrograde window', 4, -1, rules.plutoRx.hint);

  if(rules.d9Conj.length){
    const labels = rules.d9Conj.map(c=>c.with).join('/');
    add(`Moon D9 conjunct ${labels}`, 8, -1, 'BankNifty pressure (Day-11 rule)');
  }

  if(rules.mercEvent){
    if(rules.mercEvent.event === 'RISE' || rules.mercEvent.event === 'RISE-SOON')
      add('Mercury heliacal rise', 8, +1, rules.mercEvent.hint);
    if(rules.mercEvent.event === 'SET')
      add('Mercury heliacal set',  8, -1, rules.mercEvent.hint);
  }

  const norm = Math.max(-100, Math.min(100, Math.round(score * 1.0)));
  const label = norm > 15 ? 'BULLISH' : norm < -15 ? 'BEARISH' : 'NEUTRAL';
  return { score: norm, label, factors };
}

function computeRules(planets, aspects, J){
  const moon = planets.find(p=>p.name==='Moon');
  const sun  = planets.find(p=>p.name==='Sun');
  if(!moon || !sun) return null;
  const moonNakIdx = getNak(moon.lon).idx;

  const tithi = tithiCompute(sun.lon, moon.lon);
  const tithiAnom = tithiAnomaly(J);
  const gandMool = isInGandMool(moonNakIdx);
  const panchak  = isInPanchak(moonNakIdx);
  const combust  = combustList(planets);
  const papaK    = papaKartari(planets);
  const plutoRx  = plutoRxStatus(J);
  const moonDecl = moonDeclinationState(J);
  const moonAsp  = moonAspectsClass(aspects);
  const moonOpp  = moonOppositionCount(aspects);
  const d9Conj   = moonD9Conjunctions(planets);
  const vedha    = vedhaPolarity(planets);
  const mercEvent= mercuryRiseEvent(J);

  const rules = { tithi, tithiAnomaly:tithiAnom, gandMool, panchak,
                  combust, papaKartari:papaK, plutoRx, moonDecl,
                  moonAsp, moonOpp, d9Conj, vedha, mercEvent,
                  moonNakIdx, moonNakName: NAKS[moonNakIdx].n };

  rules.composite = buildRulesScore(rules, planets, aspects);
  return rules;
}

// Helper: minimum great-circle separation in degrees
function _sep(p1, p2){ return Math.abs(((p1.lon - p2.lon + 180) % 360) - 180); }
// Helper: angular distance to a target aspect (e.g. 90° = square, 180° = opp)
function _aspectDist(p1, p2, deg){
  const ang = (p1.lon - p2.lon + 360) % 360;
  const a = Math.min(Math.abs(ang - deg), Math.abs(ang - (360 - deg)));
  return a;
}
