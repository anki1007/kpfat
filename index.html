const BT_FMP_SYM={nifty:'^NSEI',bnifty:'^NSEBANK',gold:'GCUSD',silver:'SIUSD',crude:'CLUSD',sensex:'^BSESN'};

// ── FMP via Anthropic API (works from file:// since Anthropic API is CORS-open) ──
async function btFetchFMP(instrKey,fromDate,toDate){
  const sym=BT_FMP_SYM[instrKey]||'^NSEI';
  const fromY=parseInt(fromDate.slice(0,4)), toY=parseInt(toDate.slice(0,4));
  const allDays=[];
  for(let y=fromY;y<=toY;y++){
    const cf=y===fromY?fromDate:`${y}-01-01`, ct=y===toY?toDate:`${y}-12-31`;
    window._BT.msg=`FMP: ${sym} ${y} (${y-fromY+1}/${toY-fromY+1})…`; gs({_btTick:Date.now()});
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:16384,
        system:`Return ONLY a JSON array [{"date":"YYYY-MM-DD","open":N,"high":N,"low":N,"close":N}]. No text.`,
        messages:[{role:'user',content:`FMP: get daily OHLCV for "${sym}" from ${cf} to ${ct}`}],
        mcp_servers:[{type:'url',url:'https://financialmodelingprep.com/mcp',name:'fmp'}]})
    });
    if(!resp.ok) throw new Error('Anthropic '+resp.status);
    const data=await resp.json();
    let rows=null;
    for(const blk of (data.content||[])){
      if(blk.type==='mcp_tool_result'){
        const txt=blk.content?.[0]?.text||'';
        try{ const j=JSON.parse(txt); rows=j?.historical||j; }catch(e){}
        if(!rows){ const m=txt.match(/\[[\s\S]{10,}\]/); if(m) try{rows=JSON.parse(m[0]);}catch(e){} }
        if(Array.isArray(rows)&&rows.length) break;
      }
    }
    if(!rows){ for(const blk of (data.content||[])){
      if(blk.type==='text'){
        const m=blk.text.match(/\[[\s\S]{10,}\]/); if(m) try{rows=JSON.parse(m[0]);}catch(e){}
        if(!rows){ const m2=blk.text.match(/\{[\s\S]*?"historical"[\s\S]*?\}/); if(m2) try{const j=JSON.parse(m2[0]);rows=j?.historical;}catch(e){} }
        if(Array.isArray(rows)&&rows.length) break;
      }
    }}
    if(Array.isArray(rows)) rows.forEach(r=>{const n=btNormFMP(r);if(n.open&&n.close&&n.dateStr>=cf&&n.dateStr<=ct)allDays.push(n);});
  }
  if(!allDays.length) throw new Error(`FMP: no data for ${sym}`);
  return allDays.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));
}

// ── Master fetch: pre-loaded data first, then network fallbacks ──
// Source 1: pre-loaded data embedded in this file (works from file://, instant)
// Source 2: user CSV upload
// Source 3: Yahoo Finance via CORS proxies (works from localhost)
// Source 4: FMP via Anthropic API (works from any origin)
function btUsePreloaded(instrKey,fromDate,toDate){
  const raw=(typeof BT_PRELOADED!=='undefined')&&BT_PRELOADED[instrKey];
  if(!raw||!raw.length) return null;
  const rows=raw.filter(r=>r[0]>=fromDate&&r[0]<=toDate)
    .map(r=>{
      const d=new Date(r[0]+'T00:00:00Z');
      return {dateStr:r[0],y:d.getUTCFullYear(),m:d.getUTCMonth()+1,d:d.getUTCDate(),
              open:r[1],high:r[2],low:r[3],close:r[4]};
    });
  return rows.length>5 ? rows : null;
}

async function btFetchOHLCV(instrKey,yfSymbol,fromDate,toDate){
  // Priority 1: pre-loaded embedded data (instant, works from file://)
  const preloaded=btUsePreloaded(instrKey,fromDate,toDate);
  if(preloaded){
    window._BT.msg=`Using pre-loaded data (${preloaded.length} days, fetched ${typeof BT_PRELOADED_DATE!=='undefined'?BT_PRELOADED_DATE:'2026-06-17'})`;
    gs({_btTick:Date.now()});
    return preloaded;
  }
  // Priority 2: user CSV upload
  if(window._BT_CSV&&window._BT_CSV.length>5){
    return window._BT_CSV.filter(r=>r.dateStr>=fromDate&&r.dateStr<=toDate);
  }
  // Priority 3: Yahoo Finance via CORS proxies (works from localhost / https)
  const p1=Math.floor(new Date(fromDate+'T00:00:00Z').getTime()/1000);
  const p2=Math.floor(new Date(toDate+'T23:59:59Z').getTime()/1000);
  const target=`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yfSymbol)}?period1=${p1}&period2=${p2}&interval=1d`;
  let lastErr='';
  for(let pi=0;pi<PROXIES.length;pi++){
    try{
      window._BT.msg=`Yahoo Finance via proxy ${pi+1}/${PROXIES.length}…`; gs({_btTick:Date.now()});
      const url=PROXIES[pi](target);
      const r=await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
      if(!r.ok){lastErr='HTTP '+r.status;continue;}
      let text=await r.text(),j;
      j=JSON.parse(text);
      if(j&&typeof j.contents==='string'&&!j.chart) j=JSON.parse(j.contents);
      const days=btParseYF(j);
      if(days.length>5) return days;
      lastErr='only '+days.length+' days';
    }catch(e){lastErr=(e&&e.message)?e.message.slice(0,60):'err';}
  }
  // Priority 4: FMP via Anthropic API
  window._BT.msg='Trying FMP via Anthropic API…'; gs({_btTick:Date.now()});
  return await btFetchFMP(instrKey,fromDate,toDate);
}

// Main async backtest runner
async function btRunEngine(cfg){
  window._BT={status:'fetching',progress:5,msg:'Fetching OHLCV from Yahoo Finance…',cfg};
  gs({_btTick:Date.now()});
  let prices;
  // If user uploaded a CSV, use it directly (skip network fetch)
  if(window._BT_CSV&&window._BT_CSV.length>5){
    prices=window._BT_CSV.filter(r=>r.dateStr>=cfg.fromDate&&r.dateStr<=cfg.toDate);
    window._BT.msg=`Using uploaded CSV (${prices.length} days filtered)`;
    gs({_btTick:Date.now()});
  } else {
    try{
      prices=await btFetchOHLCV(cfg.instrKey,cfg.yfSym,cfg.fromDate,cfg.toDate);
      if(prices.length<5) throw new Error(`Only ${prices.length} days returned`);
    }catch(e){
      window._BT={status:'error',
        msg:'Price fetch failed: '+e.message,
        hint:'Use the CSV Upload button — download historical data from NSE/Yahoo/Investing.com as CSV (columns: date,open,high,low,close)',
        cfg};
      gs({_btTick:Date.now()}); return;
    }
  }
  window._BT={...window._BT,status:'computing',progress:15,msg:`${prices.length} days fetched · Computing SBC verdicts…`};
  gs({_btTick:Date.now()});

  const instr=SBC_INSTR.find(i=>i.key===cfg.instrKey)||SBC_INSTR[0];
  const loc=LOCATIONS[cfg.loc]||LOCATIONS.Mumbai;
  const ayMode=cfg.ayMode||'Lahiri';
  const minV=parseFloat(cfg.minVishva)||0;
  const series=[];   // per-day: {date, vishvaOpen, vishvaClose, price OHLC}

  for(let i=0;i<prices.length;i++){
    if(i%6===0){
      await new Promise(r=>setTimeout(r,0));
      if(window._BT.status==='idle') return;
      window._BT.progress=15+Math.round(i/prices.length*78);
      window._BT.msg=`Day ${i+1}/${prices.length} · ${prices[i].dateStr}`;
      gs({_btTick:Date.now()});
    }
    const p=prices[i], prev=i>0?prices[i-1]:null;
    const tzOff=9.25-loc.tz+5.5;
    // ── Open + Close snapshots ────────────────────────────────────────────────────
    const J_open =JD(p.y,p.m,p.d, tzOff);
    const J_close=JD(p.y,p.m,p.d, (15.5-loc.tz+5.5));
    let v_open, v_close, v_open_off, v_close_off;
    let snapO=null, snapC=null;
    try{
      snapO=sbcSnapshot(J_open, ayMode);
      snapC=sbcSnapshot(J_close,ayMode);
      v_open     =sbcVerdict(snapO,instr);
      v_close    =sbcVerdict(snapC,instr);
      v_open_off =sbcVerdict(snapO,instr,{cascadeOff:true});
      v_close_off=sbcVerdict(snapC,instr,{cascadeOff:true});
    }catch(e){ continue; }

    // ── Gap signal: direction change close[T] → open[T+1] ────────────────────────
    // Signal direction = open[T+1].dir (TEJI or MANDI)
    // Flip:  close[T]=TEJI → open[T+1]=MANDI → gap down
    // Same:  close[T]=TEJI → open[T+1]=TEJI  → gap up
    // Both sides must be non-SAMA to generate a signal
    const absNet=Math.abs(v_open.net);
    const dir=(absNet>=Math.max(minV,0.15))?v_open.dir:'SAMA';
    const prevEntry=series.length>0?series[series.length-1]:null;
    const prevDirClose=prevEntry?.dirClose||'SAMA';
    // Signal only fires when BOTH yesterday-close AND today-open have an opinion
    const gapSignal=(prevDirClose!=='SAMA'&&dir!=='SAMA')?dir:'SAMA';
    const didFlip  =(gapSignal!=='SAMA')&&(prevDirClose!==dir); // reversal vs continuation
    const gapPct=prev?(p.open-prev.close)/prev.close*100:null;
    const gapAct=gapPct===null?null:gapPct>0.05?'TEJI':gapPct<-0.05?'MANDI':'SAMA';
    const gapHit=(gapSignal!=='SAMA'&&gapAct&&gapAct!=='SAMA')?gapSignal===gapAct:null;

    // ── Moon Nakshatra Change detector ─────────────────────────────────────────────
    // Moon moves ~0.55°/hr. On days when it crosses a nakshatra boundary (13°20')
    // during the session, the Vishva configuration shifts — genuine intraday signal.
    const moonNakOpen  = snapO.planets.find(p=>p.name==='Moon')?.nak?.idx;
    const moonNakClose = snapC.planets.find(p=>p.name==='Moon')?.nak?.idx;
    const nakChange = (moonNakOpen!==undefined && moonNakClose!==undefined &&
                       moonNakOpen !== moonNakClose);
    let nakXTime=null, vBeforeX=null, vAfterX=null, vBeforeX_off=null, vAfterX_off=null;
    if(nakChange){
      // Binary search for the nakshatra crossover time (within ±5 min accuracy)
      let lo=J_open, hi=J_close;
      for(let bi=0;bi<12;bi++){
        const mid=(lo+hi)/2;
        const sn=sbcSnapshot(mid,ayMode);
        const nk=sn.planets.find(p=>p.name==='Moon')?.nak?.idx;
        if(nk===moonNakOpen) lo=mid; else hi=mid;
      }
      nakXTime=lo; // JD just before the crossing
      const snapBX=sbcSnapshot(lo,      ayMode);
      const snapAX=sbcSnapshot(lo+0.007,ayMode); // ~10 min after crossing
      vBeforeX     =sbcVerdict(snapBX,instr);
      vAfterX      =sbcVerdict(snapAX,instr);
      vBeforeX_off =sbcVerdict(snapBX,instr,{cascadeOff:true});
      vAfterX_off  =sbcVerdict(snapAX,instr,{cascadeOff:true});
    }

    // ── Intraday signal: only on nakshatra-change days ────────────────────────────
    // Signal = Vishva direction AFTER the crossover (when Moon enters new nakshatra)
    // Rationale: crossing unlocks the new ring position → rest of session reflects it
    const intPct=(p.close-p.open)/p.open*100;
    const intAct=intPct>0.05?'TEJI':intPct<-0.05?'MANDI':'SAMA';
    let intDirSlope='SAMA', intDirSlopeOff='SAMA';
    let vishvaIntra=[], vishvaIntraOff=[], slopeOn=0, slopeOff=0;
    if(nakChange && vAfterX){
      const absAfter=Math.abs(vAfterX.net);
      intDirSlope   =(absAfter>=Math.max(minV,0.15))?vAfterX.dir:'SAMA';
      const absAfterOff=Math.abs(vAfterX_off?.net||0);
      intDirSlopeOff=(absAfterOff>=Math.max(minV,0.15))?vAfterX_off.dir:'SAMA';
      // Store 3-point arc: open → before-cross → after-cross for chart
      vishvaIntra   =[v_open.net, vBeforeX.net, vAfterX.net, v_close.net];
      vishvaIntraOff=[v_open_off.net, vBeforeX_off?.net||0, vAfterX_off?.net||0, v_close_off.net];
      slopeOn  =vAfterX.net - v_open.net;
      slopeOff =(vAfterX_off?.net||0) - v_open_off.net;
    }
    const intHit = nakChange&&intDirSlope!=='SAMA'&&intAct!=='SAMA'
                   ? intDirSlope===intAct : null;

    const cascadeActive=!!(v_open.desh?.tithiCascadeFired||v_open.kal?.tithiCascadeFired||v_open.panya?.tithiCascadeFired);
    const cascadeActiveClose=!!(v_close.desh?.tithiCascadeFired||v_close.kal?.tithiCascadeFired||v_close.panya?.tithiCascadeFired);
    const absNetClose=Math.abs(v_close.net);
    const dirClose=(absNetClose>=Math.max(minV,0.15))?v_close.dir:'SAMA';
    const absNetCloseOff=Math.abs(v_close_off.net);
    const dirClose_off=(absNetCloseOff>=Math.max(minV,0.15))?v_close_off.dir:'SAMA';
    series.push({
      dateStr:p.dateStr, y:p.y, m:p.m,
      vishvaOpen: v_open.net,   dirOpen: v_open.dir,
      vishvaClose:v_close.net,  dirClose,
      chainActive:!!(v_open.chainDelta&&v_open.chainDelta!==0),
      priceOpen:p.open, priceHigh:p.high||p.open,
      priceLow:p.low||p.open,   priceClose:p.close,
      prevClose:prev?.close||null,
      // btMetrics fields (cascade ON)
      dir:gapSignal, net:v_open.net, gapPct, gapAct, gapHit,
      didFlip, prevDirClose, vishvaOpen9:v_open.net, vishvaClosePrev:prevEntry?.vishvaClose||null,
      netClose:v_close.net, dirClose,
      nakChange, nakXTime,                               // Moon nak crossover
      vishvaIntra, slopeOn,                              // intraday arc
      intDirSlope, intPct, intAct, intHit,
      cascadeActive, cascadeActiveClose,
      // Cascade OFF
      net_off: v_open_off.net,
      dir_off: (Math.abs(v_open_off.net)>=Math.max(minV,0.15))?v_open_off.dir:'SAMA',
      netClose_off: v_close_off.net, dirClose_off,
      vishvaIntraOff, slopeOff, intDirSlopeOff,
      gapHit_off: null, intHit_off: null,
    });
    const last=series[series.length-1];
    const prevDirCloseOff=prevEntry?.dirClose_off||'SAMA';
    const gapSignalOff=(prevDirCloseOff!=='SAMA'&&last.dir_off!=='SAMA')?last.dir_off:'SAMA';
    last.gapHit_off=(gapSignalOff!=='SAMA'&&gapAct&&gapAct!=='SAMA')?gapSignalOff===gapAct:null;
    last.intHit_off=nakChange&&intDirSlopeOff!=='SAMA'&&intAct!=='SAMA'?intDirSlopeOff===intAct:null;
  }
  const metrics=btMetrics(series);
  // Cascade-OFF metrics
  const seriesOff=series.map(s=>({...s,dir:s.dir_off,net:s.net_off,gapHit:s.gapHit_off,intHit:s.intHit_off}));
  const metricsOff=btMetrics(seriesOff);
  window._BT={status:'done',progress:100,msg:'',cfg,series,metrics,metricsOff};
  gs({_btTick:Date.now()});
}

// Pure statistics
function btMetrics(signals){
  const tr=signals.filter(s=>s.dir!=='SAMA');
  const acc=(arr,mode)=>{
    if(!arr.length) return null;
    const valid=arr.filter(s=>mode==='gap'?s.gapHit!==null:s.intHit!==null);
    if(!valid.length) return null;
    const hits=valid.filter(s=>mode==='gap'?s.gapHit===true:s.intHit===true).length;
    return {hits,total:valid.length,pct:Math.round(hits/valid.length*100)};
  };
  const flt=fn=>({gap:acc(tr.filter(fn),'gap'),int:acc(tr.filter(fn),'intraday')});
  const years=[...new Set(tr.map(s=>s.y))].sort();
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {
    overall:{gap:acc(tr,'gap'),int:acc(tr,'intraday')},
    teji:   {gap:acc(tr.filter(s=>s.dir==='TEJI'),'gap'), int:acc(tr.filter(s=>s.dir==='TEJI'),'intraday')},
    mandi:  {gap:acc(tr.filter(s=>s.dir==='MANDI'),'gap'),int:acc(tr.filter(s=>s.dir==='MANDI'),'intraday')},
    samaCount:signals.filter(s=>s.dir==='SAMA').length,
    tradable:tr.length, totalDays:signals.length,
    withChain:   flt(s=>s.chainActive),    noChain: flt(s=>!s.chainActive),
    withCascade: flt(s=>s.cascadeActive),
    noCascade:   flt(s=>!s.cascadeActive),

    vishvaSub1:  flt(s=>Math.abs(s.net)<1),
    vishva1to3:  flt(s=>Math.abs(s.net)>=1&&Math.abs(s.net)<3),
    vishvaAbove3:flt(s=>Math.abs(s.net)>=3),
    byYear: years.map(y=>({y, gap:acc(tr.filter(s=>s.y===y),'gap'), int:acc(tr.filter(s=>s.y===y),'intraday'), n:tr.filter(s=>s.y===y).length})),
    byMonth:MN.map((mn,mi)=>({label:mn, gap:acc(tr.filter(s=>s.m===mi+1),'gap'), int:acc(tr.filter(s=>s.m===mi+1),'intraday')}))
  };
}

// Accuracy cell renderer
function _btAcc(ac){
  if(!ac) return '<span style="color:#1a3a50">—</span>';
  const c=ac.pct>=65?'#7dffba':ac.pct>=55?'#b8ff70':ac.pct>=50?'#ffd166':ac.pct>=45?'#ff9060':'#ff5050';
  return `<b style="color:${c}">${ac.pct}%</b><span style="color:#2a5060;font-size:8px"> ${ac.hits}/${ac.total}</span>`;
}
function _btCard(title,ac,sub=''){
  return `<div style="background:#010f18;border:1px solid #0d3040;border-radius:4px;padding:8px 10px;min-width:118px">
    <div style="font-size:8px;color:#3a6070;letter-spacing:.05em;margin-bottom:2px">${title}</div>
    ${sub?`<div style="font-size:8px;color:#2a5060;margin-bottom:3px">${sub}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:3px">
      <div><div style="font-size:7px;color:#1a4050">GAP O→O</div><div>${_btAcc(ac?.gap)}</div></div>
      <div><div style="font-size:7px;color:#1a4050">INTRADAY</div><div>${_btAcc(ac?.int)}</div></div>
    </div>
  </div>`;
}

// Render the backtest tab
// ─────────────────────────────────────────────────────────────────────────────
// SBC VISHVA vs PRICE — dual-panel SVG chart
//   Top:    Net Vishva at 9:15 AM (solid) and 3:30 PM (dashed)
//           Green above zero = Teji · Red below zero = Mandi
//   Bottom: OHLC candlesticks + close line
// ─────────────────────────────────────────────────────────────────────────────
function btRenderChart(series, instrName){
  if(!series||series.length<2) return '<div style="color:#3a6070;padding:20px;text-align:center">Not enough data</div>';

  const PPD=4;                     // pixels per trading day
  const PAD_L=42, PAD_R=6;
  const H_V=190, H_GAP=10, H_P=160, H_X=22;
  const H=H_V+H_GAP+H_P+H_X;
  const W=series.length*PPD+PAD_L+PAD_R;
  const xOf=i=>PAD_L+i*PPD+PPD/2;

  // Vishva scale (symmetric around zero)
  const vMax=Math.max(5,...series.map(s=>Math.abs(s.vishvaOpen||0)),...series.map(s=>Math.abs(s.vishvaClose||0)));
  const vScale=(H_V/2-12)/vMax;
  const vZ=H_V/2;                  // Y of zero line
  const vY=v=>vZ-v*vScale;

  // Price scale
  const priceVals=series.flatMap(s=>[s.priceHigh,s.priceLow,s.priceClose].filter(Boolean));
  const pMin=Math.min(...priceVals), pMax=Math.max(...priceVals);
  const pRange=pMax-pMin||1;
  const pTop=H_V+H_GAP+8, pBot=H_V+H_GAP+H_P-6;
  const pY=p=>pBot-((p-pMin)/pRange)*(pBot-pTop);

  // ── Vishva coloured segments (morning) ──
  let vLines='';
  for(let i=1;i<series.length;i++){
    const v0=series[i-1].vishvaOpen||0, v1=series[i].vishvaOpen||0;
    const x0=xOf(i-1).toFixed(1), y0=vY(v0).toFixed(1);
    const x1=xOf(i).toFixed(1),   y1=vY(v1).toFixed(1);
    if(Math.sign(v0)!==Math.sign(v1)&&v0!==0&&v1!==0){
      const t=Math.abs(v0)/(Math.abs(v0)+Math.abs(v1));
      const xm=(+x0+t*(+x1-+x0)).toFixed(1);
      vLines+=`<line x1="${x0}" y1="${y0}" x2="${xm}" y2="${vZ}" stroke="${v0>0?'#00c870':'#ff5050'}" stroke-width="1.8"/>`;
      vLines+=`<line x1="${xm}" y1="${vZ}" x2="${x1}" y2="${y1}" stroke="${v1>0?'#00c870':'#ff5050'}" stroke-width="1.8"/>`;
    } else {
      const col=(v0+v1)>=0?'#00c870':'#ff5050';
      vLines+=`<line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}" stroke="${col}" stroke-width="1.8"/>`;
    }
  }

  // ── Vishva filled area (morning, per-day rects) ──
  let vFill='';
  for(let i=0;i<series.length;i++){
    const v=series[i].vishvaOpen||0;
    if(!v) continue;
    const x=(xOf(i)-PPD/2+0.5).toFixed(1);
    const w=(PPD-1).toFixed(1);
    const yTop=v>0?vY(v).toFixed(1):vZ.toFixed(1);
    const yBot=v>0?vZ.toFixed(1):vY(v).toFixed(1);
    const h=(+yBot-+yTop).toFixed(1);
    if(+h<0.5) continue;
    vFill+=`<rect x="${x}" y="${yTop}" width="${w}" height="${h}" fill="${v>0?'#00c870':'#ff5050'}" opacity="0.22"/>`;
  }

  // ── Evening Vishva (dashed) ──
  let vEvePts=series.map((s,i)=>`${xOf(i).toFixed(1)},${vY(s.vishvaClose||0).toFixed(1)}`).join(' ');

  // ── Candlesticks ──
  let candles='';
  for(let i=0;i<series.length;i++){
    const s=series[i];
    const x=xOf(i);
    const isUp=s.priceClose>=s.priceOpen;
    const col=isUp?'#2a9a5a':'#9a3030';
    const bodyT=pY(Math.max(s.priceOpen,s.priceClose));
    const bodyB=pY(Math.min(s.priceOpen,s.priceClose));
    const bh=Math.max(1,bodyB-bodyT);
    const bw=Math.max(2,PPD-1.5);
    candles+=`<line x1="${x.toFixed(1)}" y1="${pY(s.priceHigh||s.priceClose).toFixed(1)}" x2="${x.toFixed(1)}" y2="${pY(s.priceLow||s.priceClose).toFixed(1)}" stroke="${col}" stroke-width="0.8" opacity="0.6"/>`;
    candles+=`<rect x="${(x-bw/2).toFixed(1)}" y="${bodyT.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" opacity="0.85"/>`;
  }

  // ── Close price line ──
  let priceLine=series.map((s,i)=>`${xOf(i).toFixed(1)},${pY(s.priceClose).toFixed(1)}`).join(' ');

  // ── X-axis monthly labels + vertical grid ──
  let xGrid='', xLabels='';
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let lastM=-1;
  for(let i=0;i<series.length;i++){
    const s=series[i];
    if(s.m!==lastM){
      lastM=s.m;
      const x=xOf(i).toFixed(1);
      xGrid+=`<line x1="${x}" y1="0" x2="${x}" y2="${H_V+H_GAP+H_P}" stroke="#0a2030" stroke-width="0.6" stroke-dasharray="2,5"/>`;
      const lbl=MN[s.m-1]+(s.m===1?` '${String(s.y).slice(2)}`:'');
      xLabels+=`<text x="${x}" y="${H-5}" fill="#2a5060" font-size="9" text-anchor="middle">${lbl}</text>`;
    }
  }

  // ── Y-axis labels ──
  let yLabels='';
  // Vishva axis
  [-vMax,-vMax/2,0,vMax/2,vMax].forEach(v=>{
    const y=vY(v).toFixed(1);
    const lbl=v===0?'0':(v>0?'+':'')+Math.round(v*10)/10;
    yLabels+=`<text x="${PAD_L-3}" y="${+y+3}" fill="#2a5060" font-size="8" text-anchor="end">${lbl}</text>`;
    yLabels+=`<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="${v===0?'#1a4050':'#0a1f28'}" stroke-width="${v===0?1:0.5}"/>`;
  });
  // Price axis
  [pMin,(pMin+pMax)/2,pMax].forEach(p=>{
    const y=pY(p).toFixed(1);
    const lbl=p>=10000?Math.round(p/100)*100:Math.round(p);
    yLabels+=`<text x="${PAD_L-3}" y="${+y+3}" fill="#2a5060" font-size="8" text-anchor="end">${lbl}</text>`;
    yLabels+=`<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#0a1f28" stroke-width="0.5"/>`;
  });

  return `
<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;background:#020c14;border-radius:4px;padding:0">
  <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="display:block;background:#020c14">
    <!-- X grid + labels -->
    ${xGrid}${xLabels}
    <!-- Vishva panel -->
    <rect x="${PAD_L}" y="0" width="${W-PAD_L-PAD_R}" height="${H_V}" fill="#030d17" opacity="0.6"/>
    <text x="${PAD_L+4}" y="13" fill="#3a7080" font-size="9" font-weight="700">NET VISHVA — ${instrName}</text>
    <text x="${PAD_L+4}" y="23" fill="#2a5060" font-size="8">—— 9:15 AM (morning)  · · · 3:30 PM (evening)   ▮ Teji=green  ▮ Mandi=red</text>
    ${vFill}
    ${vLines}
    <polyline points="${vEvePts}" fill="none" stroke="#7ecad8" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.65"/>
    <!-- Price panel -->
    <rect x="${PAD_L}" y="${H_V+H_GAP}" width="${W-PAD_L-PAD_R}" height="${H_P}" fill="#020a12" opacity="0.7"/>

}

window.btLoadCSV=function(input){
  const file=input.files?.[0]; if(!file) return;
  const st=document.getElementById('bt-csv-status');
  if(st) st.textContent='Reading…';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const rows=btParseCSV(e.target.result);
      if(rows.length<5) throw new Error('Need at least 5 rows');
      window._BT_CSV=rows;
      if(st) st.textContent=`✓ ${rows.length} days loaded (${rows[0].dateStr} → ${rows[rows.length-1].dateStr})`;
    }catch(err){
      if(st) st.textContent='⚠ '+err.message;
      window._BT_CSV=null;
    }
  };
  reader.readAsText(file);
};

async function sbcFetchMonthlyPrice(){
  const dp=S.date.split('-').map(Number);
  const off=S.sbcMonthOff||0;
  const base=new Date(dp[0],dp[1]-1+off,1);
  const yr=base.getFullYear(), mo=base.getMonth()+1;
  const moStr=String(mo).padStart(2,'0');
  const divId=`sbc-mprice-${yr}-${mo}`;
  const div=document.getElementById(divId);
  if(!div) return;

  const fromDate=`${yr}-${moStr}-01`;
  const lastDay=new Date(yr,mo,0).getDate();
  const toDate=`${yr}-${moStr}-${String(lastDay).padStart(2,'0')}`;

  div.innerHTML=`<div style="font-size:9px;color:#1a5060;padding:6px 0">⟳ Fetching NIFTY ${moStr}/${yr}…</div>`;

  // Extract any JSON array from a text blob (aggressive parser)
  const _extract=(txt)=>{
    if(!txt) return null;
    // Try direct JSON parse first
    try{ const j=JSON.parse(txt);
      if(Array.isArray(j)&&j.length) return j;
      if(j?.historical&&Array.isArray(j.historical)) return j.historical;
      if(j?.data&&Array.isArray(j.data)) return j.data;
    }catch(e){}
    // Scan for all JSON arrays in the text
    let best=null;
    const rx=/\[[\s\S]*?\]/g; let m;
    while((m=rx.exec(txt))!==null){
      try{ const arr=JSON.parse(m[0]);
        if(Array.isArray(arr)&&arr.length>best?.length){
          const first=arr[0];
          if(first&&(first.date||first.Date||first.time||first.t)) best=arr;
        }
      }catch(e){}
    }
    if(best) return best;
    // Also look for historical object wrapper
    const hw=txt.match(/"historical"\s*:\s*(\[[\s\S]*?\])/);
    if(hw) try{ return JSON.parse(hw[1]); }catch(e){}
    return null;
  };

  // Normalise a raw row to {d, o, h, l, c, date}
  const _norm=(r)=>{
    const date=r.date||r.Date||r.time||r.t||'';
    const c=+(r.close||r.Close||r.adjClose||r.c||0);
    const o=+(r.open||r.Open||r.o||c);
    const h=+(r.high||r.High||r.h||c);
    const l=+(r.low||r.Low||r.l||c);
    const d=parseInt(date.slice(8))||0;
    return {date,d,o,h,l,c};
  };

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:8192,
        system:`You are a data extraction assistant. When FMP returns historical price data, output ONLY the raw JSON array of daily OHLCV records — no explanation, no markdown, no code block. Format: [{"date":"YYYY-MM-DD","open":N,"high":N,"low":N,"close":N}]`,
        messages:[{role:'user',content:`Use FMP to get daily historical prices for NIFTY 50 index from ${fromDate} to ${toDate}. Output only the JSON array.`}],
        mcp_servers:[{type:'url',url:'https://financialmodelingprep.com/mcp',name:'fmp'}]
      })
    });
    if(!resp.ok) throw new Error(`Anthropic ${resp.status}`);
    const data=await resp.json();

    // Collect ALL text from ALL blocks and try to extract rows
    let rows=null;
    const allTexts=[];
    for(const blk of (data.content||[])){
      if(blk.type==='mcp_tool_result'){
        for(const c of (blk.content||[])) if(c.text) allTexts.push(c.text);
      }
      if(blk.type==='text') allTexts.push(blk.text||'');
    }
    // Try each text block
    for(const txt of allTexts){
      const r=_extract(txt);
      if(r&&r.length>(rows?.length||0)) rows=r;
    }
    // Fallback: join all text and try once more
    if(!rows||!rows.length){
      const r=_extract(allTexts.join(' '));
      if(r&&r.length) rows=r;
    }
    if(!rows||!rows.length) throw new Error(`Parse failed — blocks: ${data.content?.map(b=>b.type).join(',')}`);

    // Normalise, filter to target month
    const ohlc=rows.map(_norm)
      .filter(r=>r.c>0&&r.d>0&&(r.date.startsWith(`${yr}-${moStr}`)||r.date.startsWith(`${moStr}/`)||r.date.includes(`/${moStr}/${yr}`)))
      .sort((a,b)=>a.d-b.d);

    if(ohlc.length<3){
      // Fallback: maybe all data is here but filter was too strict — use any row with close>0
      const all=rows.map(_norm).filter(r=>r.c>100&&r.d>0).sort((a,b)=>a.d-b.d);
      if(all.length>=3){
        // deduplicate by d
        const seen=new Set(); const dedup=all.filter(r=>!seen.has(r.d)&&seen.add(r.d));
        ohlc.push(...dedup.slice(0,30));
      }
    }
    if(ohlc.length<3) throw new Error(`Only ${ohlc.length} valid rows (raw: ${rows.length})`);

    // Build candlestick SVG aligned with Vishva x-axis
    const tradingDays=[];
    for(let d=1;d<=lastDay;d++){
      if(new Date(yr,mo-1,d).getDay()!==0&&new Date(yr,mo-1,d).getDay()!==6) tradingDays.push(d);
    }
    const n=tradingDays.length;
    const W=Math.max(540,n*22+60),H=130,PL=52,PR=16,PT=12,PB=22,IW=W-PL-PR,IH=H-PT-PB;
    const xOf=i=>PL+((i+0.5)/n)*IW;
    const allH2=ohlc.map(r=>r.h), allL2=ohlc.map(r=>r.l);
    const cMin=Math.min(...allL2)*0.9985, cMax=Math.max(...allH2)*1.0015;
    const yOf=v=>PT+(1-(v-cMin)/(cMax-cMin))*IH;

    let grid='',candles='';
    [cMin,cMin+(cMax-cMin)/2,cMax].forEach(v=>{
      const y=yOf(v).toFixed(1);
      grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#0a2028" stroke-width="0.5"/>`;
      grid+=`<text x="${PL-4}" y="${(parseFloat(y)+3).toFixed(1)}" fill="#2a6070" font-size="8" text-anchor="end">${Math.round(v).toLocaleString('en-IN')}</text>`;
    });
    grid+=`<text x="${PL}" y="${PT+10}" fill="#1a5060" font-size="8">NIFTY 50</text>`;

    tradingDays.forEach((d,i)=>{
      const e=ohlc.find(r=>r.d===d); if(!e) return;
      const x=xOf(i).toFixed(1);
      const yo=yOf(e.o).toFixed(1),yc=yOf(e.c).toFixed(1),yh=yOf(e.h).toFixed(1),yl=yOf(e.l).toFixed(1);
      const up=e.c>=e.o, col=up?'#69f0ae':'#ff5566';
      const bT=Math.min(parseFloat(yo),parseFloat(yc)), bH=Math.max(Math.abs(parseFloat(yc)-parseFloat(yo)),1);
      const isToday=(d===dp[2]&&yr===dp[0]&&mo===dp[1]);
      if(isToday) candles+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB}" stroke="#e8c020" stroke-width="0.8" stroke-dasharray="2 2" opacity=".7"/>`;
      candles+=`<line x1="${x}" y1="${yh}" x2="${x}" y2="${yl}" stroke="${col}" stroke-width="1"/>`;
      candles+=`<rect x="${(parseFloat(x)-3.5).toFixed(1)}" y="${bT.toFixed(1)}" width="7" height="${bH.toFixed(1)}" fill="${up?col:'#020d14'}" stroke="${col}" stroke-width="0.8">
        <title>${yr}-${moStr}-${String(d).padStart(2,'0')} C:${Math.round(e.c).toLocaleString('en-IN')}</title></rect>`;
    });

    div.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;display:block;overflow:visible">${grid}${candles}</svg>`;

  }catch(err){
    div.innerHTML=`<div style="font-size:9px;color:#3a2020;padding:6px 8px;background:#100808;border-radius:3px;display:flex;align-items:center;gap:8px">
      <span style="color:#5a4040">Price unavailable (${err.message})</span>
      <button onclick="sbcFetchMonthlyPrice()" style="background:#1a0808;border:1px solid #3a2020;color:#5a8090;padding:2px 10px;border-radius:2px;cursor:pointer;font-size:9px;flex-shrink:0">↻ Retry</button>
    </div>`;
  }
}

function tSBC(){
  if(S.sbcMode==='bt') return tSBCBT();
  const D=DATA;
  const dp=S.date.split('-').map(Number);
  const Jnow=JD(dp[0],dp[1],dp[2],parseFloat(S.time)||9.25);
  const snap=sbcSnapshot(Jnow,S.ayMode);
  const verdicts=SBC_INSTR.map(ins=>sbcVerdict(snap,ins));
  // §5i price engine — two-period differencing (book pp.421-423): period-1 = previous day's close, period-2 = now
  const _locP=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||{open:9.25,close:15.5};
  const snapPrev=sbcSnapshot(JD(dp[0],dp[1],dp[2],_locP.close||15.5)-1,S.ayMode);  // −1 JD day = yesterday's close
  const prevNet={}; SBC_INSTR.forEach(ins=>{ prevNet[ins.key]=sbcVerdict(snapPrev,ins).net; });
  window.SBCX={snap,verdicts,prevNet};
  // ── Shringonnati: Monthly bias from Shukla Dvitiya Moon horn elevation ──
  const _shrLoc=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||{lat:19.076,lon:72.878,tz:5.5};
  const _shr=sbcShringonnati(Jnow, S.ayMode, _shrLoc);
  // Overall vedha bias this moment (sum net across all instruments)
  const _shrOverallNet=verdicts.reduce((s,v)=>s+v.net,0);
  const _shrVedicBias=_shrOverallNet>0.15?'TEJI':_shrOverallNet<-0.15?'MANDI':'NEUTRAL';
  const activeNaks=new Set(snap.planets.map(p=>p.nak.idx));
  // naks pierced by anything (for ring colouring) → {saumya:n,krura:n}
  const nakPierce={};
  snap.planets.forEach(p=>p.nakHits.forEach(k=>{ const e=nakPierce[k]=nakPierce[k]||{s:0,k:0}; p.saumya?e.s++:e.k++; }));

  // ── SVG chakra (geometry identical to the classical एकाशीतिपद layout) ──
  const EAST=SBC_EAST,SOUTH=SBC_SOUTH,WEST=SBC_WEST,NORTH=SBC_NORTH;
  const ABHIJIT={n:'Abhijit',l:'Brahma'};
  const ringPos={}; Object.keys(SBC_RINGPOS).forEach(k=>{ringPos[k==='AB'?'AB':+k]=SBC_RINGPOS[k];});
  const AK=SBC_AK, RASHI=SBC_RASHI;
  const RNAME=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const RDEV=['मेष','वृष','मिथुन','कर्क','सिंह','कन्या','तुला','वृश्चिक','धनु','मकर','कुंभ','मीन'];
  const SAB=['Ar','Ta','Ge','Cn','Le','Vi','Li','Sc','Sg','Cp','Aq','Pi'];
  const TVA=[[3,4,'NANDA','Sun · Tue','1·6·11','#00f07a'],[4,3,'RIKTA','Fri','4·9·14','#ff3355'],[4,4,'PURNA','Sat','5·10·15·30','#ffc107'],[4,5,'BHADRA','Mon · Wed','2·7·12','#69F0AE'],[5,4,'JAYA','Thu','3·8·13','#00e8ff']];
  const DEITY={'0,0':['ईशान','Bha₄·Kri₁'],'0,8':['आग्नेय','Ash₄·Mag₁'],'8,8':['वायव्य','Vis₄·Anu₁'],'8,0':['नैऋत्य','Shr₄·Dha₁']};
  const NG=9,CS=82,PADAB=15,NAVB=15,SIGNB=20,BND=PADAB+NAVB+SIGNB,DM=26,O=DM+BND,SZ=O+NG*CS+BND+DM,SUB=CS/4;
  const gX=c=>O+c*CS,gY=r=>O+r*CS,cX=c=>O+c*CS+CS/2,cY=r=>O+r*CS+CS/2;
  const navOf=(ni,p)=>((ni*4+p)%12)+1;
  const signOf=(ni,p)=>Math.floor((ni*13.33333+p*3.33333)/30)%12+1;
  const signFill=['#3a1a1a','#2a2a14','#143a2a','#142a3a','#3a2a14','#1a3a1a','#2a1a3a','#3a1428','#2a1a14','#14283a','#1a2a3a','#1a1428'];
  let svg=`<svg width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}" xmlns="http://www.w3.org/2000/svg" font-family="Courier New">`;
  svg+=`<rect width="${SZ}" height="${SZ}" fill="#010b0f"/>`;
  for(let r=0;r<NG;r++)for(let c=0;c<NG;c++){ const corner=(r===0||r===8)&&(c===0||c===8);
    svg+=`<rect x="${gX(c)}" y="${gY(r)}" width="${CS}" height="${CS}" fill="${corner?'#02141c':'#011a26'}" stroke="#103848" stroke-width=".8"/>`; }
  function band(naks,edge){
    for(let i=0;i<7;i++){ const key=naks[i]; const ni=(key==='AB')?-1:key;
      for(let p=0;p<4;p++){
        let pr,nr,sr; const naxX=gX(1+i),naxY=gY(1+i);
        if(edge==='top'){const x=naxX+p*SUB;pr=[x,O-PADAB,SUB,PADAB];nr=[x,O-PADAB-NAVB,SUB,NAVB];sr=[x,O-BND,SUB,SIGNB];}
        else if(edge==='bottom'){const x=naxX+p*SUB,yb=O+NG*CS;pr=[x,yb,SUB,PADAB];nr=[x,yb+PADAB,SUB,NAVB];sr=[x,yb+PADAB+NAVB,SUB,SIGNB];}
        else if(edge==='right'){const y=naxY+p*SUB,xr=O+NG*CS;pr=[xr,y,PADAB,SUB];nr=[xr+PADAB,y,NAVB,SUB];sr=[xr+PADAB+NAVB,y,SIGNB,SUB];}
        else{const y=naxY+p*SUB;pr=[O-PADAB,y,PADAB,SUB];nr=[O-PADAB-NAVB,y,NAVB,SUB];sr=[O-BND,y,SIGNB,SUB];}
        const si=(ni>=0)?signOf(ni,p):0;
        svg+=`<rect x="${sr[0]}" y="${sr[1]}" width="${sr[2]}" height="${sr[3]}" fill="${si?signFill[si-1]:'#06141c'}" stroke="#0d2a34" stroke-width=".5"/>`;

        if(ni>=0)svg+=`<text x="${nr[0]+nr[2]/2}" y="${nr[1]+nr[3]/2+3}" text-anchor="middle" fill="#5a90a0" font-size="8">${navOf(ni,p)}</text>`;
        svg+=`<rect x="${pr[0]}" y="${pr[1]}" width="${pr[2]}" height="${pr[3]}" fill="#02181f" stroke="#0d2a34" stroke-width=".5"/>`;

      }
    }
  }
  band(EAST,'top');band(SOUTH,'right');band(WEST,'bottom');band(NORTH,'left');
  svg+=`<text x="${O-PADAB-NAVB/2}" y="${O-2}" text-anchor="middle" fill="#3a8090" font-size="7" transform="rotate(-90 ${O-PADAB-NAVB/2} ${O-2})">NAVAMSA</text>`;
  svg+=`<text x="${gX(0)+CS/2}" y="${O-BND-3}" text-anchor="middle" fill="#5a90a0" font-size="8">SIGNS</text>`;
  svg+=`<text x="${SZ/2}" y="${DM-8}" text-anchor="middle" fill="#00e8ff" font-size="16" font-weight="bold">EAST · पूर्व</text>`;
  svg+=`<text x="${SZ/2}" y="${SZ-6}" text-anchor="middle" fill="#00e8ff" font-size="16" font-weight="bold">WEST · पश्चिम</text>`;
  svg+=`<text x="${DM-8}" y="${SZ/2}" text-anchor="middle" fill="#00e8ff" font-size="16" font-weight="bold" transform="rotate(-90 ${DM-8} ${SZ/2})">NORTH · उत्तर</text>`;
  svg+=`<text x="${SZ-DM+10}" y="${SZ/2}" text-anchor="middle" fill="#00e8ff" font-size="16" font-weight="bold" transform="rotate(90 ${SZ-DM+10} ${SZ/2})">SOUTH · दक्षिण</text>`;
  svg+=`<text x="${gX(1)+4}" y="${DM-8}" fill="#cc1030" font-size="9">◄ वक्री = Right-Side Vedha</text>`;
  svg+=`<text x="${gX(8)-4}" y="${DM-8}" text-anchor="end" fill="#00b84a" font-size="9">शीघ्री = Left-Side Vedha ►</text>`;
  for(const key in DEITY){const rc=key.split(',').map(Number),d=DEITY[key];
    svg+=`<text x="${cX(rc[1])}" y="${cY(rc[0])-5}" text-anchor="middle" fill="#b89cff" font-size="13" font-weight="bold">${d[0]}</text>`;
    svg+=`<text x="${cX(rc[1])}" y="${cY(rc[0])+13}" text-anchor="middle" fill="#8a78c8" font-size="9">${d[1]}</text>`;}
  for(const key in AK){const rc=key.split(',').map(Number),a=AK[key];
    svg+=`<text x="${cX(rc[1])}" y="${cY(rc[0])-5}" text-anchor="middle" fill="#9fe8ff" font-size="15" font-weight="bold">${a[0]}</text>`;

  for(const rc of RASHI){const r=rc[0],c=rc[1],si=rc[2];
    svg+=`<rect x="${gX(c)+1}" y="${gY(r)+1}" width="${CS-2}" height="${CS-2}" fill="#02202e" stroke="#145060" stroke-width="1"/>`;
    svg+=`<text x="${cX(c)}" y="${cY(r)-3}" text-anchor="middle" fill="#ffc107" font-size="11" font-weight="bold">${RNAME[si-1]}</text>`;
    svg+=`<text x="${cX(c)}" y="${cY(r)+13}" text-anchor="middle" fill="#cc8800" font-size="11">${si} · ${RDEV[si-1]}</text>`;}
  svg+=`<rect x="${gX(3)}" y="${gY(3)}" width="${3*CS}" height="${3*CS}" fill="none" stroke="#145060" stroke-width="1"/>`;
  for(const t of TVA){const r=t[0],c=t[1];
    svg+=`<rect x="${gX(c)+1}" y="${gY(r)+1}" width="${CS-2}" height="${CS-2}" fill="#02141c" stroke="${t[5]}66" stroke-width="1.5"/>`;

    svg+=`<text x="${cX(c)}" y="${cY(r)+17}" text-anchor="middle" fill="#89a" font-size="9">${t[4]}</text>`;}
  // ── TRUE vedha lines per the book: front/left/right by गति + कोण diagonals ──
  const SBC_LINE_SP=5.5;
  const vedhaJobs=[];
  for(const p of snap.planets){
    const col=PC[p.name]||'#7ecad8';
    const a=ringPos[p.ringKey]; if(!a)continue;
    for(const ln of p.lines) vedhaJobs.push({name:p.name,col,ln,a});

  const vedhaGroups={};

  // nakshatra ring cells — coloured by who pierces them

    if(pierce){const lbl=pierce.s&&pierce.k?'±':pierce.k?'तेजी':'मंदी',bc=pierce.s&&pierce.k?'#ffc107':pierce.k?'#00f07a':'#ff3355';
      svg+=`<text x="${gX(c)+CS-4}" y="${gY(r)+11}" text-anchor="end" fill="${bc}" font-size="8" font-weight="bold">${lbl}</text>`;}
    if(ni>=0){const ps=snap.planets.filter(p=>p.nak.idx===ni);

  }
  [].concat(EAST,SOUTH,WEST,NORTH).forEach(drawNak);
  svg+=`</svg>`;

  // ── verdict cards ──
  const dirCol=d=>d==='TEJI'?'var(--bull)':d==='MANDI'?'var(--bear)':'var(--neut)';

  const cards=verdicts.map(v=>{

      const a=resolveAnchor(S.gannAnchor||'open',open,pc);
      if(a.price>0){
        const phala=Math.round((v.net-(prevNet[v.instr.key]||0))*100)/100;          // §5i फल-विश्वा = period-2 − period-1
        const pcl=phala>0?'var(--bull)':phala<0?'var(--bear)':'var(--neut)';
        const move=a.price*Math.abs(phala)/20, tgt=phala>=0?a.price+move:a.price-move;// क्रूर(तेजी)→add · सौम्य(मंदी)→subtract

      .map(r=>`<span style="color:${PC[r.planet]}">${pShort(r.planet)}</span>&thinsp;${r.side==='teji'?'▲':'▼'}${r.vishva}`).join(' · ')||'—';
    return `<div style="flex:1;min-width:170px;background:var(--bg2);border:1px solid ${c}44;border-top:3px solid ${c};border-radius:4px;padding:8px 10px">

  // ── 15-min heatmap ──
  const ID=sbcIntraday(S.ayMode);
  const hmHead=ID.slots.map(s=>`<th style="padding:2px 1px;font-size:8px;color:var(--tx3);font-weight:400;min-width:26px">${mtt(s.t*60)}</th>`).join('');

  const hmRows=SBC_INSTR.map(ins=>{
    const cells=ID.slots.map(s=>{

      const tcol=Math.abs(net)>2.5?'#fff':'var(--tx1)';
      const topR=v.rows.filter(r=>r.vishva>0).sort((x,y)=>y.vishva-x.vishva)[0];
      const tip=`${mtt(s.t*60)} · ${ins.name} · ${net>0.05?'तेजी':net<-0.05?'मंदी':'सम'} ${net>0?'+':''}${net} विश्वा${topR?' · '+topR.planet+' '+(topR.side==='teji'?'▲':'▼')+topR.vishva:''}`;

  // ── workings table — 3 panchaks × 5 limbs = 15 limb checks per instrument ──
  const angaChip=(on,lbl)=>`<span style="display:inline-block;padding:0 4px;margin:0 1px;border-radius:2px;font-size:9px;${on?'background:#06303f;color:#8df7ff;border:1px solid #1a6878':'color:var(--bd2);border:1px solid var(--bd)'}">${lbl}</span>`;
  const sightFmt=s=>s===0?'<span style="color:var(--bear)">0</span>':s===1?'१':s===0.75?'¾':s===0.5?'½':'¼';
  const workRows=verdicts.map(v=>{

  // ── pierced nakshatra book-effects ──
  const fxRows=Object.keys(nakPierce).map(k=>{

  // ── build 15-limb display data ──────────────────────────────────────────────
  const RNAME_SBC=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const RDEV_SBC =['मेष','वृष','मिथुन','कर्क','सिंह','कन्या','तुला','वृश्चिक','धनु','मकर','कुंभ','मीन'];
  const _nakName = ni => ni==='AB'?'Abhijit':(NAKS[ni]||{n:'?'}).n;
  const _rashiName = ri => ri!=null ? RNAME_SBC[ri]+'&thinsp;<span style="color:#8890a0;font-size:9px">'+RDEV_SBC[ri]+'</span>' : '—';
  const _svaraColor= sv => ({अ:'#ffd166',इ:'#5cd8ff',उ:'#b8ff70',ए:'#ff8888',ओ:'#c8a8ff'})[sv]||'#cde';
  const _tithiColor = tg => ({NANDA:'#ffd166',BHADRA:'#5cd8ff',JAYA:'#b8ff70',RIKTA:'#ff6680',PURNA:'#c8a8ff'})[tg]||'#cde';
  const _limb = (label, val, color) =>
    `<div style="background:#010f18;border:1px solid #0d3040;border-radius:3px;padding:5px 8px;min-width:90px">
       <div style="font-size:8px;color:#4a7a90;letter-spacing:.08em;margin-bottom:2px">${label}</div>

     </div>`;
  const _panchakBlock = (pc, result, heading, subColor) => {
    if(!pc) return '';

    const cascadePlanets = result && result.tithiCascadePlanets && result.tithiCascadePlanets.length
                         ? result.tithiCascadePlanets.join(', ') : '';

    const _limbC = (label, val, col, lit) =>

         <div style="font-size:8px;color:${lit?'#ff8060':'#4a7a90'};letter-spacing:.08em;margin-bottom:2px">${label}${lit?' ⚡':''}</div>

      <div style="font-size:9px;color:#4a7a90;margin-bottom:8px">

        <span style="color:#6a9ab0">${pc.src||''}</span>

      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">

        ${_limbC('स्वर (Svara)', pc.svara||'?', _svaraColor(pc.svara), cascade)}
        ${_limbC('तिथि (Tithi)', `<span style="color:${_tithiColor(pc.tithiGrp)}">${pc.tithiGrp||'—'}</span>`, '#cde', cascade)}
        ${_limbC('नक्षत्र (Nak)', nakLbl, '#7ecad8', cascade)}
        ${_limbC('राशि (Rashi)', _rashiName(pc.rashi), '#ffc107', cascade)}
      </div>
    </div>`;
  };
  // first verdict holds all three fully-derived panchaks
  const _v0 = verdicts[0];
  const p15html = verdicts.map(vv => `
    <div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:800;color:var(--tx0);padding:4px 0 6px;border-bottom:1px solid #0d3040;margin-bottom:8px">
        ${vv.instr.name} <span style="font-size:9px;color:#4a7a90;font-weight:400">${vv.instr.dev}</span>

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${_panchakBlock(vv.desh.panchak,  vv.desh,  'देश-पञ्चक (Desh)',  '#00e8ff')}
        ${_panchakBlock(vv.kal.panchak,   vv.kal,   'काल-पञ्चक (Kal)',   '#ffd166')}
        ${_panchakBlock(vv.panya.panchak, vv.panya, 'पण्य-पञ्चक (Panya)','#7dffba')}
      </div>
    </div>`).join('');

  return `
<div style="display:flex;flex-direction:column;gap:10px">

  <!-- Mode toggle: Live / Backtest -->
  <div style="display:flex;gap:6px;align-items:center;padding:4px 0">
    <button onclick="gs({sbcMode:'live'})" style="padding:5px 14px;border-radius:3px;border:1px solid ${!S.sbcMode||S.sbcMode==='live'?'#1a8aff':'#0d3040'};background:${!S.sbcMode||S.sbcMode==='live'?'#0a2a4a':'#010f18'};color:${!S.sbcMode||S.sbcMode==='live'?'#7ecaff':'#3a6070'};cursor:pointer;font-size:10px;font-weight:700">⬡ Live</button>
    <button onclick="gs({sbcMode:'bt'})" style="padding:5px 14px;border-radius:3px;border:1px solid ${S.sbcMode==='bt'?'#1a8aff':'#0d3040'};background:${S.sbcMode==='bt'?'#0a2a4a':'#010f18'};color:${S.sbcMode==='bt'?'#7ecaff':'#3a6070'};cursor:pointer;font-size:10px;font-weight:700">🔬 Backtest</button>
    <span style="font-size:9px;color:#2a5060;margin-left:4px">SBC signal accuracy engine · Yahoo Finance OHLCV</span>
  </div>

  ${sbcShringonnatiPanel(_shr, _shrVedicBias)}

  <!-- INTRADAY VISHVA TIMELINE -->
  ${(()=>{
    const _locP=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||{open:9.25,close:15.5,tz:5.5};
    const tz=_locP.tz||5.5;
    const dp=S.date.split('-').map(Number);
    const _hrs=[]; for(let h=9.25;h<=15.51;h+=0.25) _hrs.push(Math.round(h*4)/4);
    const _niftyInstr=SBC_INSTR.find(p=>p.key==='nifty')||SBC_INSTR[0];
    const points=_hrs.map(hr=>{
      const J=JD(dp[0],dp[1],dp[2],hr-tz+5.5);
      const sn=sbcSnapshot(J,S.ayMode);
      const moonP=sn.planets.find(p=>p.name==='Moon');
      const vd=sbcVerdict(sn,_niftyInstr);
      return {hr,net:Math.round(vd.net*100)/100,nak:moonP?.nak?.idx,nakName:(moonP?.nak?.idx!=null)?(NAKS[moonP.nak.idx]||{n:'?'}).n:'?',pada:moonP?.nak?.pada||1};
    });
    const nakChanges=[];
    for(let i=1;i<points.length;i++){
      if(points[i].nak!==points[i-1].nak)
        nakChanges.push({from:points[i-1],to:points[i],atHr:(points[i-1].hr+points[i].hr)/2});
    }
    const vMax=Math.max(...points.map(p=>Math.abs(p.net)),1);
    const timeLabel=hr=>{const h=Math.floor(hr),m=Math.round((hr-h)*60);return `${h}:${m.toString().padStart(2,'0')}`;};
    const nakNote=nakChanges.length>0?nakChanges.map(c=>`🌙 Moon: ${c.from.nakName}→${c.to.nakName} at ${timeLabel(c.atHr)}`).join(' · '):'Moon stays in same nakshatra all session';
    const W=540,H=160,PL=42,PR=16,PT=14,PB=32,IW=W-PL-PR,IH=H-PT-PB;
    const tMin=points[0].hr,tMax=points[points.length-1].hr;
    const vPad=(vMax||1)*0.18,vLo=-vMax-vPad,vHi=vMax+vPad;
    const xOf=hr=>PL+(hr-tMin)/(tMax-tMin)*IW;
    const yOf=v=>PT+(1-(v-vLo)/(vHi-vLo))*IH;
    const y0=yOf(0);
    let grid='';
    const vTicks=[...new Set([-vMax,-(vMax/2),0,vMax/2,vMax].map(v=>Math.round(v*2)/2))];
    vTicks.forEach(v=>{const y=yOf(v);const isZ=Math.abs(v)<0.01;grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="${isZ?'#1a5060':'#0a2028'}" stroke-width="${isZ?1:0.5}" stroke-dasharray="${isZ?'':'3 3'}"/>`;grid+=`<text x="${PL-4}" y="${(y+3).toFixed(1)}" fill="#2a6070" font-size="8" text-anchor="end">${v>0?'+':''}${v.toFixed(1)}</text>`;});
    let xLabels='';
    points.forEach(pt=>{const m=Math.round((pt.hr-Math.floor(pt.hr))*60);if(m===0||pt.hr===9.25||pt.hr===15.5){const x=xOf(pt.hr);xLabels+=`<text x="${x.toFixed(1)}" y="${(H-PB+12).toFixed(1)}" fill="#2a6070" font-size="8" text-anchor="middle">${timeLabel(pt.hr)}</text>`;}});
    const areaPos=[],areaNeg=[];

        <span style="color:var(--tx2)">planet badge: ·म = मध्यचारी/अतिमन्द (front) · ·शी = शीघ्री/अतिशीघ्री (left) · ·व = वक्री (right) · सूर्य/चन्द्र never Right · राहु/केतु Right only (अर्घकाण्ड §2e)</span>
      </div>
    </div>
  </div>

  <!-- workings -->
  <div class="pnl">
    <div class="ph"><span class="dot"></span>वेध WORKINGS — limb-by-limb (वर्ण · स्वर · तिथि · नक्षत्र · राशि) × दृष्टि × स्वामी-सम्बन्ध</div>
    <div class="ts"><table class="tbl">
      <thead><tr><th>Instrument</th><th>Vedhaka</th><th>गति</th><th style="text-align:center">बल</th><th>पञ्चक limbs pierced</th><th style="text-align:center">दृष्टि</th><th style="text-align:center">सम्बन्ध (पण्य-स्वामी)</th><th style="text-align:center">विश्वा</th></tr></thead>
      <tbody>${workRows}</tbody></table></div>
    <div style="font-size:9px;color:var(--tx3);padding:4px 12px">विश्वा = base(सौम्य 5 · क्रूर 4) × (n limbs ÷5) × अंश-पाद ÷4 × दृष्टि-पाद ÷4 — exact विंशोपक formula (§5e-5f, TABLES 26 & 29). अंश-पाद by स्वामी-सम्बन्ध to पण्य-त्रिक lord (सौम्य स्वामी4·मित्र3·सम2·शत्रु1 · क्रूर inverted, §5b). बल = क्षेत्र+उच्च+नवांश+वक्र+उदय कला (§4). वेध without दृष्टि bears no fruit (§5c). तिथि-वेध halves in कृष्ण पक्ष (§5g). वर्ण-via: ≡ phonetic · अनुक्त parent · ∝ sthitija; नक्षत्र-via: नवांश = navamsha-vedha (§2g-2i).</div>
  </div>


    <!-- nakshatra effects from the book -->
  <div class="pnl">

</div>`;

// TAB: 15-MIN TIMING
// ═══════════════════════════════════════════════════════════════════
function tTiming(){
  const D=DATA;
  const _hw=new Date(S.date+"T00:00:00").getDay(), _hp=D.ruleX?D.ruleX.horaNow.paksha:(D.rules?D.rules.tithi.paksha:'Shukla');
  const curMin=parseFloat(S.time)*60;
  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="pnl">
    <div class="ph">
      <span class="dot"></span>15-MIN INTRADAY TIMING · ${S.date} · Sunrise ${mtt(D.rMin)} · Sunset ${mtt(D.sMin)} · Planet Hour = ${D.hlMin.toFixed(1)} min
    </div>
    <div class="ts">
      <table class="tbl">
        <thead><tr>
          <th>Time IST</th><th>PL Hour</th><th>Hora</th><th>Bias</th>
          <th>Moon Rashi</th><th>Moon °</th><th>Nakshatra</th><th>Nak Lord</th><th>Sub Lord</th><th>SS Lord</th><th>Pada</th>
          <th>KP Indication</th><th>Action</th>
        </tr></thead>
        <tbody>
          ${D.slots.map(sl=>{
            const hl=Math.abs(curMin-sl.min)<8;
            const cls=sl.hb.bias==='BULLISH'?'tr-b':sl.hb.bias==='BEARISH'?'tr-r':'tr-n';
            return`<tr class="${cls}${hl?' tr-hl':''}">
              <td style="font-family:monospace;font-weight:700;color:${hl?'var(--acc)':'var(--tx1)'};white-space:nowrap">${sl.time}${hl?' ◄':''}</td>
              <td style="color:${PC[sl.planet]};font-weight:700">${sl.planet}</td>
              <td style="font-weight:700;font-size:10px">${(()=>{const c=horaClass(sl.planet,_hw,_hp);return c>0?'<span style="color:var(--bull)">FAV</span>':c<0?'<span style="color:var(--bear)">UNFAV</span>':'<span style="color:var(--tx3)">—</span>';})()}</td>
              <td style="white-space:nowrap"><span style="color:${sl.hb.col};font-weight:700">${sl.hb.arrow} ${sl.hb.bias}</span></td>
              <td style="color:var(--tx1)">${sl.moonSign.slice(0,4)}</td>
              <td style="font-family:monospace;color:var(--tx1)">${dmsC(sl.moonDeg)}</td>
              <td style="color:var(--tx2);font-size:10px">${sl.moonNak.slice(0,10)}</td>
              <td style="color:${PC[sl.moonNakL]};font-weight:700">${sl.moonNakL}</td>
              <td style="color:${PC[sl.moonSub]};font-weight:700;font-size:12px">${sl.moonSub}</td>
              <td style="color:${PC[sl.moonSS]};font-size:10px">${sl.moonSS}</td>
              <td style="color:#4ab8c8">${sl.moonPada}</td>
              <td style="color:${sl.hb.col};font-size:10px">${sl.hb.ind}</td>
              <td style="font-weight:700;color:${sl.hb.bias==='BULLISH'?'var(--bull)':sl.hb.bias==='BEARISH'?'var(--bear)':'var(--neut)'}">${sl.hb.bias==='BULLISH'?'▲ Long':sl.hb.bias==='BEARISH'?'▼ Short':'→ Wait'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="padding:5px 12px;background:var(--bg2);border-top:1px solid var(--bd);font-size:9px;color:var(--tx3)">
      ◄ = selected time. Moon position recomputed from ephemeris per slot (not linear extrapolation). Sub-lord changes = intraday inflection.
    </div>
  </div>
  <div class="pnl">
    <div class="ph"><span class="dot"></span>PLANETARY HOUR SCHEDULE · ${S.date} · Market Hours Only</div>
    <div class="ts">
      <table class="tbl">
        <thead><tr><th>Start</th><th>End</th><th>Dur.</th><th>Hour Lord</th><th>Sign · Nak · House</th><th>Sub Lord</th><th>Market Bias</th><th>Indication</th></tr></thead>
        <tbody>
          ${D.phpHours.filter(h=>h.em>555&&h.sm<930).map(h=>{
            const pl=D.planets.find(p=>p.name===h.planet);
            const hb=hourBias(h.planet,D.planets);
            const cur=curMin>=h.sm&&curMin<h.em;
            const cls=hb.bias==='BULLISH'?'tr-b':hb.bias==='BEARISH'?'tr-r':'tr-n';
            return`<tr class="${cls}${cur?' tr-hl':''}">
              <td style="font-family:monospace;color:${cur?'var(--acc)':'var(--tx1)'};font-weight:${cur?700:400}">${mtt(h.sm)}${cur?' ◄':''}</td>
              <td style="font-family:monospace;color:var(--tx2)">${mtt(h.em)}</td>
              <td style="color:var(--tx3)">${(h.em-h.sm).toFixed(1)}m</td>
              <td style="color:${PC[h.planet]};font-weight:700;font-size:13px">${h.planet}</td>
              <td style="font-size:10px;color:var(--tx1)">${pl?`${pl.sign} · ${pl.nak.slice(0,9)} · H${pl.h}`:'-'}</td>
              <td style="color:${PC[pl?.sub]||'var(--tx3)'};font-size:10px">${pl?.sub||'-'}</td>
              <td style="font-weight:700;color:${hb.col}">${hb.arrow} ${hb.bias}</td>
              <td style="font-size:10px;color:${hb.col}">${hb.ind}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
</div>`;
}

// TAB: ASTRO RULES  — FORECAST-DRIVEN
// Pattern-matches today's planetary combinations to specific predicted
// outcomes (session type, direction, intraday reversal times, sector
// calls, trade plan). The diagnostic data tables (tithi/combust/papa
// kartari/vedha) are kept below for reference but not the focus.
// ═══════════════════════════════════════════════════════════════════
function tRules(){
  const D = DATA;
  const R = D.rules;
  const F = D.forecast;
  if(!R || !F) return '<div style="padding:20px;color:var(--bear)">Forecast engine unavailable.</div>';

  // Session-type colour
  const sessCol = {
    'WHIPSAW':  '#FF5366',
    'VOLATILE': '#FFB300',
    'TRENDING': F.direction === 'BULLISH' ? '#00d68f' : '#FF5366',
    'RANGE':    '#5ad0e8',
    'QUIET':    '#7a96a0',
    'NORMAL':   '#7a96a0'
  }[F.session.type] || '#7a96a0';
  const dirCol  = F.direction === 'BULLISH' ? 'var(--bull)'
                : F.direction === 'BEARISH' ? 'var(--bear)' : 'var(--neut)';
  const sevCol = s => ({ EXTREME:'#FF3355', HIGH:'#FFB300', MED:'#5ad0e8', LOW:'#7a96a0' }[s]);

  // ▒▒▒ TOP: SESSION VERDICT + TRADE PLAN ▒▒▒
  const verdictCard = `
  <div class="pnl" style="border:2px solid ${sessCol}66">
    <div class="ph" style="background:linear-gradient(90deg,${sessCol}22 0%,transparent 100%)"><span class="dot" style="background:${sessCol}"></span>SESSION FORECAST · ${S.date}</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px">
        <div style="background:${sessCol}15;border-left:3px solid ${sessCol};padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">SESSION TYPE</div>
          <div style="font-size:20px;font-weight:800;color:${sessCol};line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.session.type}</div>
        </div>
        <div style="background:${dirCol === 'var(--bull)' ? 'var(--bull3)' : dirCol === 'var(--bear)' ? 'var(--bear3)' : 'var(--bg2)'};border-left:3px solid ${dirCol};padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">DIRECTION</div>
          <div style="font-size:20px;font-weight:800;color:${dirCol};line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.direction} ${F.directionScore>0?'+':''}${F.directionScore}</div>
        </div>
        <div style="background:var(--bg2);border-left:3px solid var(--acc);padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">CONFIDENCE</div>
          <div style="font-size:20px;font-weight:800;color:var(--acc);line-height:1.1;margin-top:2px">${F.confidence}%</div>
          <div class="sbar" style="height:4px;margin-top:4px"><div class="sbar-fill" style="width:${F.confidence}%;background:var(--acc)"></div></div>
        </div>
        <div style="background:var(--bg2);border-left:3px solid #4DB8FF;padding:8px 12px;border-radius:3px">
          <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em">SPOTLIGHT INDEX</div>
          <div style="font-size:18px;font-weight:800;color:#4DB8FF;line-height:1.1;letter-spacing:.05em;margin-top:2px">${F.indexSpotlight}</div>
          <div style="font-size:9px;color:var(--tx3);margin-top:1px">BN:${F.indexImpacts.bn} · NF:${F.indexImpacts.nf} · US:${F.indexImpacts.us}${F.usFlag?' ★':''}</div>
        </div>
      </div>
      <div style="background:var(--bg2);border-radius:3px;padding:10px 14px;border-left:3px solid ${sessCol};margin-bottom:8px">
        <div style="font-size:9px;color:var(--tx3);letter-spacing:.08em;font-weight:700;margin-bottom:3px">SUMMARY</div>
        <div style="font-size:12px;color:var(--tx0);line-height:1.5">${F.session.summary}</div>
      </div>
      <div style="background:linear-gradient(90deg,var(--acc)22,transparent);border-radius:3px;padding:10px 14px;border-left:3px solid var(--acc)">
        <div style="font-size:9px;color:var(--acc);letter-spacing:.08em;font-weight:700;margin-bottom:3px">⇨ TRADE PLAN</div>
        <div style="font-size:13px;color:var(--tx0);line-height:1.5;font-weight:600">${F.session.plan}</div>
      </div>
    </div>
  </div>`;

  // ▒▒▒ ACTIVE YOGAS — each with its specific forecast ▒▒▒
  const yogaCard = F.yogas.length === 0 ? `
    <div class="pnl"><div class="ph"><span class="dot"></span>ACTIVE COMBINATIONS</div>
    <div class="pb"><div style="padding:10px;color:var(--tx3);font-size:11px">No high-significance combinations detected — calm session expected.</div></div></div>
  ` : `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>ACTIVE YOGAS &amp; THEIR SPECIFIC FORECASTS · ${F.yogas.length} detected</div>
    <div class="pb">
      <div style="display:flex;flex-direction:column;gap:8px">
      ${F.yogas.map(o => {
        const col = sevCol(o.severity);
        const dirArr = o.dir > 0.5 ? '▲' : o.dir < -0.5 ? '▼' : '⟷';
        const dirC   = o.dir > 0.5 ? 'var(--bull)' : o.dir < -0.5 ? 'var(--bear)' : 'var(--neut)';
        const ixCol  = o.indexImpact === 'BANKNIFTY' ? '#4DB8FF' : o.indexImpact === 'NIFTY' ? '#FFB300' : '#9C7DFF';
        return `<div style="background:var(--bg2);border-left:4px solid ${col};border-radius:3px;padding:10px 14px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="background:${col}33;color:${col};font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:2px;border:1px solid ${col}55">${o.severity}</span>
              <span style="font-size:13px;font-weight:700;color:var(--tx0)">${o.name}</span>
              <span style="font-size:14px;color:${dirC};font-weight:700">${dirArr}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="background:${ixCol}22;color:${ixCol};font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px">${o.indexImpact}</span>
              ${o.usImpact === 'HIGH' ? `<span style="background:#4caf5022;color:#4caf50;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px">US★</span>` : ''}
            </div>
          </div>
          <div style="font-size:11px;color:var(--tx1);line-height:1.55;margin-bottom:${o.sectors?.length ? 6 : 0}px">${o.forecast}</div>
          ${o.sectors?.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;font-size:9px">${o.sectors.map(s=>`<span style="background:var(--bg3);color:var(--tx2);padding:1px 6px;border-radius:2px;border:1px solid var(--bd)">${s}</span>`).join('')}</div>` : ''}
        </div>`;
      }).join('')}
      </div>
    </div>
  </div>`;

  // ▒▒▒ REVERSAL WINDOWS ▒▒▒
  const curMin = parseFloat(S.time)*60;
  const reversalCard = `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>INTRADAY REVERSAL WINDOWS · ${F.reversals.length} computed</div>
    <div class="pb">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:8px;line-height:1.5">
        Computed from Moon sub-lord transitions, planetary hour flips, and nakshatra changes during the session. The highest-strength events are inflections where intraday direction often pivots.
      </div>
      ${F.reversals.length === 0 ? `<div style="color:var(--tx3);font-size:11px;padding:6px">No major intraday inflections detected.</div>` : `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px">
          ${F.reversals.map(r => {
            const [h,m] = r.time.split(':').map(Number);
            const rMin = h*60+m;
            const past = curMin > rMin;
            const upcoming = !past && (rMin - curMin) <= 30;
            const baseCol = r.strength >= 90 ? 'var(--acc)' : r.strength >= 75 ? '#5ad0e8' : 'var(--tx2)';
            const col = upcoming ? 'var(--acc)' : past ? 'var(--tx3)' : baseCol;
            const bg  = upcoming ? 'rgba(0,200,255,0.15)' : past ? 'var(--bg2)' : 'var(--bg2)';
            const dirA = r.dir > 0 ? '▲' : r.dir < 0 ? '▼' : '◆';
            return `<div style="background:${bg};border:1px solid ${upcoming?'var(--acc)':'var(--bd)'};border-left:3px solid ${col};border-radius:3px;padding:6px 10px;${past?'opacity:0.5':''}">
              <div style="display:flex;justify-content:space-between;align-items:baseline">
                <span style="font-size:14px;font-weight:700;color:${col};font-family:monospace">${r.time} ${dirA}</span>
                <span style="font-size:8px;color:var(--tx3);letter-spacing:.05em">${r.type.replace('_',' ')} · ${r.strength}</span>
              </div>
              <div style="font-size:10px;color:var(--tx2);margin-top:2px;line-height:1.4">${r.reason}</div>
              ${upcoming?`<div style="font-size:9px;color:var(--acc);font-weight:700;margin-top:2px">◄ in ${Math.round(rMin-curMin)} min</div>`:''}
            </div>`;
          }).join('')}
        </div>`}
    </div>
  </div>`;

  // ▒▒▒ SECTOR CALLS ▒▒▒
  const sectorCard = F.sectors.length === 0 ? '' : `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>SECTOR CALLS · WEIGHTED FROM ACTIVE YOGAS</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px">
        ${F.sectors.map(s => {
          const col = s.score > 0.5 ? 'var(--bull)' : s.score < -0.5 ? 'var(--bear)' : 'var(--neut)';
          const arr = s.score > 0.5 ? '▲' : s.score < -0.5 ? '▼' : '◆';
          return `<div style="background:var(--bg2);border-left:3px solid ${col};border-radius:3px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--tx0);font-weight:700">${s.sector}</span>
            <span style="font-family:monospace;color:${col};font-weight:700">${arr} ${s.score>0?'+':''}${s.score.toFixed(1)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  // ▒▒▒ DIAGNOSTIC INFO (small, below) ▒▒▒
  const diagCard = `
  <div class="pnl">
    <div class="ph"><span class="dot"></span>DAY CONTEXT · DIAGNOSTIC DATA</div>
    <div class="pb">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;font-size:11px">
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">TITHI</div><div style="font-weight:700;color:var(--tx0)">${R.tithi.paksha} ${R.tithi.name}</div><div style="font-size:9px;color:var(--tx2)">${R.tithi.klass} · ${(R.tithi.fraction*100).toFixed(0)}%</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">MOON NAKSHATRA</div><div style="font-weight:700;color:${R.gandMool?'var(--bear)':'var(--tx0)'}">${R.moonNakName}${R.gandMool?' ⚠':''}</div><div style="font-size:9px;color:var(--tx2)">${R.gandMool?'Gand Mool':R.panchak?'Panchak':'Normal'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">MOON DECL</div><div style="font-weight:700;color:${R.moonDecl.bias>0?'var(--bull)':'var(--bear)'}">${R.moonDecl.hemisphere} ${R.moonDecl.dec.toFixed(1)}°</div><div style="font-size:9px;color:var(--tx2)">→ ${R.moonDecl.movingToward}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">COMBUST</div><div style="font-weight:700;color:${R.combust.length?'var(--neut)':'var(--tx0)'}">${R.combust.length} planet${R.combust.length===1?'':'s'}</div><div style="font-size:9px;color:var(--tx2)">${R.combust.map(c=>c.name.slice(0,3)).join(',')||'None'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">PAPA KARTARI</div><div style="font-weight:700;color:${R.papaKartari.filter(p=>p.tight).length?'var(--bear)':'var(--tx0)'}">${R.papaKartari.length} (${R.papaKartari.filter(p=>p.tight).length} tight)</div><div style="font-size:9px;color:var(--tx2)">${R.papaKartari.map(p=>p.target.slice(0,3)).join(',')||'None'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">VEDHA Σ</div><div style="font-weight:700;color:${R.vedha.reduce((s,v)=>s+v.dir,0)>0?'var(--bull)':R.vedha.reduce((s,v)=>s+v.dir,0)<0?'var(--bear)':'var(--neut)'}">${(R.vedha.reduce((s,v)=>s+v.dir,0)>0?'+':'')}${R.vedha.reduce((s,v)=>s+v.dir,0).toFixed(1)}</div><div style="font-size:9px;color:var(--tx2)">${R.vedha.length} pair${R.vedha.length===1?'':'s'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">JUP/SAT SPEED</div><div style="font-weight:700;color:var(--tx0)">${F.jupSpd.toFixed(3)} / ${F.satSpd.toFixed(3)}</div><div style="font-size:9px;color:var(--tx2)">${F.jupSpd<0.05?'JUP STN':F.satSpd<0.04?'SAT STN':'Normal'}</div></div>
        <div class="pc"><div style="font-size:9px;color:var(--tx3)">PLUTO RX</div><div style="font-weight:700;color:${R.plutoRx.active?'var(--neut)':'var(--tx0)'}">${R.plutoRx.active?`Day ${R.plutoRx.daysIn}/163`:'Direct'}</div><div style="font-size:9px;color:var(--tx2)">${R.plutoRx.active?`${R.plutoRx.daysLeft}d left`:''}</div></div>
      </div>
    </div>
  </div>`;

  return verdictCard + yogaCard + reversalCard + sectorCard + diagCard;
}

// ── ANCHOR RESOLUTION ──────────────────────────────────────────────
// Gann SQ9 levels are FIXED reference points for the trading session.
// We track only TWO prices: Day Open and Previous Close. The user
// selects which one anchors the levels via the Gann Anchor dropdown.
// ═══════════════════════════════════════════════════════════════════
function resolveAnchor(mode, open, prevClose){
  // mode: 'open' | 'prevclose'
  const ok = v => typeof v==='number' && isFinite(v) && v>0;
  if(mode==='prevclose'){
    if(ok(prevClose)) return {price: prevClose, label:'Prev Close', src:'prevclose'};
    if(ok(open))      return {price: open,      label:'Open (PC unavailable)', src:'open(fallback)'};
    return                   {price: 0,         label:'No data',   src:'none'};
  }
  // Default: open
  if(ok(open))      return {price: open,      label:'Open',      src:'open'};
  if(ok(prevClose)) return {price: prevClose, label:'Prev Close (Open unavailable)', src:'prevclose(fallback)'};
  return                   {price: 0,         label:'No data',   src:'none'};
}

// TAB: VYAPAAR RATNA — multi-aspect grid, sankranti, year-lords, sectors
// ═══════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════════
// VYAPAAR RATNA (व्यापार रत्न) — dṛṣṭि-yoga teji/mandi engine + intraday
//   Faithful to Vyaapar_ratna part 1 & 2: harmonic aspect-yogas on
//   SAYANA (tropical) longitudes → शुभ(तेजी)/अशुभ(मंदी), via benefic/
//   malefic + jaya-parajaya (उत्तर शर विजयी) + retro reversal (वक्री).
//   Evaluable at ANY instant → 15-min intraday teji/mandi/volatile band.
// ════════════════════════════════════════════════════════════════════
const VR_BEN={Moon:1,Mercury:1,Jupiter:1,Venus:1};
const VR_DEV={Sun:'सूर्य',Moon:'चन्द्र',Mars:'मंगल',Mercury:'बुध',Jupiter:'गुरु',Venus:'शुक्र',Saturn:'शनि',Rahu:'राहु',Ketu:'केतु',Uranus:'हर्षल',Neptune:'नेपच्यून',Pluto:'प्लूटो'};
const VR_NAMES=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune','Pluto'];
const VR_ASP=[
  {a:0,orb:6,nm:'Yuti',dev:'युति',mode:'cond'},
  {a:180,orb:6,nm:'Pratiyoga',dev:'प्रतियोग',mode:'cond'},
  {a:120,orb:5,nm:'Trikona',dev:'त्रिकोण',mode:'teji'},
  {a:60,orb:3,nm:'Shashthamsha',dev:'षष्ठांश/त्रिरेकादश',mode:'shubh'},
  {a:72,orb:2.5,nm:'Panchamamsha',dev:'पञ्चमांश',mode:'panch'},
  {a:51.4286,orb:1.5,nm:'Saptamamsha',dev:'सप्तमांश',mode:'sapt'},
  {a:45,orb:1.5,nm:'Ashtamamsha',dev:'अष्टमांश',mode:'sapt'},
  {a:40,orb:1.3,nm:'Navamamsha',dev:'नवमांश',mode:'sapt'},
  {a:36,orb:1.3,nm:'Dashamamsha',dev:'दशमांश',mode:'sapt'},
  {a:32.7273,orb:1.3,nm:'Ekadashamsha',dev:'एकादशांश',mode:'sapt'},
  {a:30,orb:1.5,nm:'Dwadashamsha',dev:'द्वादशांश',mode:'dwidwa'},
  {a:22.5,orb:1.2,nm:'Shodashamsha',dev:'षोडशांश',mode:'dwidwa'},
  {a:108,orb:2,nm:'Shashtha-rahit',dev:'षष्ठांशरहित',mode:'kt'},
  {a:135,orb:1.6,nm:'Ashtamamsha-rahit',dev:'अष्टमांशरहित',mode:'shad'},
  {a:144,orb:1.3,nm:'Dashamamsha-rahit',dev:'दशमांशरहित',mode:'shad'},
  {a:147.273,orb:1.3,nm:'Ekadashamsha-rahit',dev:'एकादशांशरहित',mode:'shad'},
  {a:150,orb:1.8,nm:'Dwadashamsha-rahit',dev:'द्वादशांशरहित',mode:'shad'}
];
function vrSep(a,b){let d=Math.abs(a-b)%360; return d>180?360-d:d;}
// planet snapshot at Julian day J (tropical lon, shar, kranti, retro)
function vrPlanetsAt(J){
  return VR_NAMES.map(name=>{ let tlon=0,retro=false,lat=0,dec=0;
    try{tlon=n360(geoLon(name,J));}catch(e){} try{retro=isRetrograde(name,J);}catch(e){}
    try{lat=geoLat(name,J);}catch(e){} try{dec=declination(name,J);}catch(e){}
    return {name,dev:VR_DEV[name],tlon,lat,dec,retro,ben:!!VR_BEN[name]}; });
}
// evaluate dṛṣṭि-yogas for a planet array → {yogas, net, tejiSum, mandiSum, moonNear}
function vrYogas(P){
  const jaya=(p1,p2)=>p1.lat>=p2.lat?p1:p2;
  function verdict(mode,p1,p2){ const bb=p1.ben&&p2.ben, mm=!p1.ben&&!p2.ben, win=jaya(p1,p2); let v;
    if(mode==='teji')v=1; else if(mode==='shubh')v=mm?0.6:1;
    else if(mode==='panch')v=bb?0.8:mm?-0.8:(win.ben?0.5:-0.5);
    else if(mode==='kt')v=bb?0.6:mm?-0.6:(win.ben?0.4:-0.4);
    else if(mode==='shad')v=bb?0.5:mm?-1.0:(win.ben?0.3:-0.7);
    else if(mode==='dwidwa')v=bb?0.6:mm?-0.6:(win.ben?0.4:-0.4);
    else if(mode==='sapt')v=bb?0.7:mm?-0.7:(win.ben?0.45:-0.45);
    else v=bb?1:mm?-1:(win.ben?0.7:-0.7);
    if(((p1.retro?1:0)+(p2.retro?1:0))%2===1)v=-v; return Math.round(v*100)/100; }
  const yogas=[]; let moonHard=false;
  const HARD=new Set([180,150,147.273,144,135,45,51.4286]);   // प्रतियोग / षडष्टक-रहित / केन्द्रार्ध — turbulence
  for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){
    const s=vrSep(P[i].tlon,P[j].tlon); let best=null;
    for(const A of VR_ASP){ const off=Math.abs(s-A.a); if(off<=A.orb&&(!best||off<best.off))best={A,off}; }
    if(best){ const v=verdict(best.A.mode,P[i],P[j]);
      yogas.push({p1:P[i],p2:P[j],sep:s,asp:best.A,off:best.off,v,win:jaya(P[i],P[j]).name});
      if(P[i].name==='Moon'||P[j].name==='Moon'){ const oth=P[i].name==='Moon'?P[j]:P[i];
        if(!oth.ben && best.off<0.45 && HARD.has(best.A.a)) moonHard=true; } } }
  for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){ const dd=Math.abs(P[i].dec-P[j].dec);
    if(dd<=1.0){ yogas.push({p1:P[i],p2:P[j],sep:null,kranti:true,off:dd,asp:{nm:'Kranti-Samya',dev:'क्रान्ति-साम्य',a:null,mode:'cond'},v:verdict('cond',P[i],P[j]),win:jaya(P[i],P[j]).name}); } }
  yogas.sort((a,b)=>Math.abs(b.v)-Math.abs(a.v));
  let net=0,tejiSum=0,mandiSum=0; for(const y of yogas){net+=y.v; if(y.v>0)tejiSum+=y.v; else mandiSum+=-y.v;}
  const moon=P.find(p=>p.name==='Moon');
  return {yogas,net:Math.round(net*100)/100,tejiSum:Math.round(tejiSum*100)/100,mandiSum:Math.round(mandiSum*100)/100,moonHard,moonLat:moon?moon.lat:0};
}
// classify a slot → bull / bear / volatile / neutral
function vrState(r){
  // volatile = Moon tightly hitting a hard aspect to a malefic, or shar-parivartan (Moon ~ on ecliptic)
  if(r.moonHard || Math.abs(r.moonLat)<0.3) return 'volatile';
  if(r.net>=0.4) return 'bull';
  if(r.net<=-0.4) return 'bear';
  return 'neutral';
}
const VR_STCOL={bull:'#00c050',bear:'#ff3355',volatile:'#ff9020',neutral:'#3a6678'};
const VR_STLBL={bull:'तेजी · Bullish',bear:'मंदी · Bearish',volatile:'अस्थिर · Volatile',neutral:'सम · Neutral'};

function computeVR(D){
  const P=vrPlanetsAt(D.J); const r=vrYogas(P);
  const COMM=[['सोना · Gold',['Sun','Jupiter']],['चांदी · Silver',['Moon']],['रूई · Cotton',['Venus']],['सूत · Yarn',['Mercury','Venus']],['गेहूँ · Wheat',['Sun']],['चावल · Rice',['Moon']],['सरसों · Mustard',['Sun','Saturn']],['चीनी · Sugar',['Venus']],['तेल · Oil',['Saturn','Neptune']],['सीमेंट · Cement',['Saturn']],['लोहा · Iron/Steel',['Mars','Saturn']],['तांबा · Copper',['Sun','Mars']],['रेशम · Silk',['Mercury','Venus']],['हल्दी · Turmeric',['Sun','Neptune']],['सीसा · Lead',['Pluto']]];
  const commodities=COMM.map(c=>{ const rel=r.yogas.filter(y=>c[1].includes(y.p1.name)||c[1].includes(y.p2.name));
    return {nm:c[0],rulers:c[1],score:Math.round(rel.reduce((s,y)=>s+y.v,0)*100)/100,n:rel.length}; });
  return {P,Pm:Object.fromEntries(P.map(p=>[p.name,p])),yogas:r.yogas,net:r.net,tejiC:r.yogas.filter(y=>y.v>0).length,mandiC:r.yogas.filter(y=>y.v<0).length,commodities};
}
// 15-min intraday band across market hours
function vrIntraday(){
  const dp=S.date.split('-').map(Number);
  const loc=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||{open:9.25,close:15.5};
  const slots=[]; const n=Math.round((loc.close-loc.open)/0.25);
  for(let k=0;k<=n;k++){ const t=Math.round((loc.open+k*0.25)*100)/100; const J=JD(dp[0],dp[1],dp[2],t);
    const r=vrYogas(vrPlanetsAt(J)); const st=vrState(r); const drv=r.yogas[0];
    slots.push({t,net:r.net,state:st,driver:drv?`${drv.p1.dev}–${drv.p2.dev} ${drv.asp.dev}`:'—'}); }
  // merge consecutive same-state into ranges (close = next slot start, last = market close)
  const ranges=[]; for(let i=0;i<slots.length;i++){ const s=slots[i];
    if(ranges.length&&ranges[ranges.length-1].state===s.state){ ranges[ranges.length-1].endT=s.t; ranges[ranges.length-1].slots.push(s); }
    else ranges.push({state:s.state,startT:s.t,endT:s.t,slots:[s]}); }
  ranges.forEach(rg=>{ rg.endT=Math.round((rg.endT+0.25)*100)/100; if(rg.endT>loc.close)rg.endT=loc.close;
    rg.netAvg=Math.round(rg.slots.reduce((a,b)=>a+b.net,0)/rg.slots.length*100)/100;
    const cnt={}; rg.slots.forEach(s=>{cnt[s.driver]=(cnt[s.driver]||0)+1;}); rg.driver=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0]; });
  return {slots,ranges,open:loc.open,close:loc.close,abbr:loc.abbr||'IST'};
}
