/* ════ PLANET CHART TABS (ports of planet.py / planets.py) ════ */
/* ════════════════════════════════════════════════════════════════════
   PLANET CHARTS — ports of planet.py (latitudes) & planets.py (longitudes)
   Interactive: wheel-zoom, drag box-zoom, shift/pan-toggle pan, dblclick
   reset, toolbar buttons. Data computed once & cached; only the SVG is
   redrawn on zoom/pan (no re-fetch / re-sample).
   ════════════════════════════════════════════════════════════════════ */
window.PLAN = window.PLAN || {ohlc:{}, status:'idle', err:'', loadedKey:null, view:null, data:null, win:null, panMode:false, maximized:false, minimized:false, _rb:false};
const PLAN_INST = {'NIFTY 50':'^NSEI','BANK NIFTY':'^NSEBANK','SENSEX':'^BSESN','NIFTY IT':'^CNXIT','NIFTY MIDCAP 100':'NIFTY_MIDCAP_100.NS'};
const PLAN_COL = {Sun:'#ff7f0e',Moon:'#1e90ff',Mercury:'#2ca02c',Venus:'#ff69b4',Mars:'#d62728',Jupiter:'#ffd700',Saturn:'#1f3a93',Rahu:'#9aa6ad',Ketu:'#b5774f'};
const PLAN_ORDER = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Rahu','Ketu'];
const PLAN_RANGES = {'6mo':'6M','1y':'1Y','2y':'2Y','3y':'3Y','5y':'5Y'};
const PLAN_YEARS = {'6mo':0.5,'1y':1,'2y':2,'3y':3,'5y':5};
const PLAN_DAYMS=86400000;

function planInstKey(){ return S.planInst || 'NIFTY 50'; }
function planRange(){ return S.planRange || '3y'; }
function planFwd(){ return (S.planFwd==null)?180:S.planFwd; }
function planBodies(){ return (S.planBodies||'Moon,Mercury,Venus,Mars,Jupiter,Saturn').split(',').filter(Boolean); }
function planChartType(){ return S.planChart || 'candle'; }
function planOrb(){ return S.planOrb || 6; }
function planKind(){ return S.tab==='planlon'?'lon':'lat'; }

function planJD(y,m,d,hUTC){ let Y=y,M=m; if(M<=2){Y--;M+=12;} const A=Math.floor(Y/100),B=2-A+Math.floor(A/4); return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+d+hUTC/24+B-1524.5; }
function planJDfromMs(ms){ const d=new Date(ms); return planJD(d.getUTCFullYear(),d.getUTCMonth()+1,d.getUTCDate(), d.getUTCHours()+d.getUTCMinutes()/60); }
function planMs(ds){ return new Date(ds+'T00:00:00Z').getTime(); }
function planISO(ms){ const d=new Date(ms); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function planFmtIST(ms){ const d=new Date(ms+5.5*3600000); const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return MON[d.getUTCMonth()]+' '+String(d.getUTCDate()).padStart(2,'0')+' '+d.getUTCFullYear()+'  '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0'); }

async function planFetchOHLC(sym, range){
  const yrs=PLAN_YEARS[range]||3; const p2=Math.floor(Date.now()/1000); const p1=p2-Math.round(yrs*365.25*86400);
  const target=`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?period1=${p1}&period2=${p2}&interval=1d`;
  let lastErr='';
  for(let pi=0; pi<PROXIES.length; pi++){
    try{
      const r=await withTimeout(fetch(PROXIES[pi](target),{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
      if(!r.ok){ lastErr='HTTP '+r.status; continue; }
      let t=await r.text(), j=JSON.parse(t);
      if(j && typeof j.contents==='string' && !j.chart) j=JSON.parse(j.contents);
      const res=j&&j.chart&&j.chart.result&&j.chart.result[0]; if(!res){lastErr='no result';continue;}
      const ts=res.timestamp||[], q=res.indicators.quote[0], out=[];
      for(let i=0;i<ts.length;i++){ const o=q.open[i],h=q.high[i],l=q.low[i],c=q.close[i];
        if([o,h,l,c].some(v=>v==null||!isFinite(v)||v<=0)) continue;
        const ds=planISO(ts[i]*1000); out.push({date:ds,ms:planMs(ds),o,h,l,c}); }
      if(out.length>10) return out;
      lastErr='too few candles';
    }catch(e){ lastErr=(e&&e.message)?e.message.slice(0,50):'err'; }
  }
  throw new Error(lastErr||'all sources failed');
}
async function planLoad(){
  const key=planInstKey()+'|'+planRange();
  if(window.PLAN.loadedKey===key && window.PLAN.ohlc[key]) { planPaint(); return; }
  if(window.PLAN.status==='loading') return;
  window.PLAN.status='loading'; window.PLAN.err=''; window.PLAN.data=null; window.PLAN.win=null; planPaint();
  try{ const data=await planFetchOHLC(PLAN_INST[planInstKey()], planRange());
    window.PLAN.ohlc[key]=data; window.PLAN.loadedKey=key; window.PLAN.status='ready'; window.PLAN.data=null; window.PLAN.win=null;
  }catch(e){ window.PLAN.status='error'; window.PLAN.err=(e&&e.message)||'fetch failed'; }
  planPaint();
}

function planSig(kind){ return planInstKey()+'|'+planRange()+'|'+kind+'|'+planBodies().join(',')+'|'+planFwd()+'|'+planOrb(); }
function planComputeData(kind){
  const key=planInstKey()+'|'+planRange(); const ohlc=window.PLAN.ohlc[key]; if(!ohlc) return;
  const bodies=planBodies();
  const t0=ohlc[0].ms, tLastP=ohlc[ohlc.length-1].ms, t1=tLastP+planFwd()*PLAN_DAYMS;
  const spanDays=(t1-t0)/PLAN_DAYMS, nS=Math.max(40,Math.min(1800,Math.round(spanDays*4))), step=(t1-t0)/nS;
  const times=[], series={}, retro={}; bodies.forEach(b=>{series[b]=[];retro[b]=[];});
  for(let k=0;k<=nS;k++){ const ms=t0+k*step; times.push(ms); const J=planJDfromMs(ms);
    for(const b of bodies){ if(kind==='lat') series[b].push(geoLat(b,J));
      else { series[b].push(n360(geoLon(b,J))); const sp=(b==='Rahu'||b==='Ketu')?-0.05:planetSpeed(b,J); retro[b].push(sp<0); } } }
  let conj=[];
  if(kind==='lon'){ const orb=planOrb();
    for(let a=0;a<bodies.length;a++)for(let b=a+1;b<bodies.length;b++){ const A=series[bodies[a]],B=series[bodies[b]]; let inC=false,bi=-1,best=999;
      for(let i=0;i<times.length;i++){ const d=Math.abs(((A[i]-B[i]+180)%360+360)%360-180);
        if(d<=orb){ if(!inC){inC=true;bi=i;best=d;} else if(d<best){best=d;bi=i;} } else if(inC){ conj.push({ms:times[bi],p1:bodies[a],p2:bodies[b],sep:best}); inC=false;best=999; } }
      if(inC) conj.push({ms:times[bi],p1:bodies[a],p2:bodies[b],sep:best}); }
    conj.sort((x,y)=>x.ms-y.ms); }
  window.PLAN.data={sig:planSig(kind), kind, bodies, t0, t1, tLastP, ohlc, times, series, retro, conj, nS};
}

function planDrawSVG(kind){
  const D=window.PLAN.data; if(!D) return '';
  const w=window.PLAN.win||{t0:D.t0,t1:D.t1}; const vt0=w.t0, vt1=w.t1;
  const cont=document.getElementById('plan-svg-wrap')||document.getElementById('plan-chart');
  const W=(cont&&cont.clientWidth>320)?Math.round(cont.clientWidth):1120;
  const PADL=52,PADR=120,PADT=16,HP=200,GAP=24,HB=200,AX=28; const topB=PADT+HP+GAP,H=topB+HB+AX,IW=W-PADL-PADR;
  const X=ms=>PADL+((ms-vt0)/(vt1-vt0))*IW;
  const inWin=ms=>ms>=vt0&&ms<=vt1;
  // visible price scale
  let pmin=Infinity,pmax=-Infinity; D.ohlc.forEach(r=>{ if(inWin(r.ms)){pmin=Math.min(pmin,r.l);pmax=Math.max(pmax,r.h);} });
  if(!isFinite(pmin)){ D.ohlc.forEach(r=>{pmin=Math.min(pmin,r.l);pmax=Math.max(pmax,r.h);}); }
  const ppad=(pmax-pmin)*0.06||1; pmin-=ppad; pmax+=ppad; const yP=v=>PADT+(1-(v-pmin)/(pmax-pmin))*HP;
  // planet scale
  let lmin,lmax;
  if(kind==='lon'){ lmin=0;lmax=360; }
  else { lmin=Infinity;lmax=-Infinity; D.bodies.forEach(b=>D.times.forEach((ms,i)=>{ if(inWin(ms)){lmin=Math.min(lmin,D.series[b][i]);lmax=Math.max(lmax,D.series[b][i]);} })); if(!isFinite(lmin)){lmin=-6;lmax=6;} const lp=(lmax-lmin)*0.08||1; lmin-=lp;lmax+=lp; }
  const yB=v=>topB+(1-(v-lmin)/(lmax-lmin))*HB;

  const fcX=X(D.tLastP);
  let deco='';
  if(D.tLastP<vt1 && D.tLastP>vt0){ const xx=Math.max(PADL,Math.min(W-PADR,fcX)); deco+=`<rect x="${xx.toFixed(1)}" y="${PADT}" width="${(W-PADR-xx).toFixed(1)}" height="${HP}" fill="#1a1605" opacity=".5"/><rect x="${xx.toFixed(1)}" y="${topB}" width="${(W-PADR-xx).toFixed(1)}" height="${HB}" fill="#1a1605" opacity=".5"/>`; }
  const todayMs=planMs((typeof todayStr==='function')?todayStr():D.ohlc[D.ohlc.length-1].date);
  if(todayMs>=vt0&&todayMs<=vt1){ const tx=X(todayMs); deco+=`<line x1="${tx.toFixed(1)}" y1="${PADT}" x2="${tx.toFixed(1)}" y2="${(topB+HB).toFixed(1)}" stroke="#e8c020" stroke-width="0.8" stroke-dasharray="3 3"/><text x="${(tx-2).toFixed(1)}" y="${(PADT+9)}" fill="#e8c020" font-size="9" text-anchor="end">◄Today</text>`; }

  let pGrid=''; for(let k=0;k<=4;k++){const v=pmin+(pmax-pmin)*k/4;const y=yP(v);pGrid+=`<line x1="${PADL}" y1="${y.toFixed(1)}" x2="${(W-PADR).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#0d2a34"/><text x="${PADL-4}" y="${(y+3).toFixed(1)}" fill="#3a8090" font-size="8" text-anchor="end">${Math.round(v).toLocaleString('en-IN')}</text>`;}
  let bGrid='';
  if(kind==='lon'){ [0,90,180,270,360].forEach(g=>{const y=yB(g);bGrid+=`<line x1="${PADL}" y1="${y.toFixed(1)}" x2="${(W-PADR).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#0d2a34"/><text x="${PADL-4}" y="${(y+3).toFixed(1)}" fill="#3a8090" font-size="8" text-anchor="end">${g}°</text>`;}); }
  else { for(let k=0;k<=4;k++){const v=lmin+(lmax-lmin)*k/4;const y=yB(v);const z=Math.abs(v)<(lmax-lmin)*0.02;bGrid+=`<line x1="${PADL}" y1="${y.toFixed(1)}" x2="${(W-PADR).toFixed(1)}" y2="${y.toFixed(1)}" stroke="${z?'#2a5566':'#0d2a34'}" ${z?'stroke-dasharray="4 3"':''}/><text x="${PADL-4}" y="${(y+3).toFixed(1)}" fill="#3a8090" font-size="8" text-anchor="end">${v.toFixed(1)}°</text>`;} }

  // candles / line (only visible bars)
  let priceSVG='';
  const visBars=D.ohlc.filter(r=>inWin(r.ms));
  if(planChartType()==='line'){ let dp=''; visBars.forEach(r=>{dp+=(dp?'L':'M')+X(r.ms).toFixed(1)+' '+yP(r.c).toFixed(1);}); priceSVG=`<path d="${dp}" fill="none" stroke="#00e8ff" stroke-width="1.2"/>`; }
  else { const bw=Math.max(0.8,Math.min(7,(IW/Math.max(1,visBars.length))*0.6));
    for(const r of visBars){ const x=X(r.ms), up=r.c>=r.o, col=up?'#00f07a':'#ff3355';
      priceSVG+=`<line x1="${x.toFixed(1)}" y1="${yP(r.h).toFixed(1)}" x2="${x.toFixed(1)}" y2="${yP(r.l).toFixed(1)}" stroke="${col}" stroke-width="0.6"/>`;
      const y1=yP(r.o),y2=yP(r.c); priceSVG+=`<rect x="${(x-bw/2).toFixed(1)}" y="${Math.min(y1,y2).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6,Math.abs(y1-y2)).toFixed(1)}" fill="${col}"/>`; } }

  // curves clipped to plot
  let curves='', markers='', conjLines='';
  for(const b of D.bodies){ const col=PLAN_COL[b]||'#8df7ff', ys=D.series[b];
    if(kind==='lon'){ let seg=[],sr=D.retro[b][0];
      const flush=()=>{ if(seg.length>1){let dp='';seg.forEach((p,k)=>dp+=(k?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1));curves+=`<path d="${dp}" fill="none" stroke="${col}" stroke-width="1.2" ${sr?'stroke-dasharray="2 3" opacity="0.9"':''}/>`;} seg=[]; };
      for(let i=0;i<ys.length;i++){ const wrap=i>0&&Math.abs(ys[i]-ys[i-1])>180; if(wrap||D.retro[b][i]!==sr){flush();sr=D.retro[b][i];} seg.push([X(D.times[i]),yB(ys[i])]); } flush();
      for(let i=1;i<ys.length;i++){ if(D.retro[b][i]!==D.retro[b][i-1] && inWin(D.times[i])){ const x=X(D.times[i]),y=yB(ys[i]),lbl=D.retro[b][i]?'R':'D'; markers+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.2" fill="${col}"/><text x="${(x+3).toFixed(1)}" y="${(y-3).toFixed(1)}" fill="${col}" font-size="7" font-weight="700">${lbl}</text>`; } }
    } else { let dp=''; ys.forEach((v,i)=>dp+=(i?'L':'M')+X(D.times[i]).toFixed(1)+' '+yB(v).toFixed(1)); curves+=`<path d="${dp}" fill="none" stroke="${col}" stroke-width="1.2"/>`; }
  }
  if(kind==='lon' && S.planConj!==false){ D.conj.forEach(cj=>{ if(inWin(cj.ms)){const x=X(cj.ms);conjLines+=`<line x1="${x.toFixed(1)}" y1="${PADT}" x2="${x.toFixed(1)}" y2="${(topB+HB).toFixed(1)}" stroke="#5ad0e8" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>`;} }); }

  // x-axis ticks adaptive to visible span
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const spanD=(vt1-vt0)/PLAN_DAYMS; let xAxis='';
  if(spanD<70){ // day ticks
    let dms=Math.ceil(vt0/PLAN_DAYMS)*PLAN_DAYMS; const stepD=spanD<18?1:Math.ceil(spanD/14);
    let cnt=0; for(let ms=dms; ms<=vt1; ms+=stepD*PLAN_DAYMS){ const x=X(ms); xAxis+=`<line x1="${x.toFixed(1)}" y1="${PADT}" x2="${x.toFixed(1)}" y2="${(topB+HB).toFixed(1)}" stroke="#08202a"/><text x="${x.toFixed(1)}" y="${(H-9)}" fill="#3a8090" font-size="8" text-anchor="middle">${planISO(ms).slice(5)}</text>`; if(++cnt>40)break; }
  } else { let my=new Date(vt0).getUTCFullYear(),mm=new Date(vt0).getUTCMonth(); const mstep=spanD>760?3:spanD>380?2:1; let mc=0,cnt=0;
    for(let g=0;g<120;g++){ const tickMs=Date.UTC(my,mm,1); if(tickMs>vt1)break; if(tickMs>=vt0&&(mc%mstep===0)){ const x=X(tickMs); xAxis+=`<line x1="${x.toFixed(1)}" y1="${PADT}" x2="${x.toFixed(1)}" y2="${(topB+HB).toFixed(1)}" stroke="#08202a"/><text x="${x.toFixed(1)}" y="${(H-9)}" fill="#3a8090" font-size="8" text-anchor="middle">${MON[mm]} ${String(my).slice(2)}</text>`; if(++cnt>40)break; } mc++; mm++; if(mm>11){mm=0;my++;} } }

  let legend=''; D.bodies.forEach((b,i)=>{const ly=PADT+10+i*13;legend+=`<line x1="${(W-PADR+8)}" y1="${ly}" x2="${(W-PADR+26)}" y2="${ly}" stroke="${PLAN_COL[b]}" stroke-width="2"/><text x="${(W-PADR+30)}" y="${ly+3}" fill="#cde" font-size="9">${b}</text>`;});
  const titles=`<text x="${(PADL+IW/2).toFixed(1)}" y="${(PADT+11)}" fill="#9cc" font-size="11" text-anchor="middle" font-weight="700">${planInstKey()} — ${PLAN_INST[planInstKey()]}</text>
    <text x="${(PADL+IW/2).toFixed(1)}" y="${(topB-7).toFixed(1)}" fill="#9cc" font-size="11" text-anchor="middle" font-weight="700">Planet ecliptic ${kind==='lat'?'latitude (°)':'longitude (°)'}</text>`;

  window.PLAN.view={W,H,PADL,PADR,PADT,HP,GAP,HB,topB,IW,vt0,vt1,kind,pmin,pmax,lmin,lmax};

  const clip=`<clipPath id="plan-clip"><rect x="${PADL}" y="${PADT}" width="${IW}" height="${(topB+HB-PADT).toFixed(1)}"/></clipPath>`;
  return `<svg id="plan-svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;background:#02141c;border:1px solid #0d3848;border-radius:4px;cursor:crosshair;touch-action:none">
    <defs>${clip}</defs>${deco}${pGrid}${bGrid}${xAxis}
    <g clip-path="url(#plan-clip)">${conjLines}${priceSVG}${curves}${markers}</g>
    ${legend}${titles}<g id="plan-cross"></g></svg>`;
}

// zoom / pan helpers
function planClampWin(a,b){ const D=window.PLAN.data; if(!D)return; let span=b-a; const full=D.t1-D.t0; span=Math.max(2*PLAN_DAYMS,Math.min(full,span)); if(a<D.t0){a=D.t0;b=a+span;} if(b>D.t1){b=D.t1;a=b-span;} window.PLAN.win={t0:Math.max(D.t0,a),t1:Math.min(D.t1,b)}; }
function planZoom(factor){ const v=window.PLAN.view,D=window.PLAN.data; if(!v||!D)return; const c=(v.vt0+v.vt1)/2,span=(v.vt1-v.vt0)*factor; planClampWin(c-span/2,c+span/2); planRedraw(); }
function planResetZoom(){ const D=window.PLAN.data; if(D){window.PLAN.win={t0:D.t0,t1:D.t1}; planRedraw();} }
function planTogglePan(){ window.PLAN.panMode=!window.PLAN.panMode; planRedraw(); }
function planMaximize(){ window.PLAN.maximized=!window.PLAN.maximized; if(window.PLAN.maximized) window.PLAN.minimized=false; planPaint(); setTimeout(planRedraw,40); }
function planMinimize(){ window.PLAN.minimized=!window.PLAN.minimized; if(window.PLAN.minimized) window.PLAN.maximized=false; planPaint(); setTimeout(planRedraw,40); }

function planRedraw(){ const wrap=document.getElementById('plan-svg-wrap'); if(!wrap||!window.PLAN.data)return; wrap.innerHTML=planDrawSVG(window.PLAN.data.kind); planAttachInteract(); }

let _planDrag=null, _planRAF=null;
function planAttachInteract(){
  const svg=document.getElementById('plan-svg'), tip=document.getElementById('plan-tip'), cg=document.getElementById('plan-cross');
  if(!svg||!cg||!window.PLAN.view||!window.PLAN.data) return; const D=window.PLAN.data;
  const vpos=ev=>{ const r=svg.getBoundingClientRect(); const fx=(ev.clientX-r.left)/r.width; return {fx, vbX:fx*window.PLAN.view.W, cw:r.width}; };
  const timeAt=vbX=>{ const v=window.PLAN.view; return v.vt0+((vbX-v.PADL)/v.IW)*(v.vt1-v.vt0); };

  svg.onwheel=function(ev){ ev.preventDefault(); const v=window.PLAN.view; const {vbX}=vpos(ev); const ct=timeAt(vbX); const f=ev.deltaY<0?0.8:1/0.8; const rel=(ct-v.vt0)/(v.vt1-v.vt0); let span=(v.vt1-v.vt0)*f; planClampWin(ct-rel*span, ct+(1-rel)*span); planRedraw(); };

  svg.onmousedown=function(ev){ const {vbX}=vpos(ev); _planDrag={x0:vbX, t0w:window.PLAN.win.t0, t1w:window.PLAN.win.t1, pan:(window.PLAN.panMode||ev.shiftKey), moved:false}; };
  svg.ondblclick=function(){ planResetZoom(); };

  svg.onmousemove=function(ev){ const v=window.PLAN.view; const {vbX,fx,cw}=vpos(ev);
    if(_planDrag){ _planDrag.moved=true;
      if(_planDrag.pan){ const dt=((vbX-_planDrag.x0)/v.IW)*(_planDrag.t1w-_planDrag.t0w); let a=_planDrag.t0w-dt,b=_planDrag.t1w-dt; if(!_planRAF){ _planRAF=requestAnimationFrame(()=>{ planClampWin(a,b); planRedraw(); _planRAF=null; }); } return; }
      else { const x1=Math.min(_planDrag.x0,vbX), x2=Math.max(_planDrag.x0,vbX); cg.innerHTML=`<rect x="${x1.toFixed(1)}" y="${v.PADT}" width="${(x2-x1).toFixed(1)}" height="${(v.topB+v.HB-v.PADT).toFixed(1)}" fill="#5ad0e8" opacity="0.12" stroke="#5ad0e8" stroke-dasharray="3 3"/>`; return; }
    }
    // crosshair
    if(vbX<v.PADL||vbX>v.W-v.PADR){cg.innerHTML='';tip.style.display='none';return;}
    let si=Math.round((timeAt(vbX)-D.t0)/(D.t1-D.t0)*(D.times.length-1)); si=Math.max(0,Math.min(D.times.length-1,si));
    const xx=v.PADL+((D.times[si]-v.vt0)/(v.vt1-v.vt0))*v.IW; if(xx<v.PADL-2||xx>v.W-v.PADR+2){cg.innerHTML='';tip.style.display='none';return;}
    const yB=val=>v.topB+(1-(val-v.lmin)/(v.lmax-v.lmin))*v.HB;
    let dots=''; for(const b of D.bodies){ const val=D.series[b][si]; if(val==null)continue; dots+=`<circle cx="${xx.toFixed(1)}" cy="${yB(val).toFixed(1)}" r="2.6" fill="${PLAN_COL[b]}" stroke="#02141c" stroke-width="0.6"/>`; }
    cg.innerHTML=`<line x1="${xx.toFixed(1)}" y1="${v.PADT}" x2="${xx.toFixed(1)}" y2="${(v.topB+v.HB).toFixed(1)}" stroke="#5ad0e8" stroke-width="0.7" opacity="0.7"/>${dots}`;
    let pr=null,bd=1e15; for(const r of D.ohlc){const dd=Math.abs(r.ms-D.times[si]); if(dd<bd){bd=dd;pr=r;}} if(bd>2*PLAN_DAYMS)pr=null;
    let rows=`<div style="color:#8df7ff;font-weight:700">${planFmtIST(D.times[si])}</div>`;
    if(pr) rows+=`<div style="color:#cde">O ${Math.round(pr.o)} H ${Math.round(pr.h)} L ${Math.round(pr.l)} <b>C ${Math.round(pr.c)}</b></div>`;
    for(const b of D.bodies){ const val=D.series[b][si]; if(val==null)continue; const rr=(D.kind==='lon'&&D.retro[b]&&D.retro[b][si])?' ℞':''; rows+=`<div><span style="color:${PLAN_COL[b]}">${b}</span> ${val.toFixed(2)}°${rr}</div>`; }
    tip.innerHTML=rows; tip.style.display='block'; tip.style.left=Math.min(fx*cw+12,cw-160)+'px'; tip.style.top='8px';
  };
  svg.onmouseup=function(ev){ if(!_planDrag){return;} const v=window.PLAN.view; const {vbX}=vpos(ev);
    if(!_planDrag.pan && _planDrag.moved && Math.abs(vbX-_planDrag.x0)>6){ const a=timeAt(Math.min(_planDrag.x0,vbX)), b=timeAt(Math.max(_planDrag.x0,vbX)); planClampWin(a,b); planRedraw(); }
    _planDrag=null; };
  svg.onmouseleave=function(){ if(_planDrag&&!_planDrag.pan){cg.innerHTML='';} _planDrag=null; tip.style.display='none'; cg.innerHTML=cg.innerHTML; };
}

function planMetrics(){
  const key=planInstKey()+'|'+planRange(); const ohlc=window.PLAN.ohlc[key]; if(!ohlc) return '';
  const last=ohlc[ohlc.length-1].c, first=ohlc[0].c, chg=(last-first)/first*100;
  const t1=ohlc[ohlc.length-1].ms+planFwd()*PLAN_DAYMS; const fdate=planFmtIST(t1).split('  ')[0];
  const nS=Math.max(40,Math.min(1800,Math.round((t1-ohlc[0].ms)/PLAN_DAYMS*4)))+1;
  const card=(l,v,sub,c)=>`<div class="pnl" style="padding:7px 10px;flex:1;min-width:120px"><div style="font-size:8px;color:#5ad0e8;letter-spacing:.07em">${l}</div><div style="font-size:17px;font-weight:800;color:${c||'#e8f6fc'}">${v}</div><div style="font-size:8px;color:#3a8090">${sub}</div></div>`;
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
    ${card(planInstKey(), last.toLocaleString('en-IN',{maximumFractionDigits:2}), (chg>=0?'▲ +':'▼ ')+chg.toFixed(2)+'% in range', chg>=0?'var(--bull)':'var(--bear)')}
    ${card('BARS', ohlc.length, 'trading days', '#8df7ff')}
    ${card('PLANET SAMPLES', nS, '~6h cadence', '#8df7ff')}
    ${card('FORECAST TO', fdate, planFwd()+' days ahead', '#e8c020')}</div>`;
}

    <button onclick="planMinimize()" title="Minimize chart (collapse body)" style="background:${_MIN?'#06303f':'#031a22'};color:${_MIN?'var(--acc)':'#8df7ff'};border:1px solid ${_MIN?'var(--acc)':'#104858'};border-radius:3px;padding:2px 8px;font-family:inherit;font-size:11px;cursor:pointer">${_MIN?'🗗 Restore':'▭ Minimize'}</button>
    <span style="font-size:9px;color:#3a8090;margin-left:6px">drag = ${window.PLAN.panMode?'pan':'box-zoom'} · shift+drag = ${window.PLAN.panMode?'box-zoom':'pan'} · wheel = zoom · dbl-click = reset</span>
  </div>`;
  // conjunction + raw tables (full data, independent of zoom)

      <div class="ts" style="max-height:240px;overflow:auto"><table class="tbl"><thead><tr><th>Date / Time (IST)</th><th>Planet 1</th><th>Planet 2</th><th style="text-align:right">Separation</th></tr></thead><tbody>${rows}</tbody></table></div>${D.conj.length>60?`<div style="font-size:9px;color:#3a8090;padding:4px 12px">Showing first 60 of ${D.conj.length}.</div>`:''}</div>`; }
  let raw=''; const rawOpen=!!S.planRaw; let rawBody='';
  if(rawOpen && D){ const prRows=D.ohlc.slice().reverse().map(r=>`<tr><td>${r.date}</td><td style="text-align:right">${r.o.toFixed(2)}</td><td style="text-align:right">${r.h.toFixed(2)}</td><td style="text-align:right">${r.l.toFixed(2)}</td><td style="text-align:right;color:#cde">${r.c.toFixed(2)}</td></tr>`).join('');
    let plRows=''; for(let ms=D.t1; ms>=D.t0; ms-=PLAN_DAYMS){ const J=planJDfromMs(ms); let tds=''; for(const b of D.bodies){ const v=kind==='lat'?geoLat(b,J):n360(geoLon(b,J)); const rr=(kind==='lon'&&((b==='Rahu'||b==='Ketu')||(b!=='Sun'&&b!=='Moon'&&planetSpeed(b,J)<0)))?'<span style="color:var(--bear)">℞</span>':''; tds+=`<td style="text-align:right;color:${PLAN_COL[b]}">${v.toFixed(2)}°${rr}</td>`; } plRows+=`<tr><td>${planISO(ms)}</td>${tds}</tr>`; }

  raw=`<div class="pnl" style="margin-top:10px"><div class="ph" style="cursor:pointer" onclick="gs({planRaw:${!rawOpen}})"><span class="dot"></span>${rawOpen?'▾':'▸'} RAW DATA — prices &amp; planet positions ${rawOpen?'(click to hide)':'(click to show)'}</div>${rawBody}</div>`;

  return `<div id="plan-host" style="${_hostStyle}">${toolbar}${_chartBody}</div>`;
}

// ═══════════════════════════════════════════════════════════════════
function tCharts(){
  const D=DATA;
  const lagnaS=D.ascSign.s;
  const d9LagnaS=getD9(D.ascSid);
  const CS=130;   // chart cell — 520×520 chart, leaves clean room for side panel

  function makeChart(pArr,lagS,title){
    const HM={1:[1,0],2:[2,0],3:[3,0],4:[3,1],5:[3,2],6:[3,3],7:[2,3],8:[1,3],9:[0,3],10:[0,2],11:[0,1],12:[0,0]};
    const sz=CS*4;
    let s=`<svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">`;
    s+=`<rect width="${sz}" height="${sz}" fill="#010c12" rx="6" stroke="#1c6080" stroke-width="2"/>`;
    for(let h=1;h<=12;h++){
      const[r,c]=HM[h];const x=c*CS,y=r*CS;
      const sIdx=((lagS+h-2)%12+12)%12;
      const pH=pArr.filter(p=>(p.h||p.house)===h);
      const ang=[1,4,7,10].includes(h);
      s+=`<rect x="${x+.5}" y="${y+.5}" width="${CS-1}" height="${CS-1}" fill="${ang?'#022838':'#011a26'}" stroke="#1c5070" stroke-width="1"/>`;
      // Bright house number top-left
      s+=`<text x="${x+8}" y="${y+22}" fill="${ang?'#5ad0e8':'#3a9ab8'}" font-size="15" font-weight="bold" font-family="Courier New">${h}</text>`;
      // Bright sign label top-center
      s+=`<text x="${x+CS/2+4}" y="${y+22}" text-anchor="middle" fill="${ang?'#ffc107':'#cc8800'}" font-size="14" font-weight="bold" font-family="Courier New">${SABB[sIdx]}</text>`;
      // Planets: 2-col grid with comfortable spacing
      pH.forEach((p,i)=>{
        const col2=i%2,row2=Math.floor(i/2);
        s+=`<text x="${x+10+col2*(CS/2-2)}" y="${y+50+row2*22}" fill="${PC[p.name]||'#7ecad8'}" font-size="17" font-weight="bold" font-family="Courier New">${p.abbr}${Math.floor(p.deg||0).toString().padStart(2,'0')}${p.retro?'<tspan fill="#ff5566" font-size="13">℞</tspan>':''}</text>`;
      });
    }
    s+=`<line x1="0" y1="0" x2="${CS}" y2="${CS}" stroke="#1c5070" stroke-width="1"/>`;
    s+=`<line x1="${sz}" y1="0" x2="${sz-CS}" y2="${CS}" stroke="#1c5070" stroke-width="1"/>`;
    s+=`<line x1="0" y1="${sz}" x2="${CS}" y2="${sz-CS}" stroke="#1c5070" stroke-width="1"/>`;
    s+=`<line x1="${sz}" y1="${sz}" x2="${sz-CS}" y2="${sz-CS}" stroke="#1c5070" stroke-width="1"/>`;
    s+=`<rect x="${CS}" y="${CS}" width="${2*CS}" height="${2*CS}" fill="#010a10" stroke="#1c5070" stroke-width="1"/>`;
    s+=`<text x="${2*CS}" y="${1.72*CS}" text-anchor="middle" fill="#00e8ff" font-size="34" font-weight="bold" font-family="Courier New">${title}</text>`;
    s+=`<text x="${2*CS}" y="${2*CS}" text-anchor="middle" fill="#5ad0e8" font-size="17" font-weight="bold" font-family="Courier New">${SABB[lagS]} Lagna</text>`;
    s+=`<text x="${2*CS}" y="${2.18*CS}" text-anchor="middle" fill="#3a9ab8" font-size="14" font-family="Courier New">${S.date}</text>`;
    return s+'</svg>';
  }

  const d9Planets=D.planets.map(p=>({name:p.name,abbr:p.abbr,retro:p.retro,s:p.d9Sign,deg:undefined}));

  // Compact 4-col house-occupancy grid (was 12-row vertical list)
  const houseOcc = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px 8px">
      ${Array.from({length:12},(_,i)=>{
        const h=i+1,ps=D.planets.filter(p=>wsHouse(p.s,lagnaS)===h);
        return`<div style="display:flex;gap:4px;align-items:baseline">
          <span style="color:#5ad0e8;font-size:11px;font-weight:700;min-width:22px">H${h}</span>
          <span style="font-size:12px">${ps.length?ps.map(p=>`<span style="color:${PC[p.name]};font-weight:700">${p.abbr}</span>`).join(' '):'<span style="color:var(--tx3)">—</span>'}</span>
        </div>`;
      }).join('')}
    </div>`;

  // Compact navamsa-strength as 3-col grid instead of full table
  const navStr = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px 10px">
      ${D.planets.slice(0,9).map(p=>{
        const vm=p.s===p.d9Sign;
        return`<div style="display:flex;gap:5px;align-items:baseline;font-size:11px">
          <span style="color:${PC[p.name]};font-weight:700;min-width:24px">${p.abbr}</span>
          <span style="color:var(--tx1)">${p.sign.slice(0,3)}→${SIGNS[p.d9Sign].slice(0,3)}</span>
          ${vm?'<span style="color:var(--bull);font-weight:700" title="Vargottama">★</span>':''}
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:9px;color:var(--tx3);margin-top:6px">★ = Vargottama (same sign in D1 & D9)</div>`;

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="pnl">
      <div class="ph"><span class="dot"></span>D1 — LAGNA CHART · IST ${mtt(parseFloat(S.time)*60)}</div>
      <div class="pb">

// vedha-line marching vectors per edge: front / left(शीघ्री) / right(वक्री)
const SBC_VEC={E:{front:[1,0],left:[1,1],right:[1,-1]},S:{front:[0,-1],left:[1,-1],right:[-1,-1]},
               W:{front:[-1,0],left:[-1,-1],right:[-1,1]},N:{front:[0,1],left:[-1,1],right:[1,1]}};
function sbcLineCells(ringKey,dir){
  const p=SBC_RINGPOS[ringKey]; if(!p)return[];
  const v=SBC_VEC[p.edge][dir]; const cells=[]; let r=p.r,c=p.c;
  for(let k=0;k<9;k++){ r+=v[0]; c+=v[1];
    if(r<0||r>8||c<0||c>8)break;
    cells.push(r+','+c);
    if(r===0||r===8||c===0||c===8)break; }
  return cells;
}
function sbcCornerLine(corner){
  const dr=corner[0]===0?1:-1, dc=corner[1]===0?1:-1; const cells=[];
  let r=corner[0],c=corner[1];
  for(let k=0;k<8;k++){ r+=dr; c+=dc; if(r<0||r>8||c<0||c>8)break; cells.push(r+','+c); }
  return cells;
}
// offset parallel vedha rays that share origin+direction (co-located grahas)
function sbcOffsetLine(x1,y1,x2,y2,idx,total,sp){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const off=(idx-(total-1)/2)*sp;
  const px=(-dy/len)*off, py=(dx/len)*off;
  return [x1+px,y1+py,x2+px,y2+py];
}
const SBC_RINGKEY_AT={}; Object.keys(SBC_RINGPOS).forEach(k=>{const p=SBC_RINGPOS[k]; SBC_RINGKEY_AT[p.r+','+p.c]=(k==='AB')?'AB':+k;});
// गति → वेध-दिशा. speed = signed °/day (retro<0). TWO book readings, toggled by window.SBC_DIR_MODE:
//   'found' (DEFAULT) = Foundational SBC, Ch.2 pp.29-52 (the chapter this engine implements):
//       Sun · Moon (सदा मार्गी) and Rahu · Ketu (सदा वक्री) have NO directional change in their
//       motion ⇒ they pierce ALL THREE directions at once (वाम+सम्मुख+दक्षिण). The 5 star-planets:
//       वक्री(retro)→Right, शीघ्री(faster than mean)→Left, मध्यचारी(mean-or-slower)→Front.
//   'argha' = Argha-Kanda pp.413-416 (preserved via toggle — old rule, NOT removed):
//       Sun/Moon never Right; Rahu/Ketu Right-only; 5 planets with अतिशीघ्र/अतिमन्द sub-bands.
function sbcGati(name,speed){
  const _argha = (typeof window!=='undefined' && window.SBC_DIR_MODE==='argha');
  if(!_argha){
    // ── Foundational SBC (Ch.2) — ACTIVE DEFAULT ──
    if(name==='Sun'||name==='Moon'||name==='Rahu'||name==='Ketu')
      return {gati:'सर्वदिक्',dirs:['left','front','right']};                              // all 3 — speed never changes their direction
    if(speed<0) return {gati:'वक्री',dirs:['right']};                                      // 5 star-planets: retro → Right
    const mean=SBC_MEAN_MOTION[name];
    return (speed>mean) ? {gati:'शीघ्री',dirs:['left']} : {gati:'मध्यचारी',dirs:['front']}; // faster-than-mean → Left, else Front
  }
  // ── Argha-Kanda pp.413-416 (toggle / preserved) ──
  if(name==='Rahu'||name==='Ketu') return {gati:'सदा वक्री',dirs:['right']};
  if(name==='Sun'||name==='Moon'){ const mean=SBC_MEAN_MOTION[name];
    return Math.abs(speed)>mean ? {gati:'शीघ्री',dirs:['left']} : {gati:'मध्यचारी',dirs:['front']}; }
  if(speed<0) return {gati:'वक्री',dirs:['right']};
  const mean=SBC_MEAN_MOTION[name], maxF=SBC_MAX_FAST[name];
  if(speed >= mean+(2/3)*(maxF-mean)) return {gati:'अतिशीघ्री',dirs:['left']};
  if(speed <= mean/3)                 return {gati:'अतिमन्द',dirs:[]};
  return {gati:'मध्यचारी',dirs:['front']};
}

// §4b उच्चबल in kala': |lon − परम नीच| ÷3 (read as minutes) + 30'  → 30..90'  [Sun example p.412 → 50'51"]
function sbcUcchaBala(name,lonSid){ const u=SBC_UCCHA[name]; if(!u)return 30;
  const exalt=u[0]*30+u[1], debil=n360(exalt+180);
  let d=Math.abs(n360(lonSid)-debil); if(d>180)d=360-d; return d/3+30; }
// fractional उच्चबल 0.5..1.0 (kept for callers needing a ratio)
function sbcUcchaFrac(name,lonSid){ return (sbcUcchaBala(name,lonSid)-30)/60+0.5; }
const _REL_MULT={Own:4,Friend:3,Neutral:2,Enemy:1};
// §4c-4d क्षेत्रबल (easy method): x=sign-deg; val=(x≤15?x:30-x); ×{own4 fr3 neu2 en1} → 0..60  [Sun Leo own → 29'43"]
function sbcKshetraBala(name,lon){ const sign=Math.floor(n360(lon)/30), deg=n360(lon)%30;
  const val=deg<=15?deg:30-deg; return val*_REL_MULT[sbcRel(name,SLRD[sign])]; }
// §4 नवांशबल: 200 kala/navamsha; full(60) at 100-kala midpoint in own/friend navamsha
function sbcNavamshaBala(name,lon){ const d9=getD9(lon);
  const k=(n360(lon)%(30/9))*60, val=k<=100?k:200-k; return val*0.15*_REL_MULT[sbcRel(name,SLRD[d9])]; } // 100·.15·4=60
// §4b वक्रबल: full at retro-midpoint; Sun/Moon 0, Rahu/Ketu full (always retro)
function sbcVakraBala(name,speed){ if(name==='Sun'||name==='Moon')return 0;
  if(name==='Rahu'||name==='Ketu')return 60;
  return speed<0 ? 60*Math.min(1,Math.abs(speed)/SBC_MEAN_MOTION[name]) : 0; }
// §4b उदयबल: Sun full; Rahu/Ketu 0; else ∝ elongation from Sun (rising/visibility proxy)
function sbcUdayaBala(name,lon,sunSid){ if(name==='Sun')return 60; if(name==='Rahu'||name==='Ketu')return 0;
  let e=Math.abs(n360(lon)-n360(sunSid)); if(e>180)e=360-e; return 60*Math.min(1,e/180); }
// §4a total बल = क्षेत्र+उच्च+नवांश+वक्र+उदय. Strongest among a त्रिक candidate-set = the lord at that moment.
function sbcBala(p,sunSid){ const speed=(p.speed!==undefined)?p.speed:0;
  const k=sbcKshetraBala(p.name,p.lon), u=sbcUcchaBala(p.name,p.lon), n=sbcNavamshaBala(p.name,p.lon),
        v=sbcVakraBala(p.name,speed), d=sbcUdayaBala(p.name,p.lon,sunSid);
  return {kshetra:k,uccha:u,navamsha:n,vakra:v,udaya:d,total:k+u+n+v+d}; }
function sbcTriadLord(cands,planets){ let best=null,bb=-1;
  for(const nm of cands){ const p=planets.find(x=>x.name===nm); if(!p)continue;
    const b=p.bala?p.bala.total:0; if(b>bb){bb=b;best=nm;} }
  return {lord:best,bala:Math.round(bb*10)/10}; }

const SBC_TRAVERSAL=[].concat(SBC_EAST,SBC_SOUTH,SBC_WEST,SBC_NORTH);

// SHRINGONNATI — Moon Horn Elevation  (Varahamihira / Key to SBC)
// ───────────────────────────────────────────────────────────────────
// "The Moon alone is the provider of strength to all the planets.
//  The essence of the Moon's motion resides in its Shringonnati."
//     — Brihad Ratna Manjusha, verse 5
//
// Observed on Shukla Dvitiya (2nd waxing day) each month.
// Sets the MONTHLY directional bias for ALL vedha analysis:
//   Vama Shringa   (Left  horn ↑) → MANDI (bearish) bias
//   Dakshina Shringa (Right horn ↑) → TEJI  (bullish) bias
//
// When Shringonnati agrees with Vedha → Full result
// When Shringonnati diverges from Vedha → Half result  (verse 20)
// ───────────────────────────────────────────────────────────────────

// RA in degrees (0–360) from ecliptic longitude + latitude
function eclToRA(lonDeg, latDeg, J){
  const D=Math.PI/180, T=(J-2451545.0)/36525;
  const eps=(23.4392911-0.0130042*T)*D;
  const lon=lonDeg*D, lat=latDeg*D;
  const ra=Math.atan2(Math.sin(lon)*Math.cos(eps)-Math.tan(lat)*Math.sin(eps), Math.cos(lon));
  return ((ra*180/Math.PI)+360)%360;
}

// Core Shringonnati computation at Julian Day J for observer at (obsLat, obsLon)
// Returns: {vama, dakshina, signal, horn, magnitude, chi, q, eta}
function computeShringonnati(J, obsLat, obsLon){
  const D2R=Math.PI/180, R2D=180/Math.PI;
  // Ecliptic positions
  const moonLon=geoLon('Moon',J), moonLat=geoLat('Moon',J);
  const sunLon =geoLon('Sun', J);
  // Equatorial
  const moonDec=declination('Moon',J)*D2R, sunDec=declination('Sun',J)*D2R;
  const moonRA =eclToRA(moonLon,moonLat,J),  sunRA=eclToRA(sunLon,0,J); // degrees

  // Position angle of bright limb (χ) — from north, increasing eastward
  // = direction from Moon toward Sun in the celestial sphere
  const dRA=(sunRA-moonRA)*D2R;
  const chi=Math.atan2(
    Math.cos(sunDec)*Math.sin(dRA),
    Math.sin(sunDec)*Math.cos(moonDec)-Math.cos(sunDec)*Math.sin(moonDec)*Math.cos(dRA)
  )*R2D;

  // Local Sidereal Time (GMST + longitude)
  const Dd=J-2451545.0;
  const LST=((18.697374558+24.06570982441908*Dd)%24+obsLon/15+24)%24; // hours
  // Moon's Hour Angle (degrees; positive = west of meridian)
  let HA=((LST*15-moonRA)+360)%360; if(HA>180) HA-=360;
  const HA_r=HA*D2R;

  // Parallactic angle (q) — position angle of zenith as seen from the Moon
  const phi=obsLat*D2R;
  const q=Math.atan2(Math.sin(HA_r),Math.tan(phi)*Math.cos(moonDec)-Math.sin(moonDec)*Math.cos(HA_r))*R2D;

  // North horn is at PA = chi + 90°
  // It is ELEVATED (above local horizontal) iff cos((chi + 90) − q) > 0
  const eta=chi+90-q;
  const vamaElevated=Math.cos(eta*D2R)>0;
  const magnitude=Math.round(Math.abs(Math.cos(eta*D2R))*100);
  return {
    chi:Math.round(chi*10)/10, q:Math.round(q*10)/10, eta:Math.round(eta*10)/10,
    vama:vamaElevated, dakshina:!vamaElevated,
    signal:vamaElevated?'MANDI':'TEJI',
    horn  :vamaElevated?'वाम श्रृंग (Left ↑)':'दक्षिण श्रृंग (Right ↑)',
    magnitude
  };
}

// Find the most recent Shukla Dvitiya and compute Shringonnati at evening observation time
function sbcShringonnati(currentJ, ayMode, loc){
  const tz=loc.tz||5.5;
  const MNAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(let d=0;d<=33;d++){
    const testJ=currentJ-d;
    const ay=getAyanamsa(testJ,ayMode);
    const sunSid =n360(geoLon('Sun', testJ)-ay);
    const moonSid=n360(geoLon('Moon',testJ)-ay);
    const tith=tithiCompute(sunSid,moonSid);
    if(tith.paksha==='Shukla'&&tith.inPaksha===2){
      // Observation time: 19:15 local (Moon ~20° above western horizon, optimal for Dvitiya)
      const obsIST=19.25-tz+5.5;   // convert local → IST for JD()
      const dt=jdToDate(testJ);
      const yr=dt.getUTCFullYear(), mo=dt.getUTCMonth()+1, dy=dt.getUTCDate();
      const dvitiyaJ=JD(yr,mo,dy,obsIST);
      const dvitiyaDate=`${dy} ${MNAMES[mo-1]} ${yr}`;
      const shr=computeShringonnati(dvitiyaJ, loc.lat, loc.lon);
      return {...shr, dvitiyaDate, dvitiyaJ, daysAgo:d};
    }
  }
  return null;
}

// per-moment snapshot of the 9 grahas with गति, वेध-lines & pierced cells
function sbcSnapshot(J,ayMode,gatiCache){
  const ay=getAyanamsa(J,ayMode);
  const sunSid=n360(geoLon('Sun',J)-ay), moonSid=n360(geoLon('Moon',J)-ay);
  const tith=tithiCompute(sunSid,moonSid);
  const moonKrura=(tith.num>=26||tith.num<=5);   // क्षीण चन्द्र (Krishna-11 → Shukla-5)
  const planets=SBC_GRAHAS.map(name=>{
    const lon=(name==='Sun')?sunSid:(name==='Moon')?moonSid:n360(geoLon(name,J)-ay);
    const sign=Math.floor(lon/30), d9=getD9(lon), nak=getNak(lon);
    const speed=(gatiCache&&gatiCache[name]!==undefined)?gatiCache[name]:planetSpeed(name,J);
    const g=sbcGati(name,speed);                    // §2c-2e Argha-Kanda direction
    return {name,lon,sign,d9,nak,speed,gati:g.gati,dirs:g.dirs};
  });
  planets.forEach(p=>{ p.bala=sbcBala(p,sunSid); }); // §4 five-fold बल for lord selection
  planets.forEach(p=>{
    // §5a सौम्य/क्रूर — base nature only. Argha-Kanda: बुध never turns क्रूर, चन्द्र stays सौम्य
    p.krura=SBC_KRURA_BASE.has(p.name); p.saumya=!p.krura;
    const ringKey=p.nak.idx; p.ringKey=ringKey;
    const cells=new Set(), nakHits=new Set(), lines=[];
    for(const d of p.dirs){ const cs=sbcLineCells(ringKey,d); if(cs.length){lines.push({dir:d,cells:cs});
      cs.forEach(cc=>{cells.add(cc); if(SBC_RINGKEY_AT[cc]!==undefined)nakHits.add(SBC_RINGKEY_AT[cc]);});}}
    // §2f कोण-वेध (Damodara refinement): pada-4 pierces corner only if मार्गी, pada-1 only if वक्री; पूर्णा तिथि by both
    const trig=SBC_CORNER_TRIG[ringKey]; let cornerOK=false;
    if(trig&&p.nak.pada===trig.pada){
      if(typeof window!=='undefined' && window.SBC_DIR_MODE==='argha'){ const margi=p.speed>=0;   // Argha/Damodara refinement (toggle)
        cornerOK = trig.pada===4 ? margi : trig.pada===1 ? !margi : true; }
      else cornerOK=true;   // Foundational SBC: कोण-वेध is gati-nirapeksha (motion-independent) — book p.27 / pp.1316-1317
    }
    p.cornerVedha=cornerOK;
    if(cornerOK){ const cs=sbcCornerLine(trig.corner); lines.push({dir:'corner',cells:cs,corner:trig.corner});
      cs.forEach(cc=>{cells.add(cc); if(SBC_RINGKEY_AT[cc]!==undefined)nakHits.add(SBC_RINGKEY_AT[cc]);});
      cells.add(SBC_TITHI_CELL.PURNA); }                                   // §2f corner also pierces पूर्णा तिथि
    p.sthitija=SBC_STHITIJA[ringKey]||null;                                // §2g positional vedha अनुक्त letters
    const opp=sbcOppRing(ringKey); p.navaVedha=(opp!==null)?{ring:opp,pada:5-p.nak.pada}:null; // §2i navamsha-vedha
    p.pierced=cells; p.nakHits=nakHits; p.lines=lines;
  });
  // ── जय-पराजय (Jaya-Parajaya, COMPLETE-edition §नवांश-वेध, p.224) ──────────────
  //   When 2+ grahas share the SAME nakshatra-charana (nak idx + pada), ONLY the
  //   victor casts vedha; the defeated co-locants yield NO vedha-phala. Victor by
  //   क्रान्ति/शर: उत्तर (north) beats दक्षिण (south); both-north → अधिकांशी (higher°)
  //   wins; both-south → न्यूनांशी (lower°) wins — all three reduce to GREATEST
  //   signed declination. [NEW rule — was absent from the engine; additive only.]
  const _jpGroups={};
  planets.forEach(p=>{ const key=p.nak.idx+','+p.nak.pada; (_jpGroups[key]=_jpGroups[key]||[]).push(p); });
  const jayaParajaya=[];
  for(const key in _jpGroups){ const grp=_jpGroups[key]; if(grp.length<2) continue;
    grp.forEach(p=>{ const dc=declination(p.name,J); p._decl=(typeof dc==='number'&&!isNaN(dc))?dc:0; });
    let victor=grp[0]; for(const p of grp){ if(p._decl>victor._decl) victor=p; }
    grp.forEach(p=>{ if(p!==victor) p.defeated=true; });
    jayaParajaya.push({pada:key, victor:victor.name, decl:Math.round(victor._decl*100)/100,
                       defeated:grp.filter(p=>p!==victor).map(p=>p.name)});
  }
  return {J,ay,tith,planets,moonKrura,sunSid,jayaParajaya};
}
function sbcDrishtiFrac(p,targetSign){ // classical drishti-pada chart (book p.45) + own-navamsha rule
  if(p.d9===targetSign) return 1;                      // अपने नवांश पर सदैव पूर्ण दृष्टि
  const hs=((targetSign-p.sign+12)%12)+1;
  if(hs===7)return 1;
  if(hs===4||hs===8) return (p.name==='Mars')?1:0.75;
  if(hs===5||hs===9) return (p.name==='Jupiter')?1:0.5;
  if(hs===3||hs===10)return (p.name==='Saturn')?1:0.25;
  return 0;
}
function sbcLordOf(rashi,planets){ // Virgo: Mercury|Rahu, Pisces: Jupiter|Ketu — stronger by बल (p.39)
  const co= rashi===5?['Mercury','Rahu'] : rashi===11?['Jupiter','Ketu'] : null;
  if(!co) return SLRD[rashi];
  const a=planets.find(p=>p.name===co[0]), b=planets.find(p=>p.name===co[1]);
  const ba=a&&a.bala?a.bala.total:0, bb=b&&b.bala?b.bala.total:0;
  return ba>=bb?co[0]:co[1];
}
// ── tithiToGroup: tithi inPaksha (1-15) → NANDA/BHADRA/JAYA/RIKTA/PURNA ──
function tithiToGroup(inPaksha){
  const t=inPaksha;
  if(t===1||t===6||t===11) return 'NANDA';
  if(t===2||t===7||t===12) return 'BHADRA';
  if(t===3||t===8||t===13) return 'JAYA';
  if(t===4||t===9||t===14) return 'RIKTA';
  return 'PURNA'; // 5,10,15(Purnima/Amavasya)
}

// ── sbcCalcPanchak: check vedha on ONE panchak (5 limbs) by all planets ─────
// panchak = {varnaCell, svaraCell, tithiGrp, nakRing, nakPada, rashi}
// lord    = the तेजी/मंदी reference lord (पण्य-त्रिक lord of the instrument)
// returns {rows, teji, mandi, net, moonFlip}
function sbcCalcPanchak(P, panchak, lord, tithiWorth, opts){
  const _cascadeOff=!!(opts&&opts.cascadeOff);
  // memoised letter helpers
  if(!sbcCalcPanchak._m){ const m={}; for(const k in SBC_AK)m[SBC_AK[k][1]]=k;
    const ch={}; for(const par in SBC_UNUKTA_PARENT)SBC_UNUKTA_PARENT[par].forEach(c=>ch[c]=par);
    sbcCalcPanchak._m=m; sbcCalcPanchak._ch=ch; }
  const cellOf=sbcCalcPanchak._m, childOf=sbcCalcPanchak._ch;
  const tithiCell = SBC_TITHI_CELL[panchak.tithiGrp]||null;
  const rashiCell = (panchak.rashi!=null) ? SBC_RASHI_CELL[panchak.rashi] : null;
  const baseLetter=(SBC_AK[panchak.varnaCell]||[])[1]||null;
  const eqCell    = baseLetter&&SBC_PHON_EQ[baseLetter] ? cellOf[SBC_PHON_EQ[baseLetter]] : null;
  const parentCell= baseLetter&&childOf[baseLetter]     ? cellOf[childOf[baseLetter]]     : null;
  const navSign   = (typeof panchak.nakRing==='number') ? ((panchak.nakRing*4+(panchak.nakPada-1))%12) : -1;

  const rows=[];
  for(const p of P){
    if(p.defeated) continue;
    // वर्ण: direct · phonetic-equiv · अनुक्त-parent · sthitija
    let varna=p.pierced.has(panchak.varnaCell), varnaVia='';
    if(!varna&&eqCell&&p.pierced.has(eqCell)){varna=true;varnaVia='≡';}
    if(!varna&&parentCell&&p.pierced.has(parentCell)){varna=true;varnaVia='अनुक्त';}
    if(!varna&&p.sthitija&&baseLetter&&p.sthitija.includes(baseLetter)){varna=true;varnaVia='∝';}
    // तिथि (evaluated first — drives the cascade)
    const tithi = tithiCell ? p.pierced.has(tithiCell) : false;
    // नक्षत्र: direct · navamsha-vedha
    let nak=p.nakHits.has(panchak.nakRing), nakVia='';
    if(!nak&&p.navaVedha&&p.navaVedha.ring===panchak.nakRing&&p.navaVedha.pada===panchak.nakPada
        &&navSign>=0&&sbcDrishtiFrac(p,navSign)>0){nak=true;nakVia='नवांश';}
    // राशि
    const rashi = rashiCell ? p.pierced.has(rashiCell) : false;

    // ── TITHI-VEDHA CASCADE (book rule, one-directional) ──────────────────
    // If this planet's nakshatra vedhas the TITHI cell of the panchak, it
    // simultaneously casts vedha on ALL 5 Varnādi limbs of that row.
    // Cascade fires only from tithi→others; vedha on varna/svara/nak/rashi
    // does NOT cascade back to tithi.
    const tithiCascade = !_cascadeOff && !!(tithiCell && p.pierced.has(tithiCell));
    if(tithiCascade){
      varna=true; if(!varnaVia) varnaVia='तिथि-वेध';
      nak=true;   if(!nakVia)   nakVia='तिथि-वेध';
    }
    const svara  = tithiCascade || p.pierced.has(panchak.svaraCell);
    const rashiF = tithiCascade || rashi;

    const angas={varna, svara, tithi, nak, rashi:rashiF, tithiCascade};
    // when cascade fires: n = all 5 limbs (4 binary + tithi-worth)
    const n = tithiCascade ? 4+tithiWorth
            : (varna?1:0)+(svara?1:0)+(nak?1:0)+(rashiF?1:0)+(tithi?tithiWorth:0);
    if(n<=0) continue;

    // दृष्टि gate — on the panchak's rashi
    const sight = (panchak.rashi!=null) ? sbcDrishtiFrac(p,panchak.rashi) : 1;
    // सम्बन्ध: casting (Vedhakarta) planet's relationship with the trika lord
    // "the casting planet, which is separate from the lord, holds with these lords" (book p.240)
    const relRaw=sbcRel(p.name,lord);
    const rel=relRaw==='Own'?'स्वामी':relRaw==='Friend'?'मित्र':relRaw==='Enemy'?'शत्रु':'सम';
    const asp= p.saumya ? {'स्वामी':1,'मित्र':0.75,'सम':0.5,'शत्रु':0.25}[rel]
                        : {'स्वामी':0.25,'मित्र':0.5,'सम':0.75,'शत्रु':1}[rel];
    // §4 actual 5-fold बल (book method) — replaces crude saumya?5:4 base
    const base=(p.bala&&p.bala.total>0) ? p.bala.total/60 : (p.saumya?5:4);
    // §8 चन्द्र-बल: Moon's entire vishva halved in Krishna paksha (all cells, not just tithi)
    const moonKrishnaFactor = (p.name==='Moon' && tithiWorth<1) ? 0.5 : 1;
    const vishva=Math.round(base*(n/5)*asp*sight*moonKrishnaFactor*100)/100;
    rows.push({planet:p.name,gati:p.gati,bala:p.bala?Math.round(p.bala.total*10)/10:0,
               corner:p.cornerVedha,angas,n,sight,asp,rel,saumya:p.saumya,vishva,
               via:{varna:varnaVia,nak:nakVia},side:p.saumya?'mandi':'teji',tithiCascade});
  }
  // ── Snapshot base vishvas BEFORE chain (for pre/post comparison in display) ──
  rows.forEach(r=>{ r._bv=r.vishva; r._bs=r.side; });

  // ── VEDHA-PARAMPARA CHAIN (Varahamihira, Key to SBC, verses 7–14) ────────────
  // UNIVERSAL rule — applies to ALL planets at L1, not just Moon (verse 9).
  // Sanskrit: "Tadvedhivedhikhetanamapi jatibaladikam" = "Of the vedha-casters
  // of the vedha-casters also, evaluate nature, strength, etc."
  //
  // For every L1 planet (direct panchak vedha-caster):
  //   L2 = planets whose SBC vedha lines reach the L1 planet's own nakshatra ring
  //   L3 = planets whose SBC vedha lines reach any L2 planet's nakshatra ring
  //   Max depth = 3 (verse 9: "samarthyam tatah param")
  //
  // Chain modifier on L1's Vishva:
  //   L2 same nature as L1 → amplify (+25% per planet)
  //   L2 opposite nature   → weaken (−25% per planet)
  //   Moon at L2           → exceptional boost 1.5× (verse 12: "baladhikyam")
  //   Moon at L3           → lesser boost 1.25× (verse 12: "kevalam alpam")
  //
  // Moon-at-L1 special case (verses 7–11): malefics in L2 behind Moon
  //   shift Moon's result toward Teji (opposite to Moon's saumya side):
  //   1 malefic + 1 benefic at L2 → slight Teji (×1.1)
  //   1 malefic only at L2        → Teji pressure (×1.25)
  //   2+ malefics at L2           → 50% more Teji (×1.5) [verse 8 explicit]

  const _moonP = P.find(p=>p.name==='Moon');

  for(const row of rows){
    const l1p = P.find(p=>p.name===row.planet);
    if(!l1p) continue;

    // L2: planets whose SBC vedha lines reach L1's nakshatra ring
    const l2 = P.filter(p=>p.name!==row.planet && !p.defeated && p.nakHits.has(l1p.nak.idx));
    if(!l2.length){ row.chain={l2:[],l3:[],boost:1,note:''}; continue; }

    // L3: planets whose SBC vedha lines reach any L2 planet's nakshatra ring
    const l2Names = new Set(l2.map(p=>p.name));
    const l3=[]; const l3Names=new Set();
    for(const l2p of l2){
      for(const p of P){
        if(p.name===row.planet||l2Names.has(p.name)||l3Names.has(p.name)||p.defeated) continue;
        if(p.nakHits.has(l2p.nak.idx)){ l3.push({planet:p,via:l2p.name}); l3Names.add(p.name); }
      }
    }

    // Moon's position in this chain
    const moonL2 = l2.find(p=>p.name==='Moon');
    const moonL3 = !moonL2 && l3.find(x=>x.planet.name==='Moon');

    // Non-Moon L2: same nature vs opposite nature relative to L1
    const l2NonMoon  = l2.filter(p=>p.name!=='Moon');
    const l2Same     = l2NonMoon.filter(p=>p.saumya===row.saumya).length;
    const l2Opp      = l2NonMoon.filter(p=>p.saumya!==row.saumya).length;

    let boost=1.0; const parts=[];

    // ── Moon special amplification (verses 12–13) ──
    if(moonL2){
      boost*=1.5; parts.push('🌙 Moon@L2 ×1.5 (exceptional)');
    } else if(moonL3){
      boost*=1.25; parts.push(`🌙 Moon@L3 via ${moonL3.via} ×1.25 (lesser)`);
    }

    // ── General same/opposite nature modifiers at L2 (non-Moon) ──
    if(l2Same>0){ const f=1+l2Same*0.25; boost*=f; parts.push(`${l2Same}×same-L2 ×${f.toFixed(2)}`); }
    if(l2Opp>0) { const f=Math.max(0.25,1-l2Opp*0.25); boost*=f; parts.push(`${l2Opp}×opp-L2 ×${f.toFixed(2)}`); }

    // ── Moon-at-L1 special case: malefics behind Moon → Teji shift ──
    if(row.planet==='Moon'){
      const nMal=l2.filter(p=>!p.saumya).length, nBen=l2.filter(p=>p.saumya).length;
      if(nMal>=2){
        boost*=1.5; parts.push('2+ malefics@L2 vedha Moon → Teji×1.5 (v.8)'); row.chainFlipToTeji=true;
      } else if(nMal===1&&nBen>=1){
        boost*=1.1; parts.push('mixed L2 vedha Moon → slight Teji×1.1'); row.chainFlipToTeji=true;
      } else if(nMal===1){
        boost*=1.25; parts.push('1 malefic@L2 vedha Moon → Teji×1.25'); row.chainFlipToTeji=true;
      } else {
        parts.push('benefics@L2 vedha Moon → Mandi confirmed');
      }
    }

    boost=Math.round(boost*100)/100;
    row.chain={
      l2: l2.map(p=>({planet:p.name,saumya:p.saumya})),
      l3: l3.map(x=>({planet:x.planet.name,saumya:x.planet.saumya,via:x.via})),
      moonAtL2: moonL2?'Moon':null, moonAtL3: moonL3?moonL3.planet.name:null,
      boost, note: parts.join(' · ')
    };
    if(boost!==1.0){
      row.vishvaBase=row.vishva;
      row.vishva=Math.round(row.vishva*boost*100)/100;
    }
    // Moon-L1 flip to Teji when malefics dominate the L2 chain
    if(row.chainFlipToTeji && row.side==='mandi'){ row.side='teji'; row.chainFlipped=true; }
  }

  // chain summary for display
  const chainRows   = rows.filter(r=>r.chain&&(r.chain.l2.length>0));
  const moonInChain = rows.some(r=>r.chain&&(r.chain.moonAtL2||r.chain.moonAtL3));

  // चन्द्र exception: Moon co-piercing with पाप → तेजी side
  const moonRow=rows.find(r=>r.planet==='Moon'&&r.saumya&&r.vishva>0);
  const kruraActive=rows.some(r=>!r.saumya&&r.vishva>0);
  let moonFlip=false;
  if(moonRow&&kruraActive){moonRow.side='teji';moonRow.flip=true;moonFlip=true;}
  // ── Final tally: chain-adjusted net ────────────────────────────────────────
  let mandi=0,teji=0;
  rows.forEach(r=>{if(r.side==='mandi')mandi+=r.vishva;else teji+=r.vishva;});
  mandi=Math.round(mandi*100)/100; teji=Math.round(teji*100)/100;
  const net=Math.round((teji-mandi)*100)/100;
  // Pre-chain base net (using snapshot taken before chain loop)
  let mandiBase=0,tejiBase=0;
  rows.forEach(r=>{if(r._bs==='mandi')mandiBase+=r._bv;else tejiBase+=r._bv;});
  mandiBase=Math.round(mandiBase*100)/100; tejiBase=Math.round(tejiBase*100)/100;
  const netBase=Math.round((tejiBase-mandiBase)*100)/100;
  const chainDelta=Math.round((net-netBase)*100)/100; // how much chain shifted the net
  // flag: any planet triggered the tithi-vedha cascade on this panchak
  const tithiCascadeFired = rows.some(r=>r.tithiCascade);
  const tithiCascadePlanets = rows.filter(r=>r.tithiCascade).map(r=>r.planet);
  return {rows,teji,mandi,net,netBase,chainDelta,moonFlip,tithiCascadeFired,tithiCascadePlanets,chainRows,moonInChain};
}

function sbcVerdict(snap,instr,opts){
  const P=snap.planets;
  const tithiWorth=snap.tith.paksha==='Shukla'?1:0.5;

  // ── पण्य-त्रिक lord — reference for all सम्बन्ध/asp calculations ──────────
  const commClass=SBC_COMM_CLASS[instr.key]||'jiva';
  const lordPanya=sbcTriadLord(SBC_TRIAD[commClass],P);
  const lordRashi=sbcLordOf(instr.rashi,P);
  const lord=lordPanya.lord||lordRashi;   // पण्याधिपति (§5b reference lord)

  // ════ VARNĀDI PAÑCHAK — same "first akshara → table → 5 limbs" rule for all 3 trikas ════
  const locObj=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||null;

  // ── PAÑCHAK 1: देश — first akshara of the market city ──────────────────────
  // city → its Devanagari first akshara (carried in LOCATIONS) → table row
  const deshAksh = (locObj&&locObj.deshAkshara) || (locObj&&locObj.deshPanchak&&locObj.deshPanchak.letter) || S.loc;
  const deshP = varnadiPanchak(deshAksh);
  // Book table (L900-L912): Desh-Trika Sthana (locality) = Moon/Mars/Mercury — strongest by बल
  const lordDesh = sbcTriadLord(SBC_TRIAD.place, P).lord;
  const deshResult=sbcCalcPanchak(P,deshP,lordDesh,tithiWorth,opts);

  // ── PAÑCHAK 2: काल — the running tithi owns a table row → that akshara's पञ्चक ─
  const kalGrp=tithiToGroup(snap.tith.inPaksha);
  const kalAksh = sbcKalAkshara(snap.tith.paksha, snap.tith.inPaksha);
  const kalP = varnadiPanchak(kalAksh);
  kalP.kalGrp=kalGrp;
  // Book: चन्द्रः स्याद्दिवसाधिपः — Moon is the ONLY day-level Kal lord
  const lordKal = 'Moon';
  const kalResult=sbcCalcPanchak(P,kalP,lordKal,tithiWorth,opts);

  // ── PAÑCHAK 3: पण्य — first akshara of the instrument's name ───────────────
  const panyaP = varnadiPanchak(instr.letter);
  const panyaResult=sbcCalcPanchak(P,panyaP,lord,tithiWorth,opts);

  // ── Combined शेष विश्वा = देश-net + काल-net + पण्य-net ────────────────────
  const teji =Math.round((deshResult.teji +kalResult.teji +panyaResult.teji )*100)/100;
  const mandi=Math.round((deshResult.mandi+kalResult.mandi+panyaResult.mandi)*100)/100;
  const net  =Math.round((deshResult.net  +kalResult.net  +panyaResult.net  )*100)/100;
  // Pre-chain base net (before Vedha-Parampara chain was applied)
  const netBase=Math.round(((deshResult.netBase??deshResult.net)+(kalResult.netBase??kalResult.net)+(panyaResult.netBase??panyaResult.net))*100)/100;
  const chainDelta=Math.round((net-netBase)*100)/100;
  const moonFlip=deshResult.moonFlip||kalResult.moonFlip||panyaResult.moonFlip;
  const dir  =net>0.15?'TEJI':net<-0.15?'MANDI':'SAMA';

  // legacy aliases (for display code that references v.rows, v.lord etc.)
  const lordCommodity=lordPanya;
  const lordRegion=sbcTriadLord(SBC_TRIAD.place,P);
  const lordTime  =sbcTriadLord(SBC_TRIAD.day,P);
  const rows=panyaResult.rows; // primary rows for backward compat

  return {instr,lord,lordCommodity,lordRegion,lordTime,lordRashi,commClass,
          desh:{panchak:deshP, ...deshResult},
          kal: {panchak:kalP,  kalGrp, ...kalResult},
          panya:{panchak:panyaP, ...panyaResult},
          rows,teji,mandi,net,netBase,chainDelta,dir,moonFlip,
          paksha:snap.tith.paksha,tithiWorth};
}
// 15-min intraday matrix: every slot × every instrument
function sbcIntraday(ayMode,keys){
  const dp=S.date.split('-').map(Number);
  const loc=(typeof LOCATIONS!=='undefined'&&LOCATIONS[S.loc])||{open:9.25,close:15.5,abbr:'IST'};
  const Jmid=JD(dp[0],dp[1],dp[2],12);
  const gatiCache={}; ['Mars','Mercury','Jupiter','Venus','Saturn'].forEach(n=>{gatiCache[n]=planetSpeed(n,Jmid);});
  const instrList=keys?SBC_INSTR.filter(i=>keys.includes(i.key)):SBC_INSTR;
  const slots=[]; const nSlots=Math.round((loc.close-loc.open)/0.25);
  for(let k=0;k<=nSlots;k++){
    const t=Math.round((loc.open+k*0.25)*100)/100;
    const snap=sbcSnapshot(JD(dp[0],dp[1],dp[2],t),ayMode,gatiCache);
    const verdicts={}; instrList.forEach(ins=>{verdicts[ins.key]=sbcVerdict(snap,ins);});
    const moon=snap.planets.find(p=>p.name==='Moon');
    slots.push({t,verdicts,moonNak:moon.nak.n,moonPada:moon.nak.pada,paksha:snap.tith.paksha});
  }
  return {slots,open:loc.open,close:loc.close,abbr:loc.abbr||'IST'};
}

// Fetch daily OHLCV from Yahoo Finance (tries query1 then query2)
// ── Parse Yahoo Finance v8 chart JSON → our OHLCV format ──
function btParseYF(data){
  const res=data?.chart?.result?.[0];
  if(!res?.timestamp) throw new Error('No YF data');
  const ts=res.timestamp, q=res.indicators.quote[0], days=[];
  for(let i=0;i<ts.length;i++){
    const o=q.open[i],c=q.close[i];
    if(o==null||c==null||!isFinite(o)||!isFinite(c)||o<=0||c<=0) continue;
    const d=new Date(ts[i]*1000);
    days.push({
      dateStr:`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`,
      y:d.getUTCFullYear(),m:d.getUTCMonth()+1,d:d.getUTCDate(),
      open:o, high:q.high[i]||o, low:q.low[i]||o, close:c
    });
  }
  if(!days.length) throw new Error('Empty price list');
  return days;
}

// ── Normalise FMP historical row → our format ──
function btNormFMP(r){
  const dateStr=r.date||r.Date||'';
  const d=new Date(dateStr+'T00:00:00Z');
  return {
    dateStr, y:d.getUTCFullYear(),m:d.getUTCMonth()+1,d:d.getUTCDate(),
    open:parseFloat(r.open||r.Open||0),
    high:parseFloat(r.high||r.High||r.open||0),
    low:parseFloat(r.low||r.Low||r.open||0),
    close:parseFloat(r.close||r.Close||r.adjClose||0)
  };
}

// ── Parse user-supplied CSV (date,open,high,low,close) ──
function btParseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const days=[];
  for(const line of lines){
    if(!line.trim()||/date/i.test(line.split(',')[0])) continue;
    const cols=line.split(',');
    if(cols.length<5) continue;
    let dateStr=cols[0].trim().replace(/\//g,'-');
    if(/^\d{2}-\d{2}-\d{4}$/.test(dateStr)){
      const [d,m,y]=dateStr.split('-'); dateStr=`${y}-${m}-${d}`;
    }
    const d=new Date(dateStr+'T00:00:00Z');
    if(isNaN(d)) continue;
    days.push({
      dateStr, y:d.getUTCFullYear(),m:d.getUTCMonth()+1,d:d.getUTCDate(),
      open:parseFloat(cols[1]),high:parseFloat(cols[2]),
      low:parseFloat(cols[3]),close:parseFloat(cols[4])
    });
  }
  return days.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));
}
