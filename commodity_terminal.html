  if(signIdx === d.debil)  return 'debil';

  if(d.own.includes(signIdx))     return 'own';
  // Need to know who owns this sign
  const owners = ['Mars','Venus','Mercury','Moon','Sun','Mercury','Venus','Mars','Jupiter','Saturn','Saturn','Jupiter'];
  const signLord = owners[signIdx];
  if(d.friend.includes(signLord))  return 'friend';
  if(d.enemy.includes(signLord))   return 'enemy';
  return 'neutral';
}
// Dignity scoring weights — used by commodityBias
const DIGNITY_WT = {exalt:+18, moolTri:+14, own:+12, friend:+6, neutral:0, enemy:-8, debil:-18};

// ── MATH HELPERS ───────────────────────────────────────────────────
const n360=d=>((d%360)+360)%360;
const toR=d=>d*DEG;

// ── JULIAN DAY (IST → UTC) ─────────────────────────────────────────
function JD(yr,mo,dy,istH){
  const utcH=istH-IST;
  let Y=yr,M=mo;
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+dy+utcH/24+B-1524.5;
}

// ═══════════════════════════════════════════════════════════════════
// AYANAMSA — calibrated to match AstroSage / Indian Govt reference
// to within 0.15 arcsecond. Verified against May 5 2026 data:
//   Lahiri 24°13'28" · KP New 24°08'04" · KP Old 24°07'48" · Raman 22°46'50"
//
// Lahiri (Chitrapaksha): 23°15'00" at JD 2435553.5 (1956-Mar-21 0h UT,
// vernal equinox, per the Calendar Reform Committee 1955), with mean
// precession 50.029"/year (the rate adopted in the Rashtriya Panchanga).
//
// All other Indian ayanamsas are constant offsets from Lahiri:
//   KP New (Krishnamurti) = Lahiri − 5'24"
//   KP Old                = Lahiri − 5'40"
//   Raman                 = Lahiri − 1°26'38"
// ═══════════════════════════════════════════════════════════════════
function lahiriAyanamsa(J){
  return 23.25 + (J-2435553.5)*50.029/(3600*365.25);
}
function kpAyanamsa(J){    return lahiriAyanamsa(J) - (5*60+24)/3600; }
function kpOldAyanamsa(J){ return lahiriAyanamsa(J) - (5*60+40)/3600; }
function ramanAyanamsa(J){ return lahiriAyanamsa(J) - (1*3600+26*60+38)/3600; }
function getAyanamsa(J,mode){
  switch(mode){
    case 'lahiri': return lahiriAyanamsa(J);
    case 'kp':     return kpAyanamsa(J);
    case 'kpold':  return kpOldAyanamsa(J);
    case 'raman':  return ramanAyanamsa(J);
    default:       return lahiriAyanamsa(J);
  }
}
function ayanamsaLabel(mode){
  return {lahiri:'Lahiri (Chitrapaksha)', kp:'KP New (Krishnamurti)',
          kpold:'KP Old', raman:'Raman'}[mode] || 'Lahiri';
}

// ═══════════════════════════════════════════════════════════════════
// NUTATION (longitude) — IAU 1980 truncated, ~0.5" precision
// ═══════════════════════════════════════════════════════════════════
function nutation(J){
  const T=(J-2451545)/36525;
  const om=toR(n360(125.04452-1934.136261*T+0.0020708*T*T));
  const L =toR(n360(280.4665+36000.7698*T));
  const Lp=toR(n360(218.3165+481267.8813*T));
  // Δψ in arcseconds → degrees
  const dpsi=(-17.20*Math.sin(om)-1.32*Math.sin(2*L)-0.23*Math.sin(2*Lp)+0.21*Math.sin(2*om))/3600;
  return dpsi;
}

// ═══════════════════════════════════════════════════════════════════
// MEAN OBLIQUITY (IAU 2006) + nutation in obliquity (truncated)
// ═══════════════════════════════════════════════════════════════════
function meanObliquity(J){
  const T=(J-2451545)/36525;
  // IAU 2006 polynomial (arcsec → degrees), accurate to <0.001" for ±200yr
  const eps0_arcsec = 84381.406 - 46.836769*T - 0.0001831*T*T
                     + 0.00200340*T*T*T - 5.76e-7*T*T*T*T - 4.34e-8*T*T*T*T*T;
  return eps0_arcsec/3600;
}
function trueObliquity(J){
  const T=(J-2451545)/36525;
  const om=toR(n360(125.04452-1934.136261*T));
  // Δε in arcseconds
  const deps=(9.20*Math.cos(om)+0.57*Math.cos(2*toR(n360(280.4665+36000.7698*T)))
              +0.10*Math.cos(2*toR(n360(218.3165+481267.8813*T)))-0.09*Math.cos(2*om))/3600;
  return meanObliquity(J)+deps;
}

// ═══════════════════════════════════════════════════════════════════
// SUN apparent ecliptic longitude (Meeus Ch.25, ~0.01° accuracy)
// ═══════════════════════════════════════════════════════════════════
function sunLon(J){
  const T=(J-2451545)/36525;
  const L0=n360(280.46646+36000.76983*T+0.0003032*T*T);
  const M=n360(357.52911+35999.05029*T-0.0001537*T*T);
  const Mr=toR(M);
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)
         +0.000289*Math.sin(3*Mr);
  const O=n360(L0+C);                    // true longitude
  const om=n360(125.04-1934.136*T);
  // apparent = true - 0.00569° aberration - 0.00478°·sin(Ω) (longitude nutation included)
  return n360(O - 0.00569 - 0.00478*Math.sin(toR(om)));
}

// ═══════════════════════════════════════════════════════════════════
// MOON apparent ecliptic longitude — Meeus Ch.47, expanded
// ~60 leading periodic terms, accuracy ~0.01° (better than the 0.1°
// of the original 30-term truncation; matters at sub-lord boundaries).
// ═══════════════════════════════════════════════════════════════════
function moonLon(J){
  const T=(J-2451545)/36525;
  const Lp=n360(218.3164477+481267.88123421*T-0.0015786*T*T+T*T*T/538841-T*T*T*T/65194000);
  const D =n360(297.8501921+445267.1114034*T-0.0018819*T*T+T*T*T/545868-T*T*T*T/113065000);
  const M =n360(357.5291092+35999.0502909*T-0.0001536*T*T+T*T*T/24490000);
  const Mp=n360(134.9633964+477198.8675055*T+0.0087414*T*T+T*T*T/69699-T*T*T*T/14712000);
  const F =n360(93.2720950+483202.0175233*T-0.0036539*T*T-T*T*T/3526000+T*T*T*T/863310000);
  const E =1-0.002516*T-0.0000074*T*T;
  const Dr=toR(D),Mr=toR(M),Mpr=toR(Mp),Fr=toR(F);
  // Σl table (subset of 60 strongest terms in 0.000001° units, Meeus Table 47.A)
  // Each row: [coef, D, M, M', F]
  const T47 = [
    [6288774, 0, 0, 1, 0], [1274027, 2, 0,-1, 0], [ 658314, 2, 0, 0, 0],
    [ 213618, 0, 0, 2, 0], [-185116, 0, 1, 0, 0], [-114332, 0, 0, 0, 2],
    [  58793, 2, 0,-2, 0], [  57066, 2,-1,-1, 0], [  53322, 2, 0, 1, 0],
    [  45758, 2,-1, 0, 0], [ -40923, 0, 1,-1, 0], [ -34720, 1, 0, 0, 0],
    [ -30383, 0, 1, 1, 0], [  15327, 2, 0, 0,-2], [ -12528, 0, 0, 1, 2],
    [  10980, 0, 0, 1,-2], [  10675, 4, 0,-1, 0], [  10034, 0, 0, 3, 0],
    [   8548, 4, 0,-2, 0], [  -7888, 2, 1,-1, 0], [  -6766, 2, 1, 0, 0],
    [  -5163, 1, 0,-1, 0], [   4987, 1, 1, 0, 0], [   4036, 2,-1, 1, 0],
    [   3994, 2, 0, 2, 0], [   3861, 4, 0, 0, 0], [   3665, 2, 0,-3, 0],
    [  -2689, 0, 1,-2, 0], [  -2602, 2, 0,-1, 2], [   2390, 2,-1,-2, 0],
    [  -2348, 1, 0, 1, 0], [   2236, 2,-2, 0, 0], [  -2120, 0, 1, 2, 0],
    [  -2069, 0, 2, 0, 0], [   2048, 2,-2,-1, 0], [  -1773, 2, 0, 1,-2],
    [  -1595, 2, 0, 0, 2], [   1215, 4,-1,-1, 0], [  -1110, 0, 0, 2, 2],
    [   -892, 3, 0,-1, 0], [   -810, 2, 1, 1, 0], [    759, 4,-1,-2, 0],
    [   -713, 0, 2,-1, 0], [   -700, 2, 2,-1, 0], [    691, 2, 1,-2, 0],
    [    596, 2,-1, 0,-2], [    549, 4, 0, 1, 0], [    537, 0, 0, 4, 0],
    [    520, 4,-1, 0, 0], [   -487, 1, 0,-2, 0], [   -399, 2, 1, 0,-2],
    [   -381, 0, 0, 2,-2], [    351, 1, 1, 1, 0], [   -340, 3, 0,-2, 0],
    [    330, 4, 0,-3, 0], [    327, 2,-1, 2, 0], [   -323, 0, 2, 1, 0],
    [    299, 1, 1,-1, 0], [    294, 2, 0, 3, 0]
  ];
  let dL=0;
  for(const [c,d,m,mp,f] of T47){
    const Eb = (Math.abs(m)===1)?E : (Math.abs(m)===2)?E*E : 1;
    dL += c*Eb*Math.sin(d*Dr + m*Mr + mp*Mpr + f*Fr);
  }
  // Additional perturbation A1 (Venus), A2 (Jupiter), L'
  const A1=toR(n360(119.75+131.849*T));
  const A2=toR(n360(53.09+479264.290*T));
  dL += 3958*Math.sin(A1) + 1962*Math.sin(toR(Lp)-Fr) + 318*Math.sin(A2);
  return n360(Lp + dL/1e6);
}

// ═══════════════════════════════════════════════════════════════════
// PLANETARY LONGITUDES (Keplerian heliocentric → geocentric)
// Accuracy ~0.5° — adequate for KP house/sub of slow-moving planets.
// (For arc-minute precision on Mercury/Venus, swap in Swiss Ephemeris
// or full VSOP87 — beyond scope of single-file build.)
// ═══════════════════════════════════════════════════════════════════
const ELS={
  Mercury:{a:.38709927,e:.20563593,i:7.00497902,O:48.33076593,w:77.45779628,L0:252.25032350,Lr:149472.67411175},
  Venus:  {a:.72333566,e:.00677672,i:3.39467605,O:76.67984255,w:131.60246718,L0:181.97909950,Lr:58517.81538729},
  Mars:   {a:1.52371034,e:.09339410,i:1.84969142,O:49.55953891,w:-23.94362959,L0:-4.55343205,Lr:19140.30268499},
  Jupiter:{a:5.20288700,e:.04838624,i:1.30439695,O:100.47390909,w:14.72847983,L0:34.39644051,Lr:3034.74612775},
  Saturn: {a:9.53667594,e:.05386179,i:2.48599187,O:113.66242448,w:92.59887831,L0:49.95424423,Lr:1222.49362201}
};

function planetGeo(J,body){
  const T=(J-2451545)/36525;
  const el=ELS[body];if(!el)return 0;
  const L=n360(el.L0+el.Lr*T);
  const M=n360(L-el.w),Mr=toR(M);
  let E=Mr+el.e*Math.sin(Mr)*(1+el.e*Math.cos(Mr));
  for(let k=0;k<8;k++) E=E - (E-el.e*Math.sin(E)-Mr)/(1-el.e*Math.cos(E));
  const xv=el.a*(Math.cos(E)-el.e);
  const yv=el.a*Math.sqrt(1-el.e*el.e)*Math.sin(E);
  const v=toD(Math.atan2(yv,xv));
  const r=Math.sqrt(xv*xv+yv*yv);
  const lonH=n360(v+el.w);
  const Or=toR(el.O),ir=toR(el.i),lhr=toR(lonH);
  const xH=r*(Math.cos(Or)*Math.cos(lhr-Or)-Math.sin(Or)*Math.sin(lhr-Or)*Math.cos(ir));
  const yH=r*(Math.sin(Or)*Math.cos(lhr-Or)+Math.cos(Or)*Math.sin(lhr-Or)*Math.cos(ir));
  const sl=sunLon(J);
  const Re=1.0;
  const xs=Re*Math.cos(toR(sl));
  const ys=Re*Math.sin(toR(sl));
  return n360(toD(Math.atan2(yH+ys, xH+xs)));
}

// ═══════════════════════════════════════════════════════════════════
// RAHU/KETU — Mean lunar ascending node (Meeus 47.6).
// This is the CLASSICAL KP convention used in KSK's original tables
// and the Lahiri Ephemeris. Some modern apps (e.g. JagannathaHora,
// "KP Details" by certain publishers) display the TRUE node instead,
// which oscillates around the mean by up to ±1°40' (~100' at most).
// On May 6 2026 the true−mean offset is ~31'; on other dates it can
// flip sign. If your reference shows a different node value, that's
// the convention difference, not a calculation error.
// ═══════════════════════════════════════════════════════════════════
function rahuLon(J){
  const T=(J-2451545)/36525;
  const om = 125.0445479 - 1934.1362891*T + 0.0020754*T*T
           + T*T*T/467441 - T*T*T*T/60616000;
  return n360(om);
}

// ═══════════════════════════════════════════════════════════════════
// ASCENDANT — Meeus 13.6 with QUADRANT FIX (was 180° off in v1)
// ═══════════════════════════════════════════════════════════════════
function computeAsc(J){
  const T=(J-2451545)/36525;
  // Apparent sidereal time at Greenwich (includes nutation)
  const GMST=n360(280.46061837+360.98564736629*(J-2451545)
                  +0.000387933*T*T-T*T*T/38710000);
  const eps=trueObliquity(J);
  const dpsi=nutation(J);
  // Equation of equinoxes (in degrees): Δψ·cos(ε)
  const eqEq = dpsi*Math.cos(toR(eps));
  const GAST = n360(GMST + eqEq);
  const LST  = n360(GAST + LON);
  const epsr=toR(eps), latr=toR(LAT), lstr=toR(LST);
  // Meeus 13.6 ascendant formula
  const y = -Math.cos(lstr);
  const x =  Math.sin(lstr)*Math.cos(epsr) + Math.tan(latr)*Math.sin(epsr);
  let asc = n360(toD(Math.atan2(y,x)));
  // ── QUADRANT CORRECTION (THE BUG FIX) ──
  // Meeus's atan2 form yields the descendant in the LST ranges where
  // the eastern semi-arc wraps. Force the ascendant to lie east of MC.
  const mc = n360(toD(Math.atan2(Math.sin(lstr), Math.cos(lstr)*Math.cos(epsr))));
  if (n360(asc - mc) > 180) asc = n360(asc + 180);
  return { asc, mc, lst:LST };
}

// ═══════════════════════════════════════════════════════════════════
// SUNRISE / SUNSET (Mumbai) — verified accurate to ~30s
// ═══════════════════════════════════════════════════════════════════
function sunriseSunset(dateStr){
  const dp=dateStr.split('-').map(Number);
  const[yr,mo,dy]=dp;
  let Y=yr,M=mo;
  if(M<=2){Y--;M+=12;}
  const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);
  const JDnoon=Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+dy+0.5+B-1524.5;
  const n=JDnoon-2451545.0;
  const L=((280.460+0.9856474*n)%360+360)%360;
  const g=((357.528+0.9856003*n)%360+360)%360;
  const gr=g*DEG;
  const lam=(L+1.915*Math.sin(gr)+0.020*Math.sin(2*gr))*DEG;
  const eps=(23.439-0.0000004*n)*DEG;
  const RA=((Math.atan2(Math.cos(eps)*Math.sin(lam),Math.cos(lam)))/DEG+360)%360;
  const decl=Math.asin(Math.sin(eps)*Math.sin(lam));
  let EoT=(L-RA)*4;
  if(EoT>20)EoT-=1440;
  if(EoT<-20)EoT+=1440;
  const cosH=(Math.sin(-0.8333*DEG)-Math.sin(LAT*DEG)*Math.sin(decl))
            /(Math.cos(LAT*DEG)*Math.cos(decl));
  if(Math.abs(cosH)>1)return{rise:6*60,set:18*60,hl:60};
  const H=Math.acos(cosH)/DEG;
  const noonIST=(12-EoT/60-LON/15)+5.5;
  const riseH=noonIST-H/15;
  const setH =noonIST+H/15;
  return{rise:riseH*60,set:setH*60,hl:(setH-riseH)*60/12};
}

// ═══════════════════════════════════════════════════════════════════
// KP NAKSHATRA / SUB / SUB-SUB
// ═══════════════════════════════════════════════════════════════════
function getNak(lon){
  const l=n360(lon);
  const idx=Math.min(Math.floor(l/NAK_SPAN),26);
  const posInNak=l-idx*NAK_SPAN;
  const pada=Math.min(Math.floor(posInNak/(NAK_SPAN/4))+1,4);
  return{...NAKS[idx],idx,pada,pos:posInNak};
}
function getSub(lon){
  const l=n360(lon);
  const ni=Math.min(Math.floor(l/NAK_SPAN),26);
  const nakL=NAKS[ni].l;
  const posInNak=(l-ni*NAK_SPAN)/NAK_SPAN;
  const si=DO_SEQ.indexOf(nakL);
  let cum=0,sub=nakL,subi=si,ss=nakL;
  for(let i=0;i<9;i++){
    const p=DO_SEQ[(si+i)%9];
    const f=DY[p]/120;
    if(posInNak>=cum&&posInNak<cum+f){
      sub=p;subi=(si+i)%9;
      const posInSub=(posInNak-cum)/f;
      let c2=0;
      for(let j=0;j<9;j++){
        const p2=DO_SEQ[(subi+j)%9];
        const f2=DY[p2]/120;
        if(posInSub>=c2&&posInSub<c2+f2){ss=p2;break;}
        c2+=f2;
      }
      break;
    }
    cum+=f;
  }
  const nk=getNak(lon);
  return{nak:nk.n,nakL:nk.l,sub,ss,pada:nk.pada};
}
function getSign(lon){
  const l=n360(lon);const s=Math.floor(l/30);
  return{sign:SIGNS[s],s,lord:SLRD[s],deg:l%30,abb:SABB[s]};
}
function getD9(lon){
  const l=n360(lon);const s=Math.floor(l/30);const d=l%30;
  const p=Math.floor(d/(30/9));
  const st=[0,9,6,3,0,9,6,3,0,9,6,3];
  return(st[s]+p)%12;
}
function houseOf(pLon,ascLon){return(Math.floor(n360(pLon-ascLon)/30)%12)+1;}

// ═══════════════════════════════════════════════════════════════════
// GANN SQUARE-OF-9
// ═══════════════════════════════════════════════════════════════════
// GANN SQUARE-OF-9 LEVELS
// ───────────────────────────────────────────────────────────────────
// Generates support/resistance levels around an ANCHOR price using
// the classical SQ9 formula: level = (√anchor + n)² where n is in
// units of 0.5 (each 0.5 unit corresponds to ~22.5° on the SQ9 wheel).
// The anchor should be a FIXED reference for the trading session —
// typically the Day Open or Previous Close, NOT live price.
// ═══════════════════════════════════════════════════════════════════
function gannLevels(anchor){
  const sq=Math.sqrt(Math.max(anchor,1));
  return[-2,-1.5,-1,-0.5,0,.5,1,1.5,2].map(u=>{
    const p=Math.round((sq+u)**2);
    const pct=((p-anchor)/anchor*100).toFixed(2);
    const type=u===0?'BASE':u>0?`R${Math.abs(u)*2}`:`S${Math.abs(u)*2}`;
    return{u,p,pct,type};
  });
}

// BIAS ENGINE (unchanged; weights configurable)
// ═══════════════════════════════════════════════════════════════════
function computeBias(planets){
  const pm=Object.fromEntries(planets.map(p=>[p.name,p]));
  const F=[];let sc=0;
  const add=(l,w,d)=>{F.push({l,w,d});sc+=w*d;};
  const{Sun,Moon,Mars,Mercury,Jupiter,Venus,Saturn,Rahu,Ketu}=pm;
  if(Sun){
    if(Sun.h===11)add('Sun in 11H — profit house',25,1);
    if(Sun.h===5)add('Sun in 5H speculation',12,1);
    if(Sun.s===0)add('Sun exalted Aries',20,1);
    else if(Sun.s===6)add('Sun debilitated Libra',20,-1);
    if([6,8,12].includes(Sun.h))add('Sun in dusthana H'+Sun.h,15,-1);
  }
  if(Moon){
    if([1,4,5,7,10,11].includes(Moon.h)&&![6,8,12].includes(Moon.h))add('Moon in good house H'+Moon.h,14,1);
    if([6,8,12].includes(Moon.h))add('Moon in dusthana H'+Moon.h,12,-1);
    if(Moon.s===1)add('Moon exalted Taurus',12,1);
    if(Moon.s===7)add('Moon debilitated Scorpio',12,-1);
  }
  if(Jupiter){
    if(Jupiter.h===1)add('Jupiter in Lagna — expansive',20,1);
    else if(Jupiter.h===11)add('Jupiter in 11H gains',15,1);
    else if(Jupiter.h===5)add('Jupiter in 5H trikona',10,1);
    if([6,8,12].includes(Jupiter.h))add('Jupiter in dusthana',10,-1);
    if(Jupiter.s===3)add('Jupiter exalted Cancer',15,1);
    if(Jupiter.s===9)add('Jupiter debilitated Capricorn',15,-1);
  }
  if(Mars&&Saturn){
    const df=n360(Mars.lon-Saturn.lon),d=df>180?360-df:df;
    if(d<8)add(`Mars-Sat conj ${dmsC(d)} (tight)`,18,-1);
    else if(d<18)add(`Mars-Sat near conj ${Math.round(d)}°`,8,-1);
  }
  if(Mercury){
    if(Mercury.s===11)add('Mercury debilitated Pisces',10,-1);
    if(Mercury.s===5)add('Mercury exalted Virgo',10,1);
    if([6,8,12].includes(Mercury.h))add('Mercury in dusthana H'+Mercury.h,7,-1);
  }
  if(Venus){
    if(Venus.h===12)add('Venus in 12H — expenses',8,-1);
    if([1,6].includes(Venus.s))add('Venus own sign',8,1);
    if(Venus.s===11)add('Venus exalted Pisces',12,1);
    if(Venus.s===5)add('Venus debilitated Virgo',12,-1);
  }
  if(Rahu&&[5,11].includes(Rahu.h))add('Rahu in 5/11H gains',8,1);
  const norm=Math.max(-100,Math.min(100,sc*0.8));
  const bias=norm>15?'BULLISH':norm<-15?'BEARISH':'NEUTRAL';
  return{score:Math.round(norm),bias,F:F.slice(0,10)};
}

function hourBias(planet,planets){
  const p=planets.find(x=>x.name===planet);
  if(!p)return{bias:'NEUTRAL',col:'var(--neut)',arrow:'→',ind:'Sideways'};
  if(planet==='Saturn')return{bias:'VOLATILE',col:'var(--neut)',arrow:'↕',ind:'Reversal zone — caution'};
  if(planet==='Ketu')return{bias:'BEARISH',col:'var(--bear)',arrow:'▼',ind:'Sudden dip risk'};
  if(planet==='Rahu')return{bias:'VOLATILE',col:'var(--neut)',arrow:'↕',ind:'Choppy/whipsaw'};
  if([1,5,9,11].includes(p.h)&&![6,7,8].includes(p.s))return{bias:'BULLISH',col:'var(--bull)',arrow:'▲',ind:'Bull momentum hour'};
  if([6,8,12].includes(p.h)||[6,8].includes(p.s))return{bias:'BEARISH',col:'var(--bear)',arrow:'▼',ind:'Bear contraction hour'};
  if(planet==='Jupiter'&&[1,4,5,9].includes(p.h))return{bias:'BULLISH',col:'var(--bull)',arrow:'▲▲',ind:'Strong bull push'};
  if(planet==='Sun'&&p.h===11)return{bias:'BULLISH',col:'var(--bull)',arrow:'▲',ind:'Profit hour — exalted'};
  return{bias:'NEUTRAL',col:'var(--neut)',arrow:'→',ind:'Range-bound / wait'};
}

// EPHEMERIS WRAPPER — uses Astronomy Engine (VSOP87/ELP) when loaded,
// falls back to in-file Keplerian/Sun/Moon series when offline.
// AE delivers sub-arcsecond accuracy matching JPL Horizons.
// ═══════════════════════════════════════════════════════════════════
function jdToDate(J){
  // JD → JS Date (UTC). JD 2440587.5 = 1970-01-01 00:00 UT
  return new Date((J-2440587.5)*86400000);
}
function isAELoaded(){
  return typeof window!=='undefined' && typeof window.Astronomy!=='undefined'
      && typeof window.Astronomy.GeoVector==='function';
}
function ephemerisStatus(){
  return isAELoaded() ? 'VSOP87/ELP (sub-arcsecond)' : 'Keplerian fallback (~5\' accuracy)';
}

// Geocentric apparent ecliptic longitude (tropical, ecliptic of date)
function geoLon(body,J){
  if(isAELoaded()){
    try{
      const A=window.Astronomy, d=jdToDate(J);
      if(body==='Moon') return n360(A.EclipticGeoMoon(d).lon);
      if(body==='Sun'){
        const ev=A.HelioVector(A.Body.Earth,d);
        return n360(A.Ecliptic({x:-ev.x,y:-ev.y,z:-ev.z,t:ev.t}).elon);
      }
      const v=A.GeoVector(A.Body[body],d,true); // aberration=true → apparent
      return n360(A.Ecliptic(v).elon);
    }catch(e){ /* fall through to Keplerian */ }
  }
  if(body==='Sun')  return sunLon(J);
  if(body==='Moon') return moonLon(J);
  return planetGeo(J,body);
}

// Retrograde detection: compare longitude at J-12h vs J+12h
function isRetrograde(body,J){
  if(body==='Sun'||body==='Moon') return false;
  if(body==='Rahu'||body==='Ketu') return true; // mean nodes always retrograde
  try{
    let l1=geoLon(body,J-0.5), l2=geoLon(body,J+0.5);
    let d=l2-l1; if(d>180)d-=360; if(d<-180)d+=360;
    return d<0;
  }catch(e){ return false; }
}
function computeAll(dateStr,timeIST,ayMode){
  const dp=dateStr.split('-').map(Number);
  const J=JD(dp[0],dp[1],dp[2],timeIST);
  const ay=getAyanamsa(J,ayMode);

  const trop={
    Sun:    geoLon('Sun',J),
    Moon:   geoLon('Moon',J),
    Mars:   geoLon('Mars',J),
    Mercury:geoLon('Mercury',J),
    Jupiter:geoLon('Jupiter',J),
    Venus:  geoLon('Venus',J),
    Saturn: geoLon('Saturn',J),
    Rahu:   rahuLon(J),
    Uranus: geoLon('Uranus',J),
    Neptune:geoLon('Neptune',J)
  };
  trop.Ketu=n360(trop.Rahu+180);

  // Retrograde flags (Rahu/Ketu always retrograde by convention; Sun/Moon never)
  const retro={
    Sun:false, Moon:false,
    Mars:    isRetrograde('Mars',J),
    Mercury: isRetrograde('Mercury',J),
    Jupiter: isRetrograde('Jupiter',J),
    Venus:   isRetrograde('Venus',J),
    Saturn:  isRetrograde('Saturn',J),
    Uranus:  isRetrograde('Uranus',J),
    Neptune: isRetrograde('Neptune',J),
    Rahu:true, Ketu:true
  };

  const ascObj=computeAsc(J);
  const ascTrop=ascObj.asc;
  const ascSid=n360(ascTrop-ay);
  const ascSign=getSign(ascSid);
  const ascSub=getSub(ascSid);
  const ascNak=getNak(ascSid);
  const mcSid=n360(ascObj.mc-ay);

  const planets=Object.entries(trop).map(([name,tl])=>{
    const sl=n360(tl-ay);
    const sg=getSign(sl);
    const nk=getNak(sl);
    const sb=getSub(sl);
    const h=houseOf(sl,ascSid);
    const d9s=getD9(sl);
    return{name,tLon:tl,lon:sl,s:sg.s,sign:sg.sign,abb:sg.abb,lord:sg.lord,deg:sg.deg,
      h,nak:nk.n,nakL:nk.l,sub:sb.sub,ss:sb.ss,pada:nk.pada,d9Sign:d9s,
      retro:retro[name]||false,
      abbr:PA[name]||name.slice(0,2)};
  });

  const dayOfWeek=new Date(dateStr).getDay();
  const dayLord=DAY_LORDS[dayOfWeek];
  const moon=planets.find(p=>p.name==='Moon');
  const rp=[dayLord,moon?.nakL,moon?.sub,ascSub.nakL,ascSub.sub].filter(Boolean);

  const{rise:rMin,set:sMin,hl:hlMin}=sunriseSunset(dateStr);
  const chaldStart=CHALD.indexOf(dayLord);

  // PLANETARY HOURS — full 24h cycle (12 day + 12 night hours)
  // Day hour length = (sunset - sunrise)/12  (~hlMin from sunriseSunset)
  // Night hour length = (24h - daylight)/12
  const phpHours=[];
  const dayHL  = hlMin;
  const nightHL= (24*60 - (sMin - rMin))/12;
  for(let i=0;i<24;i++){
    const isDay = i<12;
    const len = isDay ? dayHL : nightHL;
    const start = isDay ? rMin + i*dayHL : sMin + (i-12)*nightHL;
    phpHours.push({planet:CHALD[(chaldStart+i)%7], sm:start, em:start+len, isDay});
  }

  const slots=[];
  // 5-MIN GRID across 24h: 00:00 → 23:55 = 288 slots
  // Marks mcx=true/false based on MCX trading window (09:00–23:30 IST)
  for(let min=0;min<24*60;min+=5){
    const slotIST = min/60;
    const Jslot = JD(dp[0],dp[1],dp[2],slotIST);
    const aySlot = getAyanamsa(Jslot,ayMode);
    const ml = n360(geoLon('Moon',Jslot) - aySlot);
    const msg=getSign(ml);const mnk=getNak(ml);const msb=getSub(ml);
    const ph=phpHours.find(h=>min>=h.sm&&min<h.em)||phpHours[phpHours.length-1]||{planet:dayLord};
    const phPlanet=ph?.planet||dayLord;
    const hb=hourBias(phPlanet,planets);
    slots.push({min,time:mtt(min),planet:phPlanet,hb,
      moonSign:msg.sign,moonDeg:msg.deg,moonNak:mnk.n,moonNakL:msb.nakL,
      moonSub:msb.sub,moonSS:msb.ss,moonPada:mnk.pada,
      moonLon:ml, mcx:isMcxWindow(min)});
  }

  const bias=computeBias(planets);

  return{J,ay,ayMode,ascSid,ascSign,ascSub,ascNak,mcSid,planets,dayLord,moon,rp,
    rMin,sMin,hlMin,phpHours,slots,bias,dateStr,timeIST,
    ephSrc:ephemerisStatus()};
}

function mtt(m){let h=Math.floor(m/60),mn=Math.floor(m%60);return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;}
function pc(p){return PC[p]||'#7ecad8';}

// ── DMS FORMATTING (degree · minute · second) ──────────────────────
// secDec=0 → DD°MM'SS"      e.g. 5°40'53"
// secDec=2 → DD°MM'SS.ss"   e.g. 24°08'09.03"   (used for ayanamsa)
function dms(deg, secDec){
  if(secDec===undefined) secDec=0;
  if(deg===null||deg===undefined||isNaN(deg)) return '—';
  const sign = deg<0 ? '-' : '';
  const a = Math.abs(deg);
  let d = Math.floor(a);
  const minF = (a-d)*60;
  let m = Math.floor(minF);
  let s = (minF-m)*60;
  // Round seconds and carry over
  const f = Math.pow(10,secDec);
  s = Math.round(s*f)/f;
  if(s>=60){s-=60; m+=1;}
  if(m>=60){m-=60; d+=1;}
  const sStr = secDec>0
    ? s.toFixed(secDec).padStart(secDec+3,'0')
    : Math.round(s).toString().padStart(2,'0');
  return `${sign}${d}°${String(m).padStart(2,'0')}'${sStr}"`;
}
// Compact form for tight cells (no zero-pad on degrees)
function dmsC(deg){
  if(deg===null||deg===undefined||isNaN(deg)) return '—';
  const a = Math.abs(deg);
  let d = Math.floor(a);
  const minF = (a-d)*60;
  let m = Math.floor(minF);
  let s = Math.round((minF-m)*60);
  if(s===60){s=0; m+=1;}
  if(m===60){m=0; d+=1;}
  return `${d}°${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"`;
}

function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function nowTimeIST(){
  try{
    const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const h=ist.getHours(),m=ist.getMinutes();
    // Round to nearest 5-min slot in 24h. Time is stored as decimal hours.
    const dec = h + (Math.round(m/5)*5)/60;
    return String(Math.min(23.9167, Math.max(0, dec)));
  }catch(e){return'9';}
}

// COMMODITY-SPECIFIC BIAS ENGINE
// ───────────────────────────────────────────────────────────────────
// For each commodity, weighs:
//   • PRIMARY significator (the karaka planet): house, sign, retrograde
//   • SECONDARY significator: house, sign
//   • Sub-lord of the primary's nakshatra (KP final-arbiter rule)
//   • Day-lord influence
//   • Special transit rules per commodity (e.g. Mars-Sat conj = base metals bearish)
//
// Returns: {score:-100..+100, bias:'BULLISH'|'BEARISH'|'NEUTRAL', factors:[...]}
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// commodityBias — Research-backed scoring (Nov 2026 revision)
// ───────────────────────────────────────────────────────────────────
// Combines TEN rule families, each citing its primary source:
//   1. Karaka dignity (BPHS Ch.3-4)            — exalt/own/friend/enemy/debil
//   2. Karaka house placement (KP consensus)    — 2/5/9/11 bull, 6/8/12 bear
//   3. KP Sub-lord verdict (Krishnamurti)       — final arbiter rule
//   4. Karaka in bullish/bearish sign           — Brihat Samhita 40.2-10
//   5. Karaka retrograde (RG Krishnan, gold)    — special bull for precious metals
//   6. Day-lord & hora-lord match (Atrish)      — own day boosts commodity
//   7. Mars-Saturn axis (Aggarwala, Parashara)  — 6/8 axis = crude UP, base metals UP
//   8. Saturn/Rahu in watery sign (Krishnan)    — gold UP
//   9. Saturn in fiery sign (Aggarwala)         — oil disruption → oil UP
//  10. Sun-Jupiter conjunction (BS Ch.16)       — gold mega-bull
// Each factor's weight scaled to per-commodity relevance.
// Output normalized to ±100.
// ═══════════════════════════════════════════════════════════════════
function commodityBias(commKey, planets, dayLord, horaLord){
  const com = CBYK[commKey];
  if(!com) return {score:0, bias:'NEUTRAL', F:[]};
  const pm = Object.fromEntries(planets.map(p=>[p.name,p]));
  const pri = pm[com.pri], sec = pm[com.sec], ter = com.ter ? pm[com.ter] : null;
  const F = []; let sc = 0;
  // weight w, direction d (+1 bull / -1 bear), tier t (which karaka triggered it: 'pri'|'sec'|'ter'|'all')
  const add = (label, w, d, t='all') => { F.push({label,w,d,tier:t}); sc += w*d; };

  // ─────────────────────────────────────────────────────────────
  // Helper: score one karaka (pri/sec/ter) with weight multiplier
  // ─────────────────────────────────────────────────────────────
  const scoreKaraka = (p, name, wMul, tier) => {
    if(!p) return;
    // (1) Dignity by sign (BPHS) — primary placement quality
    const dig = dignityOf(name, p.s, planets);
    if(dig !== 'neutral'){
      const w = Math.round(Math.abs(DIGNITY_WT[dig]) * wMul);
      const d = DIGNITY_WT[dig] >= 0 ? 1 : -1;
      const tag = {exalt:'exalted',moolTri:'moolatrikona',own:'own sign',friend:'friendly sign',enemy:'enemy sign',debil:'debilitated'}[dig];
      add(`${name} ${tag} ${p.sign}`, w, d, tier);
    }

    // (2) House placement (KP financial consensus)
    if([2,11].includes(p.h))         add(`${name} in ${p.h}H (wealth/profit)`,    Math.round(22*wMul), 1, tier);
    else if([5,9].includes(p.h))     add(`${name} in ${p.h}H (trikona)`,          Math.round(16*wMul), 1, tier);
    else if([1,4,10].includes(p.h))  add(`${name} in ${p.h}H (kendra)`,           Math.round(9*wMul),  1, tier);
    else if(p.h===6)                 add(`${name} in 6H (supply/debt)`,           Math.round(20*wMul), -1, tier);
    else if(p.h===8)                 add(`${name} in 8H (sudden shocks)`,         Math.round(18*wMul), -1, tier);
    else if(p.h===12)                add(`${name} in 12H (loss/leakage)`,         Math.round(16*wMul), -1, tier);

    // (3) Sub-lord verdict (KP — Krishnamurti's "final arbiter" rule)
    const subL = pm[p.sub];
    if(subL){
      if([2,5,9,10,11].includes(subL.h)) add(`Sub-lord ${p.sub} in ${subL.h}H (final BULL)`, Math.round(16*wMul), 1, tier);
      else if([6,8,12].includes(subL.h)) add(`Sub-lord ${p.sub} in ${subL.h}H (final BEAR)`, Math.round(16*wMul), -1, tier);
    }

    // (4) Bullish / bearish sign transit (Brihat Samhita Ch.40)
    if(com.bullSigns.includes(p.s))  add(`${name} in ${p.sign} (bullish sign for ${com.k})`, Math.round(10*wMul), 1, tier);
    else if(com.bearSigns.includes(p.s)) add(`${name} in ${p.sign} (bearish sign for ${com.k})`, Math.round(10*wMul), -1, tier);
    else if(BULL_SIGNS.has(p.s))     add(`${name} in ${p.sign} (general bull sign)`, Math.round(5*wMul), 1, tier);
    else if(BEAR_SIGNS.has(p.s))     add(`${name} in ${p.sign} (general bear sign)`, Math.round(5*wMul), -1, tier);

    // (5) Retrograde — bullish for gold/silver karakas, bearish for industrial commodity karakas
    // Per RG Krishnan: "When transit Mars/Saturn/Jupiter becomes retrograde, bullish trends in the
    // price of Gold are likely during the period of retrogression."
    if(p.retro){
      const precious = ['GOLD','SILVER','PLATINUM'].includes(commKey);
      if(precious && ['Mars','Saturn','Jupiter','Sun'].includes(name)){
        add(`${name} retrograde (RG Krishnan: bullish for precious)`, Math.round(12*wMul), 1, tier);
      } else {
        add(`${name} retrograde (industrial: trend pause)`, Math.round(8*wMul), -1, tier);
      }
    }
  };

  // Score the three karakas with descending weights (1.0 / 0.6 / 0.35)
  scoreKaraka(pri, com.pri, 1.00, 'pri');
  scoreKaraka(sec, com.sec, 0.60, 'sec');
  scoreKaraka(ter, com.ter, 0.35, 'ter');

  // ─────────────────────────────────────────────────────────────
  // SPECIAL YOGAS — apply once at the commodity level
  // ─────────────────────────────────────────────────────────────

  // (6) Day-lord & Hora-lord match (Atrish — own day boosts commodity)
  if(dayLord===com.pri)        add(`Day-lord is ${dayLord} (primary karaka day)`,    14, 1);
  else if(dayLord===com.sec)   add(`Day-lord is ${dayLord} (secondary karaka day)`,  8,  1);
  else if(dayLord===com.ter)   add(`Day-lord is ${dayLord} (tertiary karaka day)`,   4,  1);
  if(horaLord){
    if(horaLord===com.pri)     add(`Hora-lord ${horaLord} (primary karaka hora)`,    10, 1);
    else if(horaLord===com.sec)add(`Hora-lord ${horaLord} (secondary karaka hora)`,  5,  1);
  }

  // (7) Mars-Saturn 6/8 axis or conjunction — special for crude, base metals, gold (per Aggarwala)
  if(pm.Mars && pm.Saturn){
    const ms_diff = Math.abs(((pm.Mars.h - pm.Saturn.h) + 12) % 12);
    const sm_diff = Math.abs(((pm.Saturn.h - pm.Mars.h) + 12) % 12);
    const houseAxis68 = (ms_diff===2 || ms_diff===6 || sm_diff===2 || sm_diff===6);  // 6/8 from each other
    const lonDiff = n360(pm.Mars.lon - pm.Saturn.lon);
    const orbDeg = lonDiff>180 ? 360-lonDiff : lonDiff;
    if(['CRUDEOIL','NATGAS'].includes(commKey)){
      if(houseAxis68)              add(`Mars-Saturn 6/8 axis (Aggarwala: crude UP)`, 16, 1);
      if(orbDeg<10)                add(`Mars-Saturn conjunction (oil volatility UP)`, 14, 1);
    } else if(['COPPER','ZINC','STEEL','NICKEL','LEAD'].includes(commKey)){
      if(orbDeg<8)                 add(`Mars-Saturn tight conj (base metals bear)`, 14, -1);
      if(houseAxis68)              add(`Mars-Saturn 6/8 axis (industrial caution)`, 10, -1);
    } else if(commKey==='GOLD'){
      if(orbDeg<10 || houseAxis68) add(`Mars-Saturn affliction (gold safe-haven UP)`, 12, 1);
    }
  }

  // (8) Saturn/Rahu in watery sign — Gold UP (per RG Krishnan)
  if(commKey==='GOLD' || commKey==='SILVER'){
    if(pm.Saturn && WATER_SIGNS.has(pm.Saturn.s))
      add(`Saturn in ${pm.Saturn.sign} water sign (Krishnan: precious UP)`, 14, 1);
    if(pm.Rahu && WATER_SIGNS.has(pm.Rahu.s))
      add(`Rahu in ${pm.Rahu.sign} water sign (Krishnan: precious UP)`, 12, 1);
  }

  // (9) Saturn in fiery sign — Crude oil production disruption → prices UP (per Aggarwala)
  if(commKey==='CRUDEOIL' || commKey==='NATGAS'){
    if(pm.Saturn && FIRE_SIGNS.has(pm.Saturn.s))
      add(`Saturn in ${pm.Saturn.sign} fire sign (Aggarwala: oil disruption UP)`, 14, 1);
    if(pm.Saturn && WATER_SIGNS.has(pm.Saturn.s))
      add(`Saturn in ${pm.Saturn.sign} water sign (Aggarwala: production UP, oil DOWN)`, 12, -1);
  }

  // (10) Sun-Jupiter conjunction — Gold mega-bull (per Brihat Samhita Ch.16)
  if(commKey==='GOLD' && pm.Sun && pm.Jupiter){
    const sjDiff = n360(pm.Sun.lon - pm.Jupiter.lon);
    const sjOrb = sjDiff>180 ? 360-sjDiff : sjDiff;
    if(sjOrb<10) add(`Sun-Jupiter conjunction (BS Ch.16: gold mega-bull)`, 18, 1);
  }

  // (11) Jupiter conjunct/aspect on karaka — strong bullish for precious (per Aggarwala 2025 gold analysis)
  if(pri && pm.Jupiter && pri.name !== 'Jupiter'){
    const jpDiff = n360(pri.lon - pm.Jupiter.lon);
    const jpOrb = jpDiff>180 ? 360-jpDiff : jpDiff;
    if(jpOrb<8) add(`Jupiter conjunct ${com.pri} (benefic boost)`, 10, 1);
    // Jupiter's 5/7/9 aspects in Vedic
    const houseDiff = Math.abs(((pri.h - pm.Jupiter.h) + 12) % 12);
    if([4,6,8].includes(houseDiff)) add(`Jupiter aspecting ${com.pri} from ${pm.Jupiter.h}H`, 8, 1);
  }

  // (12) Mars-Saturn affliction on karaka — bearish (per Brihat Samhita 40.10)
  if(pri && pri.name !== 'Saturn' && pri.name !== 'Mars'){
    if(pm.Saturn){
      const houseDiff = Math.abs(((pri.h - pm.Saturn.h) + 12) % 12);
      if([2,6,9].includes(houseDiff) || houseDiff===0) add(`Saturn affliction on ${com.pri}`, 8, -1);
    }
  }

  // (13) VYAPAAR RATNA nakshatra rules — Sun, Mars, Saturn in 27 nakshatras
  // Pt. Hardev Sharma Trivedi & Pt. Gopesh Kumar Ojha — direct rule citations.
  // Each rule fires at ±8 weight (moderate; VR is confirmation, not primary).
  for(const planetName of ['Sun','Mars','Saturn']){
    const p = pm[planetName];
    const tbl = VYAPAR_NAKSHATRA[planetName];
    if(!p || !tbl) continue;
    // Find nakshatra index — match by name (NAKS array order)
    const nakIdx = NAKS.findIndex(n => n.n === p.nak);
    if(nakIdx < 0) continue;
    const rule = tbl[nakIdx];
    if(!rule) continue;
    if(rule.u && rule.u.includes(commKey)){
      add(`${planetName} in ${p.nak} → ${commKey} तेजी (Vyapaar Ratna)`, 8, 1);
    }
    if(rule.d && rule.d.includes(commKey)){
      add(`${planetName} in ${p.nak} → ${commKey} मन्दी (Vyapaar Ratna)`, 8, -1);
    }
  }

  // Normalize and classify
  const norm = Math.max(-100, Math.min(100, Math.round(sc*0.7)));
  const bias = norm>20 ? 'BULLISH' : norm<-20 ? 'BEARISH' : 'NEUTRAL';
  // Keep top 10 factors by absolute weight × direction for display
  const topFactors = F.slice().sort((a,b)=> Math.abs(b.w*b.d) - Math.abs(a.w*a.d)).slice(0,10);
  return {score:norm, bias, F:topFactors, allF:F};
}

          <div style="font-size:9px;color:#5ac8d8;margin-top:2px"><span style="color:var(--tx2)">H${p.h}</span> · ${p.nak.slice(0,9)} Pd${p.pada}</div>
          <div style="font-size:9px;color:#3a9090;margin-top:1px">NL:<span style="color:${pc(p.nakL)}">${p.nakL?p.nakL.slice(0,3):'—'}</span> SL:<span style="color:${pc(p.sub)};font-weight:700">${p.sub?p.sub.slice(0,3):'—'}</span> SSL:<span style="color:${pc(p.ss)}">${p.ss?p.ss.slice(0,3):'—'}</span></div>
        </div>`).join('')}

</div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════════
// TAB: D1 · D9 CHARTS
// ═══════════════════════════════════════════════════════════════════
function tCharts(){
  const D=DATA;
  const lagnaS=D.ascSign.s;
  const d9LagnaS=getD9(D.ascSid);
  const CS=80;

  function makeChart(pArr,lagS,title){
    const HM={1:[1,0],2:[2,0],3:[3,0],4:[3,1],5:[3,2],6:[3,3],7:[2,3],8:[1,3],9:[0,3],10:[0,2],11:[0,1],12:[0,0]};
    const sz=CS*4;
    let s=`<svg width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">`;
    s+=`<rect width="${sz}" height="${sz}" fill="#010c12" rx="4" stroke="#104050" stroke-width="1.5"/>`;
    for(let h=1;h<=12;h++){
      const[r,c]=HM[h];const x=c*CS,y=r*CS;
      const sIdx=((lagS+h-2)%12+12)%12;
      const pH=pArr.filter(p=>(p.h||p.house)===h);
      const ang=[1,4,7,10].includes(h);
      s+=`<rect x="${x+.5}" y="${y+.5}" width="${CS-1}" height="${CS-1}" fill="${ang?'#021820':'#010e16'}" stroke="#0d3040" stroke-width=".5"/>`;
      s+=`<text x="${x+5}" y="${y+16}" fill="${ang?'#1e5068':'#0a2530'}" font-size="11" font-family="Courier New">${h}</text>`;
      s+=`<text x="${x+CS/2}" y="${y+34}" text-anchor="middle" fill="${ang?'#1e6080':'#0f3a50'}" font-size="11" font-family="Courier New">${SABB[sIdx]}</text>`;
      pH.forEach((p,i)=>{
        const col2=i%2,row2=Math.floor(i/2);
        s+=`<text x="${x+6+col2*(CS/2-4)}" y="${y+52+row2*15}" fill="${PC[p.name]||'#7ecad8'}" font-size="12" font-weight="bold" font-family="Courier New">${p.abbr}${Math.floor(p.deg||0).toString().padStart(2,'0')}</text>`;
      });
    }
    s+=`<line x1="0" y1="0" x2="${CS}" y2="${CS}" stroke="#0d3040" stroke-width=".5"/>`;
    s+=`<line x1="${sz}" y1="0" x2="${sz-CS}" y2="${CS}" stroke="#0d3040" stroke-width=".5"/>`;
    s+=`<line x1="0" y1="${sz}" x2="${CS}" y2="${sz-CS}" stroke="#0d3040" stroke-width=".5"/>`;
    s+=`<line x1="${sz}" y1="${sz}" x2="${sz-CS}" y2="${sz-CS}" stroke="#0d3040" stroke-width=".5"/>`;
    s+=`<rect x="${CS}" y="${CS}" width="${2*CS}" height="${2*CS}" fill="#010a10" stroke="#0d3040" stroke-width=".5"/>`;
    s+=`<text x="${1.5*CS}" y="${1.75*CS}" text-anchor="middle" fill="#1e5068" font-size="17" font-weight="bold" font-family="Courier New">${title}</text>`;
    s+=`<text x="${1.5*CS}" y="${1.95*CS}" text-anchor="middle" fill="#0d3040" font-size="12" font-family="Courier New">${SABB[lagS]} Lagna</text>`;
    s+=`<text x="${1.5*CS}" y="${2.1*CS}" text-anchor="middle" fill="#081c28" font-size="11" font-family="Courier New">${S.date}</text>`;
    return s+'</svg>';
  }

  const d9Planets=D.planets.map(p=>({...p,h:houseOf(p.d9Sign*30+15,d9LagnaS*30+15),house:houseOf(p.d9Sign*30+15,d9LagnaS*30+15),deg:p.d9Sign%1===0?15:p.d9Sign*30%30}));

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start">
    <div class="pnl" style="flex:1;min-width:470px">
      <div class="ph"><span class="dot"></span>D1 — LAGNA CHART · IST ${mtt(parseFloat(S.time)*60)}</div>
      <div class="pb" style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start">
        ${makeChart(D.planets,lagnaS,'D1')}
        <div style="min-width:140px">
          <div style="color:var(--tx3);font-size:10px;letter-spacing:.07em;margin-bottom:7px">HOUSE OCCUPANCY</div>
          ${Array.from({length:12},(_,i)=>{
            const h=i+1,ps=D.planets.filter(p=>p.h===h);
            return`<div style="display:flex;gap:5px;margin-bottom:4px;align-items:center">
              <span style="color:#4ab8c8;font-size:11px;width:26px">H${h}</span>
              ${ps.length?ps.map(p=>`<span style="color:${PC[p.name]};font-size:12px;font-weight:700">${p.abbr}</span>`).join(' '):'<span style="color:var(--tx3);font-size:11px">—</span>'}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="pnl" style="flex:1;min-width:470px">
      <div class="ph"><span class="dot"></span>D9 — NAVAMSA CHART</div>
      <div class="pb" style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start">
        ${makeChart(d9Planets,d9LagnaS,'D9')}
        <div style="min-width:140px">
          <div style="color:var(--tx3);font-size:10px;letter-spacing:.07em;margin-bottom:7px">NAVAMSA STRENGTH</div>
          <table class="tbl" style="font-size:11px">
            <thead><tr><th>Planet</th><th>D1</th><th>D9</th><th></th></tr></thead>
            <tbody>
              ${D.planets.slice(0,9).map(p=>{
                const vm=p.s===p.d9Sign;
                return`<tr>
                  <td style="color:${PC[p.name]};font-weight:700">${p.abbr}</td>
                  <td style="color:var(--tx2)">${p.sign.slice(0,3)}</td>
                  <td style="color:var(--tx2)">${SIGNS[p.d9Sign].slice(0,3)}</td>
                  <td>${vm?'<span class="pill pb-b" style="font-size:10px;padding:1px 6px">Vargo.</span>':'<span style="color:var(--tx3)">—</span>'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>`;
}


// ═══════════════════════════════════════════════════════════════════
// TAB: SBC
// ═══════════════════════════════════════════════════════════════════
function tSBC(){
  const D=DATA;
  const activeNaks=new Set(D.planets.map(p=>getNak(p.lon).idx));
  const VEDHA={0:13,1:14,2:15,3:16,4:17,5:18,6:19,7:20,8:21,9:22,10:23,11:24,12:25,13:0,14:1,15:2,16:3,17:4,18:5,19:6,20:7,21:8,22:9,23:10,24:11,25:12};
  const vedhaSet=new Set([...activeNaks].map(n=>VEDHA[n]).filter(n=>n!==undefined));
  const SBC_POS=[[0,1,0],[0,2,1],[0,3,2],[0,4,3],[0,5,4],[0,6,5],[0,7,6],[1,8,7],[2,8,8],[3,8,9],[4,8,10],[5,8,11],[6,8,12],[7,8,13],[8,7,14],[8,6,15],[8,5,16],[8,4,17],[8,3,18],[8,2,19],[8,1,20],[7,0,21],[6,0,22],[5,0,23],[4,0,24],[3,0,25],[2,0,26],[1,0,-1]];
  const INNER=[[2,3,'Cancer'],[2,4,'Gemini'],[2,5,'Taurus'],[3,2,'Leo'],[3,6,'Aries'],[4,2,'Virgo'],[4,6,'Pisces'],[5,2,'Libra'],[5,6,'Aquarius'],[6,3,'Scorpio'],[6,4,'Sagittarius'],[6,5,'Capricorn']];
  const CS=62,SZ=9*CS;

  let svg=`<svg width="${SZ}" height="${SZ}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${SZ}" height="${SZ}" fill="#010b0f" rx="4" stroke="#104050" stroke-width="1.5"/>`;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const corner=(r===0||r===8)&&(c===0||c===8);
    svg+=`<rect x="${c*CS}" y="${r*CS}" width="${CS}" height="${CS}" fill="${corner?'#01080c':'#01101a'}" stroke="#0a2030" stroke-width=".4"/>`;
  }
  for(const[r,c,sn] of INNER){
    svg+=`<rect x="${c*CS+.5}" y="${r*CS+.5}" width="${CS-1}" height="${CS-1}" fill="#01121e" stroke="#0d3040" stroke-width=".5"/>`;
    svg+=`<text x="${c*CS+CS/2}" y="${r*CS+CS/2+4}" text-anchor="middle" fill="#1e5068" font-size="11" font-family="Courier New">${sn.slice(0,3)}</text>`;
  }
  svg+=`<rect x="${3*CS}" y="${3*CS}" width="${3*CS}" height="${3*CS}" fill="#010a10" stroke="#0d3040" stroke-width=".5"/>`;
  svg+=`<text x="${4.5*CS}" y="${4.3*CS}" text-anchor="middle" fill="#1e6080" font-size="15" font-weight="bold" font-family="Courier New">SARVATOBHADRA</text>`;
  svg+=`<text x="${4.5*CS}" y="${4.6*CS}" text-anchor="middle" fill="#1e6080" font-size="15" font-weight="bold" font-family="Courier New">CHAKRA</text>`;
  svg+=`<text x="${4.5*CS}" y="${4.85*CS}" text-anchor="middle" fill="#0a2a38" font-size="11" font-family="Courier New">${S.date}</text>`;

  for(const[r,c,ni] of SBC_POS){
    const nak=ni>=0?NAKS[ni]:null;
    const isAct=ni>=0&&activeNaks.has(ni);
    const isVedha=ni>=0&&vedhaSet.has(ni);
    const ps=ni>=0?D.planets.filter(p=>getNak(p.lon).idx===ni):[];
    svg+=`<rect x="${c*CS+.5}" y="${r*CS+.5}" width="${CS-1}" height="${CS-1}" fill="${isAct?'#003020':isVedha?'#200010':'#010f18'}" stroke="${isAct?'#007040':isVedha?'#700020':'#0a2030'}" stroke-width="${isAct||isVedha?1.2:.4}"/>`;
    if(nak){
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+15}" text-anchor="middle" fill="${isAct?'#00c870':isVedha?'#d04080':'#1e5070'}" font-size="9.5" font-family="Courier New">${nak.n.slice(0,9)}</text>`;
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+26}" text-anchor="middle" fill="${PC[nak.l]||'#444'}" font-size="9" font-family="Courier New">${nak.l.slice(0,3)}</text>`;
    }else{
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+20}" text-anchor="middle" fill="#0d3040" font-size="9" font-family="Courier New">Abhijit</text>`;
    }
    ps.forEach((p,i)=>{
      svg+=`<text x="${c*CS+CS/2}" y="${r*CS+42+i*13}" text-anchor="middle" fill="${PC[p.name]}" font-size="12" font-weight="bold" font-family="Courier New">${p.abbr}</text>`;
    });
  }
  svg+=`</svg>`;

  const vedhaList=[];
  for(const ni of activeNaks){const vi=VEDHA[ni];if(vi!==undefined&&activeNaks.has(vi))vedhaList.push(`${NAKS[ni].n} ↔ ${NAKS[vi].n}`);}

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="pnl">
    <div class="ph"><span class="dot"></span>SARVATOBHADRA CHAKRA · ${S.date} · IST ${mtt(parseFloat(S.time)*60)}</div>
    <div class="pb">
      <div style="overflow-x:auto;display:flex;justify-content:center">${svg}</div>
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;font-size:10px">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;background:#003020;border:1px solid #007040;display:inline-block"></span><span style="color:#5ad0e0">Active nakshatra (planet present)</span></span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;background:#200010;border:1px solid #700020;display:inline-block"></span><span style="color:#5ad0e0">Vedha opposition</span></span>
      </div>
      ${vedhaList.length?`<div style="margin-top:6px;font-size:10px;padding:5px 10px;background:var(--bear3);border:1px solid var(--bear2);border-radius:3px;color:var(--bear)">⚠ Active Vedha: ${vedhaList.join(' | ')}</div>`:''}
    </div>
  </div>
  <div class="pnl">
    <div class="ph"><span class="dot"></span>NAKSHATRA POSITIONS — ALL PLANETS</div>
    <div class="pb" style="display:flex;gap:8px;flex-wrap:wrap">
      ${D.planets.map(p=>{const nk=getNak(p.lon);const vi=VEDHA[nk.idx];const vaktive=vi!==undefined&&activeNaks.has(vi);
      return`<div style="background:var(--bg2);border:1px solid var(--bd);border-left:2px solid ${PC[p.name]};padding:5px 9px;border-radius:3px${vaktive?';border-top:1px solid var(--bear2)':''}">
        <div style="font-size:11px;font-weight:700;color:${PC[p.name]}">${p.name}${p.retro?' <span style="color:var(--bear)">℞</span>':''}</div>
        <div style="font-size:9px;color:var(--tx1);margin-top:1px">${nk.n}</div>
        <div style="font-size:9px;color:#3a9090">${p.sign} ${dmsC(p.deg)} Pd${nk.pada}</div>
        <div style="font-size:9px;color:${pc(p.sub)}">${p.sub}</div>
        ${vaktive?`<div style="font-size:8px;color:var(--bear)">Vedha: ${NAKS[vi]?.n}</div>`:''}
      </div>`;}).join('')}
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════════
// TAB: 5-MIN TIMING (24H · 288 slots)
// ═══════════════════════════════════════════════════════════════════
function tTiming(){
  const D=DATA;
  const curMin=parseFloat(S.time)*60;
  const com = CBYK[S.selectedCom] || COMMODITIES[0];
  // Filter selector — view all 288 slots, MCX-only, or near current time
  const view = S.timingView || 'mcx';
  let slots = D.slots;
  if(view==='mcx')   slots = D.slots.filter(s=>s.mcx);
  if(view==='near')  slots = D.slots.filter(s=>Math.abs(s.min-curMin)<=60);  // ±1h around now

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="pnl" style="padding:8px 12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;border-left:3px solid var(--acc)">
    <span style="color:var(--acc);font-size:11px;font-weight:700;letter-spacing:.05em">⏱ VIEW:</span>
    ${[['all','All 288 slots (00:00 → 23:55)'],['mcx','MCX session only (09:00 → 23:30)'],['near','Near current time (±60 min)']].map(([k,l])=>`

// ── ANCHOR RESOLUTION ──────────────────────────────────────────────
// Gann SQ9 levels are FIXED reference points for the trading session.
// We track only TWO prices: Day Open and Previous Close. The user
// selects which one anchors the levels via the Gann Anchor dropdown.
// ═══════════════════════════════════════════════════════════════════
function resolveAnchor(mode, open, prevClose, ltp){
  // mode: 'open' | 'prevclose' | 'ltp'
  const ok = v => typeof v==='number' && isFinite(v) && v>0;
  if(mode==='ltp'){
    if(ok(ltp))       return {price: ltp,       label:'LTP',       src:'ltp'};
    if(ok(open))      return {price: open,      label:'Open (LTP unavailable)', src:'open(fallback)'};
    if(ok(prevClose)) return {price: prevClose, label:'Prev Close (LTP unavailable)', src:'prevclose(fallback)'};
    return                   {price: 0,         label:'No data',   src:'none'};
  }
  if(mode==='prevclose'){
    if(ok(prevClose)) return {price: prevClose, label:'Prev Close', src:'prevclose'};
    if(ok(open))      return {price: open,      label:'Open (PC unavailable)', src:'open(fallback)'};
    return                   {price: 0,         label:'No data',   src:'none'};
  }
  // Default: open
  if(ok(open))      return {price: open,      label:'Open',      src:'open'};
  if(ok(ltp))       return {price: ltp,       label:'LTP (Open unavailable)', src:'ltp(fallback)'};
  if(ok(prevClose)) return {price: prevClose, label:'Prev Close (Open unavailable)', src:'prevclose(fallback)'};
  return                   {price: 0,         label:'No data',   src:'none'};
}

function rEvents(){
  const b=(id,evt,k)=>{const e=document.getElementById(id);if(e)e.addEventListener(evt,ev=>gs({[k]:ev.target.value}));};
  b('iD','change','date');b('iT','change','time');
  b('iA','change','ayMode');b('iGA','change','gannAnchor');
  b('iC','change','selectedCom');
  // Commodity-specific price inputs.
  // For PLATINUM/STEEL (parityScale=null, no MCX listing) the iCO/iCP/iCL fields
  // bind to usdOpen/usdPrev/usdLtp. For everything else they bind to MCX INR.
  const com = CBYK[S.selectedCom] || COMMODITIES[0];
  const noMcx = com.parityScale === null;
  const bindPriceInput = (id, fieldUsd, fieldInr) => {
    const e = document.getElementById(id);
    if(!e) return;
    e.addEventListener('change', ev=>{
      const v = ev.target.value;
      if(noMcx){
        const num = parseFloat(v);
        S.prices = {...S.prices, [com.k]:{...S.prices[com.k], [fieldUsd]: isFinitePos(num)?num:null}};
      } else {
        S.prices = {...S.prices, [com.k]:{...S.prices[com.k], [fieldInr]:v}};
      }
      S._userEditedPrices = true;
      render();
    });
  };
  bindPriceInput('iCL', 'usdLtp',  'ltp');
  bindPriceInput('iCO', 'usdOpen', 'open');
  bindPriceInput('iCP', 'usdPrev', 'prev');
  // Lat/Lon binding — these mutate the module-level constants and re-render
  const eLA=document.getElementById('iLA');
  if(eLA)eLA.addEventListener('change',ev=>{const v=parseFloat(ev.target.value);if(!isNaN(v)&&v>=-90&&v<=90){LAT=v;render();}else{ev.target.value=LAT.toFixed(4);}});
  const eLO=document.getElementById('iLO');
  if(eLO)eLO.addEventListener('change',ev=>{const v=parseFloat(ev.target.value);if(!isNaN(v)&&v>=-180&&v<=180){LON=v;render();}else{ev.target.value=LON.toFixed(4);}});
}

// LIVE PRICE FETCHER — Commodity-aware, multi-source
// ───────────────────────────────────────────────────────────────────
// Fetches OPEN + PREV-CLOSE for the 7 commodities that have free
// Yahoo Finance feeds. Three (Zinc, Nickel, Lead) trade primarily on
// LME and have no free CORS-accessible feed — those remain MANUAL.
//
// Yahoo's regularMarketDayOpen meta + previous day's close from the
// daily candles array gives us authoritative session anchors.
//
// HONEST CAVEAT: free CORS proxies are flaky. Three are tried before
// giving up. If all fail, the user pastes prices manually — and that
// is a perfectly valid workflow (most pro traders type values anyway).
// ═══════════════════════════════════════════════════════════════════

const PROXIES = [
  // allorigins is the most reliable free CORS proxy as of 2026 (allow-origin: *)
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,  // wrapped JSON
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,
];

const withTimeout = (p, ms=8000) =>
  Promise.race([p, new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout')), ms))]);

const isFinitePos = v => typeof v==='number' && isFinite(v) && v>0;

// ── Yahoo Finance daily candles ─ returns {open, prevClose, ltp} ────
// open      = today's session open (q.open[lastIdx])
// prevClose = yesterday's close (meta.chartPreviousClose, falls back to q.close[-2])
// ltp       = live last-traded price (meta.regularMarketPrice, falls back to q.close[last])
async function yfFetch(sym, proxify){
  const target = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`;
  const url = proxify ? proxify(target) : target;
  const r = await withTimeout(fetch(url,{mode:'cors',credentials:'omit',headers:{'Accept':'application/json'}}));
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  let j;
  try {
    j = JSON.parse(text);
    if(j && typeof j.contents === 'string' && !j.chart){
      j = JSON.parse(j.contents);
    }
  } catch(e){
    throw new Error('JSON parse: ' + e.message.slice(0,40));
  }
  const res  = j?.chart?.result?.[0];
  const meta = res?.meta || {};
  const ts   = res?.timestamp || [];
  const q    = res?.indicators?.quote?.[0];
  if(!ts.length || !q) throw new Error('no daily candles');
  const lastIdx = ts.length - 1;
  const open      = q.open?.[lastIdx];
  const prevClose = meta.chartPreviousClose ?? (ts.length >= 2 ? q.close?.[lastIdx - 1] : null);
  const ltp       = meta.regularMarketPrice ?? q.close?.[lastIdx];
  if(!isFinitePos(open) && !isFinitePos(prevClose) && !isFinitePos(ltp)) throw new Error('no valid prices');
  return {
    open:      isFinitePos(open)?open:null,
    prevClose: isFinitePos(prevClose)?prevClose:null,
    ltp:       isFinitePos(ltp)?ltp:null
  };
}

// ── Multi-commodity Yahoo batch — uses single proxy for all symbols ──
// Fetches COMEX/NYMEX USD prices for the 7 commodities with yf symbols
// AND USDINR=X for parity. NEVER overwrites the MCX INR fields — those
// only change via the PASTE MCX or per-commodity manual paste workflows.
// USD values are stored separately in usdOpen/usdPrev for dual display.
async function fetchAllViaProxy(proxify){
  const out = {usd:{}, usdinr:null};
  const yahooEligible = COMMODITIES.filter(c => c.yf);
  const tasks = yahooEligible.map(async c => {
    try { out.usd[c.k] = await yfFetch(c.yf, proxify); }
    catch(e){ out.usd[c.k] = null; }
  });
  // USDINR=X — Yahoo FX symbol for spot USD/INR
  tasks.push((async () => {
    try {
      const fx = await yfFetch('USDINR=X', proxify);
      // Latest reliable value is the previous close (today's open may be NaN before US wakes)
      out.usdinr = isFinitePos(fx.open) ? fx.open
                 : isFinitePos(fx.prevClose) ? fx.prevClose
                 : null;
    } catch(e){ out.usdinr = null; }
  })());
  await Promise.all(tasks);
  const got = Object.values(out.usd).filter(v=>v && (isFinitePos(v.open) || isFinitePos(v.prevClose))).length;
  if(got < 1) throw new Error('no USD data returned');
  return out;
}

// ── Source list — three independent CORS proxies in priority order ──
const PRICE_SOURCES = [
  {name:'Yahoo via allorigins/raw', go:()=>fetchAllViaProxy(PROXIES[0])},
  {name:'Yahoo via corsproxy.io',   go:()=>fetchAllViaProxy(PROXIES[2])},
  {name:'Yahoo via allorigins/get', go:()=>fetchAllViaProxy(PROXIES[1])},
  {name:'Yahoo via cors.lol',       go:()=>fetchAllViaProxy(PROXIES[4])},
  {name:'Yahoo via codetabs',       go:()=>fetchAllViaProxy(PROXIES[3])},
];

function fmtPrice(p){
  if(!isFinitePos(p)) return '—';
  return Number(p).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:2});
}

function nowISTStr(){
  try{
    return new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour12:false,
      hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){return new Date().toTimeString().slice(0,8);}
}

// MCX is the user's exchange — open 09:00–23:30 IST Mon–Fri.
// Saturday: 09:00–14:00 for non-agri commodities; we keep it simple
// and refresh on weekdays only.
function isMarketHours(){
  try{
    const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const day=ist.getDay();
    if(day===0) return false; // Sunday
    const m=ist.getHours()*60+ist.getMinutes();
    return m>=MCX_OPEN_MIN && m<=MCX_CLOSE_MIN;
  }catch(e){return false;}
}

async function fetchPrices(){
  PS={...PS,state:'fetching',src:'',ts:nowISTStr(),tried:[]};
  const pb=document.getElementById('price-bar');
  if(pb) pb.innerHTML=buildPriceBar();

  for(const src of PRICE_SOURCES){
    try{
      PS.tried.push(src.name);
      if(pb) pb.innerHTML=buildPriceBar();
      const r = await src.go();   // {usd:{GOLD:{open,prevClose,ltp},...}, usdinr:86.12}
      const newPrices = {...PS.prices};
      for(const k of Object.keys(r.usd||{})){
        if(!r.usd[k]) continue;
        newPrices[k] = {
          ...(newPrices[k]||{}),
          usdOpen: r.usd[k].open,
          usdPrev: r.usd[k].prevClose,
          usdLtp:  r.usd[k].ltp
        };
        // Always update USD fields — they're independent of MCX INR
        if(isFinitePos(r.usd[k].open))      S.prices[k].usdOpen = r.usd[k].open;
        if(isFinitePos(r.usd[k].prevClose)) S.prices[k].usdPrev = r.usd[k].prevClose;
        if(isFinitePos(r.usd[k].ltp))       S.prices[k].usdLtp  = r.usd[k].ltp;
      }
      if(isFinitePos(r.usdinr)) {
        S.usdinr = r.usdinr;
        PS.usdinr = r.usdinr;
      }
      PS = {...PS, state:'ok', src:src.name, ts:nowISTStr(), prices:newPrices};
      render();
      return;
    }catch(e){ /* try next proxy */ }
  }
  PS={...PS,state:'error',src:'all proxies failed',ts:nowISTStr()};
  if(pb) pb.innerHTML=buildPriceBar();
}

function buildPriceBar(){
  const stCol = PS.state==='ok' ? 'var(--bull)' :
                PS.state==='error' ? 'var(--bear)' :
                PS.state==='fetching' ? 'var(--neut)' : 'var(--tx3)';
  const stIco = PS.state==='ok' ? '<span class="live-dot"></span>' :
                PS.state==='fetching' ? '<span class="spin-anim">⟳</span>' :
                PS.state==='error' ? '⚠' : '○';
  const mh = isMarketHours();
  const tried = (PS.tried||[]).join(', ');
  const fx = isFinitePos(S.usdinr) ? S.usdinr : SEED_USDINR;

  // Per-commodity triple-feed cards:
  //   LTP   (large, color-coded green/red vs prev close)
  //   Open  (small)
  //   Prev  (small)
  //   USD LTP + USD Open + USD Prev (small)
  //   Parity ratio (LTP-based for live spread)
  const sel = S.selectedCom;
  const cards = COMMODITIES.map(c=>{
    const sp = S.prices?.[c.k] || {};
    const inrOpen = parseFloat(sp.open);
    const inrPrev = parseFloat(sp.prev);
    const inrLtp  = parseFloat(sp.ltp) || inrOpen;
    const usdOpen = sp.usdOpen;
    const usdPrev = sp.usdPrev;
    const usdLtp  = isFinitePos(sp.usdLtp) ? sp.usdLtp : usdOpen;
    const isSel = c.k===sel;
    const noMcx = (c.parityScale === null);
    const noUsd = !isFinitePos(usdLtp) && !isFinitePos(usdOpen);

    // Color the LTP based on change vs prev close
    const inrChg = isFinitePos(inrLtp) && isFinitePos(inrPrev) ? (inrLtp - inrPrev) : 0;
    const usdChg = isFinitePos(usdLtp) && isFinitePos(usdPrev) ? (usdLtp - usdPrev) : 0;
    const inrChgPct = inrPrev>0 ? (inrChg/inrPrev*100) : 0;
    const usdChgPct = usdPrev>0 ? (usdChg/usdPrev*100) : 0;
    const inrCol = inrChg>0.0001 ? 'var(--bull)' : inrChg<-0.0001 ? 'var(--bear)' : 'var(--tx1)';
    const usdCol = usdChg>0.0001 ? 'var(--bull)' : usdChg<-0.0001 ? 'var(--bear)' : 'var(--tx1)';

    // Parity uses LTP for live spread (preferred), falls back to open
    let parityRow = '';
    const mcxRef = isFinitePos(inrLtp) ? inrLtp : inrOpen;
    const usdRef = isFinitePos(usdLtp) ? usdLtp : usdOpen;
    if(c.parityScale && isFinitePos(mcxRef) && isFinitePos(usdRef)){
      const implied = usdRef * fx * c.parityScale;
      const ratio = mcxRef / implied;
      const premPct = (ratio - 1) * 100;
      const pcol = Math.abs(premPct) < 0.5 ? 'var(--tx3)'
                 : premPct > 0 ? 'var(--neut)' : 'var(--acc)';
      parityRow = `<span style="font-size:7px;color:${pcol};letter-spacing:.02em" title="LTP parity: MCX ₹${fmtPrice(mcxRef)} vs implied ₹${implied.toFixed(2)} at USD/INR ${fx.toFixed(2)}">par ${ratio.toFixed(3)}× (${premPct>=0?'+':''}${premPct.toFixed(1)}%)</span>`;
    } else if(noMcx){
      parityRow = `<span style="font-size:7px;color:var(--tx3)">${c.usdExch} only</span>`;
    } else if(noUsd){
      parityRow = `<span style="font-size:7px;color:var(--tx3)">no USD feed</span>`;
    } else {
      parityRow = `<span style="font-size:7px;color:var(--tx3)">${c.usdExch}</span>`;
    }

    const bg = isSel ? 'var(--bg1)' : 'transparent';
    const bd = isSel ? `1px solid ${c.col}` : '1px solid var(--bd)';
    const tip = `${c.n} · ${c.exchange}${noMcx?' · NYMEX-only, no MCX':''}${!c.yf?' · LME manual':''}`;

    const mcxBlock = noMcx
      ? `<span style="font-size:7px;color:var(--tx4);font-style:italic">— no MCX —</span>`
      : `<span style="font-size:11px;color:${inrCol};font-weight:700;font-family:monospace" title="MCX LTP">
           ₹${fmtPrice(inrLtp)}${inrChgPct?` <span style="font-size:8px">(${inrChgPct>=0?'+':''}${inrChgPct.toFixed(2)}%)</span>`:''}
         </span>
         <span style="font-size:7px;color:var(--tx3);font-family:monospace">O ${fmtPrice(inrOpen)} · PC ${fmtPrice(inrPrev)}</span>`;

    const usdBlock = noUsd
      ? `<span style="font-size:7px;color:var(--tx4);font-style:italic">— no $ feed —</span>`
      : `<span style="font-size:9px;color:${usdCol};font-family:monospace" title="${c.usdExch} ${c.usdUnit}">
           $${fmtPrice(usdLtp)}${usdChgPct?` <span style="font-size:7px">(${usdChgPct>=0?'+':''}${usdChgPct.toFixed(2)}%)</span>`:''}
         </span>
         <span style="font-size:7px;color:var(--tx3);font-family:monospace">O ${fmtPrice(usdOpen)} · PC ${fmtPrice(usdPrev)}</span>`;

    return `<div onclick="selectCom('${c.k}')" style="background:${bg};border:${bd};border-radius:3px;padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;line-height:1.25;min-width:138px" title="${tip}">
      <span style="font-size:9px;color:${c.col};font-weight:700;letter-spacing:.05em">${c.k}</span>
      ${mcxBlock}
      <span style="height:1px;background:var(--bd);margin:2px 0"></span>
      ${usdBlock}
      ${parityRow}
    </div>`;
  }).join('');

  return `
<div style="background:var(--bg2);border-bottom:1px solid var(--bd);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
  <div style="display:flex;gap:5px;flex-wrap:wrap">${cards}</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <div style="display:flex;flex-direction:column;line-height:1.15;padding:3px 8px;background:var(--bg3);border:1px solid var(--bd2);border-radius:3px">
      <span style="font-size:8px;color:var(--tx3);letter-spacing:.05em">USD/INR</span>
      <strong style="font-size:12px;color:var(--acc);font-family:monospace">${fx.toFixed(2)}</strong>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:${stCol};max-width:240px">
      ${stIco}
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${
        PS.state==='ok'      ? `${PS.src} · ${PS.ts}` :
        PS.state==='fetching'? `Fetching… (${tried||'starting'})` :
        PS.state==='error'   ? `Auto-fetch failed — paste manually` :
                                'Idle'
      }</span>
    </div>
    <span style="font-size:9px;color:${mh?'var(--bull)':'var(--tx3)'}">
      ${mh?'● MCX LIVE':'○ MCX CLOSED'}
    </span>
    <button onclick="pasteMcxHeatmap()" style="background:var(--bg3);color:var(--bull);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em" title="Paste full MCX Heatmap — auto-fills all 8 MCX commodities">
      ⎘ MCX
    </button>
    <button onclick="pasteIntlPrompt()" style="background:var(--bg3);color:#7fb3c0;border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em" title="Paste COMEX/NYMEX/LME USD price for focus commodity">
      ⎘ INTL
    </button>
    <button onclick="pastePrompt()" style="background:var(--bg3);color:var(--tx1);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em" title="Paste INR open + prev for focus commodity">
      ⎘ INR
    </button>
    <button onclick="fetchPrices()" style="background:var(--bg3);color:var(--acc);border:1px solid var(--bd2);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.05em">
      ⟳ REFRESH
    </button>
  </div>
</div>`;
}

// Helper called from price-bar mini-cards
window.selectCom = function(k){
  if(!CBYK[k]) return;
  S.selectedCom = k;
  // Sync the focus dropdown if present
  const iC = document.getElementById('iC');
  if(iC) iC.value = k;
  render();
};

// Paste prices for the currently-focused commodity (INR / MCX).
// Accepts 2 values (LTP + PrevClose) or 3 (LTP + Open + PrevClose).
window.pastePrompt = function(){
  const k = S.selectedCom;
  const c = CBYK[k];
  if(c.parityScale === null){
    alert(`${c.n} doesn't trade on MCX (${c.usdExch} only).\nUse the INTL paste button instead to set USD prices.`);
    return;
  }
  const cur = `${S.prices[k].ltp||S.prices[k].open||''},${S.prices[k].open||''},${S.prices[k].prev||''}`;
  const txt = prompt(
    `Paste MCX INR prices for ${c.n} (${c.unit}):\n\n` +
    `Order: LTP, OPEN, PREV CLOSE   (3 values, OPEN optional)\n` +
    `   OR: LTP, PREV CLOSE         (2 values — open inherits LTP)\n\n` +
    `Separator: comma, space, tab, or newline\n\n` +
    `Example:\n` +
    `  ${cur}`,
    cur
  );
  if(!txt) return;
  const nums = txt.split(/[^\d.\-]+/).filter(Boolean).map(parseFloat).filter(n=>!isNaN(n)&&n>0);
  if(nums.length < 2){
    alert(`Need 2 or 3 numbers, got ${nums.length}.\nFormat: LTP, [OPEN,] PREV CLOSE`);
    return;
  }
  if(nums.length >= 3){
    S.prices[k].ltp  = String(nums[0]);
    S.prices[k].open = String(nums[1]);
    S.prices[k].prev = String(nums[2]);
  } else {
    S.prices[k].ltp  = String(nums[0]);
    S.prices[k].open = String(nums[0]);   // inherit
    S.prices[k].prev = String(nums[1]);
  }
  S._userEditedPrices = true;
  PS.state = 'ok'; PS.src = `Manual INR · ${k}`; PS.ts = nowISTStr();
  render();
};

  const nums = txt.split(/[^\d.\-]+/).filter(Boolean).map(parseFloat).filter(n=>!isNaN(n)&&n>0);

// ── BULK MCX HEATMAP PASTE ─────────────────────────────────────────
// User goes to mcxindia.com/en/market-data/heatmap, Ctrl+A, Ctrl+C,
// clicks our PASTE MCX button and pastes the whole page.
// We tokenise on whitespace, then look for exact-match anchor tokens
// for the 8 commodities MCX lists (GOLD, SILVER, CRUDEOIL, NATURALGAS,
// COPPER, ZINC, NICKEL, LEAD) and pull the LTP + percent change that
// follow. Prev close = LTP / (1 + pct/100). MCX heatmap shows the
// previous day's close (since "As on DD MMM YYYY 23:30" is the
// after-hours snapshot), which becomes today's reference open.
//
// Disambiguation: MCX lists multiple GOLD contracts (GOLD, GOLDM,
// GOLDTEN, GOLDGUINEA, GOLDPETAL). We match EXACT token "GOLD" only,
// which gives us the main 1kg lot contract (~₹162,000/10g range).
window.pasteMcxHeatmap = function(){
  // Anchors we'll look for in the pasted text. Order matters for
  // longest-first matching to avoid GOLD eating GOLDM/GOLDTEN.
  const ANCHORS = [
    {pat:/^GOLDPETAL$/,  k:null},   // skip 1g sub-contract
    {pat:/^GOLDGUINEA$/, k:null},   // skip 8g sub-contract
    {pat:/^GOLDTEN$/,    k:null},   // skip 10g lot variant
    {pat:/^GOLDM$/,      k:null},   // skip 100g mini
    {pat:/^GOLD$/,       k:'GOLD'},
    {pat:/^SILVERM$/,    k:null},
    {pat:/^SILVERMIC$/,  k:null},
    {pat:/^SILVER$/,     k:'SILVER'},
    {pat:/^CRUDEOILM$/,  k:null},
    {pat:/^CRUDEOIL$/,   k:'CRUDEOIL'},
    {pat:/^NATURALGAS$/, k:'NATGAS'},
    {pat:/^NATGASMINI$/, k:'NATGAS'},  // accept either spelling
    {pat:/^COPPER$/,     k:'COPPER'},
    {pat:/^ZINC$/,       k:'ZINC'},
    {pat:/^ZINCMINI$/,   k:'ZINC'},
    {pat:/^NICKEL$/,     k:'NICKEL'},
    {pat:/^LEAD$/,       k:'LEAD'},
    {pat:/^LEADMINI$/,   k:'LEAD'}
  ];
  const dialog =
    'Paste the FULL MCX Heatmap page (Ctrl+A, Ctrl+C at\n' +
    'mcxindia.com/en/market-data/heatmap, then paste here).\n\n' +
    'We will parse all 8 MCX commodities automatically.\n' +
    'Sub-contracts (GOLDM, GOLDPETAL, SILVERM etc.) are ignored.\n\n' +
    'Platinum & Steel: NYMEX-only, will not be updated here.';
  const txt = prompt(dialog, '');
  if(!txt || txt.length < 20) return;

  // Tokenise — split on anything that isn't an alphanumeric/percent/dot/minus
  // Keep "%" and "." attached to numbers so we can spot percent change.
  const toks = txt.toUpperCase().replace(/[,\r]/g,'').split(/\s+/).filter(Boolean);

  const found = {};   // {COMMODITY_KEY: {ltp, pct}}
  const taken = new Set();   // commodities already set (longest match wins)

  for(let i=0; i<toks.length; i++){
    const t = toks[i];
    let matched = null;
    for(const a of ANCHORS){
      if(a.pat.test(t)){ matched = a; break; }
    }
    if(!matched) continue;
    // null target ⇒ skip sub-contract but still advance past its price block
    if(!matched.k){
      // Skip over date + price + pct (3 tokens roughly)
      i += 3;
      continue;
    }
    if(taken.has(matched.k)) continue;
    // Walk forward: skip date-like tokens, find first price, then pct.
    let ltp=null, pct=null;
    for(let j=i+1; j<Math.min(i+8,toks.length); j++){
      const v = toks[j];
      // Date pattern: 26MAY2026, 03JUL2026 etc.
      if(/^\d{1,2}[A-Z]{3}\d{4}$/.test(v)) continue;
      // Pure number
      const num = parseFloat(v.replace(/%$/,''));
      if(!isFinite(num)) continue;
      if(v.endsWith('%')){
        if(pct===null) pct = num;
      } else if(ltp===null){
        ltp = num;
      } else if(pct===null){
        // No % suffix but second number — treat as pct
        pct = num;
      }
      if(ltp!==null && pct!==null) break;
    }
    if(ltp!==null && ltp>0){
      found[matched.k] = {ltp, pct: pct||0};
      taken.add(matched.k);
      i += 3;
    }
  }

  const updated = [];
  for(const k of Object.keys(found)){
    const {ltp, pct} = found[k];
    // LTP from heatmap = today's open (or yesterday's close = today's reference).
    // Prev close = LTP / (1 + pct/100)
    const prev = pct!==0 ? ltp/(1 + pct/100) : ltp;
    // Heatmap value is the latest traded price (snapshot at posted timestamp).
    // → store as LTP. prev_close = ltp / (1 + pct/100) where pct is the day's change.
    // open is left alone unless null (in which case seed it = LTP as best-effort).
    S.prices[k].ltp  = String(ltp);
    S.prices[k].prev = String(Number(prev.toFixed(2)));
    if(!S.prices[k].open || S.prices[k].open==='null'){
      S.prices[k].open = String(ltp);
    }
    PS.prices = {...PS.prices, [k]:{
      ltp:ltp,
      prev:Number(prev.toFixed(2)),
      open: parseFloat(S.prices[k].open)
    }};
    updated.push(k);
  }
  if(updated.length === 0){
    alert('Could not find any commodity prices in the pasted text.\n\n' +
          'Make sure you copied the FULL heatmap page including the commodity names\n' +
          '(GOLD, SILVER, CRUDEOIL, NATURALGAS, COPPER, ZINC, NICKEL, LEAD).');
    return;
  }
  S._userEditedPrices = true;
  PS.state = 'ok';
  PS.src   = `MCX heatmap · ${updated.length} commodities`;
  PS.ts    = nowISTStr();
  render();
  // Brief, non-blocking confirmation
  console.log('MCX heatmap parsed:', updated.join(', '));
};

function scheduleAutoRefresh(){
  if(autoTimer) clearInterval(autoTimer);
  // Refresh every 90s during MCX hours, idle outside (saves bandwidth/proxies)
  autoTimer = setInterval(()=>{
    if(isMarketHours() && !S._userEditedPrices) fetchPrices();
  }, 90*1000);
}

// Track manual price edits so we don't overwrite on auto-refresh
document.addEventListener('input', e=>{
  const id = e.target?.id;
  if(id==='iCO' || id==='iCP' || id==='iCL') S._userEditedPrices = true;
});

// BOOT
// ═══════════════════════════════════════════════════════════════════
render();
fetchPrices();
scheduleAutoRefresh();

</script>
